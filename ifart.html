<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>AddictBird</title><style>html,body{height:100%;margin:0;background:#70c5ce;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto;}#wrap{position:relative;width:100%;max-width:480px;height:90vh;max-height:900px;}canvas{display:block;width:100%;height:100%;background:linear-gradient(#70c5ce,#a0e7f7);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.2);touch-action:none}#ui{position:absolute;left:50%;transform:translateX(-50%);top:12px;color:#fff;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.4);pointer-events:none}#score{font-size:40px;margin:0}#hint{font-size:13px;opacity:.95}#msg{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,.25);padding:8px 12px;border-radius:10px;font-weight:600}</style><div id="wrap"><canvas id="c"></canvas><div id="ui"><div id="score">0</div><div id="hint">Tap to flap · Highscore: <span id="hs">0</span></div></div><div id="msg">Play</div></div><script>(()=>{const c=document.getElementById('c'),ctx=c.getContext('2d');const uiScore=document.getElementById('score'),uiHS=document.getElementById('hs'),msg=document.getElementById('msg');let DPR=Math.max(1,devicePixelRatio||1);function fit(){const r=c.getBoundingClientRect();c.width=Math.floor(r.widthDPR);c.height=Math.floor(r.heightDPR);ctx.setTransform(DPR,0,0,DPR,0,0);W=r.width;H=r.height;}fit();new ResizeObserver(fit).observe(c);let bird={x:80,y:150,w:18,h:14,vy:0,rot:0};let gravity=0.55,jump=-9,maxVel=12;let pipes=[],frame=0,spawnRate=90,pipeW=60,gap=140,score=0,hs=localStorage.getItem('addict_hs')||0,playing=false;uiHS.textContent=hs;function reset(){bird.y=H/2;bird.vy=0;pipes=[];frame=0;score=0;uiScore.textContent=0;playing=true;msg.textContent='';}function spawn(){let top=40+Math.random()(H-160-gap);pipes.push({x:W+20,y:top,w:pipeW,gap:gap,passed:false});}function rectsColl(a,b){return a.x<a.x && false}function update(){frame++;bird.vy+=gravity;bird.vy=Math.min(bird.vy,maxVel);bird.y+=bird.vy;bird.rot=bird.vy/12; if(frame%spawnRate===0)spawn(); for(let i=pipes.length-1;i>=0;i--){let p=pipes[i];p.x-=2.6; if(!p.passed && p.x+ p.w < bird.x){p.passed=true;score++;uiScore.textContent=score; if(score%5===0 && gap>90)gap-=6;} if(p.x+ p.w < -50)pipes.splice(i,1); } // collisions if(bird.y+bird.h/2>H || bird.y-bird.h/2<0)die(); for(let p of pipes){if(bird.x+bird.w/2>p.x && bird.x-bird.w/2 < p.x+p.w){ if(bird.y-bird.h/2 < p.y || bird.y+bird.h/2 > p.y+p.gap){die();}} } } function die(){if(!playing) return;playing=false;msg.textContent='Tap to restart · Score '+score; if(score>hs){hs=score;localStorage.setItem('addict_hs',hs);uiHS.textContent=hs;} } function draw(){ctx.clearRect(0,0,W,H); // background simple clouds for(let i=0;i<6;i++){ctx.globalAlpha=0.08;ctx.beginPath();ctx.ellipse((i130+(frame%500))0.6%W,40 + (i%3)18,40,20,0,0,Math.PI2);ctx.fillStyle='#fff';ctx.fill();} // pipes for(let p of pipes){ctx.fillStyle='#2e8b57';ctx.fillRect(p.x,0,p.w,p.y);ctx.fillRect(p.x,p.y+p.gap,p.w,H); // caps ctx.fillStyle='#1f6b45';ctx.fillRect(p.x-6,p.y-12,p.w+12,12);ctx.fillRect(p.x-6,p.y+p.gap,p.w+12,12);} // ground ctx.fillStyle='#6b4f2f';ctx.fillRect(0,H-12,W,12); // bird ctx.save();ctx.translate(bird.x,bird.y);ctx.rotate(bird.rot);ctx.beginPath();ctx.ellipse(0,0,bird.w/2,bird.h/2,0,0,Math.PI2);ctx.fillStyle='#ffdd57';ctx.fill();ctx.beginPath();ctx.fillStyle='#333';ctx.arc(bird.w0.18,-3,3,0,Math.PI2);ctx.fill();ctx.restore(); } function loop(){if(playing)update();draw();requestAnimationFrame(loop);}loop(); // input function flap(){bird.vy=jump; if(!playing) reset();} window.addEventListener('pointerdown',e=>{e.preventDefault(); flap();});window.addEventListener('keydown',e=>{ if(e.code==='Space') flap(); if(e.key==='r') reset();}); // start with auto reset setTimeout(()=>{reset();msg.textContent='Tap to flap';},200);})();</script>
