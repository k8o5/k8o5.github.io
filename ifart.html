<!doctype html> <meta charset="utf-8"> <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">

<title>AddictBird — Omega Süchtig</title>
<style>html,body{height:100%;margin:0;background:#071021;display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto;color:#fff}#wrap{position:relative;width:100%;max-width:480px;height:92vh;max-height:920px;}canvas{display:block;width:100%;height:100%;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);background:linear-gradient(180deg,#0ea5bf 0%,#3b82f6 60%)}#ui{position:absolute;left:50%;transform:translateX(-50%);top:10px;color:#fff;text-align:center;pointer-events:none;width:92%}#score{font-size:36px;font-weight:700;text-shadow:0 6px 18px rgba(0,0,0,.6)}#hs{opacity:.85;font-size:13px}#msg{position:absolute;left:50%;transform:translateX(-50%);bottom:18px;color:#fff;background:linear-gradient(90deg,rgba(0,0,0,.35),rgba(255,255,255,.02));padding:10px 14px;border-radius:12px;font-weight:700;pointer-events:auto;user-select:none}#controls{position:absolute;left:12px;bottom:14px;color:#fff;font-size:13px;opacity:.95}#shop{position:absolute;right:12px;bottom:14px;background:rgba(0,0,0,.18);padding:8px 10px;border-radius:10px;font-weight:700}button.small{background:rgba(255,255,255,.06);border:0;padding:8px;border-radius:8px;color:#fff;font-weight:700}#toast{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);background:linear-gradient(180deg,#ffef6b,#ffb86b);color:#111;padding:10px 14px;border-radius:12px;font-weight:800;display:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}.coin{display:inline-block;margin-left:6px;background:gold;padding:6px 8px;border-radius:999px;color:#111;font-weight:800}</style>
<div id="wrap"><canvas id="c"></canvas>
  <div id="ui"><div id="score">0 <span id="hs">HS:0</span></div><div id="hint">Tap • Hold for boost • Tilt to steer</div></div>
  <div id="msg">Omega Mode activated — Tap to start</div>
  <div id="controls"><span id="coins">Coins: <span class="coin">0</span></span></div>
  <div id="shop"><button id="skinBtn" class="small">Skin</button> <button id="powerBtn" class="small">Power</button></div>
  <div id="toast"></div>
</div>
<script>
(() => {
  // --- setup
  const c = document.getElementById('c'), ctx = c.getContext('2d');
  const uiScore = document.querySelector('#score'), uiHS = document.querySelector('#hs'), msg = document.getElementById('msg');
  const coinsEl = document.querySelector('#coins .coin'), toast = document.getElementById('toast');
  let DPR = Math.max(1, devicePixelRatio || 1);
  function fit(){const r=c.getBoundingClientRect();c.width=Math.floor(r.width*DPR);c.height=Math.floor(r.height*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);W=r.width;H=r.height;}
  fit(); new ResizeObserver(fit).observe(c);// --- game state let W=320,H=568; // will be set by fit let bird = {x:80,y:150,w:20,h:16,vy:0,rot:0,boost:0,skin:0}; let gravity=0.55, jump=-9, maxVel=14; let pipes=[], frame=0, spawnRate=82, pipeW=68, gap=150, score=0, hs = +(localStorage.getItem('omega_hs')||0); let coins=+(localStorage.getItem('omega_coins')||0), multiplier=1, combo=0, comboT=0, playing=false, omega=false; let particles=[]; uiHS.textContent='HS:'+hs; coinsEl.textContent = coins;

// --- audio (tiny synth) const AudioCtx = window.AudioContext || window.webkitAudioContext; let ac = null; function beep(freq, time=0.06){ try{ if(!ac) ac=new AudioCtx(); const o=ac.createOscillator(), g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.type='sine'; o.frequency.value=freq; g.gain.value=0.08; o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime+time); o.stop(ac.currentTime+time+0.02);}catch(e){} }

// --- helpers function rand(a,b){return a+Math.random()*(b-a)} function toastMsg(t){toast.textContent=t; toast.style.display='block'; toast.style.opacity=1; setTimeout(()=>{toast.style.opacity=0; setTimeout(()=>toast.style.display='none',350)},1200)} function vibr(ms){ if(navigator.vibrate) navigator.vibrate(ms); }

// --- spawn function spawn(){ let top = 56 + Math.random()*(H-200-gap); pipes.push({x:W+20,y:top,w:pipeW,gap:gap,passed:false,coinGiven:false}); }

// --- particles function spawnParticles(x,y,n,clr){ for(let i=0;i<n;i++){particles.push({x,y,vx:rand(-2,2),vy:rand(-4,1),life:rand(30,70),r:rand(1,4),clr}); } } function updateParticles(){ for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; if(p.life<=0)particles.splice(i,1);} }

// --- collisions function rectIntersect(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by}

// --- powerups & shop let skinList = ['#ffdd57','#ff9fcc','#8ef6b3','#9ad0ff']; let activePower = null; let powerReady=true; document.getElementById('skinBtn').addEventListener('click',()=>{ bird.skin = (bird.skin+1)%skinList.length; toastMsg('Skin changed'); localStorage.setItem('omega_skin',bird.skin); }); document.getElementById('powerBtn').addEventListener('click',()=>{ if(!powerReady){ toastMsg('Power reloading'); return;} activePower='magnet'; powerReady=false; setTimeout(()=>{activePower=null; toastMsg('Power ended'); setTimeout(()=>{powerReady=true; toastMsg('Power ready')},3000)},6000); toastMsg('Power on'); }) bird.skin = +localStorage.getItem('omega_skin')||0;

// --- death function die(){ if(!playing) return; playing=false; vibr(120); beep(120,0.2); msg.textContent = 'Game Over · Tap to restart · Score '+score; if(score>hs){hs=score; localStorage.setItem('omega_hs',hs); uiHS.textContent='HS:'+hs; toastMsg('NEW HIGH SCORE!'); } // reward coins let cReward = Math.floor(score*0.6)+combo; coins+=cReward; localStorage.setItem('omega_coins',coins); coinsEl.textContent=coins; spawnParticles(bird.x,bird.y,18,'#fff'); }

// --- update function update(){ frame++; // physics bird.vy += gravity - (bird.boost?0.8:0); bird.vy = Math.max(Math.min(bird.vy,maxVel),-18); bird.y += bird.vy; bird.rot = Math.max(-0.9, Math.min(1.2, bird.vy/12)); // spawn if(frame%spawnRate===0) spawn(); // pipes for(let i=pipes.length-1;i>=0;i--){let p=pipes[i]; p.x -= 3; if(!p.passed && p.x + p.w < bird.x){ p.passed=true; score++; combo++; comboT=90; multiplier = 1 + Math.floor(combo/5)0.5; uiScore.firstChild.textContent = score + ' x'+multiplier; beep(800+score8,0.06); if(score%7===0){ gap = Math.max(96, gap-6); spawnParticles(W/2,80,18,'#ffd'); } } // coin in pipe if(!p.coinGiven && p.x < bird.x + 34 && p.x + p.w > bird.x -34){ // check overlap vertically let coinY = p.y + p.gap/2; if(Math.abs(bird.y - coinY) < 48){ p.coinGiven=true; let cAmt = 1+Math.floor(score/10); coins += cAmt; localStorage.setItem('omega_coins',coins); coinsEl.textContent = coins; spawnParticles(bird.x,bird.y,10,'gold'); beep(1200,0.04); toastMsg('+'+cAmt+' coins'); } } if(p.x + p.w < -80) pipes.splice(i,1); } // collisions with pipes for(let p of pipes){ if(rectIntersect(bird.x-bird.w/2,bird.y-bird.h/2,bird.w,bird.h,p.x,0,p.w,p.y) || rectIntersect(bird.x-bird.w/2,bird.y-bird.h/2,bird.w,bird.h,p.x,p.y+p.gap,p.w,H)){ die(); } } if(bird.y + bird.h/2 > H-12 || bird.y - bird.h/2 < 0) die(); if(comboT>0) comboT--; else combo=0; updateParticles(); }

// --- draw function draw(){ ctx.clearRect(0,0,W,H); // bg gradient handled by canvas size, draw sun ctx.save(); ctx.globalAlpha=0.08; for(let i=0;i<6;i++){ ctx.beginPath(); ctx.ellipse((i130+(frame%500))0.6%W,40 + (i%3)18,40,20,0,0,Math.PI2); ctx.fillStyle='#fff'; ctx.fill(); } ctx.restore(); // pipes for(let p of pipes){ ctx.fillStyle='#0b6b3b'; ctx.fillRect(p.x,p.y,p.w,p.y); ctx.fillRect(p.x,p.y+p.gap,p.w,H); ctx.fillStyle='#094f2b'; ctx.fillRect(p.x-6,p.y-12,p.w+12,12); ctx.fillRect(p.x-6,p.y+p.gap,p.w+12,12); // coin indicator if(!p.coinGiven && p.x < W){ ctx.beginPath(); ctx.fillStyle='gold'; ctx.arc(p.x + p.w/2, p.y + p.gap/2, 8,0,Math.PI2); ctx.fill(); ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(p.x + p.w/2-12, p.y + p.gap/2+10,24,6); } } // ground ctx.fillStyle='#3b2b1b'; ctx.fillRect(0,H-12,W,12); // bird ctx.save(); ctx.translate(bird.x,bird.y); ctx.rotate(bird.rot); ctx.beginPath(); ctx.ellipse(0,0,bird.w/2,bird.h/2,0,0,Math.PI2); ctx.fillStyle = skinList[bird.skin]||'#ffdd57'; ctx.fill(); ctx.beginPath(); ctx.fillStyle='#222'; ctx.arc(bird.w0.18,-3,3,0,Math.PI2); ctx.fill(); ctx.restore(); // particles for(let p of particles){ ctx.globalAlpha = Math.max(0, p.life/80); ctx.beginPath(); ctx.fillStyle = p.clr; ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); } // UI overlay ctx.globalAlpha = 1; }

// --- loop function loop(){ if(playing) update(); draw(); requestAnimationFrame(loop); } loop();

// --- input function startOrFlap(){ if(!playing){ reset(); } bird.vy = jump; bird.boost = 0; beep(1200,0.03); vibr(8); } window.addEventListener('pointerdown', e=>{ e.preventDefault(); bird.boost = 0.9; startOrFlap(); }); window.addEventListener('pointerup', e=>{ bird.boost = 0; }); window.addEventListener('keydown', e=>{ if(e.code==='Space') startOrFlap(); if(e.key==='r'){ reset(); } }); // tilt controls window.addEventListener('deviceorientation', e=>{ if(e.gamma){ bird.x = 80 + (e.gamma/30)*40; bird.x = Math.max(48, Math.min(W-48, bird.x)); } });

// --- reset function reset(){ bird.y = H/2; bird.vy = 0; pipes = []; frame = 0; score = 0; uiScore.textContent = '0 x1'; playing = true; msg.textContent=''; gap = 150; combo = 0; multiplier = 1; spawn(); spawn(); spawn(); }

// expose score text child for updates uiScore.firstChild; // ensure node exists

// start tiny tutorial / auto-start toggle setTimeout(()=>{ msg.textContent='Tap to flap · Hold for boost · Tilt to steer'; setTimeout(()=>{ msg.style.display='none' },2000); },300);

// auto-load skin bird.skin = +localStorage.getItem('omega_skin')||0;

// initial reset setTimeout(()=>{ reset(); },180);

// --- extras: mini achievements let ach = {first: false, ten: false}; function checkAchievements(){ if(!ach.first && score>=1){ ach.first=true; toastMsg('First Flight! +5 coins'); coins+=5; coinsEl.textContent=coins; localStorage.setItem('omega_coins',coins); spawnParticles(bird.x,bird.y,20,'#fff'); } if(!ach.ten && score>=10){ ach.ten=true; toastMsg('Combo King! +25 coins'); coins+=25; coinsEl.textContent=coins; localStorage.setItem('omega_coins',coins); } } setInterval(()=>{ if(playing) checkAchievements(); },800);

})(); </script>
