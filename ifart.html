<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Grok - The Most Addicting Mobile Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ded895;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size for mobile
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        let bird = {
            x: 50,
            y: canvas.height / 2,
            radius: 20,
            velocity: 0,
            gravity: 0.5,
            lift: -10,
            color: '#ffcc00'
        };

        let pipes = [];
        let pipeWidth = 80;
        let pipeGap = 150;
        let pipeSpeed = 3;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let gameOver = false;
        let started = false;

        // Background
        function drawBackground() {
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ded895';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
        }

        // Draw bird
        function drawBird() {
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fillStyle = bird.color;
            ctx.fill();
            ctx.closePath();
        }

        // Draw pipes
        function drawPipes() {
            pipes.forEach(pipe => {
                ctx.fillStyle = '#00ff00';
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height - pipe.top - pipeGap);
            });
        }

        // Draw score
        function drawScore() {
            ctx.font = '30px Arial';
            ctx.fillStyle = '#000';
            ctx.fillText(`Score: ${score}`, 20, 50);
            ctx.fillText(`High: ${highScore}`, 20, 90);
        }

        // Update bird position
        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.y + bird.radius > canvas.height - 50) {
                bird.y = canvas.height - 50 - bird.radius;
                bird.velocity = 0;
                if (started) gameOver = true;
            }

            if (bird.y - bird.radius < 0) {
                bird.y = bird.radius;
                bird.velocity = 0;
            }
        }

        // Generate pipes
        function generatePipes() {
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                let top = Math.floor(Math.random() * (canvas.height / 2 - pipeGap / 2)) + 50;
                pipes.push({ x: canvas.width, top: top });
            }
        }

        // Update pipes
        function updatePipes() {
            pipes.forEach(pipe => {
                pipe.x -= pipeSpeed;

                // Score when passing pipe
                if (pipe.x + pipeWidth < bird.x && !pipe.passed) {
                    score++;
                    pipe.passed = true;
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('highScore', highScore);
                    }
                }

                // Collision detection
                if (
                    bird.x + bird.radius > pipe.x &&
                    bird.x - bird.radius < pipe.x + pipeWidth &&
                    (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.top + pipeGap)
                ) {
                    gameOver = true;
                }
            });

            // Remove off-screen pipes
            pipes = pipes.filter(pipe => pipe.x + pipeWidth > 0);
        }

        // Game loop
        function gameLoop() {
            drawBackground();
            if (started && !gameOver) {
                updateBird();
                generatePipes();
                updatePipes();
            }
            drawPipes();
            drawBird();
            drawScore();

            if (gameOver) {
                ctx.font = '50px Arial';
                ctx.fillText('Game Over!', canvas.width / 2 - 150, canvas.height / 2);
                ctx.font = '30px Arial';
                ctx.fillText('Tap to Restart', canvas.width / 2 - 120, canvas.height / 2 + 50);
            } else if (!started) {
                ctx.font = '30px Arial';
                ctx.fillText('Tap to Start', canvas.width / 2 - 100, canvas.height / 2);
            }

            requestAnimationFrame(gameLoop);
        }

        // Jump on tap or space
        function jump() {
            if (!started) {
                started = true;
            }
            if (gameOver) {
                // Reset game
                bird.y = canvas.height / 2;
                bird.velocity = 0;
                pipes = [];
                score = 0;
                gameOver = false;
            } else {
                bird.velocity = bird.lift;
            }
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') jump();
        });
        canvas.addEventListener('touchstart', jump);
        canvas.addEventListener('click', jump);

        gameLoop();
    </script>
</body>
</html>
