<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5's fps</title>
    <meta name="description" content="Einfache 3JS First-Person Multiplayer Demo mit custom Backend, Schießen, Hitboxen und Deathcam.">

    <!-- REMOVED: Supabase Client Library -->

    <!-- Three.js Library and PointerLockControls via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        /* ----- CSS Styles (KEEP AS IS) ----- */
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; }
        canvas { display: block; }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; /* Use flexbox for centering */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            z-index: 101; /* Über Crosshair, aber unter Death Message */
        }
        #instructions {
            width: 80%;
            max-width: 400px; /* Optional: max width */
            font-size: 36px;
            text-align: center;
            color: white;
            cursor: pointer;
             background: rgba(50,50,50,0.7);
             padding: 20px;
             border-radius: 10px;
        }
        #crosshair {
             position: absolute;
             top: 50%;
             left: 50%;
             width: 10px; /* Größer für bessere Sichtbarkeit */
             height: 10px;
             border: 1px solid white; /* Weißer Kreis */
             border-radius: 50%;
             transform: translate(-50%, -50%);
             mix-blend-mode: difference; /* Macht es auf hell/dunkel sichtbar */
             z-index: 100; /* Unter Blocker */
             display: none; /* Wird angezeigt, wenn PointerLock aktiv ist */
             pointer-events: none; /* Verhindert, dass es Klicks abfängt */
        }
        #crosshair::before { /* Optional: Punkt in der Mitte */
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        #loading {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.5em;
            color: #fff;
            background-color: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 100;
        }
        footer {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: small;
            color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 2px black;
            z-index: 100;
        }
         #hud {
            position: absolute;
            bottom: 30px;
            left: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 1.5em;
            z-index: 100;
            display: none; /* Wird angezeigt, wenn PointerLock aktiv ist */
        }
        #death-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 48px;
            text-shadow: 2px 2px 4px black;
            z-index: 102; /* Über allem anderen */
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- ----- HTML Struktur (KEEP AS IS) ----- -->
    <div id="blocker">
        <div id="instructions">
            Klicken zum Spielen<br>(W, A, S, D = Bewegen, MAUS = Umschauen, LMT = Schießen, ESC = Mauszeiger freigeben)
        </div>
    </div>
    <div id="crosshair"></div>
    <div id="loading">Verbinde mit Server und lade Spiel...</div>

    <!-- UI Elemente (KEEP AS IS) -->
    <div id="hud">
        Health: <span id="health-value">100</span>
    </div>
    <div id="death-message">
        DU BIST GESTORBEN!<br>
        <span style="font-size: 24px;">Respawn in <span id="respawn-timer">5</span>s...</span><br>
        <span style="font-size: 20px;">Getötet von: <span id="killer-id">Unknown</span></span>
    </div>

    <footer>K8O-3JS-FPS-SHOOT | Backend: Custom Server</footer>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ----- Konfiguration -----
        const GAME_SERVER_URL = 'ws://localhost:8080'; // Your custom WebSocket server URL
        const MOVE_SPEED = 5.0;
        const UPDATE_INTERVAL_MS = 50; // Send updates more frequently for smoother experience
        const EYE_HEIGHT = 1.6;
        const MAP_SIZE = 100;
        const TREE_COUNT = 150;
        const PLAYER_HEIGHT = 1.8;
        const PLAYER_WIDTH = 0.5;
        const HEAD_HEIGHT = 0.4;
        const BODY_HEIGHT = PLAYER_HEIGHT - HEAD_HEIGHT;
        const INITIAL_HEALTH = 100;
        const HEADSHOT_DAMAGE = 100; // Server will ultimately decide this
        const BODY_DAMAGE = 35;     // Server will ultimately decide this
        const RESPAWN_DELAY_MS = 5000;
        const BULLET_TRAIL_DURATION_MS = 150;

        // ----- Globale Variablen -----
        let scene, camera, renderer, controls;
        let localPlayerGroup; // Represents the player controlled by this client
        let weaponMesh;
        let remotePlayers = {}; // { serverPlayerId: { group, headMesh, bodyMesh, health, targetPosition, targetQuaternion } }
        let myClientId = null; // Will be assigned by the server upon connection
        let ws; // WebSocket connection

        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster(); // For client-side aiming indication
        const pointer = new THREE.Vector2();

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let playerVelocity = new THREE.Vector3();
        const movementDirection = new THREE.Vector3();

        let localPlayerHealth = INITIAL_HEALTH;
        let isDead = false;
        let killerId = null; // Server-assigned ID of the killer
        let respawnTimerInterval = null;

        let lastUpdateTime = 0;
        let updateInterval; // Interval for sending client state to server
        let bulletTrails = [];

        // ----- DOM Elemente (KEEP AS IS) -----
        const loadingElement = document.getElementById('loading');
        const blocker = document.getElementById('blocker');
        const instructions = document.getElementById('instructions');
        const crosshair = document.getElementById('crosshair');
        const hudElement = document.getElementById('hud');
        const healthValueElement = document.getElementById('health-value');
        const deathMessageElement = document.getElementById('death-message');
        const respawnTimerElement = document.getElementById('respawn-timer');
        const killerIdElement = document.getElementById('killer-id');

        async function init() {
            console.log("Starte Initialisierung...");
            try {
                // 1. WebSocket Connection
                loadingElement.textContent = "Verbinde mit Spielserver...";
                await connectToServer(); // New function

                // 2. Three.js Szene & Kamera (Largely the same)
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87ceeb);
                scene.fog = new THREE.Fog(0x87ceeb, 0, MAP_SIZE * 0.75);
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);

                // Licht (Same)
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(15, 20, 10);
                scene.add(directionalLight);

                // Player Group & Controls (Same setup, position will be set by server)
                localPlayerGroup = new THREE.Group();
                // Initial position will be set by server after connection
                scene.add(localPlayerGroup);
                camera.position.y = EYE_HEIGHT;
                localPlayerGroup.add(camera);
                controls = new PointerLockControls(camera, renderer.domElement);

                // UI Listeners (Same)
                instructions.addEventListener('click', () => {
                    if (!isDead) controls.lock();
                });
                controls.addEventListener('lock', () => {
                    instructions.style.display = 'none';
                    blocker.style.display = 'none';
                    if (!isDead) {
                        crosshair.style.display = 'block';
                        hudElement.style.display = 'block';
                    }
                });
                controls.addEventListener('unlock', () => {
                    if (!isDead) {
                        blocker.style.display = 'flex';
                        instructions.style.display = '';
                    }
                    crosshair.style.display = 'none';
                });

                createMap();
                createWeaponView();
                setupEventListeners(); // Movement, shooting, window resize

                // Start game loop
                // Loading element hidden by server message or after timeout
                animate();

                // Start sending client state updates
                updateInterval = setInterval(sendClientState, UPDATE_INTERVAL_MS);

                console.log("Initialisierung abgeschlossen. Warte auf Server-Bestätigung...");

            } catch (error) {
                console.error("FEHLER bei der Initialisierung:", error);
                loadingElement.textContent = `Fehler: ${error.message}. Konsole prüfen.`;
                // ... (error handling as before)
            }
        }

        function connectToServer() {
            return new Promise((resolve, reject) => {
                ws = new WebSocket(GAME_SERVER_URL);

                ws.onopen = () => {
                    console.log('Verbunden mit Spielserver!');
                    loadingElement.textContent = "Warte auf Spielerdaten...";
                    // Client can send an initial "join" message if needed,
                    // or server can send initial state automatically.
                    // For now, we wait for 'clientIdAssigned' or 'initialState'
                };

                ws.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    // console.log("Nachricht vom Server:", message);

                    switch (message.type) {
                        case 'clientIdAssigned': // Server assigns a unique ID to this client
                            myClientId = message.id;
                            console.log("Meine Client ID:", myClientId);
                            loadingElement.style.display = 'none'; // Or wait for full initial state
                            resolve(); // Connection and ID assignment successful
                            break;
                        case 'initialState': // Server sends full initial game state
                            // Process existing players, local player initial data
                            myClientId = message.yourId;
                            localPlayerGroup.position.set(message.yourPosition.x, message.yourPosition.y, message.yourPosition.z);
                            // camera.rotation.y = message.yourRotation.y; // Set initial look direction
                            controls.getObject().rotation.y = message.yourRotation.y;


                            localPlayerHealth = message.yourHealth;
                            updateHealthDisplay();
                            for (const playerData of message.players) {
                                if (playerData.id !== myClientId) {
                                    addRemotePlayer(playerData);
                                }
                            }
                            loadingElement.style.display = 'none';
                            console.log("Initialer Spielzustand erhalten.");
                            if (!updateInterval) { // Ensure it's started if not already
                                updateInterval = setInterval(sendClientState, UPDATE_INTERVAL_MS);
                            }
                            resolve(); // If not resolved by clientIdAssigned
                            break;
                        case 'playerJoined':
                            if (message.data.id !== myClientId) {
                                addRemotePlayer(message.data);
                            }
                            break;
                        case 'playerLeft':
                            removeRemotePlayer(message.data.id);
                            break;
                        case 'gameStateUpdate': // Incremental updates for all players
                            message.updates.forEach(playerUpdate => {
                                if (playerUpdate.id === myClientId) {
                                    // Server might correct our position (server reconciliation)
                                    // For now, we assume client prediction is mostly accurate
                                    // Or, if health changes due to external factors:
                                    if (playerUpdate.health !== undefined && localPlayerHealth !== playerUpdate.health) {
                                        localPlayerHealth = playerUpdate.health;
                                        updateHealthDisplay();
                                        if (localPlayerHealth <= 0 && !isDead) {
                                            handleDeath(playerUpdate.lastHitBy);
                                        }
                                    }
                                } else if (remotePlayers[playerUpdate.id]) {
                                    updateRemotePlayer(remotePlayers[playerUpdate.id], playerUpdate);
                                } else if (playerUpdate.id !== myClientId) { // New player seen in general update
                                    addRemotePlayer(playerUpdate)
                                }
                            });
                            break;
                        case 'hitConfirmed': // Server confirms your hit
                            console.log("Treffer bestätigt auf:", message.targetId);
                            // Maybe play a sound or show a hit marker
                            break;
                        case 'bulletTrail': // Server tells clients to draw a bullet trail
                             if (message.shooterId !== myClientId) { // Don't draw our own trail again if we already did client-side
                                 const start = new THREE.Vector3(message.start.x, message.start.y, message.start.z);
                                 const end = new THREE.Vector3(message.end.x, message.end.y, message.end.z);
                                 visualizeBulletTrailFromServer(start, end);
                             }
                            break;
                        case 'playerDied':
                            console.log(`Spieler ${message.playerId} ist gestorben. Getötet von ${message.killerId}`);
                            if (message.playerId === myClientId && !isDead) {
                                handleDeath(message.killerId);
                            } else if (remotePlayers[message.playerId]) {
                                // Could play a death animation for remote player before removing
                                removeRemotePlayer(message.playerId);
                            }
                            break;
                        case 'playerRespawned':
                             console.log(`Spieler ${message.playerId} ist respawned.`);
                             if (message.playerId === myClientId) {
                                 // Server dictates respawn, client updates UI
                                 localPlayerHealth = message.health;
                                 localPlayerGroup.position.set(message.position.x, message.position.y, message.position.z);
                                 // controls.getObject().rotation.y = message.rotation.y;
                                 respawnClientSide(); // Update UI, reset dead state
                             } else {
                                 // Re-add or update the remote player
                                 addRemotePlayer({
                                     id: message.playerId,
                                     x: message.position.x, y: message.position.y, z: message.position.z,
                                     rotation_y: message.rotation.y,
                                     health: message.health
                                 });
                             }
                             break;
                        // ... other message types: chat, game events, etc.
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket Fehler:', error);
                    loadingElement.textContent = `Verbindungsfehler. Erneut versuchen?`;
                    loadingElement.style.color = 'red';
                    if (updateInterval) clearInterval(updateInterval);
                    reject(error);
                };

                ws.onclose = () => {
                    console.log('WebSocket Verbindung geschlossen.');
                    loadingElement.textContent = `Verbindung getrennt.`;
                    if (updateInterval) clearInterval(updateInterval);
                    // Potentially try to reconnect or show a "disconnected" screen
                    blocker.style.display = 'flex';
                    instructions.textContent = 'Verbindung zum Server verloren.';
                    instructions.style.cursor = 'default';
                    reject(new Error("WebSocket connection closed."));
                };
            });
        }

        function sendToServer(message) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(message));
            }
        }

        // ----- Map & Object Creation (MOSTLY THE SAME) -----
        // createMap(), createWeaponView(), createRemotePlayerMesh()
        // Minor change in createRemotePlayerMesh: it won't have health directly
        // from playerData, server will send it.
        function createMap() {
            const groundGeometry = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3c6d3c, roughness: 0.8, metalness: 0.1 });
            const groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
            groundMesh.rotation.x = -Math.PI / 2;
            scene.add(groundMesh);

            const treeGeometryTrunk = new THREE.CylinderGeometry(0.2, 0.3, 2, 8);
            const treeMaterialTrunk = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
            const treeGeometryLeaves = new THREE.ConeGeometry(1, 3, 8);
            const treeMaterialLeaves = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.7 });
            const trunkMesh = new THREE.Mesh(treeGeometryTrunk, treeMaterialTrunk);
            const leavesMesh = new THREE.Mesh(treeGeometryLeaves, treeMaterialLeaves);
            leavesMesh.position.y = 2 + 1.5 / 2;
            const treeTemplate = new THREE.Group();
            treeTemplate.add(trunkMesh.clone());
            treeTemplate.add(leavesMesh.clone());
            trunkMesh.geometry.dispose();
            trunkMesh.material.dispose();
            leavesMesh.geometry.dispose();
            leavesMesh.material.dispose();

            for (let i = 0; i < TREE_COUNT; i++) {
                const tree = treeTemplate.clone();
                const angle = Math.random() * Math.PI * 2;
                const radius = 5 + Math.random() * (MAP_SIZE / 2 - 6);
                tree.position.x = Math.cos(angle) * radius;
                tree.position.z = Math.sin(angle) * radius;
                tree.position.y = 1;
                tree.rotation.y = Math.random() * Math.PI * 2;
                tree.scale.setScalar(0.8 + Math.random() * 0.4);
                scene.add(tree);
            }
        }

        function createWeaponView() {
            const handleGeo = new THREE.BoxGeometry(0.1, 0.3, 0.1);
            const slideGeo = new THREE.BoxGeometry(0.08, 0.1, 0.5);
            const material = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.5 });
            weaponMesh = new THREE.Group();
            const handle = new THREE.Mesh(handleGeo, material);
            handle.position.y = -0.15;
            const slide = new THREE.Mesh(slideGeo, material);
            slide.position.y = 0.05;
            slide.position.z = -0.15;
            weaponMesh.add(handle);
            weaponMesh.add(slide);
            weaponMesh.position.set(0.25, -0.15, -0.5);
            weaponMesh.rotation.y = -0.05;
            camera.add(weaponMesh);
        }

        function createRemotePlayerMesh() { // Used for remote players
            const playerGroup = new THREE.Group();
            playerGroup.name = "RemotePlayerGroup";

            // Hitboxes might not be needed on client if server handles all hit detection
            // But good for client-side prediction or effects
            const bodyGeometry = new THREE.BoxGeometry(PLAYER_WIDTH, BODY_HEIGHT, PLAYER_WIDTH);
            const bodyMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff, wireframe: false, visible: false }); // Not visible
            const bodyMesh = new THREE.Mesh(bodyGeometry, bodyMaterial);
            bodyMesh.name = "hitbox_body";
            bodyMesh.position.y = BODY_HEIGHT / 2;
            playerGroup.add(bodyMesh);

            const headGeometry = new THREE.BoxGeometry(PLAYER_WIDTH * 0.8, HEAD_HEIGHT, PLAYER_WIDTH * 0.8);
            const headMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: false, visible: false }); // Not visible
            const headMesh = new THREE.Mesh(headGeometry, headMaterial);
            headMesh.name = "hitbox_head";
            headMesh.position.y = BODY_HEIGHT + (HEAD_HEIGHT / 2);
            playerGroup.add(headMesh);

            const visualGeo = new THREE.CapsuleGeometry(PLAYER_WIDTH / 2, PLAYER_HEIGHT - PLAYER_WIDTH, 4, 8);
            const visualMat = new THREE.MeshStandardMaterial({ color: 0xff8800, roughness: 0.6 });
            const visualMesh = new THREE.Mesh(visualGeo, visualMat);
            visualMesh.position.y = PLAYER_HEIGHT / 2;
            playerGroup.add(visualMesh);
            return { group: playerGroup, headMesh: headMesh, bodyMesh: bodyMesh, visualMesh: visualMesh };
        }


        // ----- Player Logic (Client-Side Representation) -----
        // No registerLocalPlayer, loadInitialPlayers as server handles this.

        function addRemotePlayer(playerData) { // playerData from server
            if (!playerData || remotePlayers[playerData.id] || playerData.id === myClientId) return;

            const { group, headMesh, bodyMesh, visualMesh } = createRemotePlayerMesh();
            group.position.set(playerData.x, playerData.y, playerData.z);
            group.rotation.y = playerData.rotation_y || 0;

            scene.add(group);
            remotePlayers[playerData.id] = {
                id: playerData.id,
                group: group,
                headMesh: headMesh,
                bodyMesh: bodyMesh,
                visualMesh: visualMesh,
                health: playerData.health,
                // For interpolation:
                targetPosition: new THREE.Vector3(playerData.x, playerData.y, playerData.z),
                targetQuaternion: new THREE.Quaternion().setFromEuler(new THREE.Euler(0, playerData.rotation_y || 0, 0)),
                lastUpdate: Date.now()
            };
            console.log("Remote Spieler hinzugefügt:", playerData.id);
        }

        function updateRemotePlayer(player, newData) { // newData from server
            if (newData.x != null && newData.y != null && newData.z != null) {
                player.targetPosition.set(newData.x, newData.y, newData.z);
            }
            if (newData.rotation_y != null) {
                player.targetQuaternion.setFromEuler(new THREE.Euler(0, newData.rotation_y, 0));
            }
            if (newData.health !== undefined) {
                player.health = newData.health;
                // Potentially change color of visualMesh based on health
                if (player.health <= 0 && player.group.parent) { // If dead and still in scene
                    // Could play death animation here instead of immediate removal
                    // For now, server will send 'playerDied' to trigger removal
                }
            }
            player.lastUpdate = Date.now();
        }

        function removeRemotePlayer(playerId) {
            const remotePlayer = remotePlayers[playerId];
            if (remotePlayer) {
                scene.remove(remotePlayer.group);
                remotePlayer.group.traverse((object) => {
                    if (object.isMesh) {
                        if(object.geometry) object.geometry.dispose();
                        if(Array.isArray(object.material)) {
                            object.material.forEach(mat => mat.dispose());
                        } else if (object.material) {
                            object.material.dispose();
                        }
                    }
                });
                delete remotePlayers[playerId];
                console.log('Remote Spieler entfernt:', playerId);
            }
        }

        // ----- Event Listeners (Mostly the same, shooting is different) -----
        function setupEventListeners() {
            const onKeyDown = (event) => {
                 if (isDead || !controls.isLocked) return;
                switch (event.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = true; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = true; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = true; break;
                    case 'KeyD': case 'ArrowRight': moveRight = true; break;
                }
            };
            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': case 'ArrowUp': moveForward = false; break;
                    case 'KeyA': case 'ArrowLeft': moveLeft = false; break;
                    case 'KeyS': case 'ArrowDown': moveBackward = false; break;
                    case 'KeyD': case 'ArrowRight': moveRight = false; break;
                }
            };
             const onMouseDown = (event) => {
                if (event.button === 0 && controls.isLocked && !isDead) {
                    shoot(); // Client initiates shot
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown);
            window.addEventListener('resize', onWindowResize, false);

            window.addEventListener('beforeunload', () => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    sendToServer({ type: 'disconnecting' }); // Graceful disconnect
                    ws.close();
                }
                if (updateInterval) clearInterval(updateInterval);
                if (respawnTimerInterval) clearInterval(respawnTimerInterval);
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ----- Movement (Client-Side Prediction) -----
        function handleMovement(deltaTime) {
            // This part is for client-side prediction. The server will ultimately validate.
            if (!controls.isLocked || isDead) {
                 playerVelocity.x *= 0.9;
                 playerVelocity.z *= 0.9;
                 controls.moveRight(-playerVelocity.x * deltaTime);
                 controls.moveForward(-playerVelocity.z * deltaTime);
                 return;
            }

            const damping = Math.exp(-15 * deltaTime);
            playerVelocity.x *= damping;
            playerVelocity.z *= damping;

            movementDirection.z = Number(moveForward) - Number(moveBackward);
            movementDirection.x = Number(moveRight) - Number(moveLeft);

            const acceleration = MOVE_SPEED * 50.0 * deltaTime;

             if (moveForward || moveBackward) playerVelocity.z -= movementDirection.z * acceleration;
             if (moveLeft || moveRight) playerVelocity.x -= movementDirection.x * acceleration;

             const maxSpeed = MOVE_SPEED * 1.2;
             playerVelocity.clampLength(0, maxSpeed);

            controls.moveRight(-playerVelocity.x * deltaTime);
            controls.moveForward(-playerVelocity.z * deltaTime);

            localPlayerGroup.position.y = 0; // Simple floor

            const halfMap = MAP_SIZE / 2 - 1;
            localPlayerGroup.position.x = Math.max(-halfMap, Math.min(halfMap, localPlayerGroup.position.x));
            localPlayerGroup.position.z = Math.max(-halfMap, Math.min(halfMap, localPlayerGroup.position.z));
        }

        // ----- Shooting (Client tells server, server validates) -----
        function shoot() {
            if (isDead || !myClientId) return;

            // Get camera direction for the shot
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            const origin = new THREE.Vector3();
            camera.getWorldPosition(origin);

            // Send shoot request to server
            sendToServer({
                type: 'shoot',
                origin: { x: origin.x, y: origin.y, z: origin.z },
                direction: { x: direction.x, y: direction.y, z: direction.z }
            });

            // Client-side immediate feedback (optional, server is authoritative)
            // Perform a client-side raycast for immediate visual effect like bullet trail
            raycaster.setFromCamera(pointer, camera); // pointer is {x:0, y:0}
            const intersectableObjects = scene.children.filter(obj => obj.name !== "RemotePlayerGroup" && obj !== localPlayerGroup && !obj.isLight && obj !== weaponMesh && obj.type !== "Fog"); // Simplified target list
            
            // Add remote player visuals to intersectable for client-side trail visualization
            Object.values(remotePlayers).forEach(rp => {
                 if (rp.visualMesh) intersectableObjects.push(rp.visualMesh);
            });


            const intersects = raycaster.intersectObjects(intersectableObjects, true); // recursive true

            let hitPoint;
            if (intersects.length > 0) {
                hitPoint = intersects[0].point;
            } else {
                // No hit, calculate point far away for trail
                hitPoint = origin.clone().add(direction.multiplyScalar(200)); // 200 units away
            }
            visualizeBulletTrail(hitPoint); // Client-side trail for responsiveness
            animateWeaponRecoil();
        }

        // visualizeBulletTrail and updateBulletTrails are mostly for client-side effects
        function visualizeBulletTrail(endPoint) { // For local player's shot
            const startPoint = new THREE.Vector3();
            camera.getWorldPosition(startPoint);
            const direction = new THREE.Vector3().subVectors(endPoint, startPoint).normalize();
            startPoint.add(direction.multiplyScalar(0.3));

            const points = [startPoint, endPoint.clone()];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xfff700, linewidth: 2, transparent: true, opacity: 0.9 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            bulletTrails.push({ line, expires: Date.now() + BULLET_TRAIL_DURATION_MS });
        }
        
        function visualizeBulletTrailFromServer(startPoint, endPoint) { // For remote player's shot
            const points = [startPoint, endPoint.clone()];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xffa500, linewidth: 2, transparent: true, opacity: 0.7 }); // Different color
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            bulletTrails.push({ line, expires: Date.now() + BULLET_TRAIL_DURATION_MS });
        }


        function updateBulletTrails(currentTime) {
            const remainingTrails = [];
            for (const trail of bulletTrails) {
                if (currentTime < trail.expires) {
                    const timeleft = trail.expires - currentTime;
                    trail.line.material.opacity = Math.max(0, (timeleft / BULLET_TRAIL_DURATION_MS) * 0.9);
                    remainingTrails.push(trail);
                } else {
                    scene.remove(trail.line);
                    trail.line.geometry.dispose();
                    trail.line.material.dispose();
                }
            }
            bulletTrails = remainingTrails;
        }

        function animateWeaponRecoil() {
            const recoilAmount = 0.03;
            const recoilDuration = 50;
            weaponMesh.position.y += recoilAmount * 0.5;
            weaponMesh.position.z += recoilAmount;
            weaponMesh.rotation.x -= recoilAmount * 0.2;
            setTimeout(() => {
                if (weaponMesh) {
                    weaponMesh.position.y -= recoilAmount * 0.5;
                    weaponMesh.position.z -= recoilAmount;
                    weaponMesh.rotation.x += recoilAmount * 0.2;
                }
            }, recoilDuration);
        }

        // ----- Client State Update to Server -----
        function sendClientState() {
            if (!myClientId || !controls.isLocked || isDead || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            const currentRotationY = controls.getObject().rotation.y;
            const currentPosition = localPlayerGroup.position;

            const stateData = {
                type: 'playerUpdate',
                id: myClientId, // Important for server to know who this is
                timestamp: Date.now(),
                position: {
                    x: parseFloat(currentPosition.x.toFixed(3)),
                    y: parseFloat(currentPosition.y.toFixed(3)),
                    z: parseFloat(currentPosition.z.toFixed(3))
                },
                rotation: { // Send full camera rotation (as quaternion or euler) for server-side aiming
                    x: parseFloat(camera.rotation.x.toFixed(3)), // Pitch
                    y: parseFloat(currentRotationY.toFixed(3)),   // Yaw (controls object)
                    z: parseFloat(camera.rotation.z.toFixed(3))    // Roll (usually 0)
                },
                // Health is managed by server, client doesn't send it.
                // Input state (optional, can be useful for server prediction)
                // input: { moveForward, moveBackward, moveLeft, moveRight }
            };
            sendToServer(stateData);
        }

        // ----- Death & Respawn (Client-side handling of server messages) -----
        function handleDeath(killerIdFromServer) { // Called when server confirms death
            if (isDead) return;
            console.log(`Du bist gestorben! Getötet von: ${killerIdFromServer || 'Unbekannt'}`);
            isDead = true;
            killerId = killerIdFromServer;

            controls.unlock();

            deathMessageElement.style.display = 'block';
            hudElement.style.display = 'none';
            crosshair.style.display = 'none';
            blocker.style.display = 'none';
            instructions.style.display = 'none';

            const killerName = killerId ? (remotePlayers[killerId] ? `Spieler ${killerId.substring(0, 6)}` : (killerId === myClientId ? 'Dir selbst' : 'Unbekannt')) : 'Unbekannt';
            killerIdElement.textContent = killerName;


            let countdown = RESPAWN_DELAY_MS / 1000;
            respawnTimerElement.textContent = countdown;
            if (respawnTimerInterval) clearInterval(respawnTimerInterval);
            respawnTimerInterval = setInterval(() => {
                countdown--;
                respawnTimerElement.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(respawnTimerInterval);
                    respawnTimerInterval = null;
                    // Client doesn't trigger respawn directly anymore. Server will send 'playerRespawned' message.
                    // Optionally, client can send a "readyToRespawn" message.
                    sendToServer({ type: 'requestRespawn' });
                }
            }, 1000);
            
            moveForward = moveBackward = moveLeft = moveRight = false;
            playerVelocity.set(0,0,0);
        }

        function respawnClientSide() { // Called when server sends 'playerRespawned' for local player
            console.log("Respawning (client-side update)...");
            isDead = false;
            killerId = null;
            // Health, position, rotation already set by server message handling

            deathMessageElement.style.display = 'none';
            updateHealthDisplay();

            blocker.style.display = 'flex';
            instructions.style.display = '';
            console.log("Respawn (client-side) abgeschlossen.");
        }

        function updateHealthDisplay() {
            healthValueElement.textContent = Math.max(0, localPlayerHealth);
            let color = 'white';
            if (localPlayerHealth <= 0) color = '#555';
            else if (localPlayerHealth < INITIAL_HEALTH * 0.3) color = 'red';
            else if (localPlayerHealth < INITIAL_HEALTH * 0.6) color = 'orange';
            healthValueElement.style.color = color;
            healthValueElement.parentElement.style.textShadow = `1px 1px 3px ${color === 'white' ? 'black' : color}`;
        }

        // ----- Death Cam (Largely same logic, but killerId is from server) -----
        function updateDeathCam(deltaTime) {
            if (!isDead) return;
            let targetPosition = null;
            const killerPlayer = remotePlayers[killerId];

            if (killerPlayer && killerPlayer.group) {
                targetPosition = new THREE.Vector3();
                killerPlayer.group.getWorldPosition(targetPosition);
                targetPosition.y += EYE_HEIGHT;
                killerIdElement.textContent = `Spieler ${killerId.substring(0, 6)}`;
            } else {
                targetPosition = localPlayerGroup.position.clone();
                targetPosition.y += 5;
                const deathPos = localPlayerGroup.position;
                camera.position.set(deathPos.x, deathPos.y + 8, deathPos.z + 5);
                 if (killerId && !killerPlayer) {
                      killerIdElement.textContent = `Unbekannt (${killerId.substring(0,6)} evtl. verlassen?)`;
                  } else {
                      killerIdElement.textContent = 'Unbekannt';
                  }
            }

            if (targetPosition) {
                const currentQuaternion = camera.quaternion.clone();
                const targetQuaternion = new THREE.Quaternion();
                const tempMatrix = new THREE.Matrix4();
                tempMatrix.lookAt(camera.position, targetPosition, camera.up);
                targetQuaternion.setFromRotationMatrix(tempMatrix);
                camera.quaternion.slerp(targetQuaternion, 3.0 * deltaTime);
            }
        }

        // ----- Game Loop (Client) -----
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = Math.min(0.05, clock.getDelta());
            const currentTime = Date.now();

            if (isDead) {
                updateDeathCam(deltaTime);
            } else if (myClientId && controls.isLocked) { // Only move if connected and locked
                handleMovement(deltaTime); // Client-side prediction
            }

            // Interpolate remote players
            for (const id in remotePlayers) {
                const player = remotePlayers[id];
                player.group.position.lerp(player.targetPosition, 0.25); // Adjust lerp factor for smoothness
                player.group.quaternion.slerp(player.targetQuaternion, 0.25);
            }

            updateBulletTrails(currentTime);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
