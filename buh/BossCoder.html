<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Assistant (VS Code Edition)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --bg-main: #1e1e1e;
            --bg-sidebar: #252526;
            --bg-activitybar: #333333;
            --bg-panel: #252526;
            --bg-statusbar: #007acc;
            --bg-tab-active: #1e1e1e;
            --bg-tab-inactive: #2d2d2d;
            --bg-input: #3c3c3c;
            --border-color: #3c3c3c;
            --text-primary: #cccccc;
            --text-secondary: #999999;
            --accent-color: #007acc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-family);
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }
        
        .vscode-container { display: flex; height: 100vh; }
        
        .activity-bar {
            width: 50px;
            background-color: var(--bg-activitybar);
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .activity-bar .icon {
            width: 40px; height: 40px;
            padding: 8px; cursor: pointer;
            fill: var(--text-secondary);
            border-left: 2px solid transparent;
        }
        .activity-bar .icon:hover { fill: var(--text-primary); }
        .activity-bar .icon.active {
            fill: var(--text-primary);
            border-left-color: var(--accent-color);
        }

        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
        }
        .sidebar-view { display: none; padding: 10px; flex-grow: 1; overflow-y: auto; }
        .sidebar-view.active { display: block; }
        .sidebar-header {
            font-size: 11px;
            text-transform: uppercase;
            padding: 5px 10px;
            font-weight: bold;
            color: var(--text-secondary);
        }
        
        #explorer-view ul { list-style: none; padding-left: 10px; }
        #explorer-view li { padding: 4px 10px; cursor: pointer; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #explorer-view li:hover { background-color: rgba(255,255,255,0.05); }
        #explorer-view li.active { background-color: rgba(0, 122, 204, 0.3); }

        #settings-view .input-group { margin-bottom: 15px; }
        #settings-view label { font-size: 12px; margin-bottom: 5px; display: block; }
        #settings-view input, #settings-view button {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px;
            border-radius: 3px;
        }
        #settings-view button { cursor: pointer; margin-top: 5px; }
        #settings-view button:hover { background-color: #4f4f4f; }
        
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .tab-bar {
            display: flex;
            background-color: #2d2d2d;
            flex-shrink: 0;
        }
        .tab {
            padding: 8px 15px;
            background-color: var(--bg-tab-inactive);
            cursor: pointer;
            border-right: 1px solid #252526;
            font-size: 13px;
        }
        .tab.active { background-color: var(--bg-tab-active); }
        
        .editor-view {
            flex-grow: 1;
            padding: 10px;
            overflow: auto;
            font-family: "Fira Code", "Courier New", monospace;
            font-size: 14px;
            white-space: pre;
            background-color: var(--bg-main);
        }
        .editor-placeholder {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-secondary);
            text-align: center;
        }

        .panel-bottom {
            height: 200px;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        #instruction {
            flex-grow: 1;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-primary);
            resize: none;
            font-family: var(--font-family);
            font-size: 13px;
        }
        #instruction:focus { outline: none; border-color: var(--accent-color); }
        .panel-actions { display: flex; gap: 10px; margin-top: 10px; }
        #runBtn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }
        .status-message { flex-grow: 1; color: var(--text-secondary); font-style: italic; font-size: 13px; align-self: center; }

        .status-bar {
            height: 22px;
            background-color: var(--bg-statusbar);
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        
    </style>
</head>
<body>

<div class="vscode-container">
    <div class="activity-bar">
        <div class="icon" id="explorer-icon" title="Explorer">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4,2H20A2,2 0 0,1 22,4V20A2,2 0 0,1 20,22H4A2,2 0 0,1 2,20V4A2,2 0 0,1 4,2M4,4V11H11V4H4M4,20H11V13H4V20M20,20V13H13V20H20M20,4H13V11H20V4Z"></path></svg>
        </div>
        <div class="icon" id="settings-icon" title="Settings & Import">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M12,10A2,2 0 0,0 10,12A2,2 0 0,0 12,14A2,2 0 0,0 14,12A2,2 0 0,0 12,10M10,22C9.75,22 9.5,21.9 9.3,21.7L4.3,16.7C4.1,16.5 4,16.25 4,16V8C4,7.75 4.1,7.5 4.3,7.3L9.3,2.3C9.5,2.1 9.75,2 10,2H14C14.25,2 14.5,2.1 14.7,2.3L19.7,7.3C19.9,7.5 20,7.75 20,8V16C20,16.25 19.9,16.5 19.7,16.7L14.7,21.7C14.5,21.9 14.25,22 14,22H10Z"></path></svg>
        </div>
    </div>
    
    <div class="sidebar">
        <div id="explorer-view" class="sidebar-view">
            <div class="sidebar-header">Explorer</div>
            <ul id="file-tree">
                <!-- File tree will be generated here -->
            </ul>
            <button id="startNewBtn" style="width: 100%; margin-top: 20px; background: #37373d; border: 1px solid #4f4f4f; padding: 8px; color: #ccc; border-radius: 3px; cursor: pointer;">Neues Projekt starten</button>
        </div>
        <div id="settings-view" class="sidebar-view">
            <div class="sidebar-header">Settings & Import</div>
            <div class="input-group">
                <label for="apiKey">Gemini API Key <a href="https://aistudio.google.com/app/apikey" target="_blank" class="help-link">erstellen</a></label>
                <input type="password" id="apiKey">
            </div>
            <div class="input-group">
                <label for="model-input">Gemini Model</label>
                <input type="text" id="model-input" value="gemini-1.5-flash-latest">
            </div>
            <hr style="border-color: #4f4f4f; margin: 20px 0;">
            <div class="input-group">
                <label>GitHub Repo importieren</label>
                <input type="text" id="githubUrl" placeholder="owner/repo oder URL">
                <button id="importGithubBtn">Import</button>
            </div>
            <div class="input-group">
                <label>Lokales Verzeichnis importieren</label>
                <button id="importDirBtn">Auswählen</button>
            </div>
        </div>
    </div>

    <div class="main-content" id="main-drop-zone">
        <div class="tab-bar" id="tab-bar">
            <!-- Tabs will be generated here -->
        </div>
        <div class="editor-view" id="editor-view">
            <div class="editor-placeholder">
                <h2>Willkommen beim AI Code Assistant</h2>
                <p style="margin-top: 20px; max-width: 400px;">
                    Starten Sie, indem Sie ein Projekt importieren (links in den Einstellungen) oder eine Datei/ein Verzeichnis hierher ziehen.
                    Geben Sie dann Ihre Anweisung im unteren Panel ein.
                </p>
            </div>
        </div>
        <div class="panel-bottom">
            <textarea id="instruction" placeholder="Anweisung an die KI..."></textarea>
            <div class="panel-actions">
                <button id="runBtn">Run</button>
                <span id="statusMessage" class="status-message"></span>
            </div>
        </div>
    </div>
</div>
<div class="status-bar" id="status-bar">
    Ready
</div>


    <script>
        // --- State Management ---
        let state = {
            files: [], // { path: string, content: string }
            activeFile: null,
            apiKey: '',
            model: 'gemini-1.5-flash-latest',
        };

        // --- DOM Elements ---
        const dom = {
            explorerIcon: document.getElementById('explorer-icon'),
            settingsIcon: document.getElementById('settings-icon'),
            explorerView: document.getElementById('explorer-view'),
            settingsView: document.getElementById('settings-view'),
            fileTree: document.getElementById('file-tree'),
            tabBar: document.getElementById('tab-bar'),
            editorView: document.getElementById('editor-view'),
            instruction: document.getElementById('instruction'),
            runBtn: document.getElementById('runBtn'),
            statusBar: document.getElementById('status-bar'),
            statusMessage: document.getElementById('statusMessage'),
            apiKeyInput: document.getElementById('apiKey'),
            modelInput: document.getElementById('model-input'),
            importDirBtn: document.getElementById('importDirBtn'),
            importGithubBtn: document.getElementById('importGithubBtn'),
            githubUrlInput: document.getElementById('githubUrl'),
            startNewBtn: document.getElementById('startNewBtn'),
            mainDropZone: document.getElementById('main-drop-zone'),
        };

        // --- UI Rendering ---
        function render() {
            // Render File Tree
            dom.fileTree.innerHTML = '';
            if (state.files.length > 0) {
                state.files.forEach(file => {
                    const li = document.createElement('li');
                    li.textContent = file.path;
                    li.dataset.path = file.path;
                    if (state.activeFile && file.path === state.activeFile.path) {
                        li.classList.add('active');
                    }
                    dom.fileTree.appendChild(li);
                });
            } else {
                 dom.fileTree.innerHTML = '<li>Keine Dateien im Projekt.</li>';
            }
            
            // Render Tabs
            dom.tabBar.innerHTML = '';
            state.files.forEach(file => {
                const tab = document.createElement('div');
                tab.className = 'tab';
                tab.textContent = file.path.split('/').pop();
                tab.dataset.path = file.path;
                if (state.activeFile && file.path === state.activeFile.path) {
                    tab.classList.add('active');
                }
                dom.tabBar.appendChild(tab);
            });

            // Render Editor Content
            if (state.activeFile) {
                dom.editorView.textContent = state.activeFile.content;
            } else {
                dom.editorView.innerHTML = `<div class="editor-placeholder">Keine Datei geöffnet. Wählen Sie eine aus dem Explorer.</div>`;
            }
        }
        
        function setStatus(message, isError = false) {
            dom.statusMessage.textContent = message;
            dom.statusBar.textContent = message;
            dom.statusMessage.style.color = isError ? '#ff5555' : 'var(--text-secondary)';
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            dom.explorerIcon.addEventListener('click', () => switchView('explorer'));
            dom.settingsIcon.addEventListener('click', () => switchView('settings'));
            dom.startNewBtn.addEventListener('click', startNewProject);
            dom.fileTree.addEventListener('click', e => {
                if (e.target.tagName === 'LI' && e.target.dataset.path) {
                    setActiveFile(e.target.dataset.path);
                }
            });
            dom.tabBar.addEventListener('click', e => {
                if (e.target.classList.contains('tab') && e.target.dataset.path) {
                    setActiveFile(e.target.dataset.path);
                }
            });
            dom.importDirBtn.addEventListener('click', handleDirectoryImport);
            dom.importGithubBtn.addEventListener('click', handleGithubImport);
            dom.mainDropZone.addEventListener('dragover', e => e.preventDefault());
            dom.mainDropZone.addEventListener('drop', handleDrop);
            dom.runBtn.addEventListener('click', handleRun);
        }

        // --- Actions ---
        function switchView(view) {
            dom.explorerView.classList.toggle('active', view === 'explorer');
            dom.explorerIcon.classList.toggle('active', view === 'explorer');
            dom.settingsView.classList.toggle('active', view === 'settings');
            dom.settingsIcon.classList.toggle('active', view === 'settings');
        }
        
        function startNewProject() {
            state.files = [];
            state.activeFile = null;
            projectContext = ''; // Clear old full context
            render();
            setStatus('Bereit für ein neues Projekt.');
        }

        function setActiveFile(path) {
            state.activeFile = state.files.find(f => f.path === path) || null;
            render();
        }

        function loadFiles(files, projectName) {
            state.files = files;
            if (files.length > 0) {
                setActiveFile(files[0].path);
            } else {
                state.activeFile = null;
            }
            projectContext = files.map(f => `--- FILE: ${f.path} ---\n${f.content}\n--- END OF FILE ---\n\n`).join('');
            originalFilename = projectName;
            switchView('explorer');
            render();
        }
        
        async function handleDirectoryImport() {
             if (!window.showDirectoryPicker) {
                alert("Diese Funktion erfordert eine sichere Verbindung (HTTPS oder localhost).");
                return;
            }
            try {
                const dirHandle = await window.showDirectoryPicker();
                setStatus('Lese Verzeichnis...');
                const files = await readDirectory(dirHandle);
                loadFiles(files, dirHandle.name);
                setStatus(`Verzeichnis '${dirHandle.name}' erfolgreich geladen.`);
            } catch (e) {
                if (e.name !== 'AbortError') {
                    setStatus('Fehler bei Verzeichnis-Auswahl.', true);
                }
            }
        }

        async function readDirectory(dirHandle, path = '') {
            let files = [];
            for await (const entry of dirHandle.values()) {
                const newPath = path ? `${path}/${entry.name}` : entry.name;
                if (entry.kind === 'file') {
                    const file = await entry.getFile();
                    const content = await file.text();
                    files.push({ path: newPath, content });
                } else if (entry.kind === 'directory') {
                    files = files.concat(await readDirectory(entry, newPath));
                }
            }
            return files;
        }

        async function handleDrop(e) {
            e.preventDefault();
            const handle = await e.dataTransfer.items[0].getAsFileSystemHandle();
            if (!handle) return;
            
            setStatus('Verarbeite Drop-Ereignis...');
            if (handle.kind === 'file') {
                const file = await handle.getFile();
                const content = await file.text();
                loadFiles([{ path: file.name, content }], file.name);
                setStatus(`Datei '${file.name}' geladen.`);
            } else if (handle.kind === 'directory') {
                const files = await readDirectory(handle);
                loadFiles(files, handle.name);
                setStatus(`Verzeichnis '${handle.name}' geladen.`);
            }
        }
        
        function parseGithubUrl(url) {
            const regex = /(?:https?:\/\/)?(?:www\.)?github\.com\/([a-zA-Z0-9-]+\/[a-zA-Z0-9-._]+)/;
            const match = url.match(regex);
            if (match && match[1]) return match[1].replace(/\.git$/, '');
            if (/^[a-zA-Z0-9-]+\/[a-zA-Z0-9-._]+$/.test(url)) return url;
            return null;
        }
        
        async function handleGithubImport() {
            const repoPath = parseGithubUrl(dom.githubUrlInput.value.trim());
            if (!repoPath) {
                setStatus('Ungültiges GitHub Repo-Format.', true);
                return;
            }
            const [owner, repo] = repoPath.split('/');
            setStatus(`Lade Repo '${repoPath}'...`);
            try {
                const corsProxy = 'https://api.allorigins.win/raw?url=';
                const zipUrl = `${corsProxy}https://github.com/${owner}/${repo}/archive/refs/heads/main.zip`;
                const response = await fetch(zipUrl);
                if (!response.ok) throw new Error(`Repo nicht gefunden (Status: ${response.status}).`);
                
                const blob = await response.blob();
                const zip = await JSZip.loadAsync(blob);
                
                const files = [];
                const filePromises = [];
                zip.forEach((relativePath, zipEntry) => {
                    if (!zipEntry.dir) {
                        filePromises.push(
                            zipEntry.async('string').then(content => {
                                const cleanPath = relativePath.substring(relativePath.indexOf('/') + 1);
                                if (cleanPath) files.push({ path: cleanPath, content });
                            })
                        );
                    }
                });
                await Promise.all(filePromises);
                loadFiles(files, repo);
                setStatus(`Repo '${repo}' erfolgreich geladen.`);
            } catch (e) {
                setStatus(`GitHub Import fehlgeschlagen: ${e.message}`, true);
            }
        }

        async function handleRun() {
            state.apiKey = dom.apiKeyInput.value.trim();
            state.model = dom.modelInput.value.trim();
            const instruction = dom.instruction.value.trim();

            if (!state.apiKey || !instruction || !state.model) {
                alert('API Key, Modell und eine Anweisung sind erforderlich.');
                return;
            }

            dom.runBtn.disabled = true;
            setStatus('Sende Anfrage...');

            const currentContext = state.files.map(f => `--- FILE: ${f.path} ---\n${f.content}\n--- END OF FILE ---\n\n`).join('');

            const prompt = `**ROLE:** You are an expert AI programmer acting as a surgical code modifier inside an editor. **TASK:** Your task is to either modify the existing code or generate a new project structure based on the user's instruction. You must be precise and minimalist. **PROTOCOL:** 1. Analyze the provided context and the instruction. 2. If the user asks to **GENERATE** code, your response MUST be a JSON object with a "files" key, containing an array of {path: string, content: string}. 3. If the user asks to **MODIFY** code, your response MUST be a JSON object with a "modifications" key, containing an array of {path: string, startLine: number, endLine: number, newCode: string}. Do NOT replace the entire file if only a few lines change. Be a surgeon, not a butcher. **YOUR ENTIRE RESPONSE MUST BE A SINGLE, VALID JSON OBJECT ENCLOSED IN \`\`\`json ... \`\`\`.** **CONTEXT:**\n${currentContext || "No context provided. The user wants to generate code from scratch."}\n---\n**INSTRUCTION:**\n${instruction}\n---\n**YOUR JSON RESPONSE:**`;
            
            try {
                 const url = `https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${state.apiKey}`;
                 const options = { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) };
                 const response = await fetch(url, options); // Simplified fetch for now
                 if (!response.ok) throw new Error(`API Fehler: ${response.status} - ${await response.text()}`);

                 const data = await response.json();
                 const rawText = data.candidates[0].content.parts[0].text;
                 const jsonMatch = rawText.match(/```json\s*([\s\S]*?)\s*```/);
                 if (!jsonMatch) throw new Error("KI hat kein gültiges JSON-Format geliefert.");
                
                 const result = JSON.parse(jsonMatch[1]);
                 processAIResult(result);
                 setStatus('Operation erfolgreich abgeschlossen.');

            } catch (e) {
                setStatus(`Fehler: ${e.message}`, true);
            } finally {
                dom.runBtn.disabled = false;
            }
        }
        
        function processAIResult(result) {
            if (result.files) { // Generation
                loadFiles(result.files, originalFilename || 'new-project');
            } else if (result.modifications) { // Modification
                result.modifications.forEach(mod => {
                    const fileToModify = state.files.find(f => f.path === mod.path);
                    if (fileToModify) {
                        const lines = fileToModify.content.split('\n');
                        lines.splice(mod.startLine - 1, (mod.endLine - mod.startLine + 1), ...mod.newCode.split('\n'));
                        fileToModify.content = lines.join('\n');
                    }
                });
                render(); // Re-render to show changes
            }
        }

        // --- Initialisierung ---
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            switchView('explorer');
            render();
        });
    </script>
</body>
</html>
