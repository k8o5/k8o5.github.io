<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trystero Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: #333;
            color: #fff;
        }
        #board {
            width: 400px;
            margin-top: 20px;
        }
        #status, #info {
            font-size: 1.2em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Random Chess Matchmaking</h1>
    <div id="status">Connecting...</div>
    <div id="info"></div>
    <div id="board"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/trystero/dist/trystero.min.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const infoEl = document.getElementById('info');
        let board = null;
        let game = new Chess();
        let myId = null;
        let opponentId = null;
        let myColor = null;

        const config = { appId: 'trystero-chess-app-dmotz' };
        const room = Trystero.joinRoom(config, 'public-chess-room');

        const [sendMove, getMove] = room.makeAction('move');
        const [sendMatchRequest, getMatchRequest] = room.makeAction('matchRequest');
        const [sendMatchAccept, getMatchAccept] = room.makeAction('matchAccept');

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over() ||
                (game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1) ||
                (game.turn() !== myColor[0])) {
                return false;
            }
        }

        function onDrop(source, target) {
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            sendMove({ move: move, fen: game.fen() }, opponentId);
            updateStatus();
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        function updateStatus() {
            let status = '';
            const moveColor = game.turn() === 'w' ? 'White' : 'Black';

            if (game.in_checkmate()) {
                status = `Game over, ${moveColor} is in checkmate.`;
            } else if (game.in_draw()) {
                status = 'Game over, draw.';
            } else {
                status = `${moveColor}'s turn.`;
                if (game.in_check()) {
                    status += ` ${moveColor} is in check.`;
                }
            }
            statusEl.textContent = status;
        }

        function startNewGame(color) {
            myColor = color;
            infoEl.textContent = `You are playing as ${myColor}.`;
            game = new Chess();
            board = Chessboard('board', {
                draggable: true,
                position: 'start',
                orientation: myColor,
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd
            });
            updateStatus();
        }

        room.onPeerJoin(peerId => {
            if (!opponentId) {
                statusEl.textContent = `Found a player. Sending match request...`;
                sendMatchRequest({}, peerId);
            }
        });

        room.onPeerLeave(peerId => {
            if (peerId === opponentId) {
                opponentId = null;
                myColor = null;
                board.destroy();
                infoEl.textContent = '';
                statusEl.textContent = 'Opponent disconnected. Waiting for a new opponent...';
            }
        });

        getMatchRequest((_, peerId) => {
            if (!opponentId) {
                opponentId = peerId;
                sendMatchAccept({}, peerId);
                startNewGame('black');
            }
        });
        
        getMatchAccept((_, peerId) => {
            if (!opponentId) {
                opponentId = peerId;
                startNewGame('white');
            }
        });

        getMove(({ move, fen }, peerId) => {
            if (peerId === opponentId) {
                game.load(fen);
                board.position(fen);
                updateStatus();
            }
        });

        myId = room.getSelfId();
        statusEl.textContent = 'Waiting for an opponent...';
    </script>
</body>
</html>
