<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8O - Öffentliche Liste (GitHub Pages Demo)</title>
    <meta name="description" content="Öffentliche Item-Liste mit Supabase Backend via Anon Key auf GitHub Pages.">

    <!-- Supabase Client Library via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Style (wie zuvor) -->
    <style>
        /* CSS bleibt unverändert */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #007bff; color: #fff; padding: 1rem 0; text-align: center; }
        main { max-width: 600px; margin: 2rem auto; padding: 1.5rem; background-color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px; }
        section { margin-bottom: 2rem; }
        h1 { margin: 0; font-size: 1.8em;}
        h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 0.6rem; margin-top: 0;}
        form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        input[type="text"] { flex-grow: 1; padding: 0.7rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        button { padding: 0.7rem 1.2rem; background-color: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; transition: background-color 0.2s ease; }
        button:hover { background-color: #218838; }
        button[type="submit"] { background-color: #007bff; } /* Add button blue */
        button[type="submit"]:hover { background-color: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0.5rem; border-bottom: 1px solid #eee; transition: background-color 0.2s ease; }
        li:last-child { border-bottom: none; }
        li:hover { background-color: #f9f9f9; }
        li span { flex-grow: 1; margin-right: 1rem; word-break: break-word; } /* Wrap long text */
        .delete-button { background-color: #dc3545; color: white; border: none; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        .delete-button:hover { background-color: #c82333; }
        .error-message { color: #dc3545; margin-top: 0.5rem; font-weight: bold; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 0.5rem; border-radius: 4px; }
        #loading-message, #list-error, #add-error { margin-top: 1rem; }
        footer { text-align: center; margin-top: 3rem; padding: 1rem; font-size: 0.9em; color: #777; }
        /* Small screen adjustments */
        @media (max-width: 640px) {
            main { margin: 1rem; padding: 1rem;}
            form { flex-direction: column; }
            input[type="text"] { margin-bottom: 0.5rem; }
        }
         @keyframes spin { to { transform: rotate(360deg); } }
         #load-spinner {display: inline-block; width: 1em; height: 1em; border: 2px solid #ccc; border-top-color: #333; border-radius: 50%; animation: spin 1s linear infinite;}
    </style>
</head>
<body>

    <header>
        <h1>K8O - Öffentliche Liste</h1>
    </header>

    <main>
        <section id="add-item-section">
            <h2>Neues Item hinzufügen</h2>
            <form id="add-item-form">
                <input type="text" id="item-name" placeholder="Item-Name (max 280 Zeichen)" required maxlength="280">
                <button type="submit">Hinzufügen</button>
            </form>
            <div id="add-error" class="error-message" style="display: none;"></div>
        </section>

        <section id="item-list-section">
            <h2>Item Liste</h2>
            <div id="loading-message">Lade Items... <span id="load-spinner"></span></div>
            <ul id="item-list">
                <!-- Items werden hier per JavaScript eingefügt -->
            </ul>
            <div id="list-error" class="error-message" style="display: none;"></div>
             <p id="empty-list-message" style="display: none; color: #666; text-align: center; margin-top: 1rem;">Die Liste ist leer. Füge neue Items hinzu!</p>
        </section>
    </main>

    <footer>
        <p>K8O Demo | Gehostet auf GitHub Pages | Backend: Supabase (Anon Key)</p>
        <p style="font-size: 0.8em; color: #999;">Hinweis: Da der Anon-Key verwendet wird, kann jeder Besucher Items hinzufügen und löschen.</p>
    </footer>

    <!-- JavaScript Logik -->
    <script>
        // ----- Konfiguration -----
        const SUPABASE_URL = 'https://ntfliujadjhlgwflecxp.supabase.co'; // Z.B. 'https://xyz.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50ZmxpdWphZGpobGd3ZmxlY3hwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYyMDc1MTAsImV4cCI6MjA2MTc4MzUxMH0.q4pc4d8GKXYMISreatPWLOnqRrVbS2OgoJMJcbSUG14'; // Der öffentliche Anon-Key

        // ----- Supabase Client Initialisierung -----
        let supabase; // Lokale Variable für die Client-Instanz
        try {
            if (!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL === 'DEINE_SUPABASE_URL') {
                 throw new Error("Supabase URL oder Anon Key fehlen oder sind nicht ersetzt worden!");
            }
            // *** KORREKTUR HIER: supabase.createClient statt supabaseJs.createClient ***
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("Supabase Client initialisiert.");
        } catch (error) {
            console.error("FEHLER bei der Supabase Initialisierung:", error);
            const listErrorDiv = document.getElementById('list-error');
            const loadingMsg = document.getElementById('loading-message');
            if(listErrorDiv && loadingMsg) {
                 // Detailreichere Fehlermeldung für den Nutzer
                 let userMessage = `Fehler: Verbindung zum Backend (Supabase) fehlgeschlagen.`;
                 if (error.message.includes("Key")) {
                    userMessage += " Möglicherweise sind die Zugangsdaten (URL/Key) in 'index.html' falsch oder nicht ersetzt worden.";
                 } else if (error instanceof ReferenceError){
                     userMessage += " Ein technischer Fehler ist aufgetreten (ReferenceError)."; // Wie dieser Fall
                 } else {
                    userMessage += ` (${error.message}).`;
                 }
                 userMessage += " Bitte überprüfe die Browser-Konsole für technische Details."
                 listErrorDiv.textContent = userMessage;
                 listErrorDiv.style.display = 'block';
                 loadingMsg.style.display = 'none';
            } else {
                alert("Supabase konnte nicht initialisiert werden. Prüfe URL/Key und die HTML-Struktur.");
            }
        }

        // ----- Restliches JavaScript (unverändert) -----
        // ----- DOM Elemente -----
        const addItemForm = document.getElementById('add-item-form');
        const itemNameInput = document.getElementById('item-name');
        const itemList = document.getElementById('item-list');
        const loadingMessage = document.getElementById('loading-message');
        const listError = document.getElementById('list-error');
        const addError = document.getElementById('add-error');
        const emptyListMessage = document.getElementById('empty-list-message');

        // ----- Hilfsfunktionen -----
        function showMessage(element, message, isError = true) { /* ... */ }
        function hideMessage(element) { /* ... */ }
        function setLoading(isLoading) { /* ... */ }

        // ----- Kernfunktionen -----
        async function fetchAndRenderItems() { /* ... */ }
        function renderItem(item) { /* ... */ }
        async function addItem(itemName) { /* ... */ }
        async function deleteItem(itemId, listItemElement) { /* ... */ }

        // ----- Event Listener -----
        addItemForm.addEventListener('submit', (event) => { /* ... */ });

        // ----- Initialisierung -----
        document.addEventListener('DOMContentLoaded', () => { /* ... */ });

        // ----- HILFSFUNKTIONEN Implementation (zur Vollständigkeit hier wiederholt) -----
         function showMessage(element, message, isError = true) {
            element.textContent = message;
            element.style.display = 'block';
            element.className = isError ? 'error-message' : ''; // Klasse dynamisch setzen/entfernen
            if (!isError) element.style.color = 'green'; // Optional: Erfolgsmeldungen
        }

        function hideMessage(element) {
            element.textContent = '';
            element.style.display = 'none';
        }

       function setLoading(isLoading) {
            loadingMessage.style.display = isLoading ? 'flex' : 'none'; // Flex oder Block je nach Layout
            if (isLoading) { // Ensure spinner exists and animation plays
                const spinner = document.getElementById('load-spinner');
                if (!spinner) { // Create spinner if it doesn't exist (robustness)
                    const newSpinner = document.createElement('span');
                    newSpinner.id = 'load-spinner';
                    loadingMessage.appendChild(newSpinner);
                } else {
                   spinner.style.display = 'inline-block'; // Ensure visible if hidden before
                }
            }
        }


        // ----- KERNFUNKTIONEN Implementation (zur Vollständigkeit hier wiederholt) -----
         async function fetchAndRenderItems() {
            if (!supabase) return;
            setLoading(true);
            hideMessage(listError);
            hideMessage(emptyListMessage);
            itemList.innerHTML = '';

            try {
                const { data: items, error } = await supabase
                    .from('items')
                    .select('id, name, created_at')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (items && items.length > 0) {
                     // Statt forEach items.reverse().forEach(renderItem); ODER .order 'ascending: true' und normal .forEach
                    items.forEach(renderItem); // `renderItem` fügt jetzt mit prepend ein
                } else {
                    emptyListMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Fehler beim Laden der Items:', error);
                showMessage(listError, `Fehler beim Abrufen der Liste: ${error.message || 'Unbekannter Fehler'}`);
            } finally {
                setLoading(false);
            }
        }

        function renderItem(item) {
            const li = document.createElement('li');
            li.dataset.id = item.id;

            const nameSpan = document.createElement('span');
            nameSpan.textContent = item.name;
            li.appendChild(nameSpan);

            const deleteButton = document.createElement('button');
            deleteButton.textContent = 'Löschen';
            deleteButton.classList.add('delete-button');
            deleteButton.onclick = async () => {
                deleteButton.disabled = true;
                deleteButton.textContent = 'Lösche...';
                if (confirm(`Sicher, dass du "${item.name}" löschen möchtest?`)) {
                    await deleteItem(item.id, li);
                } else {
                    deleteButton.disabled = false;
                    deleteButton.textContent = 'Löschen';
                }
            };
            li.appendChild(deleteButton);
             itemList.prepend(li); // Fügt am Anfang hinzu
            //itemList.appendChild(li); // Fügt am Ende hinzu
        }

        async function addItem(itemName) {
            if (!supabase || !itemName) return;

            hideMessage(addError);
            const submitButton = addItemForm.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.textContent;
            submitButton.disabled = true;
            submitButton.textContent = 'Speichern...';

            try {
                const { data, error } = await supabase
                    .from('items')
                    .insert({ name: itemName })
                    .select('id, name, created_at')
                    .single();

                if (error) throw error;

                console.log('Item hinzugefügt:', data);
                itemNameInput.value = '';
                hideMessage(emptyListMessage);
                renderItem(data); // Neues Item am Anfang rendern
            } catch (error) {
                console.error('Fehler beim Hinzufügen:', error);
                let message = `Fehler beim Speichern: ${error.message || 'Unbekannter Fehler'}`;
                if (error.message.includes("check constraint") || error.message.includes("value too long")) {
                     message = "Fehler: Der Item-Name ist möglicherweise zu lang (max 280 Zeichen) oder ungültig.";
                } else if (error.message.includes("Rate limit exceeded")) {
                     message = "Fehler: Zu viele Anfragen. Bitte warte einen Moment und versuche es erneut.";
                }
                showMessage(addError, message);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = originalButtonText;
            }
        }

         async function deleteItem(itemId, listItemElement) {
            if (!supabase) return;

            try {
                const { error } = await supabase
                    .from('items')
                    .delete()
                    .match({ id: itemId });

                if (error) throw error;

                console.log('Item gelöscht:', itemId);
                listItemElement.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                listItemElement.style.opacity = '0';
                listItemElement.style.transform = 'translateX(-20px)';
                setTimeout(() => {
                    listItemElement.remove();
                    if(itemList.children.length === 0) {
                        emptyListMessage.style.display = 'block';
                    }
                }, 500);
                hideMessage(listError);
            } catch (error) {
                console.error('Fehler beim Löschen:', error);
                let message = `Fehler beim Löschen: ${error.message || 'Unbekannter Fehler'}`;
                if (error.message.includes("Rate limit exceeded")) {
                     message = "Fehler: Zu viele Löschanfragen. Bitte warte einen Moment.";
                 }
                showMessage(listError, message);
                 const deleteButton = listItemElement.querySelector('.delete-button');
                 if (deleteButton) {
                     deleteButton.disabled = false;
                     deleteButton.textContent = 'Löschen';
                 }
                 listItemElement.style.opacity = '1'; // Reset style on error
                 listItemElement.style.transform = 'none';
                setTimeout(() => hideMessage(listError), 5000);
            }
        }

         // ----- EVENT LISTENER -----
        addItemForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const itemName = itemNameInput.value.trim();
            if (itemName) {
                 hideMessage(addError); // Hide previous add error before attempting new add
                addItem(itemName);
            } else {
                 // Avoid calling addItem if field is empty
                showMessage(addError, 'Bitte gib einen Namen für das Item ein.');
                 itemNameInput.focus(); // Set focus back to input
            }
        });


        // ----- Initialisierung -----
        document.addEventListener('DOMContentLoaded', () => {
            // Check if supabase was initialized correctly before fetching
            if (typeof supabase !== 'undefined' && supabase) {
                fetchAndRenderItems();
            } else {
                 // Error is already shown by the initialization block
                 console.log("Supabase nicht verfügbar, fetchItems wird nicht ausgeführt.");
                  setLoading(false); // Ensure loading indicator is hidden if init failed
            }
        });
    </script>

</body>
</html>
