<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dood Jumper - Control Choice</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
        }
        #instructions {
            font-size: calc(10px + 1vmin);
            background-color: rgba(0,0,0,0.4);
            padding: 0.5em 1em;
            border-radius: 8px;
            margin-top: 10px;
            text-align: center;
            pointer-events: all; /* Allow interaction if needed */
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: all;
            z-index: 10;
        }
        #startScreen h1 {
            font-size: calc(24px + 3vmin);
            color: #FFD700;
            margin-bottom: 20px;
        }
        .control-choice {
            margin-bottom: 20px;
        }
        .control-choice label {
            margin-right: 10px;
            font-size: calc(14px + 1vmin);
        }
        .control-choice input[type="radio"] {
            margin-right: 5px;
        }
        #startButton {
            font-size: calc(18px + 2vmin);
            padding: 0.8em 1.5em;
            background-color: #FFD700;
            color: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div id="instructions"></div>
    </div>

    <div id="startScreen">
        <h1>Dood Jumper</h1>
        <div class="control-choice" id="mobileControlChoice">
            <p style="margin-bottom: 10px; font-size: calc(15px + 1vmin);">Choose your controls:</p>
            <label><input type="radio" name="controlType" value="tilt" checked> Tilt</label>
            <label><input type="radio" name="controlType" value="tap"> Tap Screen</label>
        </div>
        <button id="startButton">Start Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startButton = document.getElementById('startButton');
        const instructionsDiv = document.getElementById('instructions');
        const mobileControlChoiceDiv = document.getElementById('mobileControlChoice');

        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;

        // --- OS Detection & Control Scheme ---
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        let isAndroid = /android/i.test(userAgent);
        let isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
        let isMobile = isAndroid || isIOS;

        let controlScheme = 'keyboard'; // Default: 'keyboard', 'tilt', 'tap'
        if (isMobile) {
            mobileControlChoiceDiv.classList.remove('hidden');
        } else {
            mobileControlChoiceDiv.classList.add('hidden');
        }

        let gameSpeedMultiplier = 1; // Keep speed multiplier logic if needed
        if (isAndroid) gameSpeedMultiplier = 2;


        // --- Player Properties ---
        const playerWidth = Math.min(canvasWidth * 0.09, 36);
        const playerHeight = playerWidth;
        let playerX = canvasWidth / 2 - playerWidth / 2;
        let playerY = canvasHeight - playerHeight - 100;
        let playerDY = 0;
        let playerDX = 0;
        const basePlayerMoveSpeed = canvasWidth * 0.012 > 5 ? canvasWidth * 0.012 : 5;
        let playerMoveSpeed = basePlayerMoveSpeed * gameSpeedMultiplier;
        const baseGravity = 0.0006 * canvasHeight;
        let gravity = baseGravity * gameSpeedMultiplier * gameSpeedMultiplier;
        const baseJumpStrength = -0.018 * canvasHeight;
        let jumpStrength = baseJumpStrength * gameSpeedMultiplier;
        let playerBlinkTimer = 0;
        const playerBlinkInterval = 180, playerBlinkDuration = 7;

        // --- Platform Properties --- (truncated for brevity, same as before)
        const basePlatformWidth = Math.max(canvasWidth * 0.15, 70);
        const platformHeight = Math.max(canvasHeight * 0.02, 12);
        const defaultPlatformColor = '#60D060', bouncyPlatformColor = '#6495ED', breakablePlatformColor = '#A0522D';
        let platforms = [];
        const initialPlatforms = 7, platformSpawnThreshold = canvasHeight * 0.25;
        let lastPlatformY = canvasHeight - 50;
        const PLATFORM_TYPES = { NORMAL: 'normal', BOUNCY: 'bouncy', BREAKABLE: 'breakable' };

        // --- Power-ups ---
        const POWERUP_TYPES = { SUPER_SPRING: 'super_spring' };
        let hasSuperJumpCharge = false;

        // --- Particles ---
        let particles = [];

        // --- Game State ---
        let score = 0;
        let highScore = localStorage.getItem('doodJumperControlChoiceHighScore') || 0;
        let cameraY = 0;
        let gameState = 'PRE_GAME'; // PRE_GAME, PLAYING, GAME_OVER

        // --- Background Stars --- (truncated, same as before)
        let stars = [];
        function initializeStars() { /* ... same ... */ stars = []; const numStars = Math.floor(canvasWidth * canvasHeight / 8000); for(let i = 0; i < numStars; i++) { stars.push({ x: Math.random(), y: Math.random(), size: Math.random() * 1.5 + 0.5, opacity: Math.random() * 0.4 + 0.2 }); } }


        // --- Gyroscope ---
        let gyroAvailable = false;
        let gyroPermissionGranted = false;
        const baseGyroSensitivity = 0.5;
        let gyroSensitivity = baseGyroSensitivity;
        let baseGamma = null;
        let rawGammaValueForPupils = 0;

        // --- Tap Controls ---
        let activePointerId = null;


        function updateInstructions() {
            if (gameState === 'PRE_GAME') {
                instructionsDiv.textContent = isMobile ? "Select control scheme above." : "Use Arrow Keys to Move.";
            } else if (gameState === 'PLAYING') {
                if (controlScheme === 'tilt') {
                    instructionsDiv.textContent = "Tilt device to move. Tap Game Over screen to restart.";
                } else if (controlScheme === 'tap') {
                    instructionsDiv.textContent = "Tap left/right screen half to move. Tap Game Over screen to restart.";
                } else { // keyboard
                    instructionsDiv.textContent = "Use Arrow Keys. Press Enter on Game Over to restart.";
                }
            } else if (gameState === 'GAME_OVER') {
                 instructionsDiv.textContent = isMobile ? "Tap Game Over screen to restart." : "Press Enter to Restart.";
            }
        }


        // --- Helper: Resize Canvas --- (truncated, same as before)
        function resizeCanvas() { canvasWidth = window.innerWidth; canvasHeight = window.innerHeight; canvas.width = canvasWidth; canvas.height = canvasHeight; initializeStars(); updateInstructions(); }
        window.addEventListener('resize', resizeCanvas);


        // --- Platform Creation, Spawning --- (truncated, same as before)
        function createPlatform(y, x) { /* ... same ... */ let type = PLATFORM_TYPES.NORMAL; let color = defaultPlatformColor; let jumpMod = 1; let currentWidth = basePlatformWidth * (Math.random() * 0.3 + 0.85); let isBreakable = false; const randomType = Math.random(); if (randomType < 0.12 && y < cameraY + canvasHeight - 200) { type = PLATFORM_TYPES.BOUNCY; color = bouncyPlatformColor; jumpMod = 1.9; } else if (randomType < 0.27 && y < cameraY + canvasHeight - 150) { type = PLATFORM_TYPES.BREAKABLE; color = breakablePlatformColor; isBreakable = true; } let newPlatform = { x: x !== undefined ? x : Math.random() * (canvasWidth - currentWidth), y: y, width: currentWidth, height: platformHeight, type: type, color: color, jumpModifier: jumpMod, hasPowerUp: null, isBreakable: isBreakable, isBroken: false, breakTimer: 0 }; if (newPlatform.type === PLATFORM_TYPES.NORMAL && Math.random() < 0.1 && y < cameraY + canvasHeight - 150) { newPlatform.hasPowerUp = { type: POWERUP_TYPES.SUPER_SPRING, itemWidth: playerWidth * 0.6, itemHeight: playerWidth * 0.6, collected: false }; } return newPlatform; }
        function initializePlatforms() { /* ... same ... */ platforms = []; platforms.push(createPlatform(canvasHeight - platformHeight * 4, canvasWidth / 2 - basePlatformWidth / 2)); for (let i = 1; i < initialPlatforms; i++) { let newY = platforms[platforms.length - 1].y - (Math.random() * canvasHeight * 0.1 + canvasHeight * 0.12); platforms.push(createPlatform(newY)); } lastPlatformY = platforms[platforms.length - 1].y; }
        function spawnNewPlatforms() { /* ... same ... */  while (lastPlatformY > cameraY - platformSpawnThreshold - canvasHeight) { let newY = lastPlatformY - (Math.random() * canvasHeight * 0.1 + canvasHeight * 0.13); platforms.push(createPlatform(newY)); lastPlatformY = newY; } platforms = platforms.filter(p => p.y - cameraY < canvasHeight + 200 && !p.isBroken); }


        // --- Particle System & Powerups --- (truncated, same as before)
        function createParticles(x,y,c,pC,sS,lS) { /* ... same ... */ for (let i = 0; i < c; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * (canvasWidth * 0.01) * sS, vy: (Math.random() * (-canvasHeight * 0.005) - (canvasHeight*0.0015)) * sS * gameSpeedMultiplier, size: Math.random() * (playerWidth*0.08) + (playerWidth*0.05), life: ((Math.random() * 30 + 30) * lS) / gameSpeedMultiplier, color: pC }); } }
        function updateParticles() { /* ... same ... */ for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += gravity * 0.3; p.life--; if (p.life <= 0) particles.splice(i, 1); } }
        function activatePowerUp(type) { if (type === POWERUP_TYPES.SUPER_SPRING) hasSuperJumpCharge = true; }


        // --- Game Logic Update ---
        function update() {
            if (gameState !== 'PLAYING') return;

            playerDY += gravity;
            playerY += playerDY;

            if (controlScheme === 'keyboard' || controlScheme === 'tap') {
                playerX += playerDX;
            }
            // Gyro directly modifies playerX in its handler

            if (playerX + playerWidth < 0) playerX = canvasWidth;
            else if (playerX > canvasWidth) playerX = -playerWidth;

            // Platform collision (same as before)
            platforms.forEach(platform => { /* ... same collision logic ... */ if (platform.isBroken) return; if (playerDY > 0 && playerX < platform.x + platform.width && playerX + playerWidth > platform.x && playerY + playerHeight > platform.y && playerY + playerHeight < platform.y + platform.height + playerDY * 1.1) { playerY = platform.y - playerHeight; if (platform.hasPowerUp && !platform.hasPowerUp.collected) { activatePowerUp(platform.hasPowerUp.type); platform.hasPowerUp.collected = true; createParticles(platform.x + platform.width / 2, platform.y, 15, 'rgba(255,215,0,0.9)'); } let currentJumpStrength = jumpStrength; if (hasSuperJumpCharge) { currentJumpStrength *= 2.4; hasSuperJumpCharge = false; createParticles(playerX + playerWidth / 2, playerY + playerHeight, 30, 'rgba(255,105,180,0.9)', 1.5); } else { currentJumpStrength *= platform.jumpModifier; createParticles(playerX + playerWidth / 2, playerY + playerHeight, platform.type === PLATFORM_TYPES.BOUNCY ? 15 : 8, platform.type === PLATFORM_TYPES.BOUNCY ? 'rgba(100,149,237,0.9)' : 'rgba(220,220,220,0.7)'); } playerDY = currentJumpStrength; if (platform.isBreakable) { platform.isBroken = true; createParticles(platform.x + platform.width / 2, platform.y + platform.height / 2, 20, 'rgba(139,69,19,0.7)', 0.8, 0.5); } } });


            const cameraThreshold = canvasHeight / 2.8;
            if (playerY - cameraY < cameraThreshold) {
                cameraY -= (cameraThreshold - (playerY - cameraY)) * 0.08 * gameSpeedMultiplier;
            }

            let currentHeightScore = Math.max(0, Math.floor(-cameraY / (canvasHeight * 0.015)));
            score = Math.max(score, currentHeightScore);

            spawnNewPlatforms();
            updateParticles();
            playerBlinkTimer = (playerBlinkTimer + 1) % (playerBlinkInterval + playerBlinkDuration);

            if (playerY - cameraY > canvasHeight + playerHeight * 2) {
                gameState = 'GAME_OVER';
                updateInstructions(); // Update for game over
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('doodJumperControlChoiceHighScore', highScore);
                }
            }
        }

        // --- Drawing Functions --- (truncated, same as before, just ensure drawUI updates if needed)
        function drawBackgroundAndStars() { /* ... same ... */ let topColorStop = Math.max(0, Math.min(1, (-cameraY / (canvasHeight * 20)))); const skyBlue = { r: 135, g: 206, b: 235 }; const deepSpace = { r: 10, g: 10, b: 40 }; let r = Math.round(skyBlue.r + (deepSpace.r - skyBlue.r) * topColorStop); let g = Math.round(skyBlue.g + (deepSpace.g - skyBlue.g) * topColorStop); let b = Math.round(skyBlue.b + (deepSpace.b - skyBlue.b) * topColorStop); let gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight); gradient.addColorStop(0, `rgb(${r},${g},${b})`); gradient.addColorStop(1, `rgb(${Math.max(30,r-50)},${Math.max(30,g-50)},${Math.max(50,b-50)})`); ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvasWidth, canvasHeight); let starVisibilityFactor = Math.min(1, Math.max(0, (-cameraY - canvasHeight*2.5) / (canvasHeight*15))); if (starVisibilityFactor > 0) { stars.forEach(s => { ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity * starVisibilityFactor * (Math.sin(Date.now() * 0.001 + s.x * 10) * 0.2 + 0.8)})`; ctx.beginPath(); ctx.arc(s.x * canvasWidth, s.y * canvasHeight, s.size * starVisibilityFactor, 0, Math.PI * 2); ctx.fill(); }); } }
        function drawPlayer() { /* ... same ... */ const centerX = playerX + playerWidth / 2; const centerY = playerY + playerHeight / 2; ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(centerX, centerY, playerWidth / 2, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#CDAD00'; ctx.lineWidth = 2; ctx.stroke(); const eyeRadius = playerWidth / 7; const eyeY = centerY - playerHeight * 0.05; const eyeDist = playerWidth / 4.5; let eyesClosed = playerBlinkTimer >= playerBlinkInterval; ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(centerX - eyeDist, eyeY, eyeRadius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(centerX + eyeDist, eyeY, eyeRadius, 0, Math.PI * 2); ctx.fill(); if (!eyesClosed) { ctx.fillStyle = 'black'; const pupilRadius = eyeRadius / 2.2; let pupilOffsetX = 0; const currentDXSource = (controlScheme === 'tilt' && gyroPermissionGranted && gyroAvailable) ? (rawGammaValueForPupils * 0.1) : playerDX; if (currentDXSource > 0.1) pupilOffsetX = eyeRadius * 0.3; if (currentDXSource < -0.1) pupilOffsetX = -eyeRadius * 0.3; ctx.beginPath(); ctx.arc(centerX - eyeDist + pupilOffsetX, eyeY, pupilRadius, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(centerX + eyeDist + pupilOffsetX, eyeY, pupilRadius, 0, Math.PI * 2); ctx.fill(); } else { ctx.strokeStyle = 'black'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(centerX - eyeDist - eyeRadius*0.7, eyeY); ctx.lineTo(centerX - eyeDist + eyeRadius*0.7, eyeY); ctx.stroke(); ctx.beginPath(); ctx.moveTo(centerX + eyeDist - eyeRadius*0.7, eyeY); ctx.lineTo(centerX + eyeDist + eyeRadius*0.7, eyeY); ctx.stroke(); } if (hasSuperJumpCharge) { ctx.fillStyle = 'rgba(255, 100, 0, 0.5)'; ctx.beginPath(); ctx.arc(centerX, centerY, playerWidth / 2 + 4, 0, Math.PI * 2); ctx.fill(); } }
        function drawPlatforms() { /* ... same ... */ platforms.forEach(platform => { if (platform.isBroken) return; ctx.fillStyle = platform.color; const cornerRadius = Math.min(platformHeight * 0.3, 5); ctx.beginPath(); ctx.moveTo(platform.x + cornerRadius, platform.y); ctx.lineTo(platform.x + platform.width - cornerRadius, platform.y); ctx.arcTo(platform.x + platform.width, platform.y, platform.x + platform.width, platform.y + cornerRadius, cornerRadius); ctx.lineTo(platform.x + platform.width, platform.y + platform.height - cornerRadius); ctx.arcTo(platform.x + platform.width, platform.y + platform.height, platform.x + platform.width - cornerRadius, platform.y + platform.height, cornerRadius); ctx.lineTo(platform.x + cornerRadius, platform.y + platform.height); ctx.arcTo(platform.x, platform.y + platform.height, platform.x, platform.y + platform.height - cornerRadius, cornerRadius); ctx.lineTo(platform.x, platform.y + cornerRadius); ctx.arcTo(platform.x, platform.y, platform.x + cornerRadius, platform.y, cornerRadius); ctx.closePath(); ctx.fill(); if (platform.type === PLATFORM_TYPES.BOUNCY) { ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2; const springY = platform.y + platform.height / 2; const sW = platform.width*0.6; const sX = platform.x + platform.width*0.2; for(let i=0; i<3; i++) { ctx.beginPath(); ctx.arc(sX + (sW/3)*i + sW/6, springY, sW/7, Math.PI, 0); ctx.stroke(); } } if (platform.type === PLATFORM_TYPES.BREAKABLE) { ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(platform.x + platform.width * 0.2, platform.y + platform.height * 0.3); ctx.lineTo(platform.x + platform.width * 0.8, platform.y + platform.height * 0.7); ctx.stroke(); ctx.beginPath(); ctx.moveTo(platform.x + platform.width * 0.3, platform.y + platform.height * 0.8); ctx.lineTo(platform.x + platform.width * 0.7, platform.y + platform.height * 0.2); ctx.stroke(); } if (platform.hasPowerUp && !platform.hasPowerUp.collected) { const item = platform.hasPowerUp; const itemX = platform.x + platform.width / 2 - item.itemWidth / 2; const itemY = platform.y - item.itemHeight - 3; ctx.fillStyle = '#FF8C00'; ctx.fillRect(itemX, itemY, item.itemWidth, item.itemHeight); ctx.strokeStyle = '#A52A2A'; ctx.lineWidth = 1.5; ctx.strokeRect(itemX, itemY, item.itemWidth, item.itemHeight); ctx.beginPath(); for(let i=0; i<3; i++){ ctx.moveTo(itemX + 4, itemY + item.itemHeight*(0.2 + i*0.3)); ctx.lineTo(itemX + item.itemWidth - 4, itemY + item.itemHeight*(0.2 + i*0.3)); } ctx.stroke(); } }); }
        function drawParticles() { /* ... same ... */ particles.forEach(p => { ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life / ( (30 + 30)/2 / gameSpeedMultiplier ) + 0.2), 0, Math.PI * 2); ctx.fill(); }); }
        function drawUI() { /* ... same ... */ const fontSizeSmall = Math.max(16, canvasHeight * 0.025); const fontSizeMedium = Math.max(20, canvasHeight * 0.035); const fontSizeLarge = Math.max(28, canvasHeight * 0.05); ctx.fillStyle = '#FFF'; ctx.textShadow = '1px 1px 2px black'; ctx.font = `bold ${fontSizeMedium}px "Arial Rounded MT Bold", Arial, sans-serif`; ctx.textAlign = 'left'; ctx.fillText('Score: ' + score, 15, fontSizeMedium + 5); ctx.textAlign = 'right'; ctx.fillText('High: ' + highScore, canvasWidth - 15, fontSizeMedium + 5); if (hasSuperJumpCharge && gameState === 'PLAYING') { ctx.fillStyle = '#FF8C00'; ctx.textAlign = 'center'; ctx.font = `bold ${fontSizeSmall}px "Arial Rounded MT Bold", Arial, sans-serif`; ctx.fillText('SUPER JUMP!', canvasWidth/2, fontSizeMedium + 5); } if (gameState === 'GAME_OVER') { ctx.fillStyle = 'rgba(0, 0, 0, 0.75)'; ctx.fillRect(canvasWidth / 2 - canvasWidth*0.35, canvasHeight / 2 - canvasHeight*0.15, canvasWidth*0.7, canvasHeight*0.3); ctx.fillStyle = '#FFF'; ctx.font = `bold ${fontSizeLarge}px "Arial Rounded MT Bold", Arial, sans-serif`; ctx.textAlign = 'center'; ctx.fillText('Game Over!', canvasWidth / 2, canvasHeight / 2 - canvasHeight*0.04); ctx.font = `bold ${fontSizeMedium}px "Arial Rounded MT Bold", Arial, sans-serif`; ctx.fillText('Score: ' + score, canvasWidth / 2, canvasHeight / 2 + canvasHeight*0.01); ctx.font = `${fontSizeSmall}px "Arial Rounded MT Bold", Arial, sans-serif`; ctx.fillText(isMobile ? 'Tap here to Restart' : 'Press Enter to Restart', canvasWidth / 2, canvasHeight / 2 + canvasHeight*0.06); } }


        function draw() {
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            if (gameState === 'PRE_GAME') {
                // Start screen is HTML overlay, so canvas can be simple or show a static background
                ctx.fillStyle = '#111'; // Darker background for pre-game
                ctx.fillRect(0,0,canvasWidth, canvasHeight);
                drawBackgroundAndStars(); // Or a simpler static background
                return;
            }

            drawBackgroundAndStars();
            ctx.save(); ctx.translate(0, -cameraY);
            drawPlatforms(); drawParticles(); drawPlayer();
            ctx.restore();
            drawUI();
        }

        // --- Event Handlers ---
        function handleKeyDown(e) {
            if (gameState === 'GAME_OVER' && e.key === 'Enter' && controlScheme === 'keyboard') {
                resetGameAndStartInternal(); return;
            }
            if (gameState !== 'PLAYING' || controlScheme !== 'keyboard') return;

            if (e.key === 'ArrowLeft' || e.key === 'a') playerDX = -playerMoveSpeed;
            else if (e.key === 'ArrowRight' || e.key === 'd') playerDX = playerMoveSpeed;
        }

        function handleKeyUp(e) {
            if (gameState !== 'PLAYING' || controlScheme !== 'keyboard') return;
            if ((e.key === 'ArrowLeft' || e.key === 'a') && playerDX < 0) playerDX = 0;
            else if ((e.key === 'ArrowRight' || e.key === 'd') && playerDX > 0) playerDX = 0;
        }

        function handleDeviceOrientation(event) {
            if (controlScheme !== 'tilt' || !gyroPermissionGranted || !event.gamma) {
                gyroAvailable = controlScheme === 'tilt' && gyroPermissionGranted; // Update availability based on permission
                return;
            }
            gyroAvailable = true;
            if (baseGamma === null && event.gamma !== null) baseGamma = event.gamma;

            let tilt = event.gamma - (baseGamma || 0);
            rawGammaValueForPupils = event.gamma;
            const deadZone = 3;
            if (Math.abs(tilt) < deadZone) { /* No movement */ }
            else {
                let calculatedDX = (tilt - Math.sign(tilt) * deadZone) * gyroSensitivity;
                const gyroMaxSpeed = basePlayerMoveSpeed * gameSpeedMultiplier;
                calculatedDX = Math.max(-gyroMaxSpeed, Math.min(gyroMaxSpeed, calculatedDX));
                playerX += calculatedDX; // Gyro directly modifies playerX
            }
            playerDX = 0; // Ensure keyboard DX is not used if gyro active
        }

        function handleCanvasPointerDown(event) {
            if (gameState === 'GAME_OVER') { // Handle restart tap on game over screen
                // Check if tap is within the "Game Over" message area for mobile
                const rect = canvas.getBoundingClientRect();
                const tapX = event.clientX - rect.left;
                const tapY = event.clientY - rect.top;

                // Define the approximate area of the "Tap here to Restart" text
                const restartTextY = canvasHeight / 2 + canvasHeight * 0.06;
                const restartTextArea = {
                    x: canvasWidth / 2 - canvasWidth * 0.2,
                    y: restartTextY - canvasHeight*0.03, // A bit above the text
                    width: canvasWidth * 0.4,
                    height: canvasHeight * 0.06 // Around the text
                };

                if (isMobile && tapX >= restartTextArea.x && tapX <= restartTextArea.x + restartTextArea.width &&
                    tapY >= restartTextArea.y && tapY <= restartTextArea.y + restartTextArea.height) {
                    resetGameAndStartInternal();
                }
                return;
            }

            if (gameState !== 'PLAYING' || controlScheme !== 'tap' || activePointerId !== null) return;
            activePointerId = event.pointerId;
            event.preventDefault(); // Prevent scrolling/other default actions

            if (event.clientX < canvasWidth / 2) {
                playerDX = -playerMoveSpeed;
            } else {
                playerDX = playerMoveSpeed;
            }
        }

        function handleCanvasPointerUp(event) {
            if (controlScheme !== 'tap' || event.pointerId !== activePointerId) return;
            activePointerId = null;
            playerDX = 0;
        }


        function requestGyroPermission(callback) {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        gyroPermissionGranted = (permissionState === 'granted');
                        if(gyroPermissionGranted) window.addEventListener('deviceorientation', handleDeviceOrientation);
                        callback();
                    })
                    .catch(error => {
                        console.error("Gyro permission request error:", error);
                        gyroPermissionGranted = false;
                        callback();
                    });
            } else {
                // Assume permission or it will fail silently (Android, non-HTTPS iOS)
                gyroPermissionGranted = true; // Attempt to use it
                window.addEventListener('deviceorientation', handleDeviceOrientation);
                // Check if gyro actually provides data
                setTimeout(() => { if (controlScheme === 'tilt' && !gyroAvailable && gameState === 'PLAYING') console.log("Gyro data not received."); }, 1500);
                callback();
            }
        }

        startButton.addEventListener('click', () => {
            if (isMobile) {
                const selected = document.querySelector('input[name="controlType"]:checked');
                controlScheme = selected ? selected.value : 'tap'; // Default to tap if somehow none selected
            } else {
                controlScheme = 'keyboard';
            }

            if (controlScheme === 'tilt') {
                requestGyroPermission(startGameFlowInternal);
            } else {
                startGameFlowInternal();
            }
        });


        function startGameFlowInternal() {
            startScreen.classList.add('hidden');
            updateInstructions();
            resetGameAndStartInternal();
        }


        // --- Game Management ---
        function resetGameAndStartInternal() {
            playerX = canvasWidth / 2 - playerWidth / 2;
            playerY = canvasHeight - playerHeight - canvasHeight * 0.15;
            playerDY = 0; playerDX = 0; score = 0; cameraY = 0;
            hasSuperJumpCharge = false; particles = []; baseGamma = null; rawGammaValueForPupils = 0;
            activePointerId = null; // Reset tap control state
            initializePlatforms();
            playerDY = jumpStrength * 1.2;
            gameState = 'PLAYING';
            updateInstructions();
            if (!gameLoopRunning) gameLoop();
        }

        let gameLoopRunning = false;
        function gameLoop() {
            gameLoopRunning = true;
            update();
            draw();
            if (gameState === 'PRE_GAME' || gameState === 'PLAYING') {
                requestAnimationFrame(gameLoop);
            } else { // GAME_OVER
                gameLoopRunning = false;
                draw(); // One final draw for game over screen
            }
        }

        // --- Initial Setup ---
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('pointerdown', handleCanvasPointerDown);
        canvas.addEventListener('pointerup', handleCanvasPointerUp);
        canvas.addEventListener('pointercancel', handleCanvasPointerUp); // Handle cancels like pointerup


        initializeStars();
        resizeCanvas(); // Initial size setup & instruction update
        updateInstructions(); // Set initial instructions
        draw(); // Draw PRE_GAME screen initially (or its background)
    </script>
</body>
</html>
