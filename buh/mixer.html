<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Drop2Stems (Fast DSP)</title><style>html,body{margin:0;height:100%;background:#0b0e13;color:#e7ecf3;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}#bar{display:flex;gap:.5rem;align-items:center;padding:.75rem 1rem;border-bottom:1px solid #1b2330;background:#0f141d;position:sticky;top:0;z-index:10}button{all:unset;background:#1e293b;padding:.45rem .7rem;border-radius:.7rem;cursor:pointer}button:hover{background:#334155}#drop{border:2px dashed #334155;border-radius:1rem;margin:1rem;display:flex;align-items:center;justify-content:center;min-height:110px;color:#9fb3c8;text-align:center}#lanes{display:grid;grid-template-rows:repeat(5,110px);gap:10px;padding:0 1rem 1rem}canvas{width:100%;height:70px;background:#0c111a;border-radius:.6rem;box-shadow:0 0 0 1px #111827}label{display:inline-flex;align-items:center;gap:.4rem}small{opacity:.7}#clock{opacity:.8}#name{color:#e7ecf3}#info{display:flex;gap:1rem;align-items:center;padding:0 1rem;margin-top:-6px;color:#9fb3c8;font-size:.9rem}.lane{background:#0c111a;border-radius:.8rem;padding:.5rem .6rem;box-shadow:0 0 0 1px #111827}.row{display:flex;align-items:center;gap:.5rem}.tag{font-size:.8rem;opacity:.8}</style></head><body><div id=bar><button id=openBtn>Open</button><button id=play disabled>Play</button><button id=stop disabled>Stop</button><label>Speed <input id=rate type=range min=.5 max=1.5 step=.01 value=1></label><label>Gain <input id=master type=range min=0 max=1.5 step=.01 value=1></label><div style=flex:1></div><div id=clock>00:00 / 00:00</div></div><div id=drop>drop mp3/wav here<br><small>(fast DSP stems: Vocals • Bass • Drums • Other)</small></div><div id=info><div>File: <span id=name>—</span></div><div>Channels: <span id=ch>—</span></div><div>Mode: <b>Lightweight (no ML)</b> — instant & offline</div></div><div id=lanes></div><input id=file type=file accept="audio/*" hidden><script>(()=>{const $=q=>document.querySelector(q),D=document, lanes=$('#lanes');const laneDefs=[{id:'master',label:'Master',hint:'full mix',color:'#a78bfa'},{id:'voc',label:'Vocals (Center Band)',hint:'mid/side + bandpass 200–4k',color:'#f472b6'},{id:'bass',label:'Bass',hint:'lowpass ≤160 Hz',color:'#60a5fa'},{id:'drums',label:'Drums / Percussive',hint:'wide stereo highs + transient boost',color:'#f59e0b'},{id:'other',label:'Other / Highs',hint:'everything else (air, keys, fx)',color:'#22d3ee'}];lanes.innerHTML=laneDefs.map(l=>`<div class="lane" data-id="${l.id}"><div class=row><button class=solo>Solo</button><button class=mute>Mute</button><span class=tag>${l.label}</span><div style="flex:1"></div><label>Vol <input class=gain type=range min=0 max=2 step=.01 value=${l.id==='master'?1:0.9}></label></div><canvas></canvas><small>${l.hint}</small></div>`).join('');const openBtn=$('#openBtn'),file=$('#file'),drop=$('#drop'),playBtn=$('#play'),stopBtn=$('#stop'),rate=$('#rate'),clock=$('#clock'),nameEl=$('#name'),chEl=$('#ch'),masterGainRange=$('#master');let ac,src,buf,startT=0,offset=0,playing=false,graph=null,raf=0;const dpr=Math.min(2,window.devicePixelRatio||1);const laneEls=[...lanes.children].map(el=>({id:el.dataset.id,el,solo:el.querySelector('.solo'),mute:el.querySelector('.mute'),gain:el.querySelector('.gain'),cnv:el.querySelector('canvas'),ctx:el.querySelector('canvas').getContext('2d')}));function fit(){laneEls.forEach(({cnv})=>{const r=cnv.getBoundingClientRect();cnv.width=Math.floor(r.width*dpr);cnv.height=Math.floor(r.height*dpr)});}window.addEventListener('resize',fit);function fmt(t){t=Math.max(0,t||0);const m=Math.floor(t/60),s=Math.floor(t%60);return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}openBtn.onclick=()=>file.click();file.onchange=e=>{const f=e.target.files[0];if(f)loadFile(f)};['dragenter','dragover'].forEach(k=>drop.addEventListener(k,e=>{e.preventDefault();drop.style.borderColor='#64748b'}));['dragleave','drop'].forEach(k=>drop.addEventListener(k,e=>{e.preventDefault();drop.style.borderColor='#334155'}));drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)loadFile(f)});async function loadFile(f){nameEl.textContent=f.name;drop.textContent='decoding…';if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});const arr=await f.arrayBuffer();buf=await ac.decodeAudioData(arr);drop.textContent='ready — press Play';chEl.textContent=buf.numberOfChannels;playBtn.disabled=stopBtn.disabled=false;offset=0;buildGraph();fit();drawOnce()}function makeAnalyser(){const a=ac.createAnalyser();a.fftSize=2048;a.minDecibels=-100;a.maxDecibels=-10;return a}function buildGraph(){if(!ac||!buf)return; if(src){try{src.stop()}catch{} src.disconnect()}const master=ac.createGain();master.gain.value=masterGainRange.valueAsNumber||1;const bus={master, voc:ac.createGain(), bass:ac.createGain(), drums:ac.createGain(), other:ac.createGain()};bus.voc.gain.value=.9;bus.bass.gain.value=.9;bus.drums.gain.value=.9;bus.other.gain.value=.9;const splitter=ac.createChannelSplitter(Math.max(2,buf.numberOfChannels));const mid=ac.createGain(),side=ac.createGain();const L=ac.createGain(),R=ac.createGain(),L2=ac.createGain(),R2=ac.createGain();L.gain.value=R.gain.value=.5;L2.gain.value=.5;R2.gain.value=-.5;const srcNode=ac.createBufferSource();srcNode.buffer=buf;srcNode.connect(splitter);splitter.connect(L,0);splitter.connect(R,1);splitter.connect(L2,0);splitter.connect(R2,1);L.connect(mid);R.connect(mid);L2.connect(side);R2.connect(side);const vocBP=ac.createBiquadFilter();vocBP.type='bandpass';vocBP.frequency.value=1400;vocBP.Q.value=0.6;mid.connect(vocBP).connect(bus.voc);const bassLP=ac.createBiquadFilter();bassLP.type='lowpass';bassLP.frequency.value=160;srcNode.connect(bassLP).connect(bus.bass);const hiHP=ac.createBiquadFilter();hiHP.type='highpass';hiHP.frequency.value=250;const hiShelf=ac.createBiquadFilter();hiShelf.type='highshelf';hiShelf.frequency.value=3000;hiShelf.gain.value=6;side.connect(hiHP).connect(hiShelf);const drumWide=ac.createGain();drumWide.gain.value=1.0;hiShelf.connect(drumWide);const comp=ac.createDynamicsCompressor();comp.attack.value=0.001;comp.release.value=0.08;comp.threshold.value=-30;comp.ratio.value=6;drumWide.connect(comp).connect(bus.drums);const notchVoc=ac.createBiquadFilter();notchVoc.type='notch';notchVoc.frequency.value=1200;notchVoc.Q.value=0.9;const otherHP=ac.createBiquadFilter();otherHP.type='highpass';otherHP.frequency.value=180;srcNode.connect(otherHP).connect(notchVoc).connect(bus.other);const mix=ac.createGain();bus.voc.connect(mix);bus.bass.connect(mix);bus.drums.connect(mix);bus.other.connect(mix);mix.connect(master).connect(ac.destination);const analy={master:makeAnalyser(),voc:makeAnalyser(),bass:makeAnalyser(),drums:makeAnalyser(),other:makeAnalyser()};mix.connect(analy.master);bus.voc.connect(analy.voc);bus.bass.connect(analy.bass);bus.drums.connect(analy.drums);bus.other.connect(analy.other);graph={bus,analy,srcNode};laneEls.forEach(({id, gain, solo, mute})=>{gain.oninput=()=>{(id==='master'?master:bus[id]).gain.value=gain.valueAsNumber};solo.onclick=()=>toggleSolo(id);mute.onclick=()=>toggleMute(id)});masterGainRange.oninput=()=>master.gain.value=masterGainRange.valueAsNumber;rate.oninput=()=>{if(graph?.srcNode)graph.srcNode.playbackRate.value=+rate.value};}let soloState=null;function toggleSolo(id){if(soloState===id){soloState=null}else{soloState=id}applySM()}function toggleMute(id){const lane=laneEls.find(l=>l.id===id);lane.muted=!lane.muted;applySM()}function applySM(){laneEls.forEach(({id,el})=>{const g=id==='master'?graph.bus.master:graph.bus[id];if(id==='master')return;if(soloState){g.gain.value=(id===soloState && !laneEls.find(l=>l.id===id).muted)?(laneEls.find(l=>l.id===id).gain.valueAsNumber||.9):0}else{g.gain.value=laneEls.find(l=>l.id===id).muted?0:(laneEls.find(l=>l.id===id).gain.valueAsNumber||.9)};el.style.opacity=(g.gain.value>0?.999:.4)})}function play(){if(!buf||!ac||!graph)return; if(playing)return; const {srcNode}=graph;srcNode.playbackRate.value=+rate.value;startT=ac.currentTime;srcNode.onended=()=>{playing=false;cancelAnimationFrame(raf)};srcNode.start(0,offset);playing=true;tick()}function stop(){if(!ac||!graph)return; try{graph.srcNode.stop()}catch{} playing=false;offset=0;buildGraph();drawOnce();clock.textContent=`00:00 / ${fmt(buf?.duration||0)}`}function pause(){if(!ac||!graph)return; const pos=getT(); try{graph.srcNode.stop()}catch{} playing=false;offset=pos;buildGraph();drawOnce()}function getT(){return playing?offset+(ac.currentTime-startT)*(+rate.value):offset}function drawOnce(){laneEls.forEach(({id,ctx,cnv})=>{ctx.clearRect(0,0,cnv.width,cnv.height);ctx.globalAlpha=.9;ctx.fillStyle='#0c111a';ctx.fillRect(0,0,cnv.width,cnv.height);ctx.fillStyle='rgba(148,163,184,.18)';ctx.fillRect(0,cnv.height-2,cnv.width,2)})}function tick(){const t=getT();clock.textContent=`${fmt(t)} / ${fmt(buf.duration)}`;laneEls.forEach(({id,ctx,cnv})=>{const an=graph.analy[id];if(!an)return;const timeBins=new Uint8Array(an.fftSize);const freqBins=new Uint8Array(an.frequencyBinCount);an.getByteTimeDomainData(timeBins);an.getByteFrequencyData(freqBins);ctx.clearRect(0,0,cnv.width,cnv.height);const W=cnv.width,H=cnv.height;ctx.beginPath();for(let i=0;i<W;i++){const idx=Math.floor(i/W*timeBins.length),v=(timeBins[idx]-128)/128,y=(.5-v*.45)*H;i?ctx.lineTo(i,y):ctx.moveTo(i,y)}ctx.lineWidth=1;ctx.strokeStyle='#94a3b8';ctx.stroke();let bars=48,bw=W/bars;for(let i=0;i<bars;i++){const v=freqBins[Math.floor(i/bars*freqBins.length)]/255,h=v*H*.7;ctx.fillStyle='rgba(148,163,184,.2)';ctx.fillRect(i*bw,H-h,bw*.8,h)} });raf=requestAnimationFrame(tick)}playBtn.onclick=()=>playing?pause():play();stopBtn.onclick=stop;lanes.addEventListener('click',e=>{const cnv=e.target.closest('canvas');if(!cnv||!buf||!ac||!graph)return;const r=cnv.getBoundingClientRect();const x=(e.clientX-r.left)/r.width;const t=x*buf.duration;if(playing)pause();offset=t;drawOnce();clock.textContent=`${fmt(t)} / ${fmt(buf.duration)}`});function init(){fit();drawOnce();clock.textContent='00:00 / 00:00'}init();})();</script></body></html>
