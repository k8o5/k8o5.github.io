      <path d="M-54,-4 C-20,-16 20,-16 54,-4" fill="none" stroke="#7a1a1a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <path d="M-56,10 C-22,26 22,26 56,10" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="5" stroke-linecap="round"/>
