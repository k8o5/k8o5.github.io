      <stop offset="60%" stop-color="rgba(255,140,140,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,120,120,0)"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="lipGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c2433a"/>
      <stop offset="70%" stop-color="#8e2a24"/>
      <stop offset="100%" stop-color="#6d1c18"/>
