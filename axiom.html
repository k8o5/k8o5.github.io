    .msg-header { font-size: 9px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 3px; } .msg-body { white-space: pre-wrap; word-break: break-word; }

<div class="main-container">

<script>
    function getFileIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const colors = { js:'#f7df1e',ts:'#3178c6',py:'#3776ab',html:'#e44d26',css:'#264de4',json:'#cbcb41',md:'#083fa1',go:'#00add8',rs:'#dea584',sh:'#89e051' };
        const c = colors[ext] || '#8892a2';
        return `<div class="file-icon"><svg viewBox="0 0 24 24" fill="${c}"><rect x="4" y="2" width="16" height="20" rx="2" fill="${c}" opacity="0.2"/><text x="12" y="14" text-anchor="middle" font-size="6" font-weight="bold" fill="${c}">${ext.slice(0,3).toUpperCase()}</text></svg></div>`;
    }

    function parseAIResponse(data) {
        if (typeof data === 'string') { try { data = JSON.parse(data); } catch(e) { return data; } }
        
        if (data?.choices?.[0]?.message?.tool_calls?.length > 0) {
            const tc = data.choices[0].message.tool_calls[0];
            const fnName = tc.function?.name || tc.name;
            const fnArgs = tc.function?.arguments || tc.arguments;
            return JSON.stringify({ tool: fnName, args: fnArgs });
        }
        
        if (data?.choices?.[0]?.message?.content) return data.choices[0].message.content;
        if (typeof data?.response === 'string') return data.response;
        if (data?.result?.response) return data.result.response;
        if (data?.content?.[0]?.text) return data.content[0].text;
        if (data?.candidates?.[0]?.content?.parts?.[0]?.text) return data.candidates[0].content.parts[0].text;
        if (typeof data?.text === 'string') return data.text;
        if (data?.output?.[0]?.content?.[0]?.text) return data.output[0].content[0].text;
        return JSON.stringify(data, null, 2);
    }

    const PROVIDERS = {
        google: { 
            name: 'Gemini', type: 'cloud', keyUrl: 'https://aistudio.google.com/app/apikey', defaultModel: 'gemini-2.0-flash-exp',
            buildRequest: (messages, cfg) => {
                const contents = [];
                messages.forEach(m => {
                    const role = m.role === 'assistant' ? 'model' : 'user';
                    if (contents.length > 0 && contents[contents.length - 1].role === role) {
                        contents[contents.length - 1].parts[0].text += '\n\n' + m.content;
                    } else {
                        contents.push({ role, parts: [{ text: m.content }] });
                    }
                });
                return {
                    url: `https://generativelanguage.googleapis.com/v1beta/models/${cfg.model}:generateContent?key=${cfg.apiKey}`,
                    headers: { 'Content-Type': 'application/json' },
                    body: { contents, generationConfig: { temperature: 0.7, maxOutputTokens: 8192 } }
                };
            }
        },
        openai: {

    function loadConfig() {
        const saved = localStorage.getItem('axiom_v5');

            try {
                const c = JSON.parse(saved);
                state.provider = c.provider || 'google'; state.configs = c.configs || {}; state.yoloMode = c.yoloMode || false; state.cmdHistory = c.cmdHistory || [];
                document.getElementById('providerSelect').value = state.provider;
                loadProviderUI();
                if (state.yoloMode) { document.getElementById('yoloBtn').classList.add('active'); document.getElementById('yoloBadge').classList.remove('hidden'); }
                const cfg = state.configs[state.provider]; const p = PROVIDERS[state.provider];
                if (cfg?.apiKey || p?.type !== 'cloud') connectAPI(true);
            } catch(e) {}
        } else loadProviderUI();
    }

    function saveConfig() {
        const cfg = { apiKey: document.getElementById('apiKeyInput').value.trim(), model: document.getElementById('modelInput').value.trim(), endpoint: document.getElementById('endpointInput').value.trim() };
        state.configs[state.provider] = cfg;
        localStorage.setItem('axiom_v5', JSON.stringify({ provider: state.provider, configs: state.configs, yoloMode: state.yoloMode, cmdHistory: state.cmdHistory.slice(-100) }));

    function loadProviderUI() {
        const p = PROVIDERS[state.provider]; const cfg = state.configs[state.provider] || {};
        document.getElementById('apiKeyInput').value = cfg.apiKey || ''; document.getElementById('modelInput').value = cfg.model || p?.defaultModel || ''; document.getElementById('endpointInput').value = cfg.endpoint || p?.defaultEndpoint || '';
        const badge = document.getElementById('providerBadge'); badge.className = 'provider-badge ' + (p?.type || 'cloud'); badge.textContent = (p?.type || 'cloud').toUpperCase();
        document.getElementById('endpointGroup').classList.toggle('hidden', p?.type !== 'local' && p?.type !== 'custom');
        document.getElementById('apiKeyLink').href = p?.keyUrl || '#';

    function setupEvents() {
        const input = document.getElementById('terminalInput');
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); navHistory(-1); }
            else if (e.key === 'ArrowDown') { e.preventDefault(); navHistory(1); }
        });
        input.addEventListener('input', () => { state.cmdIndex = -1; state.currentInput = input.value; });
    }

    function navHistory(dir) {
        const input = document.getElementById('terminalInput');
        if (!state.cmdHistory.length) return;
        if (state.cmdIndex === -1 && dir === -1) { state.currentInput = input.value; state.cmdIndex = state.cmdHistory.length - 1; }
        else { state.cmdIndex += dir; }
        if (state.cmdIndex < 0 || state.cmdIndex >= state.cmdHistory.length) { state.cmdIndex = -1; input.value = state.currentInput; }
        else { input.value = state.cmdHistory[state.cmdIndex]; }
        input.selectionStart = input.selectionEnd = input.value.length;
    }

    function handleFileUpload(e) {
        for (const file of e.target.files) {
            if (!file.name.startsWith('.')) {
                const reader = new FileReader();
                reader.onload = (ev) => { state.files.set(file.name, { content: ev.target.result, modified: false }); updateFileList(); if (state.activeTab === file.name) openFile(file.name); else openFile(file.name); };
                reader.readAsText(file);
            }
        }
        e.target.value = '';
    }

    function createNewFile() {
        const name = prompt('Filename:');
        if (!name || state.files.has(name)) return;
        state.files.set(name, { content: '', modified: false }); updateFileList(); openFile(name);
    }

    function openFile(name) {
        const file = state.files.get(name); if (!file) return;
        if (!state.openTabs.includes(name)) state.openTabs.push(name);
        state.activeTab = name; updateTabs(); editor.setValue(file.content);
        const info = CodeMirror.findModeByFileName(name); editor.setOption('mode', info ? info.mode : 'text/plain');
    }

    function downloadFile(name) {
        const file = state.files.get(name); if (!file) return;
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([file.content])); a.download = name; a.click();

        if (!state.files.size) return toast('No files');
        const zip = new JSZip(); state.files.forEach((f, n) => zip.file(n, f.content));

                    <button class="file-action-btn" onclick="event.stopPropagation();deleteFile('${esc(name)}')" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>

    function updateTabs() {
        document.getElementById('tabsBar').innerHTML = state.openTabs.map(n => {
            const f = state.files.get(n);
            return `<div class="tab${n === state.activeTab ? ' active' : ''}" onclick="switchTab('${esc(n)}')">

    function switchTab(name) {
        state.activeTab = name; updateTabs();
        const f = state.files.get(name); 
        if (f) {
            editor.setValue(f.content);
            const info = CodeMirror.findModeByFileName(name); 
            editor.setOption('mode', info ? info.mode : 'text/plain');
        } else {
            editor.setValue('');
        }
    }

    function closeTab(name) {
        const i = state.openTabs.indexOf(name);
        if (i > -1) {
            state.openTabs.splice(i, 1);
            if (state.activeTab === name) state.activeTab = state.openTabs[Math.max(0, i - 1)] || null;
            if (!state.openTabs.length) { 
                state.openTabs.push('README.md'); 
                state.activeTab = 'README.md'; 
                if(!state.files.has('README.md')) state.files.set('README.md', {content: '# AXIOM\n', modified: false});
            }
            updateTabs(); switchTab(state.activeTab);
        }
    }

    function runTool(name, args) {
        addMsg('tool', `${name}(${JSON.stringify(args).slice(0, 50)}...)`);
        switch (name) {
            case 'read_file': { const f = state.files.get(args.filename); return f ? { content: f.content } : { error: 'Not found' }; }
            case 'write_file': {
                state.files.set(args.filename, { content: args.content, modified: false }); updateFileList();
                if (!state.openTabs.includes(args.filename)) state.openTabs.push(args.filename);
                if (state.activeTab === 'README.md' && state.openTabs.length > 1) closeTab('README.md');
                state.activeTab = args.filename; updateTabs(); editor.setValue(args.content);
                const info = CodeMirror.findModeByFileName(args.filename); editor.setOption('mode', info ? info.mode : 'text/plain');
                addMsg('system', `Created: ${args.filename}`); return { success: true };
            }
            case 'edit_file': {
                const f = state.files.get(args.filename); if (!f) return { error: 'Not found' };
                if (!f.content.includes(args.search)) return { error: 'Text not found' };
                f.content = f.content.replace(args.search, args.replace); f.modified = false; state.files.set(args.filename, f); updateFileList();
                if (state.activeTab === args.filename) editor.setValue(f.content); addMsg('system', `Edited: ${args.filename}`); return { success: true };
            }
            case 'list_files': return { files: [...state.files.keys()] };
            default: return { error: 'Unknown tool' };
        }
    }

    async function sendMessage() {
        const input = document.getElementById('terminalInput'); const text = input.value.trim();
        if (!text) return; if (!state.connected) return toast('Connect first');
        state.cmdHistory.push(text); state.cmdIndex = -1; saveConfig(); input.value = '';
        
        if (state.history.length === 0) {
            state.history.push({
                role: 'user',
                content: `SYSTEM INSTRUCTION: You are an autonomous AI Editor. YOU MUST USE TOOLS. Do not output raw markdown for me to copy-paste.\n- To create a new file, use "tool": "write_file" with "filename" and "content" args.\n- To change a small part of an existing file, YOU MUST use "tool": "edit_file" with "filename", "search" and "replace" args. Do not rewrite the whole file for small edits.\nFormat MUST be exactly:\n\`\`\`json\n{\n  "tool": "write_file",\n  "args": {\n    "filename": "app.js",\n    "content": "..."\n  }\n}\n\`\`\`\nDO NOT use 'name' or 'arguments' or OpenAI tool formats. Understood?`
            });
            state.history.push({ role: 'assistant', content: 'Understood. I will exclusively use the exact JSON format {"tool": "...", "args": {...}}.' });
        }

        addMsg('user', text); state.history.push({ role: 'user', content: text });
        await runAI();
    }

    async function runAI(maxIter = 20) {
        const p = PROVIDERS[state.provider]; const cfg = state.configs[state.provider] || {};
        const fullCfg = { apiKey: cfg.apiKey || '', model: cfg.model || p?.defaultModel || '', endpoint: cfg.endpoint || p?.defaultEndpoint || '' };
        let iter = 0;
        while (iter++ < maxIter) {
            showLoading();
            try {
                const req = p.buildRequest(state.history, fullCfg);
                const res = await fetch(req.url, { method: 'POST', headers: req.headers, body: JSON.stringify(req.body) });
                if (!res.ok) { const errText = await res.text(); throw new Error(`${res.status}: ${errText.slice(0, 200)}`); }
                
                const data = await res.json();
                let content = parseAIResponse(data);
                
                if (content) {
                    let toolCmd = null;
                    let jsonStr = '';
                    
                    const toolMatch = content.match(/```(?:json)?\s*(\{[\s\S]*?\})\s*```/i);
                    if (toolMatch) {
                        jsonStr = toolMatch[1];
                    } else if (content.includes('"tool"') && content.includes('{') && content.includes('}')) {
                        const start = content.indexOf('{');
                        const end = content.lastIndexOf('}');
                        if (start > -1 && end > start) jsonStr = content.substring(start, end + 1);
                    }

                    if (jsonStr) {
                        try { 
                            toolCmd = JSON.parse(jsonStr); 
                        } catch(e1) {
                            try {
                                // LLM Hallucination Fix: Convert unescaped newlines to valid JSON \n,
                                // and evaluate via JS Function to elegantly swallow invalid hallucinatory 
                                // escapes (like \ followed by a space)
                                let inStr = false, esc = false, resStr = "";
                                for (let i = 0; i < jsonStr.length; i++) {
                                    let c = jsonStr[i];
                                    if (c === '"' && !esc) inStr = !inStr;
                                    if (c === '\\' && !esc) esc = true;
                                    else esc = false;
                                    
                                    if (inStr && c === '\n') resStr += '\\n';
                                    else if (inStr && c === '\r') resStr += '\\r';
                                    else if (inStr && c === '\t') resStr += '\\t';
                                    else resStr += c;
                                }
                                toolCmd = new Function('return ' + resStr)();
                            } catch(e2) {
                                // Extreme Regex Fallback if even the JS engine throws
                                const fm = jsonStr.match(/"filename"\s*:\s*"([^"]+)"/);
                                const tName = jsonStr.includes('"edit_file"') ? 'edit_file' : (jsonStr.includes('"write_file"') ? 'write_file' : null);
                                
                                // Clean up the extracted string to remove those hallucinatory backslashes
                                const unescapeStr = (str) => {
                                    return str.replace(/\\n/g, '\n')
                                              .replace(/\\t/g, '\t')
                                              .replace(/\\"/g, '"')
                                              .replace(/\\([ \t\r\n])/g, '$1') // Swallows line-continuation \
                                              .replace(/\\\\/g, '\\');
                                };

                                if (tName === 'write_file') {
                                    const cIdx = jsonStr.indexOf('"content"');
                                    if (cIdx > -1) {
                                        const sQ = jsonStr.indexOf('"', cIdx + 9);
                                        let eQMatch = jsonStr.match(/"\s*\}?\s*\}\s*$/);
                                        let eQ = eQMatch ? eQMatch.index : jsonStr.lastIndexOf('"');
                                        if (sQ > -1 && eQ > sQ) {
                                            let val = unescapeStr(jsonStr.substring(sQ + 1, eQ));
                                            toolCmd = { tool: 'write_file', args: { filename: fm ? fm[1] : 'app.js', content: val } };
                                        }
                                    }
                                } else if (tName === 'edit_file') {
                                    const sIdx = jsonStr.indexOf('"search"');
                                    const rIdx = jsonStr.indexOf('"replace"');
                                    if (sIdx > -1 && rIdx > -1) {
                                        const sQ1 = jsonStr.indexOf('"', sIdx + 8);
                                        const eQ1 = jsonStr.lastIndexOf('"', rIdx);
                                        const sQ2 = jsonStr.indexOf('"', rIdx + 9);
                                        let eQMatch = jsonStr.match(/"\s*\}?\s*\}\s*$/);
                                        let eQ2 = eQMatch ? eQMatch.index : jsonStr.lastIndexOf('"');
                                        if (sQ1 > -1 && eQ1 > sQ1 && sQ2 > -1 && eQ2 > sQ2) {
                                            let sVal = unescapeStr(jsonStr.substring(sQ1 + 1, eQ1));
                                            let rVal = unescapeStr(jsonStr.substring(sQ2 + 1, eQ2));
                                            toolCmd = { tool: 'edit_file', args: { filename: fm ? fm[1] : 'app.js', search: sVal, replace: rVal } };
                                        }
                                    }
                                }
                            }
                        }
                    }

                    if (toolCmd) {
                        let tName = toolCmd.tool || toolCmd.name;
                        let tArgs = toolCmd.args || toolCmd.arguments || toolCmd.parameters;
                        
                        if (toolCmd.function) {
                            tName = tName || toolCmd.function.name;
                            tArgs = tArgs || toolCmd.function.arguments;
                        }
                        
                        if (toolCmd.tool_calls && Array.isArray(toolCmd.tool_calls) && toolCmd.tool_calls.length > 0) {
                            const tc = toolCmd.tool_calls[0];
                            tName = tName || tc.name || tc.function?.name;
                            tArgs = tArgs || tc.arguments || tc.function?.arguments;
                        }
                        
                        if (typeof tArgs === 'string') {
                            try { tArgs = JSON.parse(tArgs); } catch(e) {}
                        }
                        
                        if (tName && tArgs && typeof tArgs === 'object') {
                            removeLoading();
                            const result = runTool(tName, tArgs);
                            state.history.push({ role: 'assistant', content });
                            state.history.push({ role: 'user', content: `Tool returned: ${JSON.stringify(result)}. Continue or say Done.` });
                            continue;
                        }
                    }

                    removeLoading();
                    if (!toolCmd && content.includes('"tool"') && content.includes('"args"')) {
                        addMsg('error', 'AI generated an invalid JSON tool call that could not be parsed.');
                    }
                    addMsg('assistant', content); 
                    state.history.push({ role: 'assistant', content });
                } else {
                    removeLoading();
                    addMsg('error', 'Empty response from API');
                }
                break;
            } catch (e) { removeLoading(); addMsg('error', e.message); break; }
        }
    }

    function addMsg(type, content) {
        removeLoading(); const out = document.getElementById('terminalOutput'); const labels = { user: 'You', assistant: 'AI', system: 'System', error: 'Error', tool: 'Tool' };
        const div = document.createElement('div'); div.className = `msg ${type}`; div.innerHTML = `<div class="msg-header">${labels[type]}</div><div class="msg-body">${esc(content)}</div>`;
        out.appendChild(div); out.scrollTop = out.scrollHeight;
    }

    function showLoading() {
        const out = document.getElementById('terminalOutput'); const div = document.createElement('div'); div.className = 'msg assistant loading';
        div.innerHTML = `<div class="msg-header">AI</div><div class="msg-body"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
        out.appendChild(div); out.scrollTop = out.scrollHeight;
    }

    function removeLoading() { document.querySelector('.loading')?.remove(); }
    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 2000); }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body> </html>
