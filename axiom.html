<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #08090c;
            --bg-primary: #0d1117;
            --bg-secondary: #131820;
            --bg-tertiary: #1a2028;
            --bg-elevated: #222830;
            --border-subtle: #252d38;
            --border-default: #303848;
            --text-primary: #e2e8f0;
            --text-secondary: #8892a2;
            --text-muted: #5a6472;
            --accent-primary: #6f42c1;
            --accent-secondary: #398be7;
            --accent-gradient: linear-gradient(135deg, #6f42c1 0%, #398be7 100%);
            --success: #2ea44f;
            --warning: #c9922e;
            --error: #d64545;
            --yolo: #ff6b35;
        }

        body {
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            border-right: 1px solid var(--border-subtle);
        }

        .brand-logo { width: 26px; height: 26px; }

        .brand-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .config-label a {
            color: var(--accent-secondary);
            text-decoration: none;
        }

        .config-label a:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }

        select, input[type="text"], input[type="password"] {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
        }

        select { min-width: 130px; cursor: pointer; }
        .input-key { width: 220px; }
        .input-model { width: 180px; }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            background: var(--bg-tertiary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--error);
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .status-dot.yolo {
            background: var(--yolo);
            box-shadow: 0 0 6px var(--yolo);
            animation: yoloPulse 0.5s infinite alternate;
        }

        @keyframes yoloPulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-subtle);
        }

        .btn-secondary:hover { background: var(--bg-elevated); }

        .btn-yolo {
            background: var(--yolo);
            color: white;
            border: none;
            font-weight: 600;
        }

        .btn-yolo:hover { opacity: 0.9; }

        .btn-yolo.active {
            animation: yoloGlow 1s infinite alternate;
        }

        @keyframes yoloGlow {
            from { box-shadow: 0 0 5px var(--yolo); }
            to { box-shadow: 0 0 15px var(--yolo); }
        }

        .hidden-input { display: none; }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .icon-btn {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-size: 14px;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .file-item {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 12px;
            border-left: 2px solid transparent;
            transition: all 0.1s;
        }

        .file-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .file-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-left-color: var(--accent-primary);
        }

        .file-item.modified .file-name::after {
            content: ' *';
            color: var(--warning);
        }

        .file-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-icon svg {
            width: 16px;
            height: 16px;
        }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-actions {
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .file-item:hover .file-actions { opacity: 1; }

        .file-action-btn {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .file-action-btn:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .file-action-btn svg {
            width: 12px;
            height: 12px;
        }

        .empty-sidebar {
            padding: 16px 12px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.6;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* Tabs */
        .tabs-bar {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            overflow-x: auto;
            min-height: 36px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border-right: 1px solid var(--border-subtle);
            font-size: 12px;
            white-space: nowrap;
            position: relative;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
        }

        .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .tab.active::after { background: var(--accent-gradient); }

        .tab-close {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            opacity: 0.5;
            font-size: 12px;
        }

        .tab-close:hover { opacity: 1; background: var(--bg-elevated); }

        /* CodeMirror Overrides */
        .editor-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .CodeMirror {
            height: 100%;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
            background: var(--bg-primary);
        }

        .CodeMirror-gutters {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
        }

        .CodeMirror-linenumber {
            color: var(--text-muted);
        }

        .CodeMirror-cursor {
            border-left: 2px solid var(--accent-secondary);
        }

        .CodeMirror-selected {
            background: rgba(57, 139, 231, 0.2) !important;
        }

        .CodeMirror-focused .CodeMirror-selected {
            background: rgba(57, 139, 231, 0.3) !important;
        }

        .cm-s-material-darker.CodeMirror {
            background: var(--bg-primary);
        }

        /* Terminal */
        .terminal-panel {
            height: 320px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            height: 32px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .terminal-title {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .yolo-badge {
            padding: 3px 8px;
            background: var(--yolo);
            color: white;
            font-size: 9px;
            font-weight: 600;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
        }

        .yolo-badge.visible { display: block; }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .msg {
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid;
            background: var(--bg-tertiary);
            font-size: 12px;
            line-height: 1.5;
        }

        .msg.user { border-left-color: var(--accent-secondary); }
        .msg.assistant { border-left-color: var(--accent-primary); background: rgba(111,66,193,0.08); }
        .msg.system { border-left-color: var(--success); background: rgba(46,164,79,0.08); }
        .msg.error { border-left-color: var(--error); background: rgba(214,69,69,0.08); }
        .msg.tool { border-left-color: var(--warning); background: rgba(201,146,46,0.08); }

        .msg-header {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .msg-body {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-input-area {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid var(--border-subtle);
            gap: 8px;
        }

        .prompt-char {
            color: var(--accent-primary);
            font-weight: bold;
            font-size: 14px;
        }

        .terminal-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
        }

        .terminal-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Loading */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 340px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            padding: 10px 20px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
            font-size: 12px;
        }

        .toast.visible {
            display: block;
            animation: toastAnim 2.5s ease;
        }

        @keyframes toastAnim {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15%, 85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-default); }
    </style>
</head>
<body>
    <input type="file" id="fileInput" class="hidden-input" multiple onchange="handleFileUpload(event)">

    <header class="header">
        <div class="brand">
            <svg class="brand-logo" viewBox="0 0 32 32" fill="none">
                <defs>
                    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6f42c1"/>
                        <stop offset="100%" stop-color="#398be7"/>
                    </linearGradient>
                </defs>
                <rect width="32" height="32" rx="6" fill="#0d1117"/>
                <path d="M8 24L16 8L24 24H20L18 20H14L12 24H8ZM15 14L13.5 17H18.5L17 14H15Z" fill="url(#brandGrad)"/>
            </svg>
            <span class="brand-name">AXIOM</span>
        </div>

        <div class="config-group">
            <span class="config-label">Provider</span>
            <select id="providerSelect" onchange="onProviderChange()">
                <option value="google">Google Gemini</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="mistral">Mistral AI</option>
                <option value="cohere">Cohere</option>
                <option value="groq">Groq</option>
                <option value="perplexity">Perplexity</option>
                <option value="together">Together AI</option>
                <option value="openrouter">OpenRouter</option>
            </select>
        </div>

        <div class="config-group">
            <span class="config-label"><a href="#" id="apiKeyLink" target="_blank">API Key</a></span>
            <input type="password" id="apiKeyInput" class="input-key" placeholder="Paste your API key">
        </div>

        <div class="config-group">
            <span class="config-label">Model</span>
            <input type="text" id="modelInput" class="input-model" placeholder="Default">
        </div>

        <button class="btn btn-primary" onclick="connectAPI()">Connect</button>

        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <button class="btn btn-yolo" id="yoloBtn" onclick="toggleYOLO()">YOLO</button>

        <div style="flex:1"></div>

        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload</button>
        <button class="btn btn-secondary" onclick="createNewFile()">New File</button>
        <button class="btn btn-secondary" onclick="downloadZip()">Download ZIP</button>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Files</span>
                <button class="icon-btn" onclick="createNewFile()">+</button>
            </div>
            <div class="file-list" id="fileList">
                <div class="empty-sidebar">No files loaded. Upload or create files to begin.</div>
            </div>
        </aside>

        <main class="editor-area">
            <div class="tabs-bar" id="tabsBar">
                <div class="tab active"><span>Welcome</span></div>
            </div>

            <div class="editor-wrapper">
                <textarea id="codeEditor"></textarea>
            </div>

            <div class="terminal-panel">
                <div class="terminal-header">
                    <span class="terminal-title">AI Terminal</span>
                    <div class="yolo-badge" id="yoloBadge">YOLO Active</div>
                </div>

                <div class="terminal-output" id="terminalOutput">
                    <div class="msg system">
                        <div class="msg-header">System</div>
                        <div class="msg-body">AXIOM initialized. Connect to an AI provider and enable YOLO mode for autonomous coding.</div>
                    </div>
                </div>

                <div class="terminal-input-area">
                    <span class="prompt-char">></span>
                    <input type="text" class="terminal-input" id="terminalInput" placeholder="Tell AI what to build... (Up/Down for history)">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <!-- CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/nginx/nginx.min.js"></script>

    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // ==================== FILE ICONS (Material Icons Style) ====================
        function getFileIcon(filename) {
            const ext = filename.includes('.') ? filename.split('.').pop().toLowerCase() : '';
            const name = filename.toLowerCase();
            
            const iconMap = {
                // JavaScript
                js: { color: '#f7df1e', icon: 'JS' },
                mjs: { color: '#f7df1e', icon: 'JS' },
                cjs: { color: '#f7df1e', icon: 'JS' },
                jsx: { color: '#61dafb', icon: 'JSX' },
                ts: { color: '#3178c6', icon: 'TS' },
                tsx: { color: '#3178c6', icon: 'TSX' },
                
                // Web
                html: { color: '#e44d26', icon: 'HTML' },
                htm: { color: '#e44d26', icon: 'HTML' },
                css: { color: '#264de4', icon: 'CSS' },
                scss: { color: '#cf649a', icon: 'SCSS' },
                sass: { color: '#cf649a', icon: 'SASS' },
                less: { color: '#1d365d', icon: 'LESS' },
                vue: { color: '#42b883', icon: 'VUE' },
                svelte: { color: '#ff3e00', icon: 'SVLT' },
                
                // Backend
                py: { color: '#3776ab', icon: 'PY' },
                rb: { color: '#cc342d', icon: 'RB' },
                php: { color: '#777bb4', icon: 'PHP' },
                java: { color: '#ed8b00', icon: 'JAVA' },
                kt: { color: '#7f52ff', icon: 'KT' },
                scala: { color: '#dc322f', icon: 'SC' },
                go: { color: '#00add8', icon: 'GO' },
                rs: { color: '#dea584', icon: 'RS' },
                swift: { color: '#fa7343', icon: 'SWIFT' },
                
                // C Family
                c: { color: '#a8b9cc', icon: 'C' },
                h: { color: '#a8b9cc', icon: 'H' },
                cpp: { color: '#00599c', icon: 'CPP' },
                cxx: { color: '#00599c', icon: 'CPP' },
                cc: { color: '#00599c', icon: 'CPP' },
                hpp: { color: '#00599c', icon: 'HPP' },
                cs: { color: '#178600', icon: 'C#' },
                
                // Data
                json: { color: '#cbcb41', icon: 'JSON' },
                xml: { color: '#e44d26', icon: 'XML' },
                yaml: { color: '#cb171e', icon: 'YAML' },
                yml: { color: '#cb171e', icon: 'YAML' },
                toml: { color: '#9c4121', icon: 'TOML' },
                csv: { color: '#237346', icon: 'CSV' },
                
                // Docs
                md: { color: '#083fa1', icon: 'MD' },
                mdx: { color: '#fcb32c', icon: 'MDX' },
                txt: { color: '#8892a2', icon: 'TXT' },
                
                // Shell
                sh: { color: '#89e051', icon: 'SH' },
                bash: { color: '#89e051', icon: 'BASH' },
                zsh: { color: '#89e051', icon: 'ZSH' },
                ps1: { color: '#012456', icon: 'PS' },
                bat: { color: '#c1f12e', icon: 'BAT' },
                
                // Database
                sql: { color: '#e38c00', icon: 'SQL' },
                
                // Config
                env: { color: '#ecd53f', icon: 'ENV' },
                ini: { color: '#8892a2', icon: 'INI' },
                cfg: { color: '#8892a2', icon: 'CFG' },
                conf: { color: '#8892a2', icon: 'CONF' },
                
                // Build
                dockerfile: { color: '#2496ed', icon: 'DOCK' },
                makefile: { color: '#427819', icon: 'MAKE' },
                
                // Other
                graphql: { color: '#e535ab', icon: 'GQL' },
                gql: { color: '#e535ab', icon: 'GQL' },
                lua: { color: '#000080', icon: 'LUA' },
                r: { color: '#276dc3', icon: 'R' },
                dart: { color: '#00b4ab', icon: 'DART' },
                ex: { color: '#6e4a7e', icon: 'EX' },
                exs: { color: '#6e4a7e', icon: 'EXS' },
                erl: { color: '#b83998', icon: 'ERL' },
                clj: { color: '#5881d8', icon: 'CLJ' },
                hs: { color: '#5e5086', icon: 'HS' },
                sol: { color: '#aa6746', icon: 'SOL' },
                prisma: { color: '#0c344b', icon: 'PRI' },
                lock: { color: '#8892a2', icon: 'LOCK' },
                log: { color: '#8892a2', icon: 'LOG' },
                gitignore: { color: '#f05032', icon: 'GIT' },
            };
            
            // Check for special filenames
            if (name === 'dockerfile') return iconMap.dockerfile;
            if (name === 'makefile') return iconMap.makefile;
            if (name === '.gitignore') return iconMap.gitignore;
            if (name === 'package.json') return { color: '#cb3837', icon: 'NPM' };
            if (name === 'tsconfig.json') return { color: '#3178c6', icon: 'TS' };
            
            return iconMap[ext] || { color: '#8892a2', icon: ext.toUpperCase().slice(0, 4) || 'FILE' };
        }

        function renderFileIcon(filename) {
            const { color, icon } = getFileIcon(filename);
            return `<div class="file-icon"><svg viewBox="0 0 24 24" fill="${color}"><rect x="4" y="2" width="16" height="20" rx="2" fill="${color}" opacity="0.2"/><text x="12" y="14" text-anchor="middle" font-size="6" font-weight="bold" fill="${color}">${icon.slice(0,3)}</text></svg></div>`;
        }

        // ==================== API KEY URLS ====================
        const API_KEY_URLS = {
            google: 'https://aistudio.google.com/app/apikey',
            openai: 'https://platform.openai.com/api-keys',
            anthropic: 'https://console.anthropic.com/settings/keys',
            mistral: 'https://console.mistral.ai/api-keys/',
            cohere: 'https://dashboard.cohere.com/api-keys',
            groq: 'https://console.groq.com/keys',
            perplexity: 'https://www.perplexity.ai/settings/api',
            together: 'https://api.together.xyz/settings/api-keys',
            openrouter: 'https://openrouter.ai/keys'
        };

        // ==================== PROVIDERS ====================
        const PROVIDERS = {
            google: {
                name: 'Google Gemini',
                defaultModel: 'gemini-2.0-flash-exp',
                endpoint: (model, key) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
                headers: () => ({ 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ name: t.name, description: t.description, parameters: { type: "object", properties: t.parameters.properties, required: t.parameters.required } })),
                buildRequest: (messages, tools) => ({
                    contents: messages.map(m => ({
                        role: m.role === 'assistant' ? 'model' : 'user',
                        parts: m.toolCalls ? m.toolCalls.map(tc => ({ functionCall: { name: tc.name, args: tc.arguments } }))
                            : m.toolResults ? m.toolResults.map(tr => ({ functionResponse: { name: tr.name, response: { result: tr.result } } }))
                            : [{ text: m.content }]
                    })),
                    tools: tools ? [{ functionDeclarations: tools }] : undefined,
                    generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
                }),
                parseResponse: (data) => {
                    const part = data.candidates?.[0]?.content?.parts?.[0];
                    if (part?.functionCall) return { type: 'tool_call', toolCalls: [{ name: part.functionCall.name, arguments: part.functionCall.args }] };
                    return { type: 'text', content: part?.text || '' };
                }
            },
            openai: {
                name: 'OpenAI',
                defaultModel: 'gpt-4o',
                endpoint: () => 'https://api.openai.com/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'gpt-4o',
                    messages: messages.map(m => {
                        if (m.toolCalls) return { role: 'assistant', tool_calls: m.toolCalls.map((tc, i) => ({ id: `call_${i}`, type: 'function', function: { name: tc.name, arguments: JSON.stringify(tc.arguments) } })) };
                        if (m.toolResults) return m.toolResults.map(tr => ({ role: 'tool', tool_call_id: tr.id || 'call_0', content: JSON.stringify(tr.result) }));
                        return { role: m.role, content: m.content };
                    }).flat(),
                    tools, temperature: 0.7
                }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ id: tc.id, name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            anthropic: {
                name: 'Anthropic',
                defaultModel: 'claude-sonnet-4-20250514',
                endpoint: () => 'https://api.anthropic.com/v1/messages',
                headers: (key) => ({ 'x-api-key': key, 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }),
                formatTools: (tools) => tools.map(t => ({ name: t.name, description: t.description, input_schema: t.parameters })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'claude-sonnet-4-20250514',
                    max_tokens: 8192,
                    messages: messages.filter(m => m.role !== 'system').map(m => {
                        if (m.toolCalls) return { role: 'assistant', content: m.toolCalls.map(tc => ({ type: 'tool_use', id: tc.id || `call_${Date.now()}`, name: tc.name, input: tc.arguments })) };
                        if (m.toolResults) return { role: 'user', content: m.toolResults.map(tr => ({ type: 'tool_result', tool_use_id: tr.id, content: JSON.stringify(tr.result) })) };
                        return { role: m.role, content: m.content };
                    }),
                    tools, temperature: 0.7
                }),
                parseResponse: (data) => {
                    const c = data.content?.[0];
                    if (c?.type === 'tool_use') return { type: 'tool_call', toolCalls: data.content.filter(x => x.type === 'tool_use').map(x => ({ id: x.id, name: x.name, arguments: x.input })) };
                    return { type: 'text', content: c?.text || '' };
                }
            },
            mistral: {
                name: 'Mistral AI',
                defaultModel: 'mistral-large-latest',
                endpoint: () => 'https://api.mistral.ai/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'mistral-large-latest', messages: messages.map(m => ({ role: m.role, content: m.content })), tools, temperature: 0.7 }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            cohere: {
                name: 'Cohere', defaultModel: 'command-r-plus',
                endpoint: () => 'https://api.cohere.ai/v1/chat',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ name: t.name, description: t.description, parameter_definitions: Object.fromEntries(Object.entries(t.parameters.properties).map(([k, v]) => [k, { type: v.type, description: v.description, required: t.parameters.required?.includes(k) }])) })),
                buildRequest: (messages, tools) => ({ model: state.model || 'command-r-plus', message: messages[messages.length - 1]?.content || '', tools }),
                parseResponse: (data) => data.tool_calls?.length ? { type: 'tool_call', toolCalls: data.tool_calls.map(tc => ({ name: tc.name, arguments: tc.parameters })) } : { type: 'text', content: data.text || '' }
            },
            groq: {
                name: 'Groq', defaultModel: 'llama-3.3-70b-versatile',
                endpoint: () => 'https://api.groq.com/openai/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'llama-3.3-70b-versatile', messages: messages.map(m => ({ role: m.role, content: m.content })), tools, temperature: 0.7 }),
                parseResponse: (data) => { const msg = data.choices?.[0]?.message; return msg?.tool_calls ? { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) } : { type: 'text', content: msg?.content || '' }; }
            },
            perplexity: {
                name: 'Perplexity', defaultModel: 'llama-3.1-sonar-large-128k-online',
                endpoint: () => 'https://api.perplexity.ai/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: () => null,
                buildRequest: (messages) => ({ model: state.model || 'llama-3.1-sonar-large-128k-online', messages: messages.map(m => ({ role: m.role, content: m.content })) }),
                parseResponse: (data) => ({ type: 'text', content: data.choices?.[0]?.message?.content || '' })
            },
            together: {
                name: 'Together AI', defaultModel: 'meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo',
                endpoint: () => 'https://api.together.xyz/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo', messages: messages.map(m => ({ role: m.role, content: m.content })), tools, temperature: 0.7 }),
                parseResponse: (data) => { const msg = data.choices?.[0]?.message; return msg?.tool_calls ? { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) } : { type: 'text', content: msg?.content || '' }; }
            },
            openrouter: {
                name: 'OpenRouter', defaultModel: 'anthropic/claude-sonnet-4',
                endpoint: () => 'https://openrouter.ai/api/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'anthropic/claude-sonnet-4', messages: messages.map(m => ({ role: m.role, content: m.content })), tools }),
                parseResponse: (data) => { const msg = data.choices?.[0]?.message; return msg?.tool_calls ? { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ id: tc.id, name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) } : { type: 'text', content: msg?.content || '' }; }
            }
        };

        // ==================== TOOLS ====================
        const TOOLS = [
            { name: "read_file", description: "Read file contents", parameters: { type: "object", properties: { filename: { type: "string", description: "Filename" } }, required: ["filename"] } },
            { name: "write_file", description: "Create/overwrite file", parameters: { type: "object", properties: { filename: { type: "string", description: "Filename" }, content: { type: "string", description: "Content" } }, required: ["filename", "content"] } },
            { name: "edit_file", description: "Find and replace", parameters: { type: "object", properties: { filename: { type: "string", description: "Filename" }, search: { type: "string", description: "Find" }, replace: { type: "string", description: "Replace" } }, required: ["filename", "search", "replace"] } },
            { name: "list_files", description: "List all files", parameters: { type: "object", properties: {}, required: [] } }
        ];

        // ==================== STATE ====================
        const state = {
            provider: 'google',
            apiKeys: {}, // { provider: key }
            model: '',
            connected: false,
            yoloMode: false,
            files: new Map(),
            openTabs: ['welcome'],
            activeTab: 'welcome',
            history: [],
            commandHistory: [],
            commandIndex: -1,
            currentInput: ''
        };

        let editor = null;

        // ==================== CODEMIRROR MODE DETECTION ====================
        function getModeForFile(filename) {
            const info = CodeMirror.findModeByFileName(filename);
            return info ? info.mode : 'text/plain';
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize CodeMirror
            editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                theme: 'material-darker',
                lineNumbers: true,
                mode: 'javascript',
                tabSize: 4,
                indentWithTabs: false,
                lineWrapping: false,
                matchBrackets: true,
                autoCloseBrackets: true,
                extraKeys: {
                    "Ctrl-S": () => downloadZip(),
                    "Cmd-S": () => downloadZip()
                }
            });

            editor.setValue(`// AXIOM - AI Code Editor
// =======================
// 
// Features:
// - Syntax highlighting for 50+ languages
// - YOLO MODE: AI executes automatically
// - Saves API keys per provider
// - Up/Down arrows for command history
//
// Get started:
// 1. Select provider + enter API key
// 2. Click Connect
// 3. Enable YOLO mode
// 4. Tell AI what to build
`);

            editor.on('change', () => {
                if (state.activeTab !== 'welcome') {
                    const file = state.files.get(state.activeTab);
                    if (file) {
                        file.modified = true;
                        file.content = editor.getValue();
                        updateTabs();
                        updateFileList();
                    }
                }
            });

            loadConfig();
            setupEvents();
        });

        function loadConfig() {
            const saved = localStorage.getItem('axiom_config_v2');
            if (saved) {
                try {
                    const c = JSON.parse(saved);
                    state.provider = c.provider || 'google';
                    state.apiKeys = c.apiKeys || {};
                    state.model = c.model || '';
                    state.yoloMode = c.yoloMode || false;
                    state.commandHistory = c.commandHistory || [];
                    
                    document.getElementById('providerSelect').value = state.provider;
                    document.getElementById('apiKeyInput').value = state.apiKeys[state.provider] || '';
                    document.getElementById('modelInput').value = state.model;
                    
                    if (state.yoloMode) {
                        document.getElementById('yoloBtn').classList.add('active');
                        document.getElementById('yoloBadge').classList.add('visible');
                    }
                    
                    if (state.apiKeys[state.provider]) connectAPI(true);
                } catch(e) { console.error(e); }
            }
            updateApiKeyLink();
        }

        function saveConfig() {
            localStorage.setItem('axiom_config_v2', JSON.stringify({
                provider: state.provider,
                apiKeys: state.apiKeys,
                model: state.model,
                yoloMode: state.yoloMode,
                commandHistory: state.commandHistory.slice(-100) // Keep last 100 commands
            }));
        }

        function setupEvents() {
            const terminalInput = document.getElementById('terminalInput');
            
            terminalInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    navigateHistory(-1);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    navigateHistory(1);
                }
            });

            terminalInput.addEventListener('input', () => {
                state.commandIndex = -1;
                state.currentInput = terminalInput.value;
            });
        }

        function navigateHistory(direction) {
            const input = document.getElementById('terminalInput');
            
            if (state.commandHistory.length === 0) return;
            
            if (state.commandIndex === -1 && direction === -1) {
                state.currentInput = input.value;
                state.commandIndex = state.commandHistory.length - 1;
            } else {
                state.commandIndex += direction;
            }
            
            if (state.commandIndex < 0) {
                state.commandIndex = -1;
                input.value = state.currentInput;
            } else if (state.commandIndex >= state.commandHistory.length) {
                state.commandIndex = -1;
                input.value = state.currentInput;
            } else {
                input.value = state.commandHistory[state.commandIndex];
            }
            
            // Move cursor to end
            input.selectionStart = input.selectionEnd = input.value.length;
        }

        function updateApiKeyLink() {
            const link = document.getElementById('apiKeyLink');
            link.href = API_KEY_URLS[state.provider];
            link.title = `Get ${PROVIDERS[state.provider].name} API Key`;
        }

        // ==================== YOLO ====================
        function toggleYOLO() {
            state.yoloMode = !state.yoloMode;
            document.getElementById('yoloBtn').classList.toggle('active', state.yoloMode);
            document.getElementById('yoloBadge').classList.toggle('visible', state.yoloMode);
            document.getElementById('statusDot').classList.toggle('yolo', state.yoloMode && state.connected);
            addMsg('system', state.yoloMode ? 'YOLO MODE ENABLED' : 'YOLO MODE DISABLED');
            saveConfig();
        }

        // ==================== PROVIDER ====================
        function onProviderChange() {
            // Save current key
            const currentKey = document.getElementById('apiKeyInput').value.trim();
            if (currentKey) state.apiKeys[state.provider] = currentKey;
            
            // Switch provider
            state.provider = document.getElementById('providerSelect').value;
            
            // Load saved key for new provider
            document.getElementById('apiKeyInput').value = state.apiKeys[state.provider] || '';
            
            state.connected = false;
            updateStatus(false);
            updateApiKeyLink();
            saveConfig();
            
            // Auto-connect if key exists
            if (state.apiKeys[state.provider]) connectAPI(true);
        }

        function connectAPI(silent = false) {
            const key = document.getElementById('apiKeyInput').value.trim();
            const model = document.getElementById('modelInput').value.trim();
            if (!key) { if (!silent) toast('Enter API key'); return; }

            state.apiKeys[state.provider] = key;
            state.model = model;
            state.connected = true;
            saveConfig();
            updateStatus(true);
            if (!silent) addMsg('system', `Connected to ${PROVIDERS[state.provider].name}`);
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.classList.toggle('active', connected);
            dot.classList.toggle('yolo', connected && state.yoloMode);
            txt.textContent = connected ? 'Connected' : 'Disconnected';
        }

        // ==================== FILES ====================
        function handleFileUpload(event) {
            for (const file of event.target.files) {
                if (!file.name.startsWith('.')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        state.files.set(file.name, { content: e.target.result, modified: false });
                        updateFileList();
                        if (state.activeTab === 'welcome') openFile(file.name);
                        addMsg('system', `Loaded: ${file.name}`);
                    };
                    reader.readAsText(file);
                }
            }
            event.target.value = '';
        }

        function createNewFile() {
            const name = prompt('Filename:');
            if (!name || state.files.has(name)) return;
            state.files.set(name, { content: '', modified: false });
            updateFileList();
            openFile(name);
        }

        function openFile(name) {
            const file = state.files.get(name);
            if (!file) return;
            if (!state.openTabs.includes(name)) state.openTabs.push(name);
            state.activeTab = name;
            updateTabs();
            editor.setValue(file.content);
            
            // Set mode based on file type
            const mode = getModeForFile(name);
            editor.setOption('mode', mode);
            
            highlightFile(name);
        }

        function downloadFile(name) {
            const file = state.files.get(name);
            if (!file) return;
            const blob = new Blob([file.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
            toast(`Downloaded: ${name}`);
        }

        function deleteFile(name) {
            if (!confirm(`Delete ${name}?`)) return;
            state.files.delete(name);
            closeTab(name);
            updateFileList();
            toast(`Deleted: ${name}`);
        }

        async function downloadZip() {
            if (state.files.size === 0) { toast('No files'); return; }
            const zip = new JSZip();
            state.files.forEach((file, name) => zip.file(name, file.content));
            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'project.zip'; a.click();
            URL.revokeObjectURL(url);
            toast('Downloaded: project.zip');
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            if (state.files.size === 0) {
                list.innerHTML = '<div class="empty-sidebar">No files loaded.</div>';
                return;
            }
            list.innerHTML = Array.from(state.files.keys()).sort().map(name => {
                const file = state.files.get(name);
                const active = name === state.activeTab ? ' active' : '';
                const modified = file.modified ? ' modified' : '';
                return `<div class="file-item${active}${modified}" onclick="openFile('${escapeAttr(name)}')">
                    ${renderFileIcon(name)}
                    <span class="file-name">${escapeHtml(name)}</span>
                    <div class="file-actions">
                        <button class="file-action-btn" onclick="event.stopPropagation(); downloadFile('${escapeAttr(name)}')" title="Download">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </button>
                        <button class="file-action-btn" onclick="event.stopPropagation(); deleteFile('${escapeAttr(name)}')" title="Delete">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function highlightFile(name) {
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.toggle('active', item.querySelector('.file-name')?.textContent === name);
            });
        }

        // ==================== EDITOR ====================
        function updateTabs() {
            document.getElementById('tabsBar').innerHTML = state.openTabs.map(name => {
                const active = name === state.activeTab ? ' active' : '';
                const file = state.files.get(name);
                const mod = file?.modified ? ' *' : '';
                const close = name === 'welcome' ? '' : `<span class="tab-close" onclick="event.stopPropagation(); closeTab('${escapeAttr(name)}')">x</span>`;
                return `<div class="tab${active}" onclick="switchTab('${escapeAttr(name)}')"><span>${escapeHtml(name)}${mod}</span>${close}</div>`;
            }).join('');
        }

        function switchTab(name) {
            state.activeTab = name;
            updateTabs();
            if (name === 'welcome') {
                editor.setValue('// Welcome - Select a file to edit');
                editor.setOption('mode', 'javascript');
            } else {
                const file = state.files.get(name);
                if (file) {
                    editor.setValue(file.content);
                    editor.setOption('mode', getModeForFile(name));
                }
            }
            highlightFile(name);
        }

        function closeTab(name) {
            const idx = state.openTabs.indexOf(name);
            if (idx > -1) {
                state.openTabs.splice(idx, 1);
                if (state.activeTab === name) {
                    state.activeTab = state.openTabs[Math.max(0, idx - 1)] || 'welcome';
                    if (!state.openTabs.length) { state.openTabs.push('welcome'); state.activeTab = 'welcome'; }
                }
                updateTabs();
                switchTab(state.activeTab);
            }
        }

        // ==================== TOOLS ====================
        function executeTool(name, args) {
            addMsg('tool', `${name}(${JSON.stringify(args).substring(0, 60)}...)`);
            switch (name) {
                case 'read_file': {
                    const file = state.files.get(args.filename);
                    return file ? { content: file.content } : { error: `Not found: ${args.filename}` };
                }
                case 'write_file': {
                    state.files.set(args.filename, { content: args.content, modified: false });
                    updateFileList();
                    if (!state.openTabs.includes(args.filename)) state.openTabs.push(args.filename);
                    if (state.activeTab === args.filename || state.activeTab === 'welcome') {
                        state.activeTab = args.filename;
                        updateTabs();
                        editor.setValue(args.content);
                        editor.setOption('mode', getModeForFile(args.filename));
                    }
                    addMsg('system', `Created: ${args.filename}`);
                    return { success: true };
                }
                case 'edit_file': {
                    const file = state.files.get(args.filename);
                    if (!file) return { error: `Not found: ${args.filename}` };
                    if (!file.content.includes(args.search)) return { error: 'Search text not found' };
                    const newContent = file.content.replace(args.search, args.replace);
                    state.files.set(args.filename, { content: newContent, modified: false });
                    updateFileList();
                    if (state.activeTab === args.filename) {
                        editor.setValue(newContent);
                    }
                    addMsg('system', `Edited: ${args.filename}`);
                    return { success: true };
                }
                case 'list_files':
                    return { files: Array.from(state.files.keys()) };
                default:
                    return { error: 'Unknown tool' };
            }
        }

        // ==================== AI ====================
        async function sendMessage() {
            const input = document.getElementById('terminalInput');
            const text = input.value.trim();
            if (!text) return;
            if (!state.connected) { toast('Connect first'); return; }

            // Add to command history
            state.commandHistory.push(text);
            state.commandIndex = -1;
            state.currentInput = '';
            saveConfig();

            input.value = '';
            addMsg('user', text);
            state.history.push({ role: 'user', content: text });

            await processAI();
        }

        async function processAI(maxIter = 25) {
            let iter = 0;
            while (iter++ < maxIter) {
                showLoading();
                try {
                    const p = PROVIDERS[state.provider];
                    const tools = p.formatTools?.(TOOLS);
                    const endpoint = p.endpoint(state.model || p.defaultModel, state.apiKeys[state.provider]);
                    const headers = p.headers(state.apiKeys[state.provider]);
                    const body = p.buildRequest(state.history, tools);

                    const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
                    if (!res.ok) throw new Error(`API error: ${res.status}`);

                    const data = await res.json();
                    const parsed = p.parseResponse(data);
                    removeLoading();

                    if (parsed.type === 'text') {
                        addMsg('assistant', parsed.content);
                        state.history.push({ role: 'assistant', content: parsed.content });
                        break;
                    } else if (parsed.type === 'tool_call') {
                        const results = parsed.toolCalls.map(tc => ({ id: tc.id, name: tc.name, result: executeTool(tc.name, tc.arguments) }));
                        state.history.push({ role: 'assistant', toolCalls: parsed.toolCalls });
                        state.history.push({ role: 'user', toolResults: results });
                    }
                } catch (e) {
                    removeLoading();
                    addMsg('error', e.message);
                    break;
                }
            }
            if (iter >= maxIter) addMsg('system', 'Task complete.');
        }

        // ==================== UI ====================
        function addMsg(type, content) {
            removeLoading();
            const output = document.getElementById('terminalOutput');
            const labels = { user: 'You', assistant: 'AI', system: 'System', error: 'Error', tool: 'Tool' };
            const msg = document.createElement('div');
            msg.className = `msg ${type}`;
            msg.innerHTML = `<div class="msg-header">${labels[type]}</div><div class="msg-body">${escapeHtml(content)}</div>`;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function showLoading() {
            const output = document.getElementById('terminalOutput');
            const msg = document.createElement('div');
            msg.className = 'msg assistant loading-msg';
            msg.innerHTML = `<div class="msg-header">AI</div><div class="msg-body"><div class="loading-dots"><span></span><span></span><span></span></div> ${state.yoloMode ? 'Building...' : 'Processing...'}</div>`;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function removeLoading() { document.querySelector('.loading-msg')?.remove(); }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 2500);
        }

        function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escapeAttr(str) { return str.replace(/'/g, "\\'").replace(/"/g, '\\"'); }
    </script>
</body>
</html>
