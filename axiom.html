<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM - AI Code Editor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjNmY0MmMxIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjMzk4YmU3Ii8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzBkMTExNyIvPjxwYXRoIGQ9Ik04IDI0TDE2IDhMMjQgMjRIMjBMMTggMjBIMTRMMTIgMjRIOFpNMTUgMTRMMTMuNSAxN0gxOC41TDE3IDE0SDE1WiIgZmlsbD0idXJsKCNnKSIvPjwvc3ZnPg==">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #08090c;
            --bg-primary: #0d1117;
            --bg-secondary: #131820;
            --bg-tertiary: #1a2028;
            --bg-elevated: #222830;
            --border-subtle: #252d38;
            --border-default: #303848;
            --text-primary: #e2e8f0;
            --text-secondary: #8892a2;
            --text-muted: #5a6472;
            --accent-primary: #6f42c1;
            --accent-secondary: #398be7;
            --accent-gradient: linear-gradient(135deg, #6f42c1 0%, #398be7 100%);
            --success: #2ea44f;
            --warning: #c9922e;
            --error: #d64545;
            --yolo: #ff6b35;
        }

        body {
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            border-right: 1px solid var(--border-subtle);
        }

        .brand-logo {
            width: 26px;
            height: 26px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        select, input[type="text"], input[type="password"] {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
        }

        select { min-width: 130px; cursor: pointer; }
        .input-key { width: 220px; }
        .input-model { width: 180px; }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            background: var(--bg-tertiary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--error);
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .status-dot.yolo {
            background: var(--yolo);
            box-shadow: 0 0 6px var(--yolo);
            animation: yoloPulse 1s infinite;
        }

        @keyframes yoloPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-subtle);
        }

        .btn-secondary:hover { background: var(--bg-elevated); }

        .btn-yolo {
            background: var(--yolo);
            color: white;
            border: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-yolo:hover {
            background: #ff8555;
        }

        .btn-yolo.active {
            animation: yoloGlow 1.5s infinite;
        }

        @keyframes yoloGlow {
            0%, 100% { box-shadow: 0 0 10px var(--yolo); }
            50% { box-shadow: 0 0 20px var(--yolo); }
        }

        .hidden-input { display: none; }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-size: 14px;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .file-item {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 12px;
            border-left: 2px solid transparent;
        }

        .file-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .file-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-left-color: var(--accent-primary);
        }

        .file-item.modified::after {
            content: '*';
            margin-left: auto;
            color: var(--warning);
        }

        .file-icon {
            font-size: 14px;
            width: 16px;
            text-align: center;
        }

        .empty-sidebar {
            padding: 16px 12px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.6;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* Tabs */
        .tabs-bar {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            overflow-x: auto;
            min-height: 36px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border-right: 1px solid var(--border-subtle);
            font-size: 12px;
            white-space: nowrap;
            position: relative;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
        }

        .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .tab.active::after { background: var(--accent-gradient); }

        .tab-close {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            opacity: 0.5;
            font-size: 12px;
        }

        .tab-close:hover { opacity: 1; background: var(--bg-elevated); }

        /* Editor */
        .editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .line-gutter {
            background: var(--bg-secondary);
            padding: 12px 10px;
            text-align: right;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
            user-select: none;
            border-right: 1px solid var(--border-subtle);
            min-width: 45px;
            overflow: hidden;
        }

        .editor-content {
            flex: 1;
            position: relative;
        }

        .code-textarea {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            padding: 12px 14px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
            tab-size: 4;
        }

        /* Terminal */
        .terminal-panel {
            height: 350px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            height: 32px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .terminal-tabs {
            display: flex;
            gap: 4px;
        }

        .terminal-tab {
            padding: 5px 10px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            border-bottom: 2px solid transparent;
        }

        .terminal-tab:hover { color: var(--text-primary); }
        .terminal-tab.active { color: var(--text-primary); border-bottom-color: var(--accent-primary); }

        .yolo-indicator {
            padding: 4px 8px;
            background: var(--yolo);
            color: white;
            font-size: 10px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .msg {
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid;
            background: var(--bg-tertiary);
            font-size: 12px;
            line-height: 1.5;
        }

        .msg.user { border-left-color: var(--accent-secondary); }
        .msg.assistant { border-left-color: var(--accent-primary); background: rgba(111,66,193,0.08); }
        .msg.system { border-left-color: var(--success); background: rgba(46,164,79,0.08); }
        .msg.error { border-left-color: var(--error); background: rgba(214,69,69,0.08); }
        .msg.tool { border-left-color: var(--warning); background: rgba(201,146,46,0.08); }

        .msg-header {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .msg-body {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-input-area {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid var(--border-subtle);
            gap: 8px;
        }

        .prompt-char {
            color: var(--accent-primary);
            font-weight: bold;
            font-size: 14px;
        }

        .terminal-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
        }

        .terminal-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Loading */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 370px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            padding: 10px 20px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
            font-size: 12px;
        }

        .toast.visible {
            display: block;
            animation: toastAnim 2.5s ease;
        }

        @keyframes toastAnim {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15%, 85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-default); }
    </style>
</head>
<body>
    <!-- Hidden File Inputs -->
    <input type="file" id="fileInput" class="hidden-input" multiple accept="*/*" onchange="handleFileUpload(event)">

    <!-- Header -->
    <header class="header">
        <div class="brand">
            <svg class="brand-logo" viewBox="0 0 32 32" fill="none">
                <defs>
                    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6f42c1"/>
                        <stop offset="100%" stop-color="#398be7"/>
                    </linearGradient>
                </defs>
                <rect width="32" height="32" rx="6" fill="#0d1117"/>
                <path d="M8 24L16 8L24 24H20L18 20H14L12 24H8ZM15 14L13.5 17H18.5L17 14H15Z" fill="url(#brandGrad)"/>
            </svg>
            <span class="brand-name">AXIOM</span>
        </div>

        <div class="config-group">
            <span class="config-label">Provider</span>
            <select id="providerSelect" onchange="onProviderChange()">
                <option value="google">Google Gemini</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="mistral">Mistral AI</option>
                <option value="openrouter">OpenRouter</option>
            </select>
        </div>

        <div class="config-group">
            <span class="config-label">API Key</span>
            <input type="password" id="apiKeyInput" class="input-key" placeholder="Paste your API key">
        </div>

        <div class="config-group">
            <span class="config-label">Model</span>
            <input type="text" id="modelInput" class="input-model" placeholder="Auto">
        </div>

        <button class="btn btn-primary" onclick="connectAPI()">Connect</button>

        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <button class="btn btn-yolo" id="yoloBtn" onclick="toggleYOLO()">YOLO MODE</button>

        <div style="flex:1"></div>

        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload Files</button>
        <button class="btn btn-secondary" onclick="createNewFile()">New File</button>
        <button class="btn btn-secondary" onclick="downloadZip()">Download ZIP</button>
    </header>

    <!-- Main -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Files</span>
                <div class="sidebar-actions">
                    <button class="icon-btn" onclick="createNewFile()">+</button>
                </div>
            </div>
            <div class="file-list" id="fileList">
                <div class="empty-sidebar">No files loaded</div>
            </div>
        </aside>

        <!-- Editor -->
        <main class="editor-area">
            <div class="tabs-bar" id="tabsBar">
                <div class="tab active">
                    <span>Welcome</span>
                </div>
            </div>

            <div class="editor-wrapper">
                <div class="line-gutter" id="lineGutter">1</div>
                <div class="editor-content">
                    <textarea class="code-textarea" id="codeEditor" spellcheck="false">// AXIOM - AI Code Editor with YOLO MODE
// =========================================
//
// YOLO MODE: AI executes all tools automatically
// No confirmations needed - full autonomous mode
//
// Just tell the AI what to build and watch it work:
// "make a flappy bird game"
// "create a todo app with react"
// "build a calculator"
//
// The AI will:
// - Create all necessary files
// - Write complete code
// - Auto-execute without asking
// - Download as ZIP when done
//
// Connect to AI and enable YOLO MODE to start!
</textarea>
                </div>
            </div>

            <!-- Terminal -->
            <div class="terminal-panel">
                <div class="terminal-header">
                    <div class="terminal-tabs">
                        <div class="terminal-tab active">AI Chat</div>
                    </div>
                    <div class="yolo-indicator" id="yoloIndicator" style="display:none;">YOLO MODE ACTIVE</div>
                </div>

                <div class="terminal-output" id="terminalOutput">
                    <div class="msg system">
                        <div class="msg-header">System</div>
                        <div class="msg-body">AXIOM initialized. Enable YOLO MODE for fully autonomous AI coding. Connect to an AI provider to begin.</div>
                    </div>
                </div>

                <div class="terminal-input-area">
                    <span class="prompt-char">></span>
                    <input type="text" class="terminal-input" id="terminalInput" placeholder="Tell AI what to build... (e.g., 'make a snake game')">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // ==================== PROVIDERS WITH TOOL SUPPORT ====================
        const PROVIDERS = {
            google: {
                name: 'Google Gemini',
                defaultModel: 'gemini-2.0-flash-exp',
                supportsTools: true,
                endpoint: (model, key) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
                headers: () => ({ 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({
                    name: t.name,
                    description: t.description,
                    parameters: {
                        type: "object",
                        properties: t.parameters.properties,
                        required: t.parameters.required
                    }
                })),
                buildRequest: (messages, tools) => ({
                    contents: messages.map(m => ({
                        role: m.role === 'assistant' ? 'model' : 'user',
                        parts: m.toolCalls ? m.toolCalls.map(tc => ({
                            functionCall: { name: tc.name, args: tc.arguments }
                        })) : m.toolResults ? m.toolResults.map(tr => ({
                            functionResponse: { name: tr.name, response: { result: tr.result } }
                        })) : [{ text: m.content }]
                    })),
                    tools: tools ? [{ functionDeclarations: tools }] : undefined,
                    generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
                }),
                parseResponse: (data) => {
                    const part = data.candidates?.[0]?.content?.parts?.[0];
                    if (part?.functionCall) {
                        return {
                            type: 'tool_call',
                            toolCalls: [{
                                name: part.functionCall.name,
                                arguments: part.functionCall.args
                            }]
                        };
                    }
                    return { type: 'text', content: part?.text || '' };
                }
            },
            openai: {
                name: 'OpenAI',
                defaultModel: 'gpt-4o',
                supportsTools: true,
                endpoint: () => 'https://api.openai.com/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({
                    type: "function",
                    function: {
                        name: t.name,
                        description: t.description,
                        parameters: t.parameters
                    }
                })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'gpt-4o',
                    messages: messages.map(m => {
                        if (m.toolCalls) {
                            return {
                                role: 'assistant',
                                tool_calls: m.toolCalls.map((tc, i) => ({
                                    id: `call_${i}`,
                                    type: 'function',
                                    function: { name: tc.name, arguments: JSON.stringify(tc.arguments) }
                                }))
                            };
                        }
                        if (m.toolResults) {
                            return m.toolResults.map(tr => ({
                                role: 'tool',
                                tool_call_id: tr.id || 'call_0',
                                content: JSON.stringify(tr.result)
                            }));
                        }
                        return { role: m.role, content: m.content };
                    }).flat(),
                    tools: tools,
                    temperature: 0.7
                }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) {
                        return {
                            type: 'tool_call',
                            toolCalls: msg.tool_calls.map(tc => ({
                                id: tc.id,
                                name: tc.function.name,
                                arguments: JSON.parse(tc.function.arguments)
                            }))
                        };
                    }
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            anthropic: {
                name: 'Anthropic',
                defaultModel: 'claude-sonnet-4-20250514',
                supportsTools: true,
                endpoint: () => 'https://api.anthropic.com/v1/messages',
                headers: (key) => ({
                    'x-api-key': key,
                    'Content-Type': 'application/json',
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                }),
                formatTools: (tools) => tools.map(t => ({
                    name: t.name,
                    description: t.description,
                    input_schema: t.parameters
                })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'claude-sonnet-4-20250514',
                    max_tokens: 8192,
                    messages: messages.filter(m => m.role !== 'system').map(m => {
                        if (m.toolCalls) {
                            return {
                                role: 'assistant',
                                content: m.toolCalls.map(tc => ({
                                    type: 'tool_use',
                                    id: tc.id || `call_${Date.now()}`,
                                    name: tc.name,
                                    input: tc.arguments
                                }))
                            };
                        }
                        if (m.toolResults) {
                            return {
                                role: 'user',
                                content: m.toolResults.map(tr => ({
                                    type: 'tool_result',
                                    tool_use_id: tr.id,
                                    content: JSON.stringify(tr.result)
                                }))
                            };
                        }
                        return { role: m.role, content: m.content };
                    }),
                    tools: tools,
                    temperature: 0.7
                }),
                parseResponse: (data) => {
                    const content = data.content?.[0];
                    if (content?.type === 'tool_use') {
                        return {
                            type: 'tool_call',
                            toolCalls: data.content.filter(c => c.type === 'tool_use').map(c => ({
                                id: c.id,
                                name: c.name,
                                arguments: c.input
                            }))
                        };
                    }
                    return { type: 'text', content: content?.text || '' };
                }
            },
            mistral: {
                name: 'Mistral AI',
                defaultModel: 'mistral-large-latest',
                supportsTools: true,
                endpoint: () => 'https://api.mistral.ai/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({
                    type: "function",
                    function: { name: t.name, description: t.description, parameters: t.parameters }
                })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'mistral-large-latest',
                    messages: messages.map(m => ({ role: m.role, content: m.content })),
                    tools: tools,
                    temperature: 0.7
                }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) {
                        return {
                            type: 'tool_call',
                            toolCalls: msg.tool_calls.map(tc => ({
                                name: tc.function.name,
                                arguments: JSON.parse(tc.function.arguments)
                            }))
                        };
                    }
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            openrouter: {
                name: 'OpenRouter',
                defaultModel: 'anthropic/claude-sonnet-4',
                supportsTools: true,
                endpoint: () => 'https://openrouter.ai/api/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({
                    type: "function",
                    function: { name: t.name, description: t.description, parameters: t.parameters }
                })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'anthropic/claude-sonnet-4',
                    messages: messages.map(m => ({ role: m.role, content: m.content })),
                    tools: tools
                }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) {
                        return {
                            type: 'tool_call',
                            toolCalls: msg.tool_calls.map(tc => ({
                                id: tc.id,
                                name: tc.function.name,
                                arguments: JSON.parse(tc.function.arguments)
                            }))
                        };
                    }
                    return { type: 'text', content: msg?.content || '' };
                }
            }
        };

        // ==================== TOOL DEFINITIONS ====================
        const TOOLS = [
            {
                name: "read_file",
                description: "Read the complete contents of a file in the project",
                parameters: {
                    type: "object",
                    properties: {
                        filename: {
                            type: "string",
                            description: "Name of the file to read"
                        }
                    },
                    required: ["filename"]
                }
            },
            {
                name: "write_file",
                description: "Create a new file or completely overwrite an existing file with new content",
                parameters: {
                    type: "object",
                    properties: {
                        filename: {
                            type: "string",
                            description: "Name of the file to write"
                        },
                        content: {
                            type: "string",
                            description: "Complete content to write to the file"
                        }
                    },
                    required: ["filename", "content"]
                }
            },
            {
                name: "edit_file",
                description: "Find and replace text in a file. Use this for targeted edits.",
                parameters: {
                    type: "object",
                    properties: {
                        filename: {
                            type: "string",
                            description: "Name of the file to edit"
                        },
                        search: {
                            type: "string",
                            description: "Exact text to find in the file"
                        },
                        replace: {
                            type: "string",
                            description: "Text to replace the found text with"
                        }
                    },
                    required: ["filename", "search", "replace"]
                }
            },
            {
                name: "list_files",
                description: "Get a list of all files currently loaded in the project",
                parameters: {
                    type: "object",
                    properties: {},
                    required: []
                }
            }
        ];

        // ==================== STATE ====================
        const state = {
            provider: 'google',
            apiKey: '',
            model: '',
            connected: false,
            yoloMode: false,
            files: new Map(),
            openTabs: ['welcome'],
            activeTab: 'welcome',
            conversationHistory: []
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            setupEvents();
            updateLines();
        });

        function loadConfig() {
            const saved = localStorage.getItem('axiom_config');
            if (saved) {
                try {
                    const c = JSON.parse(saved);
                    state.provider = c.provider || 'google';
                    state.apiKey = c.apiKey || '';
                    state.model = c.model || '';
                    state.yoloMode = c.yoloMode || false;
                    
                    document.getElementById('providerSelect').value = state.provider;
                    document.getElementById('apiKeyInput').value = state.apiKey;
                    document.getElementById('modelInput').value = state.model;
                    
                    if (state.yoloMode) {
                        document.getElementById('yoloBtn').classList.add('active');
                        document.getElementById('yoloIndicator').style.display = 'block';
                    }
                    
                    if (state.apiKey) connectAPI(true);
                } catch(e) {}
            }
        }

        function saveConfig() {
            localStorage.setItem('axiom_config', JSON.stringify({
                provider: state.provider,
                apiKey: state.apiKey,
                model: state.model,
                yoloMode: state.yoloMode
            }));
        }

        function setupEvents() {
            const input = document.getElementById('terminalInput');
            const editor = document.getElementById('codeEditor');

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            editor.addEventListener('input', () => {
                markModified();
                updateLines();
            });

            editor.addEventListener('scroll', () => {
                document.getElementById('lineGutter').scrollTop = editor.scrollTop;
            });

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    downloadZip();
                }
            });
        }

        // ==================== YOLO MODE ====================
        function toggleYOLO() {
            state.yoloMode = !state.yoloMode;
            const btn = document.getElementById('yoloBtn');
            const indicator = document.getElementById('yoloIndicator');
            const dot = document.getElementById('statusDot');
            
            if (state.yoloMode) {
                btn.classList.add('active');
                indicator.style.display = 'block';
                if (state.connected) dot.classList.add('yolo');
                addMsg('system', 'YOLO MODE ENABLED - AI will execute all actions automatically without confirmation');
            } else {
                btn.classList.remove('active');
                indicator.style.display = 'none';
                dot.classList.remove('yolo');
                addMsg('system', 'YOLO MODE DISABLED - Normal operation resumed');
            }
            
            saveConfig();
        }

        // ==================== PROVIDER ====================
        function onProviderChange() {
            state.provider = document.getElementById('providerSelect').value;
            state.connected = false;
            updateStatus(false);
        }

        function connectAPI(silent = false) {
            const key = document.getElementById('apiKeyInput').value.trim();
            const model = document.getElementById('modelInput').value.trim();

            if (!key) {
                if (!silent) toast('Enter API key');
                return;
            }

            state.apiKey = key;
            state.model = model;
            state.connected = true;

            saveConfig();
            updateStatus(true);
            
            if (!silent) {
                addMsg('system', `Connected to ${PROVIDERS[state.provider].name}`);
            }
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if (connected) {
                dot.classList.add('active');
                if (state.yoloMode) dot.classList.add('yolo');
                txt.textContent = 'Connected';
            } else {
                dot.classList.remove('active', 'yolo');
                txt.textContent = 'Disconnected';
            }
        }

        // ==================== FILES ====================
        function handleFileUpload(event) {
            const files = event.target.files;
            for (const file of files) {
                if (file.name.startsWith('.')) continue;
                readFile(file, file.name);
            }
            event.target.value = '';
        }

        function readFile(file, name) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                state.files.set(name, { content, modified: false });
                updateFileList();
                
                if (state.activeTab === 'welcome') {
                    openFile(name);
                }
                
                addMsg('system', `Loaded: ${name}`);
            };
            reader.readAsText(file);
        }

        function createNewFile() {
            const name = prompt('Filename:');
            if (!name) return;
            if (state.files.has(name)) {
                toast('File exists');
                return;
            }
            state.files.set(name, { content: '', modified: false });
            updateFileList();
            openFile(name);
        }

        function openFile(name) {
            const file = state.files.get(name);
            if (!file) return;

            if (!state.openTabs.includes(name)) {
                state.openTabs.push(name);
            }
            state.activeTab = name;
            
            updateTabs();
            updateEditor(file.content);
            highlightFile(name);
        }

        async function downloadZip() {
            if (state.files.size === 0) {
                toast('No files to download');
                return;
            }

            const zip = new JSZip();
            
            state.files.forEach((file, name) => {
                zip.file(name, file.content);
            });

            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'project.zip';
            a.click();
            URL.revokeObjectURL(url);
            
            toast('Downloaded project.zip');
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            if (state.files.size === 0) {
                list.innerHTML = '<div class="empty-sidebar">No files loaded</div>';
                return;
            }

            const sorted = Array.from(state.files.keys()).sort();
            list.innerHTML = sorted.map(name => {
                const file = state.files.get(name);
                const active = name === state.activeTab ? ' active' : '';
                const modified = file.modified ? ' modified' : '';
                return `<div class="file-item${active}${modified}" onclick="openFile('${name}')">
                    <span class="file-icon">${getFileIcon(name)}</span>
                    <span>${name}</span>
                </div>`;
            }).join('');
        }

        function getFileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const icons = { js: 'JS', ts: 'TS', py: 'PY', html: '<>', css: '#', json: '{}' };
            return icons[ext] || '[]';
        }

        function highlightFile(name) {
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.toggle('active', item.textContent.trim() === name);
            });
        }

        // ==================== EDITOR ====================
        function updateTabs() {
            const bar = document.getElementById('tabsBar');
            bar.innerHTML = state.openTabs.map(name => {
                const active = name === state.activeTab ? ' active' : '';
                const file = state.files.get(name);
                const mod = file?.modified ? ' *' : '';
                const close = name === 'welcome' ? '' : `<span class="tab-close" onclick="event.stopPropagation(); closeTab('${name}')">x</span>`;
                return `<div class="tab${active}" onclick="switchTab('${name}')">
                    <span>${name}${mod}</span>${close}
                </div>`;
            }).join('');
        }

        function switchTab(name) {
            state.activeTab = name;
            updateTabs();
            
            if (name === 'welcome') {
                updateEditor(getWelcome());
            } else {
                const file = state.files.get(name);
                if (file) updateEditor(file.content);
            }
            highlightFile(name);
        }

        function closeTab(name) {
            const idx = state.openTabs.indexOf(name);
            if (idx > -1) {
                state.openTabs.splice(idx, 1);
                if (state.activeTab === name) {
                    state.activeTab = state.openTabs[Math.max(0, idx - 1)] || 'welcome';
                    if (state.openTabs.length === 0) {
                        state.openTabs.push('welcome');
                        state.activeTab = 'welcome';
                    }
                }
                updateTabs();
                switchTab(state.activeTab);
            }
        }

        function updateEditor(content) {
            document.getElementById('codeEditor').value = content;
            updateLines();
        }

        function updateLines() {
            const editor = document.getElementById('codeEditor');
            const count = editor.value.split('\n').length;
            document.getElementById('lineGutter').innerHTML = Array.from({ length: count }, (_, i) => i + 1).join('<br>');
        }

        function markModified() {
            if (state.activeTab === 'welcome') return;
            const file = state.files.get(state.activeTab);
            if (file) {
                file.modified = true;
                file.content = document.getElementById('codeEditor').value;
                updateTabs();
                updateFileList();
            }
        }

        function getWelcome() {
            return `// AXIOM - YOLO MODE
// Enable YOLO MODE and just tell the AI what to build
// It will create all files automatically
// Download as ZIP when done (Ctrl+S)`;
        }

        // ==================== TOOL EXECUTION ====================
        function executeTool(name, args) {
            if (state.yoloMode) {
                addMsg('tool', `[AUTO] ${name}(${JSON.stringify(args).substring(0, 50)}...)`);
            } else {
                addMsg('tool', `Tool: ${name}\nArgs: ${JSON.stringify(args, null, 2)}`);
            }

            switch (name) {
                case 'read_file':
                    return readFileTool(args.filename);
                
                case 'write_file':
                    return writeFileTool(args.filename, args.content);
                
                case 'edit_file':
                    return editFileTool(args.filename, args.search, args.replace);
                
                case 'list_files':
                    return listFilesTool();
                
                default:
                    return { error: 'Unknown tool' };
            }
        }

        function readFileTool(filename) {
            const file = state.files.get(filename);
            if (!file) {
                return { error: `File not found: ${filename}` };
            }
            return { content: file.content };
        }

        function writeFileTool(filename, content) {
            state.files.set(filename, { content, modified: false });
            updateFileList();
            
            if (!state.openTabs.includes(filename)) {
                state.openTabs.push(filename);
            }
            
            if (state.activeTab === filename || state.activeTab === 'welcome') {
                state.activeTab = filename;
                updateTabs();
                updateEditor(content);
            }
            
            if (state.yoloMode) {
                addMsg('system', `Created: ${filename} (${content.length} bytes)`);
            } else {
                addMsg('system', `Updated: ${filename}`);
            }
            return { success: true, message: `File ${filename} written` };
        }

        function editFileTool(filename, search, replace) {
            const file = state.files.get(filename);
            if (!file) {
                return { error: `File not found: ${filename}` };
            }
            
            if (!file.content.includes(search)) {
                return { error: `Search text not found in ${filename}` };
            }
            
            const newContent = file.content.replace(search, replace);
            state.files.set(filename, { content: newContent, modified: false });
            updateFileList();
            
            if (state.activeTab === filename) {
                updateEditor(newContent);
            }
            
            addMsg('system', `Edited: ${filename}`);
            return { success: true, message: `File ${filename} edited` };
        }

        function listFilesTool() {
            const files = Array.from(state.files.keys());
            return { files };
        }

        // ==================== AI CHAT WITH TOOLS ====================
        async function sendMessage() {
            const input = document.getElementById('terminalInput');
            const text = input.value.trim();
            if (!text) return;

            if (!state.connected) {
                toast('Connect to AI first');
                return;
            }

            input.value = '';
            addMsg('user', text);

            state.conversationHistory.push({ role: 'user', content: text });

            await processAIResponse();
        }

        async function processAIResponse(maxIterations = 20) {
            let iterations = 0;

            while (iterations < maxIterations) {
                iterations++;
                showLoading();

                try {
                    const provider = PROVIDERS[state.provider];
                    const tools = provider.supportsTools ? provider.formatTools(TOOLS) : null;
                    
                    const endpoint = provider.endpoint(state.model || provider.defaultModel, state.apiKey);
                    const headers = provider.headers(state.apiKey);
                    const body = provider.buildRequest(state.conversationHistory, tools);

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(body)
                    });

                    if (!response.ok) {
                        throw new Error(`API error: ${response.status}`);
                    }

                    const data = await response.json();
                    const parsed = provider.parseResponse(data);

                    removeLoading();

                    if (parsed.type === 'text') {
                        addMsg('assistant', parsed.content);
                        state.conversationHistory.push({ role: 'assistant', content: parsed.content });
                        break;
                    } else if (parsed.type === 'tool_call') {
                        const toolResults = [];
                        
                        for (const toolCall of parsed.toolCalls) {
                            const result = executeTool(toolCall.name, toolCall.arguments);
                            toolResults.push({
                                id: toolCall.id,
                                name: toolCall.name,
                                result: result
                            });
                        }

                        state.conversationHistory.push({ role: 'assistant', toolCalls: parsed.toolCalls });
                        state.conversationHistory.push({ role: 'user', toolResults: toolResults });
                    }

                } catch (e) {
                    removeLoading();
                    addMsg('error', 'Error: ' + e.message);
                    break;
                }
            }

            if (iterations >= maxIterations) {
                addMsg('system', 'Task completed. Files ready for download.');
            }
        }

        // ==================== UI ====================
        function addMsg(type, content) {
            const output = document.getElementById('terminalOutput');
            removeLoading();

            const msg = document.createElement('div');
            msg.className = `msg ${type}`;

            const roles = { user: 'You', assistant: 'AI', system: 'System', error: 'Error', tool: 'Tool' };

            msg.innerHTML = `
                <div class="msg-header">${roles[type]}</div>
                <div class="msg-body">${escapeHtml(content)}</div>
            `;

            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function showLoading() {
            const output = document.getElementById('terminalOutput');
            const msg = document.createElement('div');
            msg.className = 'msg assistant loading-msg';
            msg.innerHTML = `
                <div class="msg-header">AI</div>
                <div class="msg-body"><div class="loading-dots"><span></span><span></span><span></span></div> ${state.yoloMode ? 'Building...' : 'Processing...'}</div>
            `;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function removeLoading() {
            const loading = document.querySelector('.loading-msg');
            if (loading) loading.remove();
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 2500);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
