<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM - AI Code Editor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJnIiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj48c3RvcCBvZmZzZXQ9IjAlIiBzdG9wLWNvbG9yPSIjNmY0MmMxIi8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdG9wLWNvbG9yPSIjMzk4YmU3Ii8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzBkMTExNyIvPjxwYXRoIGQ9Ik04IDI0TDE2IDhMMjQgMjRIMjBMMTggMjBIMTRMMTIgMjRIOFpNMTUgMTRMMTMuNSAxN0gxOC41TDE3IDE0SDE1WiIgZmlsbD0idXJsKCNnKSIvPjwvc3ZnPg==">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #08090c;
            --bg-primary: #0d1117;
            --bg-secondary: #131820;
            --bg-tertiary: #1a2028;
            --bg-elevated: #222830;
            --border-subtle: #252d38;
            --border-default: #303848;
            --text-primary: #e2e8f0;
            --text-secondary: #8892a2;
            --text-muted: #5a6472;
            --accent-primary: #6f42c1;
            --accent-secondary: #398be7;
            --accent-gradient: linear-gradient(135deg, #6f42c1 0%, #398be7 100%);
            --success: #2ea44f;
            --warning: #c9922e;
            --error: #d64545;
            --yolo: #ff6b35;
        }

        body {
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 12px;
            border-right: 1px solid var(--border-subtle);
        }

        .brand-logo {
            width: 26px;
            height: 26px;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .config-label a {
            color: var(--accent-secondary);
            text-decoration: none;
            transition: color 0.15s;
        }

        .config-label a:hover {
            color: var(--accent-primary);
            text-decoration: underline;
        }

        select, input[type="text"], input[type="password"] {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
        }

        select { min-width: 130px; cursor: pointer; }
        .input-key { width: 220px; }
        .input-model { width: 180px; }

        select:focus, input:focus {
            outline: none;
            border-color: var(--accent-secondary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            background: var(--bg-tertiary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--error);
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .status-dot.yolo {
            background: var(--yolo);
            box-shadow: 0 0 6px var(--yolo);
            animation: yoloPulse 0.5s infinite alternate;
        }

        @keyframes yoloPulse {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-subtle);
        }

        .btn-secondary:hover { background: var(--bg-elevated); }

        .btn-yolo {
            background: var(--yolo);
            color: white;
            border: none;
            font-weight: 600;
        }

        .btn-yolo:hover {
            opacity: 0.9;
        }

        .btn-yolo.active {
            animation: yoloGlow 1s infinite alternate;
        }

        @keyframes yoloGlow {
            from { box-shadow: 0 0 5px var(--yolo); }
            to { box-shadow: 0 0 15px var(--yolo); }
        }

        .hidden-input { display: none; }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-size: 14px;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .file-item {
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 12px;
            border-left: 2px solid transparent;
        }

        .file-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .file-item.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-left-color: var(--accent-primary);
        }

        .file-item.modified .file-name::after {
            content: ' *';
            color: var(--warning);
        }

        .file-icon {
            font-size: 11px;
            padding: 2px 4px;
            border-radius: 2px;
            background: var(--bg-elevated);
            color: var(--text-muted);
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .file-icon.html { background: #e44d26; color: white; }
        .file-icon.css { background: #264de4; color: white; }
        .file-icon.js { background: #f7df1e; color: black; }
        .file-icon.ts { background: #3178c6; color: white; }
        .file-icon.py { background: #3776ab; color: white; }
        .file-icon.json { background: var(--text-muted); color: white; }

        .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-download {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 3px;
            transition: all 0.15s;
        }

        .file-item:hover .file-download {
            opacity: 1;
        }

        .file-download:hover {
            color: var(--success);
            background: var(--bg-elevated);
        }

        .empty-sidebar {
            padding: 16px 12px;
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            line-height: 1.6;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* Tabs */
        .tabs-bar {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            overflow-x: auto;
            min-height: 36px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border-right: 1px solid var(--border-subtle);
            font-size: 12px;
            white-space: nowrap;
            position: relative;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
        }

        .tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .tab.active::after { background: var(--accent-gradient); }

        .tab-close {
            width: 14px;
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            opacity: 0.5;
            font-size: 12px;
        }

        .tab-close:hover { opacity: 1; background: var(--bg-elevated); }

        /* Editor */
        .editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .line-gutter {
            background: var(--bg-secondary);
            padding: 12px 10px;
            text-align: right;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
            user-select: none;
            border-right: 1px solid var(--border-subtle);
            min-width: 45px;
            overflow: hidden;
        }

        .editor-content {
            flex: 1;
            position: relative;
        }

        .code-textarea {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            padding: 12px 14px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            white-space: pre;
            overflow: auto;
            tab-size: 4;
        }

        /* Terminal */
        .terminal-panel {
            height: 320px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            height: 32px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .terminal-title {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .yolo-badge {
            padding: 3px 8px;
            background: var(--yolo);
            color: white;
            font-size: 9px;
            font-weight: 600;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
        }

        .yolo-badge.visible {
            display: block;
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .msg {
            margin-bottom: 12px;
            padding: 8px 10px;
            border-radius: 6px;
            border-left: 3px solid;
            background: var(--bg-tertiary);
            font-size: 12px;
            line-height: 1.5;
        }

        .msg.user { border-left-color: var(--accent-secondary); }
        .msg.assistant { border-left-color: var(--accent-primary); background: rgba(111,66,193,0.08); }
        .msg.system { border-left-color: var(--success); background: rgba(46,164,79,0.08); }
        .msg.error { border-left-color: var(--error); background: rgba(214,69,69,0.08); }
        .msg.tool { border-left-color: var(--warning); background: rgba(201,146,46,0.08); }

        .msg-header {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
        }

        .msg-body {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-input-area {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid var(--border-subtle);
            gap: 8px;
        }

        .prompt-char {
            color: var(--accent-primary);
            font-weight: bold;
            font-size: 14px;
        }

        .terminal-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
        }

        .terminal-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        /* Loading */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 340px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            padding: 10px 20px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
            font-size: 12px;
        }

        .toast.visible {
            display: block;
            animation: toastAnim 2.5s ease;
        }

        @keyframes toastAnim {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15%, 85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-default); }
    </style>
</head>
<body>
    <input type="file" id="fileInput" class="hidden-input" multiple onchange="handleFileUpload(event)">

    <!-- Header -->
    <header class="header">
        <div class="brand">
            <svg class="brand-logo" viewBox="0 0 32 32" fill="none">
                <defs>
                    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#6f42c1"/>
                        <stop offset="100%" stop-color="#398be7"/>
                    </linearGradient>
                </defs>
                <rect width="32" height="32" rx="6" fill="#0d1117"/>
                <path d="M8 24L16 8L24 24H20L18 20H14L12 24H8ZM15 14L13.5 17H18.5L17 14H15Z" fill="url(#brandGrad)"/>
            </svg>
            <span class="brand-name">AXIOM</span>
        </div>

        <div class="config-group">
            <span class="config-label">Provider</span>
            <select id="providerSelect" onchange="onProviderChange()">
                <option value="google">Google Gemini</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="mistral">Mistral AI</option>
                <option value="cohere">Cohere</option>
                <option value="groq">Groq</option>
                <option value="perplexity">Perplexity</option>
                <option value="together">Together AI</option>
                <option value="openrouter">OpenRouter</option>
            </select>
        </div>

        <div class="config-group">
            <span class="config-label"><a href="#" id="apiKeyLink" target="_blank">API Key</a></span>
            <input type="password" id="apiKeyInput" class="input-key" placeholder="Paste your API key">
        </div>

        <div class="config-group">
            <span class="config-label">Model</span>
            <input type="text" id="modelInput" class="input-model" placeholder="Default">
        </div>

        <button class="btn btn-primary" onclick="connectAPI()">Connect</button>

        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <button class="btn btn-yolo" id="yoloBtn" onclick="toggleYOLO()">YOLO</button>

        <div style="flex:1"></div>

        <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload</button>
        <button class="btn btn-secondary" onclick="createNewFile()">New File</button>
        <button class="btn btn-secondary" onclick="downloadZip()">Download ZIP</button>
    </header>

    <!-- Main -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Files</span>
                <div class="sidebar-actions">
                    <button class="icon-btn" onclick="createNewFile()">+</button>
                </div>
            </div>
            <div class="file-list" id="fileList">
                <div class="empty-sidebar">No files loaded. Upload or create files to begin.</div>
            </div>
        </aside>

        <!-- Editor -->
        <main class="editor-area">
            <div class="tabs-bar" id="tabsBar">
                <div class="tab active">
                    <span>Welcome</span>
                </div>
            </div>

            <div class="editor-wrapper">
                <div class="line-gutter" id="lineGutter">1</div>
                <div class="editor-content">
                    <textarea class="code-textarea" id="codeEditor" spellcheck="false">// AXIOM - AI Code Editor
// =======================
//
// YOLO MODE: AI executes all tools automatically
// No confirmations - full autonomous coding
//
// Just tell the AI what to build:
// "make a flappy bird game"
// "create a todo app"
// "build a calculator"
//
// The AI will:
// - Create all necessary files
// - Write complete working code
// - Execute without asking
//
// Each file can be downloaded individually
// Or download all as ZIP
//
// Click "API Key" to get your key from the provider
//
// Get started:
// 1. Select provider + enter API key
// 2. Click Connect
// 3. Enable YOLO mode
// 4. Describe what to build
</textarea>
                </div>
            </div>

            <!-- Terminal -->
            <div class="terminal-panel">
                <div class="terminal-header">
                    <span class="terminal-title">AI Terminal</span>
                    <div class="yolo-badge" id="yoloBadge">YOLO Active</div>
                </div>

                <div class="terminal-output" id="terminalOutput">
                    <div class="msg system">
                        <div class="msg-header">System</div>
                        <div class="msg-body">AXIOM initialized. Connect to an AI provider and enable YOLO mode for fully autonomous coding.</div>
                    </div>
                </div>

                <div class="terminal-input-area">
                    <span class="prompt-char">></span>
                    <input type="text" class="terminal-input" id="terminalInput" placeholder="Tell AI what to build...">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        // ==================== API KEY URLS ====================
        const API_KEY_URLS = {
            google: 'https://aistudio.google.com/app/apikey',
            openai: 'https://platform.openai.com/api-keys',
            anthropic: 'https://console.anthropic.com/settings/keys',
            mistral: 'https://console.mistral.ai/api-keys/',
            cohere: 'https://dashboard.cohere.com/api-keys',
            groq: 'https://console.groq.com/keys',
            perplexity: 'https://www.perplexity.ai/settings/api',
            together: 'https://api.together.xyz/settings/api-keys',
            openrouter: 'https://openrouter.ai/keys'
        };

        // ==================== PROVIDERS ====================
        const PROVIDERS = {
            google: {
                name: 'Google Gemini',
                defaultModel: 'gemini-2.0-flash-exp',
                endpoint: (model, key) => `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,
                headers: () => ({ 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({
                    name: t.name,
                    description: t.description,
                    parameters: { type: "object", properties: t.parameters.properties, required: t.parameters.required }
                })),
                buildRequest: (messages, tools) => ({
                    contents: messages.map(m => ({
                        role: m.role === 'assistant' ? 'model' : 'user',
                        parts: m.toolCalls ? m.toolCalls.map(tc => ({ functionCall: { name: tc.name, args: tc.arguments } }))
                            : m.toolResults ? m.toolResults.map(tr => ({ functionResponse: { name: tr.name, response: { result: tr.result } } }))
                            : [{ text: m.content }]
                    })),
                    tools: tools ? [{ functionDeclarations: tools }] : undefined,
                    generationConfig: { temperature: 0.7, maxOutputTokens: 8192 }
                }),
                parseResponse: (data) => {
                    const part = data.candidates?.[0]?.content?.parts?.[0];
                    if (part?.functionCall) return { type: 'tool_call', toolCalls: [{ name: part.functionCall.name, arguments: part.functionCall.args }] };
                    return { type: 'text', content: part?.text || '' };
                }
            },
            openai: {
                name: 'OpenAI',
                defaultModel: 'gpt-4o',
                endpoint: () => 'https://api.openai.com/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'gpt-4o',
                    messages: messages.map(m => {
                        if (m.toolCalls) return { role: 'assistant', tool_calls: m.toolCalls.map((tc, i) => ({ id: `call_${i}`, type: 'function', function: { name: tc.name, arguments: JSON.stringify(tc.arguments) } })) };
                        if (m.toolResults) return m.toolResults.map(tr => ({ role: 'tool', tool_call_id: tr.id || 'call_0', content: JSON.stringify(tr.result) }));
                        return { role: m.role, content: m.content };
                    }).flat(),
                    tools: tools,
                    temperature: 0.7
                }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ id: tc.id, name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            anthropic: {
                name: 'Anthropic',
                defaultModel: 'claude-sonnet-4-20250514',
                endpoint: () => 'https://api.anthropic.com/v1/messages',
                headers: (key) => ({ 'x-api-key': key, 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' }),
                formatTools: (tools) => tools.map(t => ({ name: t.name, description: t.description, input_schema: t.parameters })),
                buildRequest: (messages, tools) => ({
                    model: state.model || 'claude-sonnet-4-20250514',
                    max_tokens: 8192,
                    messages: messages.filter(m => m.role !== 'system').map(m => {
                        if (m.toolCalls) return { role: 'assistant', content: m.toolCalls.map(tc => ({ type: 'tool_use', id: tc.id || `call_${Date.now()}`, name: tc.name, input: tc.arguments })) };
                        if (m.toolResults) return { role: 'user', content: m.toolResults.map(tr => ({ type: 'tool_result', tool_use_id: tr.id, content: JSON.stringify(tr.result) })) };
                        return { role: m.role, content: m.content };
                    }),
                    tools: tools,
                    temperature: 0.7
                }),
                parseResponse: (data) => {
                    const content = data.content?.[0];
                    if (content?.type === 'tool_use') return { type: 'tool_call', toolCalls: data.content.filter(c => c.type === 'tool_use').map(c => ({ id: c.id, name: c.name, arguments: c.input })) };
                    return { type: 'text', content: content?.text || '' };
                }
            },
            mistral: {
                name: 'Mistral AI',
                defaultModel: 'mistral-large-latest',
                endpoint: () => 'https://api.mistral.ai/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'mistral-large-latest', messages: messages.map(m => ({ role: m.role, content: m.content })), tools, temperature: 0.7 }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            cohere: {
                name: 'Cohere',
                defaultModel: 'command-r-plus',
                endpoint: () => 'https://api.cohere.ai/v1/chat',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ name: t.name, description: t.description, parameter_definitions: Object.fromEntries(Object.entries(t.parameters.properties).map(([k, v]) => [k, { type: v.type, description: v.description, required: t.parameters.required?.includes(k) }])) })),
                buildRequest: (messages, tools) => ({ model: state.model || 'command-r-plus', message: messages[messages.length - 1]?.content || '', tools }),
                parseResponse: (data) => {
                    if (data.tool_calls?.length) return { type: 'tool_call', toolCalls: data.tool_calls.map(tc => ({ name: tc.name, arguments: tc.parameters })) };
                    return { type: 'text', content: data.text || '' };
                }
            },
            groq: {
                name: 'Groq',
                defaultModel: 'llama-3.3-70b-versatile',
                endpoint: () => 'https://api.groq.com/openai/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'llama-3.3-70b-versatile', messages: messages.map(m => ({ role: m.role, content: m.content })), tools, temperature: 0.7 }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            perplexity: {
                name: 'Perplexity',
                defaultModel: 'llama-3.1-sonar-large-128k-online',
                endpoint: () => 'https://api.perplexity.ai/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: () => null,
                buildRequest: (messages) => ({ model: state.model || 'llama-3.1-sonar-large-128k-online', messages: messages.map(m => ({ role: m.role, content: m.content })) }),
                parseResponse: (data) => ({ type: 'text', content: data.choices?.[0]?.message?.content || '' })
            },
            together: {
                name: 'Together AI',
                defaultModel: 'meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo',
                endpoint: () => 'https://api.together.xyz/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo', messages: messages.map(m => ({ role: m.role, content: m.content })), tools, temperature: 0.7 }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            },
            openrouter: {
                name: 'OpenRouter',
                defaultModel: 'anthropic/claude-sonnet-4',
                endpoint: () => 'https://openrouter.ai/api/v1/chat/completions',
                headers: (key) => ({ 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' }),
                formatTools: (tools) => tools.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: t.parameters } })),
                buildRequest: (messages, tools) => ({ model: state.model || 'anthropic/claude-sonnet-4', messages: messages.map(m => ({ role: m.role, content: m.content })), tools }),
                parseResponse: (data) => {
                    const msg = data.choices?.[0]?.message;
                    if (msg?.tool_calls) return { type: 'tool_call', toolCalls: msg.tool_calls.map(tc => ({ id: tc.id, name: tc.function.name, arguments: JSON.parse(tc.function.arguments) })) };
                    return { type: 'text', content: msg?.content || '' };
                }
            }
        };

        // ==================== TOOLS ====================
        const TOOLS = [
            { name: "read_file", description: "Read the contents of a file", parameters: { type: "object", properties: { filename: { type: "string", description: "Name of the file to read" } }, required: ["filename"] } },
            { name: "write_file", description: "Create or overwrite a file with content", parameters: { type: "object", properties: { filename: { type: "string", description: "Name of the file" }, content: { type: "string", description: "Content to write" } }, required: ["filename", "content"] } },
            { name: "edit_file", description: "Find and replace text in a file", parameters: { type: "object", properties: { filename: { type: "string", description: "Name of the file" }, search: { type: "string", description: "Text to find" }, replace: { type: "string", description: "Replacement text" } }, required: ["filename", "search", "replace"] } },
            { name: "list_files", description: "List all files in the project", parameters: { type: "object", properties: {}, required: [] } }
        ];

        // ==================== STATE ====================
        const state = {
            provider: 'google',
            apiKey: '',
            model: '',
            connected: false,
            yoloMode: false,
            files: new Map(),
            openTabs: ['welcome'],
            activeTab: 'welcome',
            history: []
        };

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            setupEvents();
            updateGutter();
            updateApiKeyLink();
        });

        function loadConfig() {
            const saved = localStorage.getItem('axiom_config');
            if (saved) {
                try {
                    const c = JSON.parse(saved);
                    state.provider = c.provider || 'google';
                    state.apiKey = c.apiKey || '';
                    state.model = c.model || '';
                    state.yoloMode = c.yoloMode || false;
                    
                    document.getElementById('providerSelect').value = state.provider;
                    document.getElementById('apiKeyInput').value = state.apiKey;
                    document.getElementById('modelInput').value = state.model;
                    
                    if (state.yoloMode) {
                        document.getElementById('yoloBtn').classList.add('active');
                        document.getElementById('yoloBadge').classList.add('visible');
                    }
                    
                    if (state.apiKey) connectAPI(true);
                } catch(e) {}
            }
            updateApiKeyLink();
        }

        function saveConfig() {
            localStorage.setItem('axiom_config', JSON.stringify({
                provider: state.provider,
                apiKey: state.apiKey,
                model: state.model,
                yoloMode: state.yoloMode
            }));
        }

        function setupEvents() {
            document.getElementById('terminalInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
            });

            document.getElementById('codeEditor').addEventListener('input', () => { markModified(); updateGutter(); });
            document.getElementById('codeEditor').addEventListener('scroll', function() {
                document.getElementById('lineGutter').scrollTop = this.scrollTop;
            });

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 's') { e.preventDefault(); downloadZip(); }
            });
        }

        function updateApiKeyLink() {
            const link = document.getElementById('apiKeyLink');
            link.href = API_KEY_URLS[state.provider];
            link.title = `Get ${PROVIDERS[state.provider].name} API Key`;
        }

        // ==================== YOLO ====================
        function toggleYOLO() {
            state.yoloMode = !state.yoloMode;
            document.getElementById('yoloBtn').classList.toggle('active', state.yoloMode);
            document.getElementById('yoloBadge').classList.toggle('visible', state.yoloMode);
            document.getElementById('statusDot').classList.toggle('yolo', state.yoloMode && state.connected);
            addMsg('system', state.yoloMode ? 'YOLO MODE ENABLED - AI will execute automatically' : 'YOLO MODE DISABLED');
            saveConfig();
        }

        // ==================== PROVIDER ====================
        function onProviderChange() {
            state.provider = document.getElementById('providerSelect').value;
            state.connected = false;
            updateStatus(false);
            updateApiKeyLink();
        }

        function connectAPI(silent = false) {
            const key = document.getElementById('apiKeyInput').value.trim();
            const model = document.getElementById('modelInput').value.trim();
            if (!key) { if (!silent) toast('Enter API key'); return; }

            state.apiKey = key;
            state.model = model;
            state.connected = true;
            saveConfig();
            updateStatus(true);
            if (!silent) addMsg('system', `Connected to ${PROVIDERS[state.provider].name}`);
        }

        function updateStatus(connected) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.classList.toggle('active', connected);
            dot.classList.toggle('yolo', connected && state.yoloMode);
            txt.textContent = connected ? 'Connected' : 'Disconnected';
        }

        // ==================== FILES ====================
        function handleFileUpload(event) {
            for (const file of event.target.files) {
                if (!file.name.startsWith('.')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        state.files.set(file.name, { content: e.target.result, modified: false });
                        updateFileList();
                        if (state.activeTab === 'welcome') openFile(file.name);
                        addMsg('system', `Loaded: ${file.name}`);
                    };
                    reader.readAsText(file);
                }
            }
            event.target.value = '';
        }

        function createNewFile() {
            const name = prompt('Filename:');
            if (!name || state.files.has(name)) return;
            state.files.set(name, { content: '', modified: false });
            updateFileList();
            openFile(name);
        }

        function openFile(name) {
            const file = state.files.get(name);
            if (!file) return;
            if (!state.openTabs.includes(name)) state.openTabs.push(name);
            state.activeTab = name;
            updateTabs();
            document.getElementById('codeEditor').value = file.content;
            updateGutter();
            highlightFile(name);
        }

        function downloadFile(name) {
            const file = state.files.get(name);
            if (!file) return;
            const blob = new Blob([file.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
            toast(`Downloaded: ${name}`);
        }

        async function downloadZip() {
            if (state.files.size === 0) { toast('No files'); return; }
            const zip = new JSZip();
            state.files.forEach((file, name) => zip.file(name, file.content));
            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'project.zip';
            a.click();
            URL.revokeObjectURL(url);
            toast('Downloaded: project.zip');
        }

        function updateFileList() {
            const list = document.getElementById('fileList');
            if (state.files.size === 0) {
                list.innerHTML = '<div class="empty-sidebar">No files loaded. Upload or create files to begin.</div>';
                return;
            }
            list.innerHTML = Array.from(state.files.keys()).sort().map(name => {
                const file = state.files.get(name);
                const ext = name.split('.').pop().toLowerCase();
                const active = name === state.activeTab ? ' active' : '';
                const modified = file.modified ? ' modified' : '';
                return `<div class="file-item${active}${modified}" onclick="openFile('${name}')">
                    <span class="file-icon ${ext}">${ext.toUpperCase()}</span>
                    <span class="file-name">${name}</span>
                    <button class="file-download" onclick="event.stopPropagation(); downloadFile('${name}')" title="Download file">DL</button>
                </div>`;
            }).join('');
        }

        function highlightFile(name) {
            document.querySelectorAll('.file-item').forEach(item => {
                item.classList.toggle('active', item.querySelector('.file-name')?.textContent === name);
            });
        }

        // ==================== EDITOR ====================
        function updateTabs() {
            document.getElementById('tabsBar').innerHTML = state.openTabs.map(name => {
                const active = name === state.activeTab ? ' active' : '';
                const file = state.files.get(name);
                const mod = file?.modified ? ' *' : '';
                const close = name === 'welcome' ? '' : `<span class="tab-close" onclick="event.stopPropagation(); closeTab('${name}')">x</span>`;
                return `<div class="tab${active}" onclick="switchTab('${name}')"><span>${name}${mod}</span>${close}</div>`;
            }).join('');
        }

        function switchTab(name) {
            state.activeTab = name;
            updateTabs();
            if (name === 'welcome') {
                document.getElementById('codeEditor').value = getWelcome();
            } else {
                const file = state.files.get(name);
                if (file) document.getElementById('codeEditor').value = file.content;
            }
            updateGutter();
            highlightFile(name);
        }

        function closeTab(name) {
            const idx = state.openTabs.indexOf(name);
            if (idx > -1) {
                state.openTabs.splice(idx, 1);
                if (state.activeTab === name) {
                    state.activeTab = state.openTabs[Math.max(0, idx - 1)] || 'welcome';
                    if (state.openTabs.length === 0) { state.openTabs.push('welcome'); state.activeTab = 'welcome'; }
                }
                updateTabs();
                switchTab(state.activeTab);
            }
        }

        function updateGutter() {
            const lines = document.getElementById('codeEditor').value.split('\n').length;
            document.getElementById('lineGutter').innerHTML = Array.from({ length: lines }, (_, i) => i + 1).join('<br>');
        }

        function markModified() {
            if (state.activeTab === 'welcome') return;
            const file = state.files.get(state.activeTab);
            if (file) {
                file.modified = true;
                file.content = document.getElementById('codeEditor').value;
                updateTabs();
                updateFileList();
            }
        }

        function getWelcome() {
            return `// AXIOM - AI Code Editor
// Enable YOLO mode and describe what to build
// Click "API Key" to get your key from the provider`;
        }

        // ==================== TOOLS ====================
        function executeTool(name, args) {
            addMsg('tool', `${name}(${JSON.stringify(args).substring(0, 60)}...)`);
            switch (name) {
                case 'read_file': {
                    const file = state.files.get(args.filename);
                    return file ? { content: file.content } : { error: `Not found: ${args.filename}` };
                }
                case 'write_file': {
                    state.files.set(args.filename, { content: args.content, modified: false });
                    updateFileList();
                    if (!state.openTabs.includes(args.filename)) state.openTabs.push(args.filename);
                    if (state.activeTab === args.filename || state.activeTab === 'welcome') {
                        state.activeTab = args.filename;
                        updateTabs();
                        document.getElementById('codeEditor').value = args.content;
                        updateGutter();
                    }
                    addMsg('system', `Created: ${args.filename} (${args.content.length} bytes)`);
                    return { success: true };
                }
                case 'edit_file': {
                    const file = state.files.get(args.filename);
                    if (!file) return { error: `Not found: ${args.filename}` };
                    if (!file.content.includes(args.search)) return { error: 'Search text not found' };
                    const newContent = file.content.replace(args.search, args.replace);
                    state.files.set(args.filename, { content: newContent, modified: false });
                    updateFileList();
                    if (state.activeTab === args.filename) {
                        document.getElementById('codeEditor').value = newContent;
                        updateGutter();
                    }
                    addMsg('system', `Edited: ${args.filename}`);
                    return { success: true };
                }
                case 'list_files':
                    return { files: Array.from(state.files.keys()) };
                default:
                    return { error: 'Unknown tool' };
            }
        }

        // ==================== AI ====================
        async function sendMessage() {
            const input = document.getElementById('terminalInput');
            const text = input.value.trim();
            if (!text) return;
            if (!state.connected) { toast('Connect first'); return; }

            input.value = '';
            addMsg('user', text);
            state.history.push({ role: 'user', content: text });

            await processAI();
        }

        async function processAI(maxIter = 25) {
            let iter = 0;
            while (iter++ < maxIter) {
                showLoading();
                try {
                    const p = PROVIDERS[state.provider];
                    const tools = p.formatTools?.(TOOLS);
                    const endpoint = p.endpoint(state.model || p.defaultModel, state.apiKey);
                    const headers = p.headers(state.apiKey);
                    const body = p.buildRequest(state.history, tools);

                    const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
                    if (!res.ok) throw new Error(`API error: ${res.status}`);

                    const data = await res.json();
                    const parsed = p.parseResponse(data);
                    removeLoading();

                    if (parsed.type === 'text') {
                        addMsg('assistant', parsed.content);
                        state.history.push({ role: 'assistant', content: parsed.content });
                        break;
                    } else if (parsed.type === 'tool_call') {
                        const results = parsed.toolCalls.map(tc => ({ id: tc.id, name: tc.name, result: executeTool(tc.name, tc.arguments) }));
                        state.history.push({ role: 'assistant', toolCalls: parsed.toolCalls });
                        state.history.push({ role: 'user', toolResults: results });
                    }
                } catch (e) {
                    removeLoading();
                    addMsg('error', 'Error: ' + e.message);
                    break;
                }
            }
            if (iter >= maxIter) addMsg('system', 'Task complete. Download your files.');
        }

        // ==================== UI ====================
        function addMsg(type, content) {
            removeLoading();
            const output = document.getElementById('terminalOutput');
            const labels = { user: 'You', assistant: 'AI', system: 'System', error: 'Error', tool: 'Tool' };
            const msg = document.createElement('div');
            msg.className = `msg ${type}`;
            msg.innerHTML = `<div class="msg-header">${labels[type]}</div><div class="msg-body">${escapeHtml(content)}</div>`;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function showLoading() {
            const output = document.getElementById('terminalOutput');
            const msg = document.createElement('div');
            msg.className = 'msg assistant loading-msg';
            msg.innerHTML = `<div class="msg-header">AI</div><div class="msg-body"><div class="loading-dots"><span></span><span></span><span></span></div> ${state.yoloMode ? 'Building...' : 'Processing...'}</div>`;
            output.appendChild(msg);
            output.scrollTop = output.scrollHeight;
        }

        function removeLoading() {
            document.querySelector('.loading-msg')?.remove();
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 2500);
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
