<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        #game {
            display: flex;
            gap: 20px;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #111;
        }
        #info {
            color: #fff;
            min-width: 100px;
        }
        #controls {
            color: #ccc;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="game">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div id="info">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>Lines: <span id="lines">0</span></div>
            <div id="next"></div>
            <div id="controls">
                Arrow Keys: Move<br>
                Up: Rotate<br>
                Space: Drop
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playNote(frequency, duration, type = 'square', volume = 0.1) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        const tetrisMelody = [
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 659.25, dur: 0.4}, // E5
            {freq: 523.25, dur: 0.2}, // C5
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 0, dur: 0.2}, // rest
            {freq: 783.99, dur: 0.2}, // G5
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.4}, // rest
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 659.25, dur: 0.4}, // E5
            {freq: 698.46, dur: 0.2}, // F5
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 0, dur: 0.2}, // rest
            {freq: 880.00, dur: 0.2}, // A5
            {freq: 783.99, dur: 0.2}, // G5
            {freq: 659.25, dur: 0.4}, // E5
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.4}, // rest
            {freq: 587.33, dur: 0.2}, // D5
            {freq: 587.33, dur: 0.2}, // D5
            {freq: 587.33, dur: 0.4}, // D5
            {freq: 523.25, dur: 0.2}, // C5
            {freq: 587.33, dur: 0.2}, // D5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 0, dur: 0.2}, // rest
            {freq: 698.46, dur: 0.2}, // F5
            {freq: 587.33, dur: 0.2}, // D5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.4}, // rest
            {freq: 523.25, dur: 0.2}, // C5
            {freq: 523.25, dur: 0.2}, // C5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 587.33, dur: 0.2}, // D5
            {freq: 523.25, dur: 0.2}, // C5
            {freq: 440.00, dur: 0.4}, // A4
            {freq: 0, dur: 0.2}, // rest
            {freq: 659.25, dur: 0.2}, // E5
            {freq: 587.33, dur: 0.2}, // D5
            {freq: 523.25, dur: 0.4}, // C5
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.2}, // rest
            {freq: 0, dur: 0.4} // rest
        ];

        let melodyIndex = 0;
        let isPlayingMelody = false;

        function playMelody() {
            if (isPlayingMelody) return;
            isPlayingMelody = true;
            melodyIndex = 0;
            
            function playNextNote() {
                if (melodyIndex >= tetrisMelody.length) {
                    isPlayingMelody = false;
                    return;
                }
                
                const note = tetrisMelody[melodyIndex];
                if (note.freq > 0) {
                    playNote(note.freq, note.dur, 'square', 0.05);
                }
                
                melodyIndex++;
                setTimeout(playNextNote, note.dur * 1000);
            }
            
            playNextNote();
        }

        function playLineClearSound() {
            playNote(800, 0.1, 'sine', 0.2);
            setTimeout(() => playNote(600, 0.1, 'sine', 0.2), 100);
        }

        function playDropSound() {
            playNote(200, 0.05, 'square', 0.1);
        }

        function playRotateSound() {
            playNote(400, 0.03, 'square', 0.08);
        }

        const arena = createMatrix(12, 20);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
            lines: 0
        };

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') {
                return [
                    [0, 0, 0],
                    [1, 1, 1],
                    [0, 1, 0],
                ];
            } else if (type === 'O') {
                return [
                    [2, 2],
                    [2, 2],
                ];
            } else if (type === 'L') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [0, 3, 3],
                ];
            } else if (type === 'J') {
                return [
                    [0, 4, 0],
                    [0, 4, 0],
                    [4, 4, 0],
                ];
            } else if (type === 'I') {
                return [
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                    [0, 5, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'Z') {
                return [
                    [7, 7, 0],
                    [0, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        const colors = [
            null,
            '#FF0D72',
            '#0DC2FF',
            '#0DFF72',
            '#F538FF',
            '#FF8E0D',
            '#FFE138',
            '#3877FF',
        ];

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
            playDropSound();
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.level = 1;
                player.lines = 0;
                updateScore();
                playMelody();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            playRotateSound();
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            let linesCleared = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines++;
                linesCleared++;
                if (player.lines % 10 === 0) {
                    player.level++;
                }
                rowCount *= 2;
            }
            if (linesCleared > 0) {
                playLineClearSound();
            }
            updateScore();
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width / 20, canvas.height / 20);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('level').innerText = player.level;
            document.getElementById('lines').innerText = player.lines;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            dropInterval = Math.max(50, 1000 - (player.level * 50));
            draw();
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) {
                playerMove(-1);
            } else if (event.keyCode === 39) {
                playerMove(1);
            } else if (event.keyCode === 40) {
                playerDrop();
            } else if (event.keyCode === 38) {
                playerRotate(1);
            } else if (event.keyCode === 32) {
                while (!collide(arena, player)) {
                    player.pos.y++;
                }
                player.pos.y--;
                playerDrop();
            }
        });

        // Initialize audio context on first user interaction
        document.addEventListener('keydown', function initAudio() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            document.removeEventListener('keydown', initAudio);
        }, {once: true});

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
