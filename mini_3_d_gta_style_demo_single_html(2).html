<!DOCTYPE html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Mini 3D GTA-Style Demo</title><style>html,body{height:100%;margin:0;overflow:hidden;background:#0b0b10}#ui{position:fixed;top:12px;left:12px;z-index:2;color:#e8e8f0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,sans-serif;background:rgba(20,20,28,.6);backdrop-filter:blur(6px);padding:10px 12px;border-radius:14px;font-size:14px;user-select:none}#renderCanvas{width:100%;height:100%;touch-action:none;display:block}</style></head><body><div id="ui">WASD move • Mouse drag rotate • Scroll zoom</div><canvas id="renderCanvas"></canvas><script src="https://cdn.babylonjs.com/babylon.js"></script><script>const canvas=document.getElementById("renderCanvas");const engine=new BABYLON.Engine(canvas,true);let mainScene;function createMainScene(){const sc=new BABYLON.Scene(engine);sc.clearColor=new BABYLON.Color4(.03,.03,.06,1);sc.ambientColor=new BABYLON.Color3(.6,.6,.7);sc.collisionsEnabled=true;const light1=new BABYLON.HemisphericLight("h1",new BABYLON.Vector3(0,1,0),sc);light1.intensity=.8;const sun=new BABYLON.DirectionalLight("sun",new BABYLON.Vector3(-1,-2,-1),sc);sun.position=new BABYLON.Vector3(60,120,60);sun.intensity=.7;const player=BABYLON.MeshBuilder.CreateBox("player",{width:1,length:2,height:.6},sc);player.position.y=.3;player.ellipsoid=new BABYLON.Vector3(.5,.8,.5);player.checkCollisions=true;player.material=new BABYLON.StandardMaterial("pm",sc);player.material.diffuseColor=new BABYLON.Color3(.95,.2,.25);const cam=new BABYLON.ArcRotateCamera("cam",-Math.PI/2,0.9,8,player.position,sc);cam.lowerRadiusLimit=5;cam.upperRadiusLimit=30;cam.wheelPrecision=20;cam.panningSensibility=0;cam.attachControl(canvas,true);const ground=BABYLON.MeshBuilder.CreateGround("g",{width:400,height:400},sc);ground.checkCollisions=true;const gm=new BABYLON.StandardMaterial("gm",sc);gm.diffuseColor=new BABYLON.Color3(.1,.14,.18);gm.specularColor=new BABYLON.Color3(0,0,0);ground.material=gm;const roadMat=new BABYLON.StandardMaterial("rm",sc);roadMat.diffuseColor=new BABYLON.Color3(.12,.12,.12);roadMat.specularColor=new BABYLON.Color3(0,0,0);const bldMat1=new BABYLON.StandardMaterial("b1",sc);bldMat1.diffuseColor=new BABYLON.Color3(.22,.35,.52);const bldMat2=new BABYLON.StandardMaterial("b2",sc);bldMat2.diffuseColor=new BABYLON.Color3(.4,.4,.45);const bldMat3=new BABYLON.StandardMaterial("b3",sc);bldMat3.diffuseColor=new BABYLON.Color3(.28,.22,.42);function makeBlock(x,z){const lot=Math.random()<.85;const h=2+Math.floor(Math.random()*18);const w=2+Math.floor(Math.random()*6);const d=2+Math.floor(Math.random()*6);if(lot){const b=BABYLON.MeshBuilder.CreateBox("b",{width:w,depth:d,height:h},sc);b.material=[bldMat1,bldMat2,bldMat3][Math.floor(Math.random()*3)];b.position.set(x,h/2,z);b.checkCollisions=true;return b}else{const r=BABYLON.MeshBuilder.CreateGround("r",{width:8,height:8},sc);r.position.set(x,0.01,z);r.material=roadMat;r.checkCollisions=true;return r}}const size=20;const spacing=10;for(let i=-size;i<=size;i++){for(let j=-size;j<=size;j++){if(Math.abs(i)<=1||Math.abs(j)<=1)continue;const px=i*spacing;const pz=j*spacing;makeBlock(px,pz)}}const sky=BABYLON.MeshBuilder.CreateBox("sky",{size:1000},sc);const skyMat=new BABYLON.StandardMaterial("skyM",sc);skyMat.backFaceCulling=false;skyMat.diffuseColor=new BABYLON.Color3(.18,.22,.32);skyMat.specularColor=new BABYLON.Color3(0,0,0);sky.material=skyMat;sky.isPickable=false;const vel=new BABYLON.Vector3(0,0,0);const input={};window.addEventListener("keydown",e=>{input[e.key.toLowerCase()]=true});window.addEventListener("keyup",e=>{input[e.key.toLowerCase()]=false});sc.onBeforeRenderObservable.add(()=>{const dt=engine.getDeltaTime()/1000;const toTarget=player.position.subtract(cam.position);toTarget.y=0;toTarget.normalize();const right=BABYLON.Vector3.Cross(toTarget,new BABYLON.Vector3(0,1,0)).normalize();let accel=new BABYLON.Vector3(0,0,0);const acc=18;const maxSpeed=12;const friction=8;const braking=20;if(input["w"])accel=accel.add(toTarget.scale(acc));if(input["s"])accel=accel.add(toTarget.scale(-acc));if(input["a"])accel=accel.add(right.scale(-acc));if(input["d"])accel=accel.add(right.scale(acc));const speed=vel.length();if(speed>0){const drag=Math.min(friction*dt,speed);vel.scaleInPlace((speed-drag)/speed)}vel.addInPlace(accel.scale(dt));if(input["s"])vel.scaleInPlace(Math.max(0,1-braking*dt*0.05));if(vel.length()>maxSpeed)vel.normalize().scaleInPlace(maxSpeed);const move=vel.scale(dt);const before=player.position.clone();player.moveWithCollisions(new BABYLON.Vector3(move.x,0,move.z));player.position.y=.3;if(!player.position.equalsWithEpsilon(before,1e-3)){}if(vel.lengthSquared()>0.001){player.rotation.y=Math.atan2(vel.x,vel.z)}cam.target.copyFrom(player.position)});return sc}mainScene=createMainScene();engine.runRenderLoop(()=>{mainScene.render()});window.addEventListener("resize",()=>{engine.resize()});</script></body></html>
