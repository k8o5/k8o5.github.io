<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;overflow:hidden;display:flex;height:100vh}
:root{--accent:#00d4ff;--bg:#16213e;--panel:#1a1a2e;--text:#eee;--border:#0f3460}

#toolbar{width:60px;background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:10px 5px;gap:5px;border-right:2px solid var(--border)}
.tool{width:44px;height:44px;background:transparent;border:2px solid transparent;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text);transition:all 0.2s}
.tool:hover{background:var(--border)}
.tool.active{background:var(--accent);color:#000;border-color:var(--accent)}
.tool-divider{width:80%;height:2px;background:var(--border);margin:5px 0}

#leftPanel{width:250px;background:var(--bg);border-right:2px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.panel-section{padding:15px;border-bottom:2px solid var(--border)}
.panel-title{color:var(--accent);font-size:12px;font-weight:bold;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}

#colorMain{width:100%;height:150px;border-radius:8px;cursor:crosshair;position:relative;margin-bottom:10px}
#colorStrip{width:100%;height:20px;border-radius:4px;cursor:crosshair;margin-bottom:10px}
#colorPreview{display:flex;gap:10px;align-items:center;margin-bottom:10px}
#currentColor{width:50px;height:50px;border-radius:8px;border:3px solid var(--text)}
#colorInputs{flex:1}
#colorInputs input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px;border-radius:4px;margin-bottom:5px;font-family:monospace}
#recentColors{display:flex;flex-wrap:wrap;gap:5px}
.recent-color{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent}
.recent-color:hover{border-color:var(--text)}

.slider-group{margin-bottom:12px}
.slider-group label{display:flex;justify-content:space-between;color:var(--text);font-size:12px;margin-bottom:5px}
.slider-group input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--accent);border-radius:50%;cursor:pointer}

#canvasArea{flex:1;display:flex;flex-direction:column;background:#0a0a15}
#canvasHeader{height:40px;background:var(--bg);display:flex;align-items:center;padding:0 15px;gap:10px;border-bottom:2px solid var(--border)}
#canvasHeader button{background:var(--border);color:var(--text);border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px}
#canvasHeader button:hover{background:var(--accent);color:#000}
#zoomLevel{color:var(--accent);font-size:12px;margin-left:auto}

#canvasContainer{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:20px}
#canvasWrapper{position:relative;box-shadow:0 0 50px rgba(0,212,255,0.2)}
canvas{display:block}
#mainCanvas{position:absolute;top:0;left:0}
#previewCanvas{position:absolute;top:0;left:0;pointer-events:none}

#rightPanel{width:200px;background:var(--bg);border-left:2px solid var(--border);display:flex;flex-direction:column}
#layersPanel{flex:1;display:flex;flex-direction:column}
#layersList{flex:1;overflow-y:auto;padding:10px}
.layer{background:var(--panel);border:2px solid var(--border);border-radius:6px;padding:8px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:8px}
.layer.active{border-color:var(--accent)}
.layer-preview{width:40px;height:30px;background:#fff;border-radius:4px}
.layer-name{flex:1;color:var(--text);font-size:12px}
.layer-visibility{font-size:16px;cursor:pointer}
#layerControls{padding:10px;display:flex;gap:5px;border-top:2px solid var(--border)}
#layerControls button{flex:1;background:var(--border);color:var(--text);border:none;padding:8px;border-radius:4px;cursor:pointer;font-size:16px}
#layerControls button:hover{background:var(--accent);color:#000}

#statusBar{height:30px;background:var(--bg);border-top:2px solid var(--border);display:flex;align-items:center;padding:0 15px;color:var(--text);font-size:11px;gap:20px}

.checkbox-group{display:flex;align-items:center;gap:8px;color:var(--text);font-size:12px;margin-bottom:8px}
.checkbox-group input{accent-color:var(--accent)}

#brushPreview{width:100%;height:60px;background:var(--panel);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
#brushDot{background:var(--accent);border-radius:50%}
</style>
</head>
<body>

<div id="toolbar">
<div class="tool active" data-tool="brush" title="Brush (B)">🖌️</div>
<div class="tool" data-tool="pencil" title="Pencil (P)">✏️</div>
<div class="tool" data-tool="eraser" title="Eraser (E)">🧽</div>
<div class="tool" data-tool="spray" title="Spray (S)">💨</div>
<div class="tool-divider"></div>
<div class="tool" data-tool="line" title="Line (L)">📏</div>
<div class="tool" data-tool="rect" title="Rectangle (R)">⬜</div>
<div class="tool" data-tool="ellipse" title="Ellipse (O)">⭕</div>
<div class="tool-divider"></div>
<div class="tool" data-tool="fill" title="Fill (G)">🪣</div>
<div class="tool" data-tool="picker" title="Color Picker (I)">💉</div>
<div class="tool" data-tool="text" title="Text (T)">📝</div>
<div class="tool-divider"></div>
<div class="tool" data-tool="move" title="Move (V)">✋</div>
<div class="tool" data-tool="select" title="Select (M)">⬚</div>
</div>

<div id="leftPanel">
<div class="panel-section">
<div class="panel-title">Color</div>
<canvas id="colorMain"></canvas>
<canvas id="colorStrip"></canvas>
<div id="colorPreview">
<div id="currentColor"></div>
<div id="colorInputs">
<input type="text" id="hexInput" value="#00D4FF" maxlength="7">
</div>
</div>
<div id="recentColors"></div>
</div>

<div class="panel-section">
<div class="panel-title">Brush</div>
<div id="brushPreview"><div id="brushDot"></div></div>
<div class="slider-group">
<label>Size <span id="sizeVal">10</span>px</label>
<input type="range" id="brushSize" min="1" max="200" value="10">
</div>
<div class="slider-group">
<label>Opacity <span id="opacityVal">100</span>%</label>
<input type="range" id="brushOpacity" min="1" max="100" value="100">
</div>
<div class="slider-group">
<label>Hardness <span id="hardnessVal">100</span>%</label>
<input type="range" id="brushHardness" min="0" max="100" value="100">
</div>
</div>

<div class="panel-section">
<div class="panel-title">Options</div>
<div class="checkbox-group"><input type="checkbox" id="symmetryX"><label for="symmetryX">Mirror X</label></div>
<div class="checkbox-group"><input type="checkbox" id="symmetryY"><label for="symmetryY">Mirror Y</label></div>
<div class="checkbox-group"><input type="checkbox" id="showGrid"><label for="showGrid">Show Grid</label></div>
<div class="checkbox-group"><input type="checkbox" id="smoothing" checked><label for="smoothing">Stabilizer</label></div>
</div>
</div>

<div id="canvasArea">
<div id="canvasHeader">
<button id="newBtn">📄 New</button>
<button id="undoBtn">↶ Undo</button>
<button id="redoBtn">↷ Redo</button>
<button id="clearBtn">🗑️ Clear</button>
<button id="saveBtn">💾 Save PNG</button>
<button id="zoomIn">🔍+</button>
<button id="zoomOut">🔍-</button>
<button id="zoomFit">Fit</button>
<span id="zoomLevel">100%</span>
</div>
<div id="canvasContainer">
<div id="canvasWrapper">
<canvas id="bgCanvas"></canvas>
<canvas id="mainCanvas"></canvas>
<canvas id="previewCanvas"></canvas>
</div>
</div>
</div>

<div id="rightPanel">
<div id="layersPanel">
<div class="panel-section" style="border-bottom:none">
<div class="panel-title">Layers</div>
</div>
<div id="layersList"></div>
<div id="layerControls">
<button id="addLayer" title="Add Layer">+</button>
<button id="deleteLayer" title="Delete Layer">🗑</button>
<button id="moveLayerUp" title="Move Up">↑</button>
<button id="moveLayerDown" title="Move Down">↓</button>
<button id="mergeDown" title="Merge Down">⊕</button>
</div>
</div>
</div>

<div id="statusBar">
<span id="cursorPos">X: 0, Y: 0</span>
<span id="canvasSize">1920 × 1080</span>
<span id="toolInfo">Brush</span>
</div>

<script>
const state = {
    tool: 'brush',
    color: '#00D4FF',
    hue: 190,
    size: 10,
    opacity: 100,
    hardness: 100,
    drawing: false,
    lastX: 0,
    lastY: 0,
    zoom: 1,
    canvasW: 1920,
    canvasH: 1080,
    layers: [],
    activeLayer: 0,
    history: [],
    historyIndex: -1,
    maxHistory: 50,
    recentColors: [],
    symmetryX: false,
    symmetryY: false,
    smoothing: true,
    smoothPoints: [],
    shapeStart: null,
    selection: null
};

const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const previewCanvas = document.getElementById('previewCanvas');
const bgCtx = bgCanvas.getContext('2d');
const mainCtx = mainCanvas.getContext('2d');
const previewCtx = previewCanvas.getContext('2d');
const colorMain = document.getElementById('colorMain');
const colorStrip = document.getElementById('colorStrip');
const colorMainCtx = colorMain.getContext('2d');
const colorStripCtx = colorStrip.getContext('2d');

function initCanvas(w, h) {
    state.canvasW = w;
    state.canvasH = h;
    [bgCanvas, mainCanvas, previewCanvas].forEach(c => {
        c.width = w;
        c.height = h;
    });
    drawCheckerboard();
    state.layers = [];
    addLayer('Background', '#FFFFFF');
    document.getElementById('canvasSize').textContent = `${w} × ${h}`;
    state.history = [];
    state.historyIndex = -1;
    saveHistory();
}

function drawCheckerboard() {
    const size = 10;
    for(let y = 0; y < state.canvasH; y += size) {
        for(let x = 0; x < state.canvasW; x += size) {
            bgCtx.fillStyle = ((x/size + y/size) % 2 === 0) ? '#ccc' : '#fff';
            bgCtx.fillRect(x, y, size, size);
        }
    }
}

function addLayer(name = `Layer ${state.layers.length + 1}`, fill = null) {
    const canvas = document.createElement('canvas');
    canvas.width = state.canvasW;
    canvas.height = state.canvasH;
    const ctx = canvas.getContext('2d');
    if(fill) {
        ctx.fillStyle = fill;
        ctx.fillRect(0, 0, state.canvasW, state.canvasH);
    }
    state.layers.push({ name, canvas, ctx, visible: true, opacity: 100 });
    state.activeLayer = state.layers.length - 1;
    renderLayers();
    updateLayersList();
}

function renderLayers() {
    mainCtx.clearRect(0, 0, state.canvasW, state.canvasH);
    state.layers.forEach(layer => {
        if(layer.visible) {
            mainCtx.globalAlpha = layer.opacity / 100;
            mainCtx.drawImage(layer.canvas, 0, 0);
        }
    });
    mainCtx.globalAlpha = 1;
}

function updateLayersList() {
    const list = document.getElementById('layersList');
    list.innerHTML = '';
    [...state.layers].reverse().forEach((layer, i) => {
        const realIndex = state.layers.length - 1 - i;
        const div = document.createElement('div');
        div.className = `layer ${realIndex === state.activeLayer ? 'active' : ''}`;
        div.innerHTML = `
            <canvas class="layer-preview" width="40" height="30"></canvas>
            <span class="layer-name">${layer.name}</span>
            <span class="layer-visibility">${layer.visible ? '👁️' : '👁️‍🗨️'}</span>
        `;
        const preview = div.querySelector('.layer-preview');
        const pCtx = preview.getContext('2d');
        pCtx.fillStyle = '#888';
        pCtx.fillRect(0, 0, 40, 30);
        pCtx.drawImage(layer.canvas, 0, 0, 40, 30);
        
        div.querySelector('.layer-name').onclick = () => {
            state.activeLayer = realIndex;
            updateLayersList();
        };
        div.querySelector('.layer-visibility').onclick = (e) => {
            e.stopPropagation();
            layer.visible = !layer.visible;
            renderLayers();
            updateLayersList();
        };
        list.appendChild(div);
    });
}

function saveHistory() {
    state.historyIndex++;
    state.history = state.history.slice(0, state.historyIndex);
    const snapshot = state.layers.map(l => {
        const c = document.createElement('canvas');
        c.width = state.canvasW;
        c.height = state.canvasH;
        c.getContext('2d').drawImage(l.canvas, 0, 0);
        return { ...l, canvas: c, ctx: c.getContext('2d') };
    });
    state.history.push(snapshot);
    if(state.history.length > state.maxHistory) {
        state.history.shift();
        state.historyIndex--;
    }
}

function undo() {
    if(state.historyIndex > 0) {
        state.historyIndex--;
        restoreHistory();
    }
}

function redo() {
    if(state.historyIndex < state.history.length - 1) {
        state.historyIndex++;
        restoreHistory();
    }
}

function restoreHistory() {
    const snapshot = state.history[state.historyIndex];
    state.layers = snapshot.map(l => {
        const c = document.createElement('canvas');
        c.width = state.canvasW;
        c.height = state.canvasH;
        c.getContext('2d').drawImage(l.canvas, 0, 0);
        return { ...l, canvas: c, ctx: c.getContext('2d') };
    });
    renderLayers();
    updateLayersList();
}

function initColorPicker() {
    colorMain.width = 220;
    colorMain.height = 150;
    colorStrip.width = 220;
    colorStrip.height = 20;
    
    drawColorMain();
    drawColorStrip();
}

function drawColorMain() {
    const w = colorMain.width, h = colorMain.height;
    colorMainCtx.fillStyle = `hsl(${state.hue}, 100%, 50%)`;
    colorMainCtx.fillRect(0, 0, w, h);
    
    const whiteGrad = colorMainCtx.createLinearGradient(0, 0, w, 0);
    whiteGrad.addColorStop(0, 'white');
    whiteGrad.addColorStop(1, 'transparent');
    colorMainCtx.fillStyle = whiteGrad;
    colorMainCtx.fillRect(0, 0, w, h);
    
    const blackGrad = colorMainCtx.createLinearGradient(0, 0, 0, h);
    blackGrad.addColorStop(0, 'transparent');
    blackGrad.addColorStop(1, 'black');
    colorMainCtx.fillStyle = blackGrad;
    colorMainCtx.fillRect(0, 0, w, h);
}

function drawColorStrip() {
    const w = colorStrip.width, h = colorStrip.height;
    const grad = colorStripCtx.createLinearGradient(0, 0, w, 0);
    for(let i = 0; i <= 360; i += 60) {
        grad.addColorStop(i / 360, `hsl(${i}, 100%, 50%)`);
    }
    colorStripCtx.fillStyle = grad;
    colorStripCtx.fillRect(0, 0, w, h);
}

colorStrip.addEventListener('click', e => {
    const rect = colorStrip.getBoundingClientRect();
    state.hue = ((e.clientX - rect.left) / rect.width) * 360;
    drawColorMain();
});

colorMain.addEventListener('click', e => {
    const rect = colorMain.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const pixel = colorMainCtx.getImageData(x, y, 1, 1).data;
    setColor(`rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`);
});

function setColor(c) {
    state.color = c;
    const hex = rgbToHex(c);
    document.getElementById('currentColor').style.background = c;
    document.getElementById('hexInput').value = hex;
    addRecentColor(hex);
}

function rgbToHex(rgb) {
    if(rgb.startsWith('#')) return rgb;
    const match = rgb.match(/\d+/g);
    if(!match) return '#000000';
    return '#' + match.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('').toUpperCase();
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return { r, g, b };
}

document.getElementById('hexInput').addEventListener('change', e => {
    let val = e.target.value;
    if(!val.startsWith('#')) val = '#' + val;
    if(/^#[0-9A-Fa-f]{6}$/.test(val)) {
        setColor(val);
    }
});

function addRecentColor(hex) {
    state.recentColors = state.recentColors.filter(c => c !== hex);
    state.recentColors.unshift(hex);
    state.recentColors = state.recentColors.slice(0, 12);
    renderRecentColors();
}

function renderRecentColors() {
    const container = document.getElementById('recentColors');
    container.innerHTML = state.recentColors.map(c => 
        `<div class="recent-color" style="background:${c}" data-color="${c}"></div>`
    ).join('');
    container.querySelectorAll('.recent-color').forEach(el => {
        el.onclick = () => setColor(el.dataset.color);
    });
}

document.querySelectorAll('.tool').forEach(el => {
    el.onclick = () => selectTool(el.dataset.tool);
});

function selectTool(tool) {
    state.tool = tool;
    document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tool="${tool}"]`).classList.add('active');
    document.getElementById('toolInfo').textContent = tool.charAt(0).toUpperCase() + tool.slice(1);
    previewCanvas.style.cursor = tool === 'picker' ? 'crosshair' : tool === 'move' ? 'grab' : 'crosshair';
}

['brushSize', 'brushOpacity', 'brushHardness'].forEach(id => {
    const el = document.getElementById(id);
    const prop = id.replace('brush', '').toLowerCase();
    el.oninput = () => {
        state[prop] = parseInt(el.value);
        document.getElementById(prop + 'Val').textContent = el.value;
        updateBrushPreview();
    };
});

function updateBrushPreview() {
    const dot = document.getElementById('brushDot');
    const size = Math.min(state.size, 50);
    dot.style.width = size + 'px';
    dot.style.height = size + 'px';
    dot.style.opacity = state.opacity / 100;
    dot.style.background = state.color;
}

document.getElementById('symmetryX').onchange = e => state.symmetryX = e.target.checked;
document.getElementById('symmetryY').onchange = e => state.symmetryY = e.target.checked;
document.getElementById('smoothing').onchange = e => state.smoothing = e.target.checked;
document.getElementById('showGrid').onchange = e => drawGrid(e.target.checked);

function drawGrid(show) {
    previewCtx.clearRect(0, 0, state.canvasW, state.canvasH);
    if(!show) return;
    previewCtx.strokeStyle = 'rgba(0,0,0,0.2)';
    previewCtx.lineWidth = 1;
    const step = 50;
    for(let x = 0; x <= state.canvasW; x += step) {
        previewCtx.beginPath();
        previewCtx.moveTo(x, 0);
        previewCtx.lineTo(x, state.canvasH);
        previewCtx.stroke();
    }
    for(let y = 0; y <= state.canvasH; y += step) {
        previewCtx.beginPath();
        previewCtx.moveTo(0, y);
        previewCtx.lineTo(state.canvasW, y);
        previewCtx.stroke();
    }
}

const wrapper = document.getElementById('canvasWrapper');
const container = document.getElementById('canvasContainer');

function setZoom(z) {
    state.zoom = Math.max(0.1, Math.min(5, z));
    wrapper.style.transform = `scale(${state.zoom})`;
    document.getElementById('zoomLevel').textContent = Math.round(state.zoom * 100) + '%';
}

document.getElementById('zoomIn').onclick = () => setZoom(state.zoom * 1.25);
document.getElementById('zoomOut').onclick = () => setZoom(state.zoom / 1.25);
document.getElementById('zoomFit').onclick = () => {
    const cw = container.clientWidth - 40;
    const ch = container.clientHeight - 40;
    setZoom(Math.min(cw / state.canvasW, ch / state.canvasH));
};

document.getElementById('newBtn').onclick = () => {
    const w = prompt('Width:', state.canvasW);
    const h = prompt('Height:', state.canvasH);
    if(w && h) initCanvas(parseInt(w), parseInt(h));
};

document.getElementById('undoBtn').onclick = undo;
document.getElementById('redoBtn').onclick = redo;
document.getElementById('clearBtn').onclick = () => {
    const layer = state.layers[state.activeLayer];
    layer.ctx.clearRect(0, 0, state.canvasW, state.canvasH);
    renderLayers();
    saveHistory();
};

document.getElementById('saveBtn').onclick = () => {
    const link = document.createElement('a');
    link.download = 'artwork.png';
    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = state.canvasW;
    exportCanvas.height = state.canvasH;
    const exportCtx = exportCanvas.getContext('2d');
    state.layers.forEach(layer => {
        if(layer.visible) {
            exportCtx.globalAlpha = layer.opacity / 100;
            exportCtx.drawImage(layer.canvas, 0, 0);
        }
    });
    link.href = exportCanvas.toDataURL('image/png');
    link.click();
};

document.getElementById('addLayer').onclick = () => { addLayer(); saveHistory(); };
document.getElementById('deleteLayer').onclick = () => {
    if(state.layers.length > 1) {
        state.layers.splice(state.activeLayer, 1);
        state.activeLayer = Math.min(state.activeLayer, state.layers.length - 1);
        renderLayers();
        updateLayersList();
        saveHistory();
    }
};
document.getElementById('moveLayerUp').onclick = () => {
    if(state.activeLayer < state.layers.length - 1) {
        [state.layers[state.activeLayer], state.layers[state.activeLayer + 1]] = 
        [state.layers[state.activeLayer + 1], state.layers[state.activeLayer]];
        state.activeLayer++;
        renderLayers();
        updateLayersList();
    }
};
document.getElementById('moveLayerDown').onclick = () => {
    if(state.activeLayer > 0) {
        [state.layers[state.activeLayer], state.layers[state.activeLayer - 1]] = 
        [state.layers[state.activeLayer - 1], state.layers[state.activeLayer]];
        state.activeLayer--;
        renderLayers();
        updateLayersList();
    }
};
document.getElementById('mergeDown').onclick = () => {
    if(state.activeLayer > 0) {
        const upper = state.layers[state.activeLayer];
        const lower = state.layers[state.activeLayer - 1];
        lower.ctx.drawImage(upper.canvas, 0, 0);
        state.layers.splice(state.activeLayer, 1);
        state.activeLayer--;
        renderLayers();
        updateLayersList();
        saveHistory();
    }
};

function getCanvasCoords(e) {
    const rect = previewCanvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) / state.zoom,
        y: (e.clientY - rect.top) / state.zoom
    };
}

previewCanvas.addEventListener('mousedown', e => {
    const pos = getCanvasCoords(e);
    state.drawing = true;
    state.lastX = pos.x;
    state.lastY = pos.y;
    state.smoothPoints = [pos];
    state.shapeStart = pos;
    
    if(state.tool === 'picker') {
        pickColor(pos.x, pos.y);
        return;
    }
    
    if(state.tool === 'fill') {
        floodFill(Math.floor(pos.x), Math.floor(pos.y));
        return;
    }
    
    if(state.tool === 'text') {
        const text = prompt('Enter text:');
        if(text) {
            const layer = state.layers[state.activeLayer];
            layer.ctx.font = `${state.size * 3}px Arial`;
            layer.ctx.fillStyle = state.color;
            layer.ctx.globalAlpha = state.opacity / 100;
            layer.ctx.fillText(text, pos.x, pos.y);
            layer.ctx.globalAlpha = 1;
            renderLayers();
            saveHistory();
        }
        return;
    }
    
    if(['brush', 'pencil', 'eraser', 'spray'].includes(state.tool)) {
        draw(pos.x, pos.y);
    }
});

previewCanvas.addEventListener('mousemove', e => {
    const pos = getCanvasCoords(e);
    document.getElementById('cursorPos').textContent = `X: ${Math.round(pos.x)}, Y: ${Math.round(pos.y)}`;
    
    if(!state.drawing) return;
    
    if(['line', 'rect', 'ellipse', 'select'].includes(state.tool)) {
        drawShapePreview(pos);
        return;
    }
    
    if(state.smoothing && ['brush', 'spray'].includes(state.tool)) {
        state.smoothPoints.push(pos);
        if(state.smoothPoints.length > 3) {
            const p = state.smoothPoints;
            const smoothX = (p[p.length-3].x + p[p.length-2].x + p[p.length-1].x) / 3;
            const smoothY = (p[p.length-3].y + p[p.length-2].y + p[p.length-1].y) / 3;
            drawLine(state.lastX, state.lastY, smoothX, smoothY);
            state.lastX = smoothX;
            state.lastY = smoothY;
        }
    } else {
        drawLine(state.lastX, state.lastY, pos.x, pos.y);
        state.lastX = pos.x;
        state.lastY = pos.y;
    }
});

previewCanvas.addEventListener('mouseup', e => {
    if(state.drawing) {
        const pos = getCanvasCoords(e);
        
        if(state.tool === 'line') {
            const layer = state.layers[state.activeLayer];
            layer.ctx.strokeStyle = state.color;
            layer.ctx.lineWidth = state.size;
            layer.ctx.lineCap = 'round';
            layer.ctx.globalAlpha = state.opacity / 100;
            layer.ctx.beginPath();
            layer.ctx.moveTo(state.shapeStart.x, state.shapeStart.y);
            layer.ctx.lineTo(pos.x, pos.y);
            layer.ctx.stroke();
            layer.ctx.globalAlpha = 1;
            previewCtx.clearRect(0, 0, state.canvasW, state.canvasH);
            renderLayers();
        }
        
        if(state.tool === 'rect') {
            const layer = state.layers[state.activeLayer];
            layer.ctx.strokeStyle = state.color;
            layer.ctx.lineWidth = state.size;
            layer.ctx.globalAlpha = state.opacity / 100;
            layer.ctx.strokeRect(
                state.shapeStart.x, state.shapeStart.y,
                pos.x - state.shapeStart.x, pos.y - state.shapeStart.y
            );
            layer.ctx.globalAlpha = 1;
            previewCtx.clearRect(0, 0, state.canvasW, state.canvasH);
            renderLayers();
        }
        
        if(state.tool === 'ellipse') {
            const layer = state.layers[state.activeLayer];
            const cx = (state.shapeStart.x + pos.x) / 2;
            const cy = (state.shapeStart.y + pos.y) / 2;
            const rx = Math.abs(pos.x - state.shapeStart.x) / 2;
            const ry = Math.abs(pos.y - state.shapeStart.y) / 2;
            layer.ctx.strokeStyle = state.color;
            layer.ctx.lineWidth = state.size;
            layer.ctx.globalAlpha = state.opacity / 100;
            layer.ctx.beginPath();
            layer.ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            layer.ctx.stroke();
            layer.ctx.globalAlpha = 1;
            previewCtx.clearRect(0, 0, state.canvasW, state.canvasH);
            renderLayers();
        }
        
        saveHistory();
    }
    state.drawing = false;
});

previewCanvas.addEventListener('mouseleave', () => {
    if(state.drawing && ['line', 'rect', 'ellipse'].includes(state.tool)) return;
    state.drawing = false;
});

function draw(x, y) {
    const layer = state.layers[state.activeLayer];
    const ctx = layer.ctx;
    
    ctx.globalAlpha = state.opacity / 100;
    
    if(state.tool === 'eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,1)';
    } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = state.color;
    }
    
    if(state.tool === 'pencil') {
        ctx.fillRect(Math.floor(x), Math.floor(y), Math.max(1, state.size/2), Math.max(1, state.size/2));
    } else if(state.tool === 'spray') {
        for(let i = 0; i < state.size * 2; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * state.size;
            ctx.fillRect(x + Math.cos(angle) * radius, y + Math.sin(angle) * radius, 1, 1);
        }
    } else {
        ctx.beginPath();
        ctx.arc(x, y, state.size / 2, 0, Math.PI * 2);
        ctx.fill();
    }
    
    if(state.symmetryX) {
        const mx = state.canvasW - x;
        if(state.tool === 'pencil') {
            ctx.fillRect(Math.floor(mx), Math.floor(y), Math.max(1, state.size/2), Math.max(1, state.size/2));
        } else {
            ctx.beginPath();
            ctx.arc(mx, y, state.size / 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    if(state.symmetryY) {
        const my = state.canvasH - y;
        if(state.tool === 'pencil') {
            ctx.fillRect(Math.floor(x), Math.floor(my), Math.max(1, state.size/2), Math.max(1, state.size/2));
        } else {
            ctx.beginPath();
            ctx.arc(x, my, state.size / 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    if(state.symmetryX && state.symmetryY) {
        const mx = state.canvasW - x;
        const my = state.canvasH - y;
        ctx.beginPath();
        ctx.arc(mx, my, state.size / 2, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    renderLayers();
}

function drawLine(x1, y1, x2, y2) {
    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const steps = Math.max(1, Math.floor(dist / (state.size / 4)));
    for(let i = 0; i <= steps; i++) {
        const t = i / steps;
        draw(x1 + (x2-x1) * t, y1 + (y2-y1) * t);
    }
}

function drawShapePreview(pos) {
    previewCtx.clearRect(0, 0, state.canvasW, state.canvasH);
    previewCtx.strokeStyle = state.color;
    previewCtx.lineWidth = state.size;
    previewCtx.globalAlpha = state.opacity / 100;
    previewCtx.setLineDash([5, 5]);
    
    if(state.tool === 'line') {
        previewCtx.beginPath();
        previewCtx.moveTo(state.shapeStart.x, state.shapeStart.y);
        previewCtx.lineTo(pos.x, pos.y);
        previewCtx.stroke();
    }
    
    if(state.tool === 'rect' || state.tool === 'select') {
        previewCtx.strokeRect(
            state.shapeStart.x, state.shapeStart.y,
            pos.x - state.shapeStart.x, pos.y - state.shapeStart.y
        );
    }
    
    if(state.tool === 'ellipse') {
        const cx = (state.shapeStart.x + pos.x) / 2;
        const cy = (state.shapeStart.y + pos.y) / 2;
        const rx = Math.abs(pos.x - state.shapeStart.x) / 2;
        const ry = Math.abs(pos.y - state.shapeStart.y) / 2;
        previewCtx.beginPath();
        previewCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        previewCtx.stroke();
    }
    
    previewCtx.setLineDash([]);
    previewCtx.globalAlpha = 1;
}

function pickColor(x, y) {
    const pixel = mainCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
    setColor(`rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`);
}

function floodFill(startX, startY) {
    const layer = state.layers[state.activeLayer];
    const imageData = layer.ctx.getImageData(0, 0, state.canvasW, state.canvasH);
    const data = imageData.data;
    
    const startIdx = (startY * state.canvasW + startX) * 4;
    const startR = data[startIdx];
    const startG = data[startIdx + 1];
    const startB = data[startIdx + 2];
    
    const fillColor = hexToRgb(rgbToHex(state.color));
    
    if(startR === fillColor.r && startG === fillColor.g && startB === fillColor.b) return;
    
    const stack = [[startX, startY]];
    const visited = new Set();
    
    while(stack.length > 0) {
        const [x, y] = stack.pop();
        const key = `${x},${y}`;
        
        if(x < 0 || x >= state.canvasW || y < 0 || y >= state.canvasH) continue;
        if(visited.has(key)) continue;
        
        const idx = (y * state.canvasW + x) * 4;
        if(Math.abs(data[idx] - startR) > 30 || 
           Math.abs(data[idx + 1] - startG) > 30 || 
           Math.abs(data[idx + 2] - startB) > 30) continue;
        
        visited.add(key);
        data[idx] = fillColor.r;
        data[idx + 1] = fillColor.g;
        data[idx + 2] = fillColor.b;
        data[idx + 3] = 255;
        
        stack.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
    }
    
    layer.ctx.putImageData(imageData, 0, 0);
    renderLayers();
    saveHistory();
}

document.addEventListener('keydown', e => {
    if(e.target.tagName === 'INPUT') return;
    
    const key = e.key.toLowerCase();
    const ctrl = e.ctrlKey || e.metaKey;
    
    if(ctrl && key === 'z') { e.preventDefault(); undo(); }
    if(ctrl && key === 'y') { e.preventDefault(); redo(); }
    if(ctrl && key === 's') { e.preventDefault(); document.getElementById('saveBtn').click(); }
    
    if(key === 'b') selectTool('brush');
    if(key === 'p') selectTool('pencil');
    if(key === 'e') selectTool('eraser');
    if(key === 's' && !ctrl) selectTool('spray');
    if(key === 'l') selectTool('line');
    if(key === 'r') selectTool('rect');
    if(key === 'o') selectTool('ellipse');
    if(key === 'g') selectTool('fill');
    if(key === 'i') selectTool('picker');
    if(key === 't') selectTool('text');
    if(key === 'v') selectTool('move');
    if(key === 'm') selectTool('select');
    
    if(key === '[') { state.size = Math.max(1, state.size - 5); document.getElementById('brushSize').value = state.size; document.getElementById('sizeVal').textContent = state.size; updateBrushPreview(); }
    if(key === ']') { state.size = Math.min(200, state.size + 5); document.getElementById('brushSize').value = state.size; document.getElementById('sizeVal').textContent = state.size; updateBrushPreview(); }
});

container.addEventListener('wheel', e => {
    if(e.ctrlKey) {
        e.preventDefault();
        setZoom(state.zoom * (e.deltaY > 0 ? 0.9 : 1.1));
    }
});

initCanvas(1920, 1080);
initColorPicker();
setColor('#00D4FF');
updateBrushPreview();

wrapper.style.transformOrigin = 'center center';
setTimeout(() => document.getElementById('zoomFit').click(), 100);
</script>
</body>
