<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #121212;
            color: #ffffff;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
        }
        #accountData, #swapSection {
            margin-top: 20px;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 5px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Solana Account Dashboard</h1>
    <button id="connectButton">Connect to Phantom Wallet</button>

    <div id="accountData">
        <p>Account data will appear here after connecting.</p>
    </div>

    <div id="swapSection">
        <h2>Swap SOL to Token (k8o5)</h2>
        <input type="number" id="swapAmount" placeholder="Amount of SOL to swap" min="0" step="0.01">
        <button id="swapButton">Swap</button>
        <p id="swapStatus"></p>
    </div>

    <!-- Include Solana Web3.js -->
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
    <!-- Include Jupiter Aggregator SDK (for swaps) -->
    <script src="https://cdn.jsdelivr.net/npm/@jup-ag/core/dist/index.iife.js"></script>

    <script>
        let publicKey = null;
        let connection = null;

        // Connect to Phantom Wallet
        document.getElementById('connectButton').addEventListener('click', async () => {
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    alert('Phantom Wallet is not installed!');
                    return;
                }

                // Connect to Phantom
                const response = await window.solana.connect();
                publicKey = response.publicKey.toString();
                connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl('mainnet-beta'));

                // Fetch account data
                const balance = await connection.getBalance(new solanaWeb3.PublicKey(publicKey));
                const tokens = await getTokenAccounts(publicKey);

                // Display account data
                document.getElementById('accountData').innerHTML = `
                    <p><strong>Connected Account:</strong> ${publicKey}</p>
                    <p><strong>Balance:</strong> ${balance / solanaWeb3.LAMPORTS_PER_SOL} SOL</p>
                    <p><strong>Tokens:</strong></p>
                    <ul>
                        ${tokens.map(token => `<li>${token.mint}: ${token.amount}</li>`).join('')}
                    </ul>
                `;

            } catch (error) {
                console.error('Error connecting to Phantom Wallet:', error);
                alert('Failed to connect to Phantom Wallet.');
            }
        });

        // Swap SOL to Token (k8o5)
        document.getElementById('swapButton').addEventListener('click', async () => {
            try {
                if (!publicKey) {
                    alert('Please connect your wallet first.');
                    return;
                }

                const amount = parseFloat(document.getElementById('swapAmount').value);
                if (isNaN(amount) || amount <= 0) {
                    alert('Please enter a valid amount of SOL to swap.');
                    return;
                }

                document.getElementById('swapStatus').innerText = 'Swapping...';

                // Perform the swap using Jupiter Aggregator
                const swapResult = await swapSOLToToken(publicKey, amount, 'k8o5'); // Replace 'k8o5' with the actual token address

                document.getElementById('swapStatus').innerText = `Swap successful! Tx ID: ${swapResult.txId}`;

            } catch (error) {
                console.error('Error swapping tokens:', error);
                document.getElementById('swapStatus').innerText = 'Swap failed. Please try again.';
            }
        });

        // Function to fetch token accounts
        async function getTokenAccounts(publicKey) {
            const response = await connection.getParsedTokenAccountsByOwner(
                new solanaWeb3.PublicKey(publicKey),
                { programId: new solanaWeb3.PublicKey('TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA') }
            );
            return response.value.map(account => ({
                mint: account.account.data.parsed.info.mint,
                amount: account.account.data.parsed.info.tokenAmount.uiAmount,
            }));
        }

        // Function to swap SOL to Token using Jupiter Aggregator
        async function swapSOLToToken(publicKey, amount, tokenAddress) {
            const jupiter = window.Jupiter;
            const swapResult = await jupiter.swap({
                inputMint: 'So11111111111111111111111111111111111111112', // SOL mint address
                outputMint: tokenAddress, // Token mint address
                amount: amount * solanaWeb3.LAMPORTS_PER_SOL, // Amount in lamports
                slippage: 1, // 1% slippage
                userPublicKey: publicKey,
            });

            return swapResult;
        }
    </script>
</body>
</html>
