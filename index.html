    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            position: relative;
        }

        /* Centered Chart Container */
        #chart-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            z-index: 1;
        }

        #dexscreener-embed {
            position: relative;
            width: 100%;
            padding-bottom: 65%; /* Adjusted for better center proportions */
        }

        @media (min-width: 1400px) {
            #dexscreener-embed {
                padding-bottom: 45%;
            }
        }

        #dexscreener-embed iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: 0;
            pointer-events: none;
            border-radius: 12px; /* Optional rounded corners */
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Optional subtle shadow */
        }
    </style>
</head>
