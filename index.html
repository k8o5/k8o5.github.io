    async function pythonizer_appendToConsole(type, textContent, codeToRun = null) {
        if (!pythonizer_consoleOutput) return;
        const entryDiv = document.createElement('div');
        let htmlContent = "";

        if (type === 'user') {
            htmlContent = `<strong>USER:</strong><div>${marked(textContent, { renderer: pythonizer_customMarkedRenderer })}</div>`;
        } else if (type === 'agent_text') {
            htmlContent = `<strong>PYTHONIZER:</strong><div>${marked(textContent, { renderer: pythonizer_customMarkedRenderer })}</div>`;
        } else if (type === 'python_block' && codeToRun) {
            pythonizer_codeBlockCounter++;
            const blockId = `pyblock-${pythonizer_codeBlockCounter}`;
            pythonizer_lastPythonCode = codeToRun; // Store for potential Python Pad use
            htmlContent = `
                <div class="pythonizer-block" id="${blockId}-container">
                    <strong>PYTHONIZER (Proposed Code Block ${pythonizer_codeBlockCounter}):</strong>
                    <pre><code>${codeToRun.replace(/</g, "<").replace(/>/g, ">")}</code></pre>
                    <div class="pythonizer-block-actions">
                        <button class="run-py-block" data-block-id="${blockId}" data-code="${encodeURIComponent(codeToRun)}">Run (Simulate)</button>
                        <button class="download-py-block" data-code="${encodeURIComponent(codeToRun)}">Download .py</button>
                        <button class="open-in-pad-block" data-code="${encodeURIComponent(codeToRun)}">Open in PyPad</button>
                    </div>
                    <div class="pythonizer-block-output" id="${blockId}-output">Awaiting simulation...</div>
                </div>`;
        } else if (type === 'info') {
            htmlContent = `<strong>SYSTEM INFO:</strong><p>${textContent}</p>`;
        }  else if (type === 'error') {
            htmlContent = `<strong style="color:red;">PYTHONIZER ERROR:</strong><p style="color:red;">${textContent}</p>`;
        }
        entryDiv.innerHTML = htmlContent;
        pythonizer_consoleOutput.appendChild(entryDiv);
        pythonizer_consoleOutput.scrollTop = pythonizer_consoleOutput.scrollHeight;

        entryDiv.querySelectorAll('.run-py-block').forEach(button => {
            button.addEventListener('click', async (e) => {

                const execPrompt = DEFAULT_PYTHONPAD_EXEC_INSTRUCTION.replace("{PYTHON_CODE}", code);
                try {

                    if (outputEl) outputEl.textContent = result.response.text();
                } catch (err) {
                    if (outputEl) outputEl.textContent = `Simulation Error: ${err.message}`;
                }
            });
        });
        entryDiv.querySelectorAll('.download-py-block').forEach(button => {
            button.addEventListener('click', (e) => downloadFile(decodeURIComponent(e.target.dataset.code), `pythonizer_block_${pythonizer_codeBlockCounter}.py`, "text/python"));
        });
        entryDiv.querySelectorAll('.open-in-pad-block').forEach(button => {

            });
        });

    async function pythonizer_runWorkflow(initialGoal) {
        if (!pythonizer_startTaskButton || !pythonizer_goalInput || !pythonizer_consoleOutput || !pythonizer_errorDisplay) return;
        pythonizer_startTaskButton.disabled = true; pythonizer_startTaskButton.textContent = "Processing...";
        if (pythonizer_goalInput) pythonizer_goalInput.disabled = true;
        pythonizer_updateStatus("Processing..."); 
        if(pythonizer_consoleOutput.textContent.includes("output appears here")) pythonizer_consoleOutput.innerHTML = ''; 
        pythonizer_errorDisplay.textContent = "";
        pythonizer_codeBlockCounter = 0; // Reset block counter for new task
        await pythonizer_appendToConsole('info', "Pythonizer workflow started...");

        if (!pythonizer_genAI_model) { await pythonizer_appendToConsole('error', "Pythonizer AI Model not ready!"); pythonizer_startTaskButton.disabled = false; pythonizer_startTaskButton.textContent = "Start Task"; if(pythonizer_goalInput) pythonizer_goalInput.disabled = false; pythonizer_updateStatus("Error: Model Not Ready"); return; }
        
        try {
             const genAI = new GoogleGenerativeAI(window.GLOBAL_API_KEY);
             pythonizer_genAI_model = genAI.getGenerativeModel({ model: getCurrentAiModel(), systemInstruction: getAppInstruction('pythonizer', DEFAULT_PYTHONIZER_INSTRUCTION).replace("{USER_GOAL}", initialGoal), tools: [{ codeExecution: {} }], safetySettings: [{ category: HarmCategory.HARM_CATEGORY_HARASSMENT, threshold: HarmBlockThreshold.BLOCK_NONE },{ category: HarmCategory.HARM_CATEGORY_HATE_SPEECH, threshold: HarmBlockThreshold.BLOCK_NONE },{ category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT, threshold: HarmBlockThreshold.BLOCK_NONE },{ category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT, threshold: HarmBlockThreshold.BLOCK_NONE },], generationConfig: { temperature: 0.2, maxOutputTokens: 80000 } });
        } catch (error) { console.error("Pythonizer AI re-init Error:", error); if (pythonizer_errorDisplay) pythonizer_errorDisplay.textContent = `AI Re-init Error: ${error.message}.`; pythonizer_startTaskButton.disabled = false; pythonizer_startTaskButton.textContent = "Start Task"; if(pythonizer_goalInput) pythonizer_goalInput.disabled = false; pythonizer_updateStatus("Error: AI Re-init Failed"); return; }

        pythonizer_conversationHistory = [{ role: "user", parts: [{ text: initialGoal }] }];
        await pythonizer_appendToConsole('user', initialGoal);

        for (let i = 0; i < PYTHONIZER_MAX_ITERATIONS; i++) { // Corrected variable
            pythonizer_updateStatus("Processing...");
            await pythonizer_appendToConsole('info', `Iteration: ${i + 1}`);
            try {
                const chat = pythonizer_genAI_model.startChat({ history: pythonizer_conversationHistory, tools: [{codeExecution: {}}]});
                const result = await chat.sendMessage("Continue based on the goal and history. Propose the next logical Python code block if appropriate, or provide textual explanation/final answer.");
                const response = result.response; const candidate = response.candidates?.[0];
                if (!candidate || !candidate.content || !candidate.content.parts) { await pythonizer_appendToConsole('error', "No valid candidate response from AI."); pythonizer_conversationHistory.push({role: "model", parts: [{text: "Error: No valid response."}]}); pythonizer_updateStatus("Error: No AI Response"); break; }
                
                pythonizer_conversationHistory.push(candidate.content);
                let hasCodeProposal = false;
                for (const part of candidate.content.parts) {
                    if (part.text) { const currentAgentText = part.text.trim(); if (currentAgentText) { await pythonizer_appendToConsole('agent_text', currentAgentText); }}
                    else if (part.executableCode) { await pythonizer_appendToConsole('python_block', "Proposed Python Code", part.executableCode.code || ''); hasCodeProposal = true; }
                    else { if (Object.keys(part).length > 0) { console.warn("Pythonizer - Unknown part:", JSON.stringify(part, null, 2)); await pythonizer_appendToConsole('info', `Unhandled part: ${JSON.stringify(part).substring(0, 100)}...`); }}
                }
                const finishReason = candidate.finishReason; const lastTextContent = candidate.content.parts.filter(p=>p.text).map(p => p.text || "").join("\n").toLowerCase();
                if (finishReason === "STOP" && (lastTextContent.includes("final answer:") || lastTextContent.includes("goal achieved") || lastTextContent.includes("task complete") || (!hasCodeProposal && lastTextContent.length > 0) )) { pythonizer_updateStatus(lastTextContent.includes("final answer:") || lastTextContent.includes("goal achieved") ? "Completed" : "Info"); break; }
                else if (finishReason === "SAFETY") { await pythonizer_appendToConsole('error', "Stopped: SAFETY settings."); pythonizer_updateStatus("Error: Safety Stop"); break; }
                else if (finishReason === "MAX_TOKENS") { await pythonizer_appendToConsole('info', "Stopped: MAX_TOKENS."); }
                else if (finishReason && finishReason !== "TOOL_CALLS" && finishReason !== "STOP" && finishReason !== "MODEL_LENGTH") { await pythonizer_appendToConsole('info', `Workflow stopped: ${finishReason}.`); pythonizer_updateStatus(`Error: ${finishReason}`); break; }
                if (i === PYTHONIZER_MAX_ITERATIONS - 1) { await pythonizer_appendToConsole('info', "Reached max iterations."); pythonizer_updateStatus("Error: Max Iterations"); }
            } catch (e) { console.error("Pythonizer Iteration Error:", e); await pythonizer_appendToConsole('error', `Iteration Error: ${e.message}`); pythonizer_conversationHistory.push({role: "model", parts: [{text: `Critical Error: ${e.message}`}]}); pythonizer_updateStatus("Error: Iteration Failed"); break; }
        }
        await pythonizer_appendToConsole('info', `Workflow finished. Status: ${pythonizer_statusPanel?.textContent || 'Unknown'}`);
        pythonizer_startTaskButton.disabled = false; pythonizer_startTaskButton.textContent = "Start New Task"; if (pythonizer_goalInput) pythonizer_goalInput.disabled = false;
    }

                const planResult = await gameGen_main_model.generateContent(planPrompt); const planResponseText = planResult.response.text().trim();
                let gamePlan;
                try { const cleanedJsonString = planResponseText.replace(/```json\n?/g, "").replace(/```\n?/g, ""); gamePlan = JSON.parse(cleanedJsonString); if (!gamePlan.game_mechanic || !Array.isArray(gamePlan.svg_assets) || gamePlan.svg_assets.length < 3 || gamePlan.svg_assets.length > 5 || !Array.isArray(gamePlan.sound_effects) || gamePlan.sound_effects.length < 2 || gamePlan.sound_effects.length > 3) { throw new Error("Invalid plan structure or asset/sound count."); }
                } catch (e) { console.error("Error parsing game plan JSON:", e, "Raw response:", planResponseText); gameGen_displayError(`Failed to parse game plan. AI Response: ${planResponseText.substring(0,200)}...`); return null; }
                if(gameGen_planDisplay) gameGen_planDisplay.textContent = `Game Mechanic: ${gamePlan.game_mechanic}\nSVGs: ${gamePlan.svg_assets.join(', ')}\nSounds: ${gamePlan.sound_effects.join(', ')}`;
                
                gameGen_showLoading("Generating SVG assets..."); const generatedSvgs = [];
                for (let i = 0; i < gamePlan.svg_assets.length; i++) { const svgDesc = gamePlan.svg_assets[i]; if(gameGen_assetStatus) gameGen_assetStatus.textContent = `Generating SVG ${i+1}/${gamePlan.svg_assets.length}: ${svgDesc}...`; const svgCode = await internal_generateSingleSvg(svgDesc); if (svgCode) { generatedSvgs.push(svgCode); } else { generatedSvgs.push(`<svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg"><rect width="10" height="10" fill="red"/><text x="1" y="8" font-size="5" fill="white">X</text></svg>`); if(gameGen_assetStatus) gameGen_assetStatus.textContent += ` [Failed for: ${svgDesc}]`; console.warn(`Failed to generate SVG for: ${svgDesc}.`); } }
                
                gameGen_showLoading("Generating sound effect JS..."); const generatedSoundJs = [];
                for (let i = 0; i < gamePlan.sound_effects.length; i++) { const soundDesc = gamePlan.sound_effects[i]; if(gameGen_assetStatus) gameGen_assetStatus.textContent = `Generating Sound JS ${i+1}/${gamePlan.sound_effects.length}: ${soundDesc}...`; const soundJsCode = await internal_generateSingleSoundJs(soundDesc); if (soundJsCode) { generatedSoundJs.push(soundJsCode); } else { generatedSoundJs.push(`console.warn("Failed to generate sound JS for ${soundDesc.replace(/"/g, '\\"')} in game.");`); if(gameGen_assetStatus) gameGen_assetStatus.textContent += ` [Failed for: ${soundDesc}]`; console.warn(`Failed to generate Sound JS for: ${soundDesc}.`);}}

                if(gameGen_assetStatus) gameGen_assetStatus.textContent = `All assets processed. Generating game code...`; gameGen_showLoading("Generating final game code with assets...");
                const finalGamePromptInstruction = getAppInstruction('gameGen_final', DEFAULT_GAMEGEN_FINAL_INSTRUCTION);
                const finalGamePrompt = finalGamePromptInstruction.replace("{USER_GAME_IDEA}", userGameIdea).replace("{GAME_PLAN_JSON}", JSON.stringify(gamePlan)).replace("{SVG_ASSETS_ARRAY_OF_STRINGS}", JSON.stringify(generatedSvgs)).replace("{SOUND_EFFECTS_JS_ARRAY_OF_STRINGS}", JSON.stringify(generatedSoundJs));
                const gameCodeResult = await gameGen_main_model.generateContent(finalGamePrompt); let gameHtml = gameCodeResult.response.text().trim(); if (gameHtml.startsWith("```html")) gameHtml = gameHtml.substring(7).trim(); else if (gameHtml.startsWith("```")) gameHtml = gameHtml.substring(3).trim(); if (gameHtml.endsWith("```")) gameHtml = gameHtml.substring(0, gameHtml.length - 3).trim(); return gameHtml;
            } catch (e) { console.error("Game Generator Full Process Error:", e); let message = "Full game generation process failed. "; if (e.message) { if (e.message.includes("API key not valid")) message += "API Key invalid."; else if (e.message.includes("quota")) message += "API quota hit."; else if (e.message.includes("model") && e.message.includes("not found")) message += "AI model not found."; else message += e.message; } else message += "Unknown error."; gameGen_displayError(message); if(gameGen_apiErrorDisplay) gameGen_apiErrorDisplay.textContent = message; return null;
            } finally { gameGen_hideLoading(); }
        }
    }
    async function processAndDisplayGameCode(gameHtml, userGameIdea) { if (gameGen_generatedCodeTextarea) gameGen_generatedCodeTextarea.value = gameHtml; if (gameHtml && gameHtml.toLowerCase().includes("<html") && gameHtml.toLowerCase().includes("</html>")) { gameGen_lastHtmlCode = gameHtml; if(gameGen_downloadHtmlButton) gameGen_downloadHtmlButton.style.display = 'block'; if(gameGen_debugSection) gameGen_debugSection.style.display = 'block'; const gameTitle = userGameIdea.substring(0, 30) + (userGameIdea.length > 30 ? "..." : "") + " - Game"; openWindow('gamePlayerWindow', { title: gameTitle }); const htmlWithLogger = prepareGameHTMLWithLogger(gameHtml); if (gamePlayerWindow_iframe) { gamePlayerWindow_iframe.srcdoc = htmlWithLogger; } } else { gameGen_displayError("AI did not return valid HTML. Output: " + (gameHtml ? gameHtml.substring(0,100) + "..." : "empty"), true); if(gameGen_debugSection) gameGen_debugSection.style.display = 'none'; } }
    if (gameGen_generateButton) gameGen_generateButton.addEventListener('click', async () => { gameGen_lastUserIdea = gameGen_promptInput.value.trim(); if (!gameGen_lastUserIdea) { gameGen_displayError("Please describe the game."); return; } const gameHtml = await executeGameGeneration(gameGen_lastUserIdea); if (gameHtml) { await processAndDisplayGameCode(gameHtml, gameGen_lastUserIdea); } });
    if (gameGen_debugAttemptButton) gameGen_debugAttemptButton.addEventListener('click', async () => { const currentCode = gameGen_generatedCodeTextarea.value; const errorsAndHints = gameGen_debugCombinedInput.value.trim(); if (!currentCode) { gameGen_displayError("No game code to debug."); return; } if (!errorsAndHints) { gameGen_displayError("Please provide error messages or hints for debugging."); return; } const fixedHtml = await executeGameGeneration(gameGen_lastUserIdea, true, currentCode, errorsAndHints); if (fixedHtml) { await processAndDisplayGameCode(fixedHtml, gameGen_lastUserIdea); } });
    if(gameGen_downloadHtmlButton) { gameGen_downloadHtmlButton.addEventListener('click', () => { if (gameGen_lastHtmlCode) { let fileName = (gameGen_lastUserIdea || "generated_game").trim().toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '_'); downloadFile(gameGen_lastHtmlCode, `${fileName}.html`, "text/html"); } else { alert("No game HTML generated."); } }); }
    
    if(musicStudio_generateButton) musicStudio_generateButton.addEventListener('click', async () => {
        if (!musicStudio_genAI_model) { if(musicStudio_errorDisplay) musicStudio_errorDisplay.textContent = "Music AI model not initialized."; return; }
        const userPrompt = musicStudio_promptInput.value.trim();
        if (!userPrompt) { if(musicStudio_errorDisplay) musicStudio_errorDisplay.textContent = "Please describe the music."; return; }
        if(musicStudio_loadingIndicator) musicStudio_loadingIndicator.style.display = 'block';
        if(musicStudio_errorDisplay) musicStudio_errorDisplay.textContent = "";
        musicStudio_generatedCode.value = ""; musicStudio_playButton.disabled = true; musicStudio_stopButton.disabled = true; musicStudio_downloadJsButton.style.display = 'none';
        const baseInstruction = getAppInstruction('musicStudio', DEFAULT_MUSICSTUDIO_INSTRUCTION);
        const fullPrompt = baseInstruction.replace("{USER_PROMPT}", userPrompt);
        try {
            const result = await musicStudio_genAI_model.generateContent(fullPrompt);
            const response = result.response; let text = response.text().trim();
            if (text.startsWith("```javascript")) text = text.substring(13).trim(); else if (text.startsWith("```")) text = text.substring(3).trim();
            if (text.endsWith("```")) text = text.substring(0, text.length - 3).trim();
            musicStudio_lastJsCode = text;
            musicStudio_generatedCode.value = text;
            musicStudio_playButton.disabled = false; musicStudio_downloadJsButton.style.display = 'block';
        } catch (e) { console.error("Music Studio AI Error:", e); if(musicStudio_errorDisplay) musicStudio_errorDisplay.textContent = `AI Error: ${e.message || String(e)}`;
        } finally { if(musicStudio_loadingIndicator) musicStudio_loadingIndicator.style.display = 'none'; }
    });
    function stopAllMusicStudioSounds() {
        if (musicStudio_currentAudioContext && musicStudio_currentAudioContext.state !== 'closed') {
            musicStudio_currentAudioContext.close().catch(e => console.error("Error closing previous AudioContext:", e));
        }
        musicStudio_currentAudioContext = null;
        musicStudio_activeSources.forEach(source => { try { if(source && typeof source.stop === 'function') source.stop(); if(source && typeof source.disconnect === 'function') source.disconnect(); } catch(e){} });
        musicStudio_activeSources = [];
        if(musicStudio_stopButton) musicStudio_stopButton.disabled = true;
        if(musicStudio_playButton && musicStudio_generatedCode.value) musicStudio_playButton.disabled = false;
    }
    if(musicStudio_playButton) musicStudio_playButton.addEventListener('click', () => {
        const code = musicStudio_generatedCode.value;
        if (code) {
            stopAllMusicStudioSounds(); 
            try {
                musicStudio_currentAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                const soundFunction = new Function('audioContext', 'activeSources', code); 
                soundFunction(musicStudio_currentAudioContext, musicStudio_activeSources);
                
                if(musicStudio_errorDisplay) musicStudio_errorDisplay.textContent = "";
                musicStudio_stopButton.disabled = false;
                musicStudio_playButton.disabled = true;
            } catch (e) { console.error("Error playing music:", e); if(musicStudio_errorDisplay) musicStudio_errorDisplay.textContent = "Playback Error: " + e.message; stopAllMusicStudioSounds(); }
        }
    });
    if(musicStudio_stopButton) musicStudio_stopButton.addEventListener('click', stopAllMusicStudioSounds);
    if(musicStudio_downloadJsButton) musicStudio_downloadJsButton.addEventListener('click', () => {
        if (musicStudio_lastJsCode) { let fileName = musicStudio_promptInput.value.trim().toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '_') || "music_script"; downloadFile(musicStudio_lastJsCode, `${fileName}.js`, "application/javascript"); }
        else { alert("No music code generated yet."); }
    });

    if(pythonPad_runButton) pythonPad_runButton.addEventListener('click', async () => {
        if (!pythonPad_ai_model) { if(pythonPad_errorDisplay) pythonPad_errorDisplay.textContent = "PyPad AI model not initialized."; return; }
        const pythonCode = pythonPad_codeTextarea.value.trim();
        if (!pythonCode) { if(pythonPad_errorDisplay) pythonPad_errorDisplay.textContent = "No Python code to simulate."; return; }
        if(pythonPad_loadingIndicator) pythonPad_loadingIndicator.style.display = 'block';
        if(pythonPad_errorDisplay) pythonPad_errorDisplay.textContent = "";
        pythonPad_outputDisplay.value = "Simulating execution...";
        const fullPrompt = DEFAULT_PYTHONPAD_EXEC_INSTRUCTION.replace("{PYTHON_CODE}", pythonCode);
        try { const result = await pythonPad_ai_model.generateContent(fullPrompt); pythonPad_outputDisplay.value = result.response.text();
        } catch (e) { console.error("PyPad AI Error:", e); if(pythonPad_errorDisplay) pythonPad_errorDisplay.textContent = `AI Simulation Error: ${e.message || String(e)}`; pythonPad_outputDisplay.value = `Error during simulation: ${e.message}`;
        } finally { if(pythonPad_loadingIndicator) pythonPad_loadingIndicator.style.display = 'none'; }
    });
    if(gamePlayer_refreshButton) gamePlayer_refreshButton.addEventListener('click', () => {
        if (gameGen_lastHtmlCode && gamePlayerWindow_iframe) {
            const htmlWithLogger = prepareGameHTMLWithLogger(gameGen_lastHtmlCode);
            gamePlayerWindow_iframe.srcdoc = htmlWithLogger;
        } else {
            alert("No game loaded to refresh.");
        }
    });

    if(startButton) startButton.addEventListener('click', (e) => { e.stopPropagation(); startMenu.style.display = startMenu.style.display === 'flex' ? 'none' : 'flex'; });
    if(startMenuShutdown) startMenuShutdown.addEventListener('click', () => { startMenu.style.display = 'none'; if (confirm("Are you sure you want to shut down k8OS?")) { document.body.innerHTML = '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;justify-content:center;align-items:center;font-size:24px;">k8OS is shutting down...</div>'; setTimeout(() => { window.close(); }, 2000); } });
    if(startMenuReboot) startMenuReboot.addEventListener('click', () => { startMenu.style.display = 'none'; if (confirm("Are you sure you want to reboot k8OS?")) { rebootOverlay.style.display = 'flex'; rebootProgressText.textContent = "Closing applications..."; document.querySelectorAll('.window').forEach(w => closeWindow(w)); const rebootSteps = [ { delay: 700, text: "System integrity check..." }, { delay: 1200, text: "Loading kernel modules..." }, { delay: 1000, text: "Initializing desktop..." }, { delay: 800, text: "Mounting file systems..." }, { delay: 600, text: "Starting services..." }, { delay: 500, text: "Finalizing..." }, { delay: 400, text: "System ready." } ]; let currentStepIndex = 0; function processNextStep() { if (currentStepIndex < rebootSteps.length) { rebootProgressText.textContent = rebootSteps[currentStepIndex].text; setTimeout(processNextStep, rebootSteps[currentStepIndex].delay); currentStepIndex++; } else { rebootOverlay.style.display = 'none'; document.querySelectorAll('.desktop-icon.selected').forEach(i => i.classList.remove('selected')); loadApiKey(); openWindow('apiKeySettingsWindow'); } } setTimeout(processNextStep, 500); } });

    loadApiKey();
    openWindow('apiKeySettingsWindow');
</script>
</body>
</html>
