<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Eigene GLB-Modelle</title>
    <style>body { margin: 0; }</style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        let scene, camera, renderer;
        const characters = [];
        const FLOOR_SIZE = 30;

        class Character {
            constructor(modelPath) {
                this.model = null;
                this.mixer = null;
                this.speed = 0.08 + Math.random() * 0.04;
                this.direction = new THREE.Vector3(
                    Math.random() - 0.5,
                    0,
                    Math.random() - 0.5
                ).normalize();

                // Eigenes GLB-Modell laden
                new THREE.GLTFLoader().load(
                    modelPath,
                    (gltf) => {
                        this.model = gltf.scene;
                        this.model.scale.set(0.5, 0.5, 0.5);
                        this.model.position.y = 0.5;
                        scene.add(this.model);

                        // Animationen aktivieren
                        if(gltf.animations?.length > 0) {
                            this.mixer = new THREE.AnimationMixer(this.model);
                            this.mixer.clipAction(gltf.animations[0]).play();
                        }
                    }
                );
            }

            update(delta) {
                if(!this.model) return;

                // Bewegung
                this.model.position.add(
                    this.direction.clone().multiplyScalar(this.speed)
                );

                // Randkollision
                const halfSize = FLOOR_SIZE/2 - 2;
                if(Math.abs(this.model.position.x) > halfSize || 
                   Math.abs(this.model.position.z) > halfSize) {
                    this.direction.set(
                        Math.random() - 0.5,
                        0,
                        Math.random() - 0.5
                    ).normalize();
                }

                // Rotation
                this.model.rotation.y = Math.atan2(
                    this.direction.x,
                    this.direction.z
                );

                // Animation
                if(this.mixer) this.mixer.update(delta);
            }
        }

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 25);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Beleuchtung
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Boden
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(FLOOR_SIZE, FLOOR_SIZE),
                new THREE.MeshPhongMaterial({ color: 0x228b22 })
            );
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // Charaktere erstellen
            characters.push(
                new Character('tmp101zm6ml.glb'),
                new Character('tmprrijf0bs.glb'),
            );

            // Resize Handler
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth/window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
            characters.forEach(c => c.update(delta));
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
