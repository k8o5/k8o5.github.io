<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        /* Your existing CSS remains unchanged */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            overflow: hidden;
            text-rendering: optimizeLegibility;
            line-height: 1.5;
        }
        #console {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            background: #000;
            position: relative;
            user-select: text;
        }
        #output {
            font-size: 15px;
            white-space: pre-wrap;
            text-align: left;
            -webkit-font-smoothing: antialiased;
            color: #00cc00;
            letter-spacing: 0.05em;
            user-select: text;
        }
        #inputArea {
            display: none;
            position: sticky;
            bottom: 10px;
            align-items: center;
            padding: 8px 0;
            margin-top: 15px;
        }
        #prompt {
            font-size: 15px;
            margin-right: 8px;
            color: #00ff00;
            font-weight: bold;
        }
        #input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            caret-color: #00ff00;
            caret-shape: block;
        }
        .peer-message {
            display: block;
            padding: 4px 0;
            animation: fadeIn 0.3s ease-in;
        }
        .connected-message {
            color: #ffcc00;
            font-weight: bold;
            padding: 4px 0;
            display: block;
            border-bottom: 1px dashed #555;
            margin-bottom: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .command { color: #0fdc5f; font-weight: bold; }
        .parameter { color: #5fb3ff; }
        .error-message { color: #ff4f4f; }
        .success-message { color: #2aef63; }
        @media (max-width: 768px) {
            #input { width: 100%; font-size: 14px; padding: 5px; }
            #inputArea { padding: 10px 0; }
            #prompt { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="console" tabindex="0">
        <div id="output"></div>
        <div id="inputArea">
            <span id="prompt">> </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- Solana Web3.js -->
    <script src="https://unpkg.com/@solana/web3.js@1.91.1/dist/index.global.js"></script>
    <!-- Metaplex UMI (for NFT minting) -->
    <script src="https://unpkg.com/@metaplex-foundation/umi-bundle-defaults@0.8.12/dist/index.global.js"></script>
    <script src="https://unpkg.com/@metaplex-foundation/umi-signer-wallet-adapters@0.8.12/dist/index.global.js"></script>
    <script src="https://unpkg.com/@metaplex-foundation/mpl-token-metadata@3.2.1/dist/index.global.js"></script>
    <script>
        const { Connection, Keypair, LAMPORTS_PER_SOL } = window.SolanaWeb3;
        const { createUmi } = window.Umi;
        const { mplTokenMetadata } = window.MplTokenMetadata;

        let peer, myPeerId = '', connections = [], knownPeers = new Set(), connectedPeers = new Set(),
            isConnected = false, chatHistory = [], myName = 'noname', commandHistory = [], historyIndex = -1,
            connectedPeersList = [], isMainPeer = false, solanaKeypair, umi;

        const PUBLIC_LOBBY_PEER_ID = 'public-lobby';
        const DEVNET_RPC = 'https://api.devnet.solana.com';

        function getPeerColor(peerId) {
            let hash = 0;
            for (let i = 0; i < peerId.length; i++) hash = peerId.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash % 360)}, 70%, 50%)`;
        }

        function renderText(text, peerId = null, name = null) {
            return peerId ? `<span class="peer-message" style="color:${getPeerColor(peerId)}">${name || 'noname'}: ${text}</span><br>` : text.replace(/\n/g, '<br>');
        }

        function typeWriter(text, index = 0, delay = 50, callback) {
            if (index < text.length) {
                document.getElementById('output').innerHTML += text.charAt(index);
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
                setTimeout(() => typeWriter(text, index + 1, delay, callback), delay);
            } else if (callback) callback();
        }

        async function initSolana() {
            try {
                // Generate a Solana keypair (in a real app, use a wallet like Phantom)
                solanaKeypair = Keypair.generate();
                const connection = new Connection(DEVNET_RPC, 'confirmed');
                
                // Airdrop 1 SOL to fund the wallet
                const airdropSignature = await connection.requestAirdrop(
                    solanaKeypair.publicKey,
                    LAMPORTS_PER_SOL
                );
                await connection.confirmTransaction(airdropSignature);
                document.getElementById('output').innerHTML += renderText(`<span class="success-message">Wallet funded: ${solanaKeypair.publicKey.toBase58()}</span>\n`);

                // Initialize UMI for Metaplex
                umi = createUmi(DEVNET_RPC)
                    .use(mplTokenMetadata())
                    .use(window.UmiSignerWalletAdapters.keypairIdentity(solanaKeypair));
            } catch (err) {
                document.getElementById('output').innerHTML += renderText(`<span class="error-message">Solana init error: ${err.message}</span>\n`);
            }
        }

        async function mintNFT(gifUrl) {
            try {
                document.getElementById('output').innerHTML += renderText(`<span class="success-message">Uploading and minting NFT...</span>\n`);
                
                // Fetch the GIF
                const response = await fetch(gifUrl);
                const blob = await response.blob();
                const file = new File([blob], 'nft.gif', { type: 'image/gif' });

                // Upload to Bundlr (via UMI's default uploader)
                const [gifUri] = await umi.uploader.upload([file]);
                
                // Create metadata
                const metadataUri = await umi.uploader.uploadJson({
                    name: `GIF NFT by ${myName}`,
                    description: 'Minted via k8o5 chat',
                    image: gifUri,
                    properties: { files: [{ uri: gifUri, type: 'image/gif' }], category: 'image' }
                });

                // Mint the NFT
                const { signature } = await umi.nfts().create({
                    name: `GIF NFT by ${myName}`,
                    uri: metadataUri,
                    sellerFeeBasisPoints: 500, // 5% royalty
                }).sendAndConfirm(umi);

                const txId = window.Umi.serializers.base58.deserialize(signature)[0];
                document.getElementById('output').innerHTML += renderText(
                    `<span class="success-message">NFT minted! Tx: https://explorer.solana.com/tx/${txId}?cluster=devnet</span>\n`
                );
            } catch (err) {
                document.getElementById('output').innerHTML += renderText(`<span class="error-message">NFT minting error: ${err.message}</span>\n`);
            }
        }

        function connectToPublicLobby() {
            isConnected = true;
            document.getElementById('prompt').innerHTML = 'chat> ';
            connectToPeer(PUBLIC_LOBBY_PEER_ID);
        }

        function becomeMainPeer() {
            if (isMainPeer) return;
            peer.destroy();
            myPeerId = PUBLIC_LOBBY_PEER_ID;
            isMainPeer = true;
            initPeerWithId(myPeerId);
        }

        function initPeerWithId(peerId) {
            // Same as your original function, unchanged
            peer = new Peer(peerId, { debug: 3, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
            peer.on('open', id => {
                myPeerId = id;
                knownPeers.add(myPeerId);
                document.getElementById('output').innerHTML += renderText(`<span class="success-message">Deine neue Peer-ID: ${myPeerId}</span>\n`);
                if (isMainPeer) {
                    document.getElementById('output').innerHTML += renderText(`<span class="success-message">Du bist jetzt der Haupt-Peer der public Lobby!</span>\n`);
                } else {
                    connectToPublicLobby();
                }
                document.getElementById('inputArea').style.display = 'flex';
                document.getElementById('input').focus();
            });
            peer.on('connection', conn => {
                conn.metadata = { name: conn.metadata?.name || 'noname' };
                connections.push(conn);
                conn.on('open', () => {
                    knownPeers.add(conn.peer);
                    connectedPeers.add(conn.peer);
                    connectedPeersList.push(`<span class="connected-message">Verbunden mit ${conn.peer}!</span>`);
                    conn.send(JSON.stringify({ type: 'peer_list', peers: [...knownPeers] }));
                    conn.send(JSON.stringify({ type: 'chat_history', history: chatHistory }));
                });
                conn.on('data', handleData);
                conn.on('close', () => {
                    connectedPeers.delete(conn.peer);
                    connectedPeersList = connectedPeersList.filter(msg => !msg.includes(conn.peer));
                    if (conn.peer === PUBLIC_LOBBY_PEER_ID && !isMainPeer) becomeMainPeer();
                });
            });
            peer.on('error', err => {
                document.getElementById('inputArea').style.display = 'flex';
                document.getElementById('input').focus();
            });
        }

        function initPeer() {
            // Same as your original function, with Solana init added
            peer = new Peer({ debug: 3, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
            peer.on('open', id => {
                myPeerId = id;
                knownPeers.add(myPeerId);
                typeWriter('k8o5\n', 0, 36, () => {
                    typeWriter(`Deine Peer-ID: ${myPeerId}\n`, 0, 18, () => {
                        initSolana().then(() => {
                            document.getElementById('inputArea').style.display = 'flex';
                            document.getElementById('input').focus();
                        });
                    });
                });
            });
            peer.on('connection', conn => {
                conn.metadata = { name: conn.metadata?.name || 'noname' };
                connections.push(conn);
                conn.on('open', () => {
                    knownPeers.add(conn.peer);
                    connectedPeers.add(conn.peer);
                    connectedPeersList.push(`<span class="connected-message">Verbunden mit ${conn.peer}!</span>`);
                    conn.send(JSON.stringify({ type: 'peer_list', peers: [...knownPeers] }));
                    conn.send(JSON.stringify({ type: 'chat_history', history: chatHistory }));
                });
                conn.on('data', handleData);
                conn.on('close', () => {
                    connectedPeers.delete(conn.peer);
                    connectedPeersList = connectedPeersList.filter(msg => !msg.includes(conn.peer));
                    if (conn.peer === PUBLIC_LOBBY_PEER_ID && !isMainPeer) becomeMainPeer();
                });
            });
            peer.on('error', err => {
                document.getElementById('inputArea').style.display = 'flex';
                document.getElementById('input').focus();
            });
        }

        function handleInput() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            document.getElementById('output').innerHTML += renderText(`<span class="command">> ${input}</span>\n`);
            if (!isConnected) {
                if (input === 'public') {
                    document.getElementById('output').innerHTML += renderText(`<span class="success-message">Verbinde mit der public Lobby...</span>\n`);
                    connectToPublicLobby();
                } else if (input.startsWith('peer ')) {
                    const targetPeerId = input.split(' ')[1];
                    if (targetPeerId) connectToPeer(targetPeerId);
                    else document.getElementById('output').innerHTML += renderText(`<span class="error-message">Fehler: Gib eine Peer-ID ein!</span>\n`);
                } else if (input.startsWith('name ')) {
                    const name = input.split(' ')[1];
                    myName = name || myName;
                    document.getElementById('output').innerHTML += renderText(`<span class="success-message">Name geändert zu: ${myName}</span>\n`);
                } else if (input === 'copy') {
                    navigator.clipboard.writeText(myPeerId).then(() => {
                        document.getElementById('output').innerHTML += renderText(`<span class="success-message">Peer-ID ${myPeerId} kopiert!</span>\n`);
                    });
                } else if (input === 'clear') {
                    document.getElementById('output').innerHTML = '';
                } else if (input.startsWith('help')) showHelp();
                else {
                    document.getElementById('output').innerHTML += renderText('<span class="error-message">Unbekannter Befehl. Nutze: help</span>\n');
                }
            } else {
                if (input === '/exit') {
                    connections.forEach(conn => conn.close());
                    connections = [];
                    connectedPeers.clear();
                    connectedPeersList = [];
                    isConnected = false;
                    isMainPeer = false;
                    document.getElementById('prompt').innerHTML = '> ';
                    document.getElementById('output').innerHTML += renderText(`<span class="success-message">Chat verlassen.</span>\n`);
                } else if (input === '/peers') {
                    if (connectedPeersList.length > 0) {
                        document.getElementById('output').innerHTML += connectedPeersList.join('<br>') + '<br>';
                    } else {
                        document.getElementById('output').innerHTML += renderText(`<span class="error-message">Keine Peers verbunden.</span>\n`);
                    }
                } else if (input === 'clear') {
                    document.getElementById('output').innerHTML = '';
                } else if (input.startsWith('gif ')) {
                    const gifUrl = input.split(' ')[1];
                    if (gifUrl) mintNFT(gifUrl);
                    else document.getElementById('output').innerHTML += renderText(`<span class="error-message">Fehler: Gib eine GIF-URL ein!</span>\n`);
                } else {
                    const messageEntry = { peerId: myPeerId, message: input, name: myName };
                    chatHistory.push(messageEntry);
                    broadcastMessage(messageEntry);
                    document.getElementById('output').innerHTML += renderText(input, myPeerId, myName);
                }
            }
            document.getElementById('input').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        function connectToPeer(peerId) {
            // Same as your original function, unchanged
            if (peerId === myPeerId || connectedPeers.has(peerId) || connections.some(conn => conn.peer === peerId)) return;
            const conn = peer.connect(peerId, { metadata: { name: myName } });
            connections.push(conn);
            conn.on('open', () => {
                knownPeers.add(peerId);
                connectedPeers.add(peerId);
                connectedPeersList.push(`<span class="connected-message">Verbunden mit ${peerId}!</span>`);
                conn.send(JSON.stringify({ type: 'peer_list', peers: [...knownPeers] }));
                conn.send(JSON.stringify({ type: 'chat_history', history: chatHistory }));
            });
            conn.on('data', handleData);
            conn.on('close', () => {
                connectedPeers.delete(conn.peer);
                connectedPeersList = connectedPeersList.filter(msg => !msg.includes(peerId));
                if (peerId === PUBLIC_LOBBY_PEER_ID && !isMainPeer) becomeMainPeer();
            });
        }

        function broadcastMessage(message) {
            const messageData = JSON.stringify(message);
            connections.forEach(conn => { if (conn.peer !== message.peerId) conn.send(messageData); });
        }

        function handleData(data) {
            // Same as your original function, unchanged
            let messageData;
            try {
                messageData = JSON.parse(data);
            } catch (e) {
                messageData = { peerId: this.peer, message: data, name: this.metadata?.name || 'noname' };
            }
            if (messageData.type === 'peer_list') {
                messageData.peers.forEach(peerId => { if (peerId !== myPeerId) knownPeers.add(peerId); });
            } else if (messageData.type === 'chat_history') {
                messageData.history.forEach(entry => {
                    if (!chatHistory.some(h => h.peerId === entry.peerId && h.message === entry.message)) {
                        chatHistory.push(entry);
                        document.getElementById('output').innerHTML += renderText(entry.message, entry.peerId, entry.name);
                    }
                });
            } else {
                const { peerId, message, name } = messageData;
                if (!chatHistory.some(h => h.peerId === peerId && h.message === message)) {
                    chatHistory.push({ peerId, message, name });
                    document.getElementById('output').innerHTML += renderText(message, peerId, name);
                    broadcastMessage(messageData);
                }
            }
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        function showHelp() {
            const helpText = `
<span class="success-message">Verfügbare Befehle:</span>
- <span class="command">public</span>: Verbinde dich mit der public Lobby
- <span class="command">peer</span> <span class="parameter">[peer_id]</span>: Verbinde dich mit einem anderen Peer
- <span class="command">name</span> <span class="parameter">[string]</span>: Definiere deinen Namen
- <span class="command">copy</span>: Kopiere deine Peer-ID
- <span class="command">clear</span>: Lösche den Bildschirm
- <span class="command">gif</span> <span class="parameter">[url]</span>: Lade ein GIF als NFT hoch (im Chat)
- <span class="command">/exit</span>: Verlasse den Chat-Modus (nur im Chat)
- <span class="command">/peers</span>: Zeige verbundene Peers (nur im Chat)
- <span class="command">help</span>: Zeige diese Hilfe
`;
            document.getElementById('output').innerHTML += renderText(helpText);
        }

        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                if (commandHistory.length > 0 && historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    document.getElementById('input').value = commandHistory[commandHistory.length - 1 - historyIndex];
                }
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                if (historyIndex > 0) {
                    historyIndex--;
                    document.getElementById('input').value = commandHistory[commandHistory.length - 1 - historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    document.getElementById('input').value = '';
                }
                e.preventDefault();
            }
        });

        document.getElementById('console').addEventListener('click', (e) => {
            const selection = window.getSelection();
            if (!selection.toString() && !e.target.matches('#input')) {
                document.getElementById('input').focus();
            }
        });

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const inputValue = document.getElementById('input').value.trim();
                if (inputValue) {
                    commandHistory.push(inputValue);
                    historyIndex = -1;
                }
                handleInput();
            }
        });

        // Initialize the page
        try {
            document.getElementById('output').innerHTML = renderText('Initialisiere...\n');
            initPeer();
        } catch (err) {
            document.getElementById('output').innerHTML += renderText(`<span class="error-message">Fehler beim Laden: ${err.message}</span>\n`);
            document.getElementById('inputArea').style.display = 'flex';
            document.getElementById('input').focus();
        }
    </script>
</body>
</html>
