<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5 - Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #setup {
            text-align: center;
        }
        #chat {
            display: none;
            width: 100%;
            height: 100%;
            background: #000;
            color: #0f0;
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 20px 40px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        button:hover {
            background: #000;
            color: #0f0;
        }
        #console {
            width: 100%;
            height: 80%;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 16px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
        }
        #inputArea {
            display: flex;
            margin-top: 10px;
        }
        input, textarea {
            flex-grow: 1;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }
        #sendButton {
            padding: 10px 20px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="setup" style="display: none;">
        <button onclick="createLobby()">Lobby erstellen</button>
    </div>
    <div id="chat">
        <div id="console"></div>
        <div id="inputArea">
            <input type="text" id="messageInput" placeholder="Nachricht..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button id="sendButton" onclick="sendMessage()">Senden</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let roomId = new URLSearchParams(window.location.search).get('room') || '';
        let isHost = !roomId; // Host, wenn keine Raum-ID in URL
        let connections = [];

        // Setup oder Chat anzeigen
        if (isHost) {
            document.getElementById('setup').style.display = 'block';
        } else {
            switchToChat();
            initPeer();
            document.getElementById('console').innerHTML = `Beitreten zur Lobby ${roomId}\nWarte auf das Angebot des Hosts und füge es hier ein:\n<textarea id="offer" onpaste="setTimeout(() => joinWithOffer(document.getElementById('offer').value), 0)"></textarea>`;
        }

        // Lobby erstellen
        function createLobby() {
            roomId = Math.random().toString(36).substr(2, 5);
            window.history.pushState({}, document.title, `?room=${roomId}`);
            isHost = true;
            initPeer();
            switchToChat();
            document.getElementById('console').innerHTML = `Lobby erstellt! Raum-ID: ${roomId}\nTeile diesen Link: k8o5.com?room=${roomId}\n\nHost-Angebot: Kopiere diesen Text und teile ihn:\n<textarea id="offer">${JSON.stringify({ type: 'offer', roomId })}</textarea>\n\nAntwort hier einfügen:\n<textarea id="answer" onpaste="setTimeout(() => joinChat(document.getElementById('answer').value), 0)"></textarea>`;
        }

        // PeerJS initialisieren
        function initPeer() {
            peer = new Peer({ debug: 3 });
            peer.on('open', id => {
                console.log('Mein Peer-ID: ' + id);
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', () => {
                    console.log('Verbunden mit: ' + conn.peer);
                });
                conn.on('data', data => {
                    document.getElementById('console').innerHTML += `\n${data}`;
                    document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
                });
            });
        }

        // Mit Angebot beitreten
        function joinWithOffer(offerText) {
            const offer = JSON.parse(offerText);
            if (offer.type !== 'offer' || offer.roomId !== roomId) return alert('Ungültiges Angebot');
            const conn = peer.connect(offer.peerId);
            connections.push(conn);
            conn.on('open', () => {
                const answer = JSON.stringify({ type: 'answer', peerId: peer.id, roomId });
                document.getElementById('console').innerHTML += `\nAntwort generiert:\n<textarea>${answer}</textarea>\nSende sie an den Host und warte...`;
            });
            conn.on('data', data => {
                document.getElementById('console').innerHTML += `\n${data}`;
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            });
        }

        // Chat beitreten mit Antwort
        function joinChat(answerText) {
            const answer = JSON.parse(answerText);
            if (answer.type !== 'answer' || answer.roomId !== roomId) return alert('Ungültige Antwort');
            const conn = peer.connect(answer.peerId);
            connections.push(conn);
            conn.on('open', () => {
                document.getElementById('console').innerHTML = 'Verbunden! Chat beginnt...';
            });
            conn.on('data', data => {
                document.getElementById('console').innerHTML += `\n${data}`;
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            });
        }

        // Nachricht senden
        function sendMessage() {
            const message = document.getElementById('messageInput').value.trim();
            if (message && connections.length > 0) {
                connections.forEach(conn => conn.send(message));
                document.getElementById('console').innerHTML += `\n${message}`;
                document.getElementById('messageInput').value = '';
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            }
        }

        // Zum Chat wechseln
        function switchToChat() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
        }
    </script>
</body>
</html>
