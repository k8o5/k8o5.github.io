<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5.com - Statischer Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #2a2a2a;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 700px;
            padding: 20px;
            border: 1px solid #444;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 20px;
            font-size: 2rem;
        }
        #online-users {
            text-align: center;
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        #chat-box {
            background: #1e1e1e;
            border-radius: 10px;
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid #444;
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }
        #chat-box p {
            margin-bottom: 10px;
            word-wrap: break-word;
        }
        #chat-box p:nth-child(odd) {
            color: #e0e0e0;
        }
        #chat-box p:nth-child(even) {
            color: #b0b0b0;
        }
        .input-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        #message-input {
            flex: 1;
            background: #333;
            border: 1px solid #555;
            border-radius: 25px;
            padding: 10px 20px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        #message-input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 5px rgba(0, 255, 136, 0.3);
        }
        #send-button {
            background: #00ff88;
            color: #1a1a1a;
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        #send-button:hover {
            background: #00cc6e;
            transform: scale(1.05);
        }
        #send-button:active {
            transform: scale(0.95);
        }
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            h1 {
                font-size: 1.5rem;
            }
            #chat-box {
                height: 300px;
                font-size: 0.9rem;
            }
            #message-input, #send-button {
                font-size: 0.9rem;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>k8o5.com - Statischer Chat</h1>
        <div id="online-users">Online Nutzer: 1</div>
        <div id="chat-box"></div>
        <div class="input-container">
            <input type="text" id="message-input" placeholder="Nachricht eingeben...">
            <button id="send-button">Senden</button>
        </div>
    </div>

    <!-- PeerJS einbinden -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // Vordefinierte Liste von Peer-IDs (für bis zu 10 Nutzer)
        const POSSIBLE_PEER_IDS = Array.from({ length: 10 }, (_, i) => `peer-${i + 1}`);

        // Wähle eine zufällige Peer-ID aus der Liste für diesen Nutzer
        const myPeerId = POSSIBLE_PEER_IDS[Math.floor(Math.random() * POSSIBLE_PEER_IDS.length)];
        const userId = `Nutzer-${myPeerId}`;

        // PeerJS initialisieren mit der ausgewählten Peer-ID
        const peer = new Peer(myPeerId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }, // Öffentlicher STUN-Server von Google
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        // Liste der verbundenen Peers
        const connections = new Map();

        // Chat-Box und Eingabefeld
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const onlineUsers = document.getElementById('online-users');

        // Funktion zum Hinzufügen einer Nachricht zur Chat-Box
        function addMessage(message) {
            const messageElement = document.createElement('p');
            messageElement.textContent = message;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Wenn der Peer initialisiert wird, erhalten wir eine ID
        peer.on('open', (id) => {
            addMessage(`Deine ID: ${id} (${userId})`);
            addMessage('Versuche, dich mit anderen Peers zu verbinden...');
            connectToOtherPeers();
        });

        // Funktion, um sich mit anderen Peers zu verbinden
        function connectToOtherPeers() {
            POSSIBLE_PEER_IDS.forEach(peerId => {
                if (peerId !== myPeerId && !connections.has(peerId)) {
                    const conn = peer.connect(peerId);
                    setupConnection(conn);
                }
            });

            // Retry-Mechanismus: Versuche alle 10 Sekunden, sich mit nicht verbundenen Peers zu verbinden
            setTimeout(connectToOtherPeers, 10000);
        }

        // Wenn ein anderer Peer sich mit uns verbindet
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // Verbindung einrichten
        function setupConnection(conn) {
            const peerId = conn.peer;
            if (connections.has(peerId)) return;

            conn.on('open', () => {
                connections.set(peerId, conn);
                addMessage(`Verbunden mit ${peerId}`);
                conn.send(`Hallo von ${userId}!`);
                onlineUsers.textContent = `Online Nutzer: ${connections.size + 1}`;
            });

            conn.on('data', (data) => {
                addMessage(`${peerId}: ${data}`);
            });

            conn.on('close', () => {
                connections.delete(peerId);
                addMessage(`${peerId} hat den Chat verlassen.`);
                onlineUsers.textContent = `Online Nutzer: ${connections.size + 1}`;
            });

            conn.on('error', (err) => {
                console.log(`Fehler mit ${peerId}: ${err}`); // Fehler nur in der Konsole anzeigen
            });
        }

        // Nachricht senden
        sendButton.addEventListener('click', () => {
            const message = messageInput.value.trim();
            if (message) {
                addMessage(`Du: ${message}`);
                connections.forEach((conn, peerId) => {
                    conn.send(message);
                });
                messageInput.value = '';
            }
        });

        // Nachricht senden mit Enter-Taste
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();
            }
        });

        // Fehlerbehandlung
        peer.on('error', (err) => {
            console.log(`Fehler: ${err}`); // Fehler nur in der Konsole anzeigen
        });
    </script>
</body>
</html>
