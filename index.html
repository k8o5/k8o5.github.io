<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8O5 Rocket Launch</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 300px;
            height: 600px;
            margin: 20px;
            background: linear-gradient(180deg, #001144 0%, #000 100%);
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #4A90E2;
        }

        #rocket {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            transition: all 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            filter: drop-shadow(0 0 10px #ff4081);
        }

        #progressBar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 20px;
            height: 560px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        #progressFill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #ff4081 0%, #4A90E2 100%);
            border-radius: 10px;
            transition: height 0.5s;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            background: linear-gradient(45deg, #4A90E2, #ff4081);
            border: none;
            color: white;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            transform: scale(1.1);
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            text-shadow: 0 0 20px #ff4081;
            opacity: 0;
        }

        .explosion {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ff4081 20%, transparent 60%);
            border-radius: 50%;
            animation: explode 0.5s forwards;
        }

        @keyframes rocketShake {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-52%) rotate(-2deg); }
            75% { transform: translateX(-48%) rotate(2deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(5); opacity: 0; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 2s linear;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1 style="color: #4A90E2; text-shadow: 0 0 15px #4A90E2">LAUNCH TO WIN 1000 K8O5!</h1>
    <div id="gameContainer">
        <div id="progressBar"><div id="progressFill"></div></div>
        <img id="rocket" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cGF0aCBkPSJNNTAgMTBMNDUgNDBINTVMNTAgMTBaIiBmaWxsPSIjZmZmIi8+PHJlY3Qgd2lkdGg9IjEwIiBoZWlnaHQ9IjYwIiB4PSI0NSIgeT0iNDAiIGZpbGw9IiNGRjRDQzEiLz48cGF0aCBkPSJNNDUgNzBsMTAgMTAgMTAtMTAtMTAtMTBaIiBmaWxsPSIjRkY0Q0MxIi8+PC9zdmc+" alt="🚀">
        <div id="countdown"></div>
    </div>
    <button id="launchButton" onclick="launchRocket()">IGNITE LAUNCH (1%)</button>
    <button id="phantomConnect" onclick="connectPhantom()">CONNECT PHANTOM</button>
    <div id="result" style="font-size: 24px; text-align: center"></div>

    <script>
        let isLaunching = false;
        let phantomConnected = false;
        const contractAddress = 'AmaLfA5qUMUDG5DfxVFR8ZmM41dR5b9H6xpsM6qApump';

        // Create background stars
        for(let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 300 + 'px';
            star.style.top = Math.random() * 600 + 'px';
            star.style.animation = `twinkle ${Math.random()*2 + 1}s infinite`;
            gameContainer.appendChild(star);
        }

        async function connectPhantom() {
            try {
                if (!window.solana?.isPhantom) {
                    alert('Install Phantom Wallet!');
                    return;
                }

                await window.solana.connect();
                phantomConnected = true;
                document.getElementById('result').innerHTML = '🟢 WALLET CONNECTED!';
                document.getElementById('phantomConnect').style.background = 'linear-gradient(45deg, #4A90E2, #00ff88)';
            } catch (err) {
                console.error(err);
                alert('Connection failed');
            }
        }

        function createExplosion(x, y) {
            for(let i = 0; i < 20; i++) {
                const explosion = document.createElement('div');
                explosion.className = 'explosion';
                explosion.style.left = x + 'px';
                explosion.style.top = y + 'px';
                gameContainer.appendChild(explosion);
                setTimeout(() => explosion.remove(), 500);
            }
        }

        function launchRocket() {
            if (!phantomConnected) return alert('CONNECT WALLET FIRST!');
            if (isLaunching) return;

            isLaunching = true;
            const win = Math.random() < 0.01;
            const rocket = document.getElementById('rocket');
            const countdown = document.getElementById('countdown');
            
            // Launch sequence
            rocket.style.animation = 'rocketShake 0.1s infinite';
            let progress = 0;
            const progressInterval = setInterval(() => {
                document.getElementById('progressFill').style.height = ++progress + '%';
            }, 40);

            // Animate countdown
            let counter = 3;
            countdown.textContent = counter;
            countdown.style.opacity = '1';
            const countdownInterval = setInterval(() => {
                countdown.textContent = --counter;
                if (counter === 0) {
                    clearInterval(countdownInterval);
                    countdown.style.opacity = '0';
                }
            }, 1000);

            setTimeout(() => {
                clearInterval(progressInterval);
                if (win) {
                    rocket.style.bottom = '-100px';
                    document.body.style.background = '#000044';
                    createExplosion(150, 300);
                    showConfetti();
                    document.getElementById('result').innerHTML = '🎉 JACKPOT! 1000 K8O5 INCOMING!';
                    console.log('Claiming prize at:', contractAddress);
                } else {
                    rocket.style.animation = '';
                    rocket.style.bottom = Math.random() * 100 + 'px';
                    setTimeout(() => {
                        rocket.style.bottom = '0';
                        createExplosion(150, 500);
                        document.getElementById('result').textContent = 'LAUNCH FAILED! TRY AGAIN!';
                    }, 2000);
                }
                isLaunching = false;
                document.getElementById('progressFill').style.height = '0%';
            }, 4000);
        }

        function showConfetti() {
            for(let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 300 + 'px';
                confetti.style.background = `hsl(${Math.random()*360}deg, 100%, 50%)`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }
        }
    </script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</body>
</html>
