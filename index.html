<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat ohne Backend</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
        #setup { margin-bottom: 20px; }
        #chat { display: none; }
        textarea { width: 80%; height: 80px; margin: 10px 0; }
        #messages { border: 1px solid #ccc; height: 200px; overflow-y: scroll; padding: 10px; text-align: left; }
        #messageInput { width: 60%; padding: 5px; }
        button { padding: 5px 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>P2P Chat</h1>
    <div id="setup">
        <button onclick="createConnection()">Verbindung erstellen</button>
        <button onclick="joinConnection()">Verbindung beitreten</button>
        <br>
        <textarea id="offer" placeholder="Angebot hier einfügen (zum Beitreten)"></textarea>
        <br>
        <button onclick="setRemoteOffer()">Angebot übernehmen</button>
        <br>
        <textarea id="answer" placeholder="Antwort hier einfügen (nach Erstellung)"></textarea>
        <br>
        <button onclick="setRemoteAnswer()">Antwort übernehmen</button>
    </div>
    <div id="chat">
        <div id="messages"></div>
        <input type="text" id="messageInput" placeholder="Nachricht eingeben">
        <button onclick="sendMessage()">Senden</button>
    </div>

    <script>
        let peerConnection;
        let dataChannel;
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // Lade gespeicherte Nachrichten aus Local Storage
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('chatMessages')) || [];
            const messagesDiv = document.getElementById('messages');
            messages.forEach(msg => {
                messagesDiv.innerHTML += `<p>${msg.sender}: ${msg.message}</p>`;
            });
        }

        // Speichere eine Nachricht im Local Storage
        function saveMessage(sender, message) {
            const messages = JSON.parse(localStorage.getItem('chatMessages')) || [];
            messages.push({ sender, message, timestamp: new Date().toISOString() });
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }

        // Verbindung erstellen (Initiator)
        function createConnection() {
            peerConnection = new RTCPeerConnection(config);
            dataChannel = peerConnection.createDataChannel('chat');
            setupDataChannel();
            peerConnection.createOffer()
                .then(offer => {
                    peerConnection.setLocalDescription(offer);
                    document.getElementById('offer').value = JSON.stringify(offer);
                })
                .catch(err => console.error('Fehler beim Erstellen des Angebots:', err));
        }

        // Verbindung beitreten (Empfänger)
        function joinConnection() {
            peerConnection = new RTCPeerConnection(config);
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                setupDataChannel();
            };
        }

        // Datenkanal konfigurieren
        function setupDataChannel() {
            dataChannel.onopen = () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('chat').style.display = 'block';
                loadMessages(); // Lade gespeicherte Nachrichten
            };
            dataChannel.onmessage = (event) => {
                const message = event.data;
                document.getElementById('messages').innerHTML += `<p>Peer: ${message}</p>`;
                saveMessage('Peer', message); // Speichere empfangene Nachricht
            };
        }

        // Angebot des anderen Peers übernehmen
        function setRemoteOffer() {
            const offer = JSON.parse(document.getElementById('offer').value);
            peerConnection.setRemoteDescription(new RTCSessionDescription(offer))
                .then(() => peerConnection.createAnswer())
                .then(answer => {
                    peerConnection.setLocalDescription(answer);
                    document.getElementById('answer').value = JSON.stringify(answer);
                })
                .catch(err => console.error('Fehler beim Setzen des Angebots:', err));
        }

        // Antwort des anderen Peers übernehmen
        function setRemoteAnswer() {
            const answer = JSON.parse(document.getElementById('answer').value);
            peerConnection.setRemoteDescription(new RTCSessionDescription(answer))
                .then(() => {
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('chat').style.display = 'block';
                    loadMessages(); // Lade gespeicherte Nachrichten
                })
                .catch(err => console.error('Fehler beim Setzen der Antwort:', err));
        }

        // Nachricht senden
        function sendMessage() {
            const message = document.getElementById('messageInput').value;
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(message);
                document.getElementById('messages').innerHTML += `<p>Du: ${message}</p>`;
                saveMessage('Du', message); // Speichere gesendete Nachricht
                document.getElementById('messageInput').value = '';
            }
        }

        // ICE-Kandidaten (müssen manuell ausgetauscht werden)
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                console.log('ICE-Kandidat (manuell teilen):', JSON.stringify(event.candidate));
            }
        };
    </script>
</body>
</html>
