<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.70.1/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background: #000; color: #0f0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 3px solid #0f0; padding: 20px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 2px solid #0f0; color: #0f0; }
        .ai-response { border: 1px solid #0f0; padding: 15px; margin: 20px 0; white-space: pre-wrap; }
        .nft-display { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .nft-item { border: 1px solid #0f0; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Web3 AI Revolution 🔥</h1>
        <button id="connectButton">Connect Phantom Wallet</button>
        <div id="walletInfo" style="margin: 20px 0;"></div>
        
        <h2>💡 AI Web3 Creator</h2>
        <input type="text" id="aiPrompt" placeholder="Describe your Web3 project...">
        <button id="generateButton">CREATE 🔥</button>
        <div id="aiResult" class="ai-response"></div>
        
        <h2>🎨 AI-Generated NFTs</h2>
        <div class="nft-display" id="nftGallery"></div>
    </div>

    <script>
        (function() {
            const { Connection, PublicKey, clusterApiUrl } = window.solanaWeb3;
            const connection = new Connection(clusterApiUrl('mainnet-beta'));
            const OPENAI_API_KEY = 'sk-your-openai-key'; // Replace with your API key
            
            let publicKey = null;
            
            // Initialize connection
            document.getElementById('connectButton').addEventListener('click', async () => {
                if (!window.solana?.isPhantom) return alert('Install Phantom Wallet!');
                
                try {
                    await window.solana.connect();
                    publicKey = new PublicKey(window.solana.publicKey.toString());
                    
                    const balance = await connection.getBalance(publicKey);
                    document.getElementById('walletInfo').innerHTML = `
                        Connected: ${publicKey.toString().slice(0, 6)}...${publicKey.toString().slice(-4)}<br>
                        Balance: ${balance / 1e9} SOL
                    `;
                } catch (error) {
                    console.error('Connection error:', error);
                }
            });

            // AI Generation
            document.getElementById('generateButton').addEventListener('click', async () => {
                if (!publicKey) return alert('Connect wallet first!');
                
                const prompt = document.getElementById('aiPrompt').value;
                const aiResponse = document.getElementById('aiResult');
                
                try {
                    const response = await axios.post('https://api.openai.com/v1/chat/completions', {
                        model: "gpt-3.5-turbo",
                        messages: [{
                            role: "user", 
                            content: `Create a complete Web3 project on Solana with: ${prompt}. Include contract details, tokenomics, and NFT integration.`
                        }]
                    }, {
                        headers: { 'Authorization': `Bearer ${OPENAI_API_KEY}` }
                    });

                    aiResponse.innerHTML = response.data.choices[0].message.content;
                    mintAchievementNFT('AI Project Created: ' + prompt.slice(0, 20));
                } catch (error) {
                    console.error('AI Error:', error);
                    aiResponse.innerHTML = 'Error generating project. Try again!';
                }
            });

            function mintAchievementNFT(achievementText) {
                const nftGallery = document.getElementById('nftGallery');
                nftGallery.innerHTML += `
                    <div class="nft-item">
                        <h3>🏆 Achievement</h3>
                        <p>${achievementText}</p>
                        <small>${new Date().toLocaleDateString()}</small>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
