<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mach Brainrot Barrage</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            background-color: #000; /* Black background */
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Appropriate font ;) */
        }
        canvas {
            display: block; /* Prevent extra space below canvas */
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: yellow; /* High contrast, maybe ugly color */
            text-shadow: 2px 2px 4px #ff00ff; /* Garish shadow */
            z-index: 10;
        }
        #score-display {
            font-size: 28px;
            font-weight: bold;
        }
        #game-over {
            display: none; /* Hidden by default */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000; /* Bright red */
            background-color: rgba(100, 0, 100, 0.8); /* Semi-transparent purple */
            border: 5px dashed lime; /* Clashing border */
            padding: 30px;
            text-align: center;
            font-size: 48px;
            font-weight: bolder;
            z-index: 100;
            text-shadow: 3px 3px 5px #00ffff;
        }
        #game-over button {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            font-size: 24px;
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
            background-color: lime;
            color: blue;
            border: 3px solid orange;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score-display">Score: <span id="score">0</span></div>
    </div>

    <div id="game-over">
        BRAINROT OVERLOAD!<br>
        Final Score: <span id="final-score">0</span><br>
        <button onclick="window.location.reload()">Try Again? (If you dare)</button>
    </div>

    <!-- Load Three.js library from CDN -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script type="module">
        // --- Global Variables ---
        let scene, camera, renderer, player, clock;
        let obstacles = [];
        let collectibles = [];
        let tunnelSegments = [];
        let gameSpeed = 6; // Start a bit faster
        let score = 0;
        let isGameOver = false;
        // Simulate audio - Replace console.log with actual audio loading/playing if possible
        const playSound = (soundName) => { console.log(`SOUND: ${soundName}`); };

        const LANE_WIDTH = 2.5;
        const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
        let currentLane = 1; // 0 = left, 1 = center, 2 = right
        const TUNNEL_LENGTH = 15; // Length of each tunnel segment
        const VISIBLE_SEGMENTS = 10; // How many segments to keep roughly visible

        // --- Initialization ---
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x660066, 10, 70); // Purple fog for atmosphere

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 6); // Player view position
            camera.lookAt(0, 1, 0); // Look slightly down the tunnel

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Clock
            clock = new THREE.Clock();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffaaff, 1.0); // Weird color light
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // Player (Simple Cube)
            const playerGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            // Slightly "Sigma" like colors? Or just bright.
            const playerMaterial = new THREE.MeshStandardMaterial({
                color: 0xcccccc, // Greyish
                roughness: 0.4,
                metalness: 0.8 // Make it shiny
            });
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.y = 0.4; // Sit on the floor
            player.position.x = LANES[currentLane];
            scene.add(player);

            // Initial Tunnel
            createInitialTunnel();

            // Event Listeners
            window.addEventListener('keydown', handleInput);
            window.addEventListener('resize', onWindowResize);

            // Start Game Loop
            animate();
        }

        // --- Tunnel Management ---
        function createTunnelSegment(positionZ) {
            const segmentGroup = new THREE.Group();

            // Floor
            const floorGeo = new THREE.PlaneGeometry(LANE_WIDTH * 3 + 2, TUNNEL_LENGTH);
            // Random garish color for floor segment
            const floorMat = new THREE.MeshStandardMaterial({
                color: new THREE.Color(Math.random(), Math.random() * 0.5, Math.random()), // Random darkish color
                side: THREE.DoubleSide,
                roughness: 0.8
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            segmentGroup.add(floor);

            // Walls (Simple colored walls)
            const wallHeight = 5;
            const wallGeo = new THREE.PlaneGeometry(TUNNEL_LENGTH, wallHeight);
            const wallMatLeft = new THREE.MeshStandardMaterial({ color: new THREE.Color(Math.random(), 0.2, 0.2), side: THREE.DoubleSide });
            const wallMatRight = new THREE.MeshStandardMaterial({ color: new THREE.Color(0.2, Math.random(), 0.2), side: THREE.DoubleSide });

            const leftWall = new THREE.Mesh(wallGeo, wallMatLeft);
            leftWall.position.x = -(LANE_WIDTH * 1.5 + 1);
            leftWall.position.y = wallHeight / 2;
            leftWall.rotation.y = Math.PI / 2;
            segmentGroup.add(leftWall);

            const rightWall = new THREE.Mesh(wallGeo, wallMatRight);
            rightWall.position.x = (LANE_WIDTH * 1.5 + 1);
            rightWall.position.y = wallHeight / 2;
            rightWall.rotation.y = -Math.PI / 2;
            segmentGroup.add(rightWall);

            segmentGroup.position.z = positionZ;
            scene.add(segmentGroup);
            tunnelSegments.push({ group: segmentGroup, initialZ: positionZ }); // Store initial Z for wrapping
            return segmentGroup;
        }

        function createInitialTunnel() {
            for (let i = 0; i < VISIBLE_SEGMENTS + 2; i++) { // Create a few extra
                createTunnelSegment(-i * TUNNEL_LENGTH);
            }
        }

        function manageTunnel(deltaTime) {
            const moveZ = gameSpeed * deltaTime * 5; // Adjust multiplier for perceived speed

            tunnelSegments.forEach(segmentData => {
                segmentData.group.position.z += moveZ;
            });

            // Recycle segments that move past the camera
            const recycleThreshold = camera.position.z + TUNNEL_LENGTH; // Point just behind camera start
            const totalTunnelDepth = (VISIBLE_SEGMENTS + 2) * TUNNEL_LENGTH;

            tunnelSegments.forEach(segmentData => {
                if (segmentData.group.position.z > recycleThreshold) {
                    segmentData.group.position.z -= totalTunnelDepth; // Move it way back

                    // CHAOS: Randomly change floor/wall colors when recycling
                    segmentData.group.children.forEach(child => {
                        if (child.material) {
                           child.material.color.setRGB(Math.random(), Math.random(), Math.random());
                        }
                    });

                    // Spawn new objects in the recycled segment
                    maybeSpawnObjects(segmentData.group.position.z);
                }
            });
        }

        // --- Object Spawning ---
        function maybeSpawnObjects(spawnZ) {
             // Clear objects associated with this Z first (important for recycling)
             obstacles = obstacles.filter(obj => {
                 if (Math.abs(obj.userData.spawnZ - spawnZ) < 1) { // If object belongs to this segment
                     scene.remove(obj);
                     obj.geometry.dispose(); // Clean up GPU memory
                     obj.material.dispose();
                     return false; // Remove from array
                 }
                 return true;
             });
             collectibles = collectibles.filter(obj => {
                 if (Math.abs(obj.userData.spawnZ - spawnZ) < 1) {
                    scene.remove(obj);
                    obj.geometry.dispose();
                    obj.material.dispose();
                    return false;
                 }
                 return true;
             });


            // Randomly decide whether to spawn stuff
            let objectsSpawnedInSegment = 0;
            for (let i = 0; i < 3; i++) { // For each lane
                if (objectsSpawnedInSegment >= 2) break; // Max 2 objects per segment row

                const laneX = LANES[i];
                const rand = Math.random();
                // Increase spawn chance over time/speed slightly
                const spawnProbFactor = Math.min(1.5, 1 + gameSpeed * 0.02);

                if (rand < 0.15 * spawnProbFactor) { // Obstacle chance
                    spawnObstacle(laneX, spawnZ - TUNNEL_LENGTH / 2); // Spawn near middle of segment Z
                    objectsSpawnedInSegment++;
                } else if (rand < 0.22 * spawnProbFactor) { // Collectible chance
                    spawnCollectible(laneX, spawnZ - TUNNEL_LENGTH / 2);
                    objectsSpawnedInSegment++;
                }
            }
             // Random sound on recycle/spawn sometimes
            if (Math.random() < 0.05) playSound(['SKIBIDI', 'OHIO', 'GRIMACE', 'SIGMA_WHAT'][Math.floor(Math.random()*4)]);
        }

        function spawnObstacle(posX, posZ) {
            // Represents Skibidi Toilet, Ohio, Grimace Shake etc. - Use different shapes/colors?
            const type = Math.random();
            let geometry, color;
            if (type < 0.4) { // "Skibidi" - Tall Box
                geometry = new THREE.BoxGeometry(0.7, 1.2, 0.7);
                color = 0x8B4513; // Brown-ish
            } else if (type < 0.7) { // "Ohio" - Flat Wide Box
                geometry = new THREE.BoxGeometry(1.5, 0.2, 1.5);
                color = 0xff0000; // Red
            } else { // "Grimace" - Sphere
                geometry = new THREE.SphereGeometry(0.5, 16, 16);
                color = 0x6A0DAD; // Purple
            }

            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const obstacle = new THREE.Mesh(geometry, material);
            obstacle.position.set(posX, geometry.parameters.height ? geometry.parameters.height / 2 : 0.5, posZ); // Position based on shape
            obstacle.userData.type = 'obstacle';
            obstacle.userData.spawnZ = posZ + TUNNEL_LENGTH / 2; // Store original segment Z for cleanup
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function spawnCollectible(posX, posZ) {
            // Represents Sigma face, Rizz - Use a shiny box/sphere
            const geometry = new THREE.BoxGeometry(0.4, 0.4, 0.4); // Small cube
            const material = new THREE.MeshStandardMaterial({
                color: 0xffff00, // Yellow
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0xaaaa00 // Make it glow slightly
            });
            const collectible = new THREE.Mesh(geometry, material);
            collectible.position.set(posX, 0.6, posZ); // Float slightly higher
            collectible.userData.type = 'collectible';
             collectible.userData.spawnZ = posZ + TUNNEL_LENGTH / 2;
            collectible.rotation.set(Math.random(), Math.random(), Math.random()); // Random rotation
            scene.add(collectible);
            collectibles.push(collectible);
        }

        // --- Game Logic ---
        function handleInput(event) {
            if (isGameOver) return;

            let targetLane = currentLane;
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                targetLane = Math.max(0, currentLane - 1);
            } else if (event.key === 'ArrowRight' || event.key === 'd') {
                targetLane = Math.min(2, currentLane + 1);
            }

            if (targetLane !== currentLane) {
                 playSound('MOVE_SWOOSH'); // Simulate movement sound
                currentLane = targetLane;
                // Snap movement for simplicity in this version
                player.position.x = LANES[currentLane];
            }
            // Add jump/duck later if desired
        }

        function updateObjects(deltaTime) {
            const moveZ = gameSpeed * deltaTime * 5;

            // Move obstacles and collectibles forward visually (relative to world)
            // They are static within their moving tunnel segments logically
            obstacles.forEach(obstacle => {
                obstacle.position.z += moveZ;
                 // Optional: Add slight wobble/rotation for chaos
                 obstacle.rotation.y += deltaTime * Math.random() * 0.5;
            });
            collectibles.forEach(collectible => {
                 collectible.position.z += moveZ;
                 // Make collectibles spin
                 collectible.rotation.x += deltaTime * 1.5;
                 collectible.rotation.y += deltaTime * 1.5;
            });

            // Object cleanup is handled during tunnel recycling now
        }


        function checkCollisions() {
            if (isGameOver) return;

            const playerBox = new THREE.Box3().setFromObject(player);

            // Check Obstacle Collisions
            obstacles.forEach(obstacle => {
                 // Only check collisions for objects roughly near the player
                if (obstacle.position.z > -2 && obstacle.position.z < player.position.z + 2) {
                    const obstacleBox = new THREE.Box3().setFromObject(obstacle);
                    if (playerBox.intersectsBox(obstacleBox)) {
                        console.log("HIT OBSTACLE!");
                        playSound('VINE_BOOM');
                        triggerGameOver();
                        return; // Exit loop early on game over
                    }
                }
            });

            if (isGameOver) return; // Check again in case obstacle collision happened

            // Check Collectible Collisions (Iterate backwards for safe removal)
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const collectible = collectibles[i];
                 // Only check collisions for objects roughly near the player
                if (collectible.position.z > -2 && collectible.position.z < player.position.z + 2) {
                    const collectibleBox = new THREE.Box3().setFromObject(collectible);
                    if (playerBox.intersectsBox(collectibleBox)) {
                        console.log("COLLECTED!");
                        playSound('SIGMA_SOUND'); // Or coin sound
                        score += 100; // More points for collectibles
                        updateScoreUI();

                        // Remove collectible
                        scene.remove(collectible);
                        collectible.geometry.dispose();
                        collectible.material.dispose();
                        collectibles.splice(i, 1); // Remove from array

                         // Optional: Add visual feedback (flash screen?)
                        flashScreen(0x00ff00, 100); // Green flash
                    }
                }
            }
        }

        function updateGameSpeed(deltaTime) {
            if (isGameOver) return;
            // Gradually increase speed, but cap it eventually
            gameSpeed += deltaTime * 0.06; // Faster increase?
             gameSpeed = Math.min(gameSpeed, 25); // Set a max speed
        }

         function updateScoreUI() {
             document.getElementById('score').innerText = Math.floor(score);
         }

        function triggerGameOver() {
            isGameOver = true;
            playSound('GAME_OVER_SOUND');
             // Make player visually react (e.g., turn red, disappear)
             player.material.color.set(0xff0000);
             player.material.emissive.set(0xff0000); // Glow red

            // Show Game Over screen
            document.getElementById('final-score').innerText = Math.floor(score);
            document.getElementById('game-over').style.display = 'block';

             // Optional: Stop everything abruptly
             // No need to stop requestAnimationFrame, just skip updates in animate()
        }

        // --- Utilities ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function flashScreen(color = 0xffffff, duration = 150) {
            const overlay = new THREE.Mesh(
                new THREE.PlaneGeometry(2, 2, 1, 1), // Covers entire screen NDC
                new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.5,
                    depthTest: false // Render on top
                })
            );
            overlay.material.blending = THREE.AdditiveBlending; // Brighter flash
            overlay.frustumCulled = false; // Always draw
             // Add directly to camera so it stays in view
            camera.add(overlay);

            setTimeout(() => {
                 camera.remove(overlay);
                 overlay.geometry.dispose();
                 overlay.material.dispose();
            }, duration);
        }


        // --- Game Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = clock.getDelta();

            if (!isGameOver) {
                // Update game elements
                manageTunnel(deltaTime); // Pass deltaTime for movement calculation
                updateObjects(deltaTime);
                checkCollisions();
                updateGameSpeed(deltaTime);

                 // Update score based on time survived (less points than collectibles)
                 score += deltaTime * gameSpeed; // Score increases faster at higher speeds
                 updateScoreUI();

                 // Subtle camera bob/shake for brainrot effect?
                 const time = Date.now() * 0.002; // Slow oscillation
                 camera.position.y = 2 + Math.sin(time * 3) * 0.05; // Gentle bob
                 camera.position.x = Math.sin(time * 2) * 0.08 * (gameSpeed / 6); // Gentle sway, increases with speed

                 // Lerp player towards target lane (smoother than snap)
                 const targetX = LANES[currentLane];
                 player.position.x += (targetX - player.position.x) * 0.2; // Adjust 0.2 for faster/slower lerp
            } else {
                 // Optional: Add game over animations (e.g., camera spin)
                 // camera.rotation.z += deltaTime * 0.5;
            }

            renderer.render(scene, camera);
        }

        // --- Start ---
        init();

    </script>
</body>
</html>
