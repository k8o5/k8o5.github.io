<!DOCTYPE html>
<html>
<head>
    <title>SocialChain - k8o5.com</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/webrtc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js/crypto-js.js"></script>
    <style>
        /* Facebook-like styling */
        body { max-width: 1200px; margin: 0 auto; font-family: Arial, sans-serif; }
        .post { background: #f0f2f5; border-radius: 8px; padding: 15px; margin: 10px 0; }
        .wallet { position: fixed; top: 10px; right: 10px; background: #fff; padding: 10px; border-radius: 8px; }
        /* ... add more styles as needed ... */
    </style>
</head>
<body>
    <div class="wallet">
        <h3>💰 Wallet: <span id="balance">0</span> SCL</h3>
        <p>IP: <span id="userIp">...</span></p>
    </div>
    
    <div id="feed"></div>
    <div id="newPost">
        <textarea id="postContent" placeholder="What's on your mind?"></textarea>
        <button onclick="createPost()">Post (Earn 1 SCL)</button>
    </div>

    <script>
        // Blockchain Core
        class Blockchain {
            constructor() {
                this.chain = JSON.parse(localStorage.getItem('blockchain')) || [this.createGenesisBlock()];
                this.pendingTransactions = [];
                this.difficulty = 3;
                this.miningReward = 10;
            }

            createGenesisBlock() {
                return {
                    index: 0,
                    timestamp: Date.now(),
                    transactions: [],
                    previousHash: "0",
                    hash: this.calculateHash(0, "0", [], Date.now(), 0),
                    nonce: 0
                };
            }

            calculateHash(index, previousHash, transactions, timestamp, nonce) {
                return CryptoJS.SHA256(
                    index + previousHash + JSON.stringify(transactions) + timestamp + nonce
                ).toString();
            }

            minePendingTransactions(miningRewardAddress) {
                const block = {
                    index: this.chain.length,
                    previousHash: this.chain[this.chain.length - 1].hash,
                    timestamp: Date.now(),
                    transactions: this.pendingTransactions,
                    nonce: 0
                };

                block.hash = this.calculateHash(
                    block.index,
                    block.previousHash,
                    block.transactions,
                    block.timestamp,
                    block.nonce
                );

                while (block.hash.substring(0, this.difficulty) !== Array(this.difficulty + 1).join("0")) {
                    block.nonce++;
                    block.hash = this.calculateHash(
                        block.index,
                        block.previousHash,
                        block.transactions,
                        block.timestamp,
                        block.nonce
                    );
                }

                this.chain.push(block);
                this.pendingTransactions = [];
                localStorage.setItem('blockchain', JSON.stringify(this.chain));
                
                // Add mining reward
                this.pendingTransactions.push({
                    from: 'network',
                    to: miningRewardAddress,
                    amount: this.miningReward
                });
            }

            getBalance(address) {
                let balance = 0;
                for (const block of this.chain) {
                    for (const tx of block.transactions) {
                        if (tx.to === address) balance += tx.amount;
                        if (tx.from === address) balance -= tx.amount;
                    }
                }
                return balance;
            }
        }

        // Social Network Core
        let userIp = '';
        const gun = Gun({ peers: ['https://k8o5.com/gun'], localStorage: true });
        const blockchain = new Blockchain();
        let socialChain = gun.get('socialChain');

        async function fetchIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIp = data.ip;
                document.getElementById('userIp').textContent = userIp;
                updateBalance();
            } catch (error) {
                userIp = 'unknown';
            }
        }

        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) return;

            // Create transaction
            blockchain.pendingTransactions.push({
                from: userIp,
                to: 'network',
                amount: 1,
                type: 'post',
                content: content,
                timestamp: Date.now()
            });

            // Mine block automatically
            blockchain.minePendingTransactions(userIp);
            updateBalance();
            socialChain.get('posts').set({
                content: content,
                author: userIp,
                timestamp: Date.now()
            });
            document.getElementById('postContent').value = '';
        }

        function updateBalance() {
            document.getElementById('balance').textContent = 
                blockchain.getBalance(userIp);
        }

        // Initialize
        fetchIp();
        setInterval(() => {
            // Auto-mine every 5 minutes
            blockchain.minePendingTransactions(userIp);
            updateBalance();
        }, 300000);

        // Real-time updates
        socialChain.get('posts').map().on((post, id) => {
            if (!post || !id) return;
            
            const postElement = document.createElement('div');
            postElement.className = 'post';
            postElement.innerHTML = `
                <h4>@${post.author} (${blockchain.getBalance(post.author)} SCL)</h4>
                <p>${post.content}</p>
                <small>${new Date(post.timestamp).toLocaleString()}</small>
            `;
            document.getElementById('feed').prepend(postElement);
        });
    </script>
</body>
</html>
