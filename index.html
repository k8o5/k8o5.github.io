<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8O5 Rocket Pool</title>
    <style>
        /* Add all previous styles here */
        /* Add new styles for the pool display */
        #poolDisplay {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
            font-size: 18px;
        }

        #cashOutButton {
            background: linear-gradient(45deg, #00ff88, #4A90E2);
            display: none;
        }

        #triesLeft {
            margin: 10px;
            font-size: 16px;
            color: #ff4081;
        }
    </style>
</head>
<body>
    <!-- Add previous HTML elements here -->
    <div id="poolDisplay">
        Total Pool: <span id="poolAmount">0</span> K8O5
    </div>
    <div id="triesLeft">Tries Left Today: <span id="triesCounter">10</span></div>
    <button id="cashOutButton" onclick="cashOut()">CASH OUT</button>

    <script>
        // Pool and game state
        let poolBalance = 1000000; // Initial pool
        let userBalance = 0;
        let currentMultiplier = 1;
        let triesLeft = 10;
        let isCashedOut = false;
        const contractAddress = 'AmaLfA5qUMUDG5DfxVFR8ZmM41dR5b9H6xpsM6qApump';
        const buyInAmount = 1; // 1 K8O5 per try
        const maxTries = 10;

        // Update pool display
        function updatePoolDisplay() {
            document.getElementById('poolAmount').textContent = poolBalance.toLocaleString();
            document.getElementById('triesCounter').textContent = triesLeft;
        }

        // Connect to Phantom Wallet
        async function connectPhantom() {
            try {
                if (!window.solana?.isPhantom) {
                    alert('Install Phantom Wallet!');
                    return;
                }

                await window.solana.connect();
                phantomConnected = true;
                document.getElementById('result').innerHTML = '🟢 WALLET CONNECTED!';
                document.getElementById('phantomConnect').style.background = 'linear-gradient(45deg, #4A90E2, #00ff88)';
            } catch (err) {
                console.error(err);
                alert('Connection failed');
            }
        }

        // Launch Rocket
        async function launchRocket() {
            if (!phantomConnected) return alert('CONNECT WALLET FIRST!');
            if (isLaunching) return;
            if (triesLeft <= 0) return alert('NO TRIES LEFT TODAY!');
            if (poolBalance < 100) return alert('POOL TOO LOW!');

            // Deduct buy-in from user (simulated)
            const transaction = await simulateTransaction(buyInAmount);
            if (!transaction.success) return alert('TRANSACTION FAILED!');

            poolBalance += buyInAmount;
            triesLeft--;
            updatePoolDisplay();

            isLaunching = true;
            const rocket = document.getElementById('rocket');
            const countdown = document.getElementById('countdown');
            
            // Generate random multiplier (1% chance for 1,000,000%)
            const win = Math.random() < 0.01;
            currentMultiplier = win ? 1000000 : Math.random() * 100;

            // Launch sequence
            rocket.style.animation = 'rocketShake 0.1s infinite';
            let progress = 0;
            const progressInterval = setInterval(() => {
                document.getElementById('progressFill').style.height = ++progress + '%';
            }, 40);

            // Animate countdown
            let counter = 3;
            countdown.textContent = counter;
            countdown.style.opacity = '1';
            const countdownInterval = setInterval(() => {
                countdown.textContent = --counter;
                if (counter === 0) {
                    clearInterval(countdownInterval);
                    countdown.style.opacity = '0';
                }
            }, 1000);

            setTimeout(() => {
                clearInterval(progressInterval);
                if (win) {
                    rocket.style.bottom = '-100px';
                    document.body.style.background = '#000044';
                    createExplosion(150, 300);
                    showConfetti();
                    userBalance += (buyInAmount * currentMultiplier);
                    poolBalance -= (buyInAmount * currentMultiplier);
                    document.getElementById('result').innerHTML = 
                        `🚀 JACKPOT! ${(buyInAmount * currentMultiplier).toLocaleString()} K8O5 WON!`;
                    document.getElementById('cashOutButton').style.display = 'block';
                } else {
                    rocket.style.animation = '';
                    rocket.style.bottom = Math.random() * 100 + 'px';
                    setTimeout(() => {
                        rocket.style.bottom = '0';
                        createExplosion(150, 500);
                        document.getElementById('result').textContent = 
                            `LAUNCH FAILED! ${currentMultiplier.toFixed(2)}% REACHED`;
                    }, 2000);
                }
                updatePoolDisplay();
                isLaunching = false;
                document.getElementById('progressFill').style.height = '0%';
            }, 4000);
        }

        // Cash Out
        async function cashOut() {
            if (userBalance <= 0) return alert('NO FUNDS TO CASH OUT!');
            
            const transaction = await simulateTransaction(-userBalance);
            if (!transaction.success) return alert('CASH OUT FAILED!');

            alert(`SUCCESS! ${userBalance.toLocaleString()} K8O5 SENT TO YOUR WALLET!`);
            userBalance = 0;
            document.getElementById('cashOutButton').style.display = 'none';
        }

        // Simulate Transaction (Replace with actual Solana transaction)
        async function simulateTransaction(amount) {
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve({ success: true });
                }, 1000);
            });
        }

        // Initialize
        updatePoolDisplay();
    </script>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>
</body>
</html>
