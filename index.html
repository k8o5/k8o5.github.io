<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Loader with Console</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #urlInput {
            width: 70%;
            padding: 10px;
            font-size: 16px;
        }
        #loadButton {
            padding: 10px 20px;
            font-size: 16px;
        }
        #consoleLog {
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
            background-color: #f5f5f5;
            margin-top: 20px;
            font-size: 14px;
        }
        #websiteFrame {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Website Loader with Console</h1>
    <input type="text" id="urlInput" placeholder="Enter website URL (e.g., https://example.com)">
    <button id="loadButton">Load Website</button>
    <iframe id="websiteFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    <div id="consoleLog"></div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadButton = document.getElementById('loadButton');
        const websiteFrame = document.getElementById('websiteFrame');
        const consoleLog = document.getElementById('consoleLog');

        // Function to log messages to our console area
        function logMessage(message) {
            const logEntry = document.createElement('p');
            logEntry.textContent = message;
            consoleLog.appendChild(logEntry);
            consoleLog.scrollTop = consoleLog.scrollHeight; // Auto-scroll to the bottom
        }

        // Override console.log and console.error to show in our custom log
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            logMessage('Log: ' + args.join(' '));
            originalConsoleLog.apply(console, args);
        };

        const originalConsoleError = console.error;
        console.error = function(...args) {
            logMessage('Error: ' + args.join(' '));
            originalConsoleError.apply(console, args);
        };

        // Load the website when the button is clicked
        loadButton.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (url) {
                // Ensure the URL has a protocol (http:// or https://)
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    websiteFrame.src = 'https://' + url;
                    logMessage(`Loading website: https://${url}`);
                } else {
                    websiteFrame.src = url;
                    logMessage(`Loading website: ${url}`);
                }
            } else {
                logMessage('Error: Please enter a valid URL.');
            }
        });

        // Log when the iframe finishes loading or encounters an error
        websiteFrame.addEventListener('load', () => {
            logMessage('Website loaded successfully.');
        });

        // Note: We can’t fully access the iframe’s console due to security restrictions
    </script>
</body>
</html>
