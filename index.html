<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        // Scene, Camera, Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);

        // Licht hinzufügen
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5).normalize();
        scene.add(light);

        // GLTFLoader für das Laden der .glb-Datei
        const loader = new THREE.GLTFLoader();
        let model;

        // Lade das 3D-Modell
        loader.load(
            'textured_mesh.glb', // Ersetze dies durch den Pfad zu deiner .glb-Datei
            function (gltf) {
                model = gltf.scene;
                scene.add(model);

                // Zentriere das Modell
                const box = new THREE.Box3().setFromObject(model);
                const center = new THREE.Vector3();
                box.getCenter(center);
                model.position.sub(center);

                // Event-Listener für Klicks auf das Modell hinzufügen
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();

                window.addEventListener('click', (event) => {
                    // Mausposition normalisieren
                    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                    // Raycaster verwenden, um zu prüfen, ob das Modell angeklickt wurde
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObject(model, true);

                    if (intersects.length > 0) {
                        // Weiterleitung zu twitch.tv/k8o5
                        window.location.href = 'https://www.twitch.tv/k8o5';
                    }
                });
            },
            undefined,
            function (error) {
                console.error('Fehler beim Laden des Modells:', error);
            }
        );

        // Kamera positionieren
        camera.position.z = 5;

        // Animation
        function animate() {
            requestAnimationFrame(animate);

            // Modell langsam drehen
            if (model) {
                model.rotation.y += 0.005; // Geschwindigkeit der Drehung anpassen
            }

            renderer.render(scene, camera);
        }

        animate();

        // Fenstergröße anpassen
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
