<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #canvas {
            width: 100%;
            height: 60vh;
            border: 2px solid #fff;
            margin-bottom: 20px;
        }
        #text-game {
            width: 100%;
            height: 40vh;
            padding: 10px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            overflow-y: auto;
        }
        #text-game p {
            margin: 5px 0;
        }
        button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #1e6dba;
            color: white;
        }
        button:hover {
            background: #1a5590;
        }
        #dialogue-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 16px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="canvas"></div>
        <div id="text-game">
            <p>Willkommen bei k8o5 - Omega Full Game!</p>
            <p>Klicke auf die Buttons, um das Spiel zu steuern.</p>
        </div>
    </div>
    <div id="dialogue-box"></div>

    <!-- Three.js Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // ==================== 3D Scene Setup ====================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight * 0.6); // Adjust canvas height
        document.getElementById('canvas').appendChild(renderer.domElement);

        // Add ambient light for better visibility
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // Add directional light for shadows and depth
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7).normalize();
        scene.add(directionalLight);

        // GLTFLoader for loading the 3D model
        const loader = new THREE.GLTFLoader();
        let npcModel;

        loader.load(
            'tmp101zm6ml.glb', // Replace with your GLB file path
            function (gltf) {
                npcModel = gltf.scene;
                scene.add(npcModel);

                // Center the model
                const box = new THREE.Box3().setFromObject(npcModel);
                const center = new THREE.Vector3();
                box.getCenter(center);
                npcModel.position.sub(center);

                // Scale the model if needed
                npcModel.scale.set(0.5, 0.5, 0.5);

                // Position the NPC in the scene
                npcModel.position.y = 0;
                npcModel.position.z = -5;

                // Add click interaction for NPC
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                const dialogueBox = document.getElementById('dialogue-box');

                window.addEventListener('click', (event) => {
                    // Normalize mouse position
                    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(event.clientY / (window.innerHeight * 0.6)) * 2 + 1; // Adjust for canvas height

                    // Check if the NPC is clicked
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObject(npcModel, true);

                    if (intersects.length > 0) {
                        // Show dialogue box
                        dialogueBox.textContent = "Willkommen bei k8o5! Ich bin dein Guide in dieser Welt.";
                        dialogueBox.style.display = 'block';

                        // Hide dialogue box after 5 seconds
                        setTimeout(() => {
                            dialogueBox.style.display = 'none';
                        }, 5000);
                    }
                });
            },
            undefined,
            function (error) {
                console.error('Fehler beim Laden des Modells:', error);
            }
        );

        // Position the camera
        camera.position.z = 10;
        camera.position.y = 2;

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate the NPC slowly
            if (npcModel) {
                npcModel.rotation.y += 0.005; // Adjust rotation speed as needed
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight * 0.6); // Adjust for canvas height
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight * 0.6);
        });

        // ==================== Text-Based Game Logic ====================
        const textGameContainer = document.getElementById('text-game');
        let playerHealth = 100;
        let gold = 0;
        let currentWeapon = "Fists";
        let damageMultiplier = 1;

        function updateStatus() {
            textGameContainer.innerHTML = `
                <p>Health: ${playerHealth}</p>
                <p>Gold: ${gold}</p>
                <p>Weapon: ${currentWeapon} (Damage Multiplier: x${damageMultiplier})</p>
            `;
        }

        function logEvent(message) {
            const paragraph = document.createElement('p');
            paragraph.textContent = message;
            textGameContainer.appendChild(paragraph);
            textGameContainer.scrollTop = textGameContainer.scrollHeight; // Scroll to bottom
        }

        function exploreForest() {
            const event = Math.floor(Math.random() * 3);
            switch (event) {
                case 0:
                    logEvent("Du fandest einen verborgenen Schatz! +20 Gold");
                    gold += 20;
                    break;
                case 1:
                    logEvent("Du tratest in eine gefährliche Falle! -10 Health");
                    playerHealth -= 10;
                    break;
                case 2:
                    logEvent("Du stolperte über ein mysteriöses Artefakt! Waffenstärke erhöht!");
                    damageMultiplier += 1;
                    break;
            }
            checkGameOver();
        }

        function fightEnemy() {
            const enemyHealth = 50;
            let enemyHp = enemyHealth;

            logEvent("Ein wildes Monster erscheint! Vorbereitung auf den Kampf!");

            const fightLoop = setInterval(() => {
                if (playerHealth <= 0 || enemyHp <= 0) {
                    clearInterval(fightLoop);
                    return;
                }

                const playerDamage = Math.floor(Math.random() * 10 * damageMultiplier);
                enemyHp -= playerDamage;
                logEvent(`Du verursachtest ${playerDamage} Schaden dem Monster!`);

                if (enemyHp <= 0) {
                    clearInterval(fightLoop);
                    logEvent("Du hast das Monster besiegt! +15 Gold");
                    gold += 15;
                    return;
                }

                const enemyDamage = Math.floor(Math.random() * 10 + 5);
                playerHealth -= enemyDamage;
                logEvent(`Das Monster verursacht dir ${enemyDamage} Schaden!`);

                checkGameOver();
            }, 1000);
        }

        function visitShop() {
            const shopOptions = `
                <p>Willkommen im Shop!</p>
                <button onclick="buyItem('Wooden Sword', 10, 2)">Holzschwert kaufen (10 Gold)</button>
                <button onclick="buyItem('Iron Sword', 25, 3)">Eisenschwert kaufen (25 Gold)</button>
                <button onclick="buyItem('Health Potion', 15, null)">Heiltrank kaufen (+20 Health) (15 Gold)</button>
                <button onclick="closeShop()">Shop verlassen</button>
            `;
            textGameContainer.innerHTML = shopOptions;
        }

        function buyItem(item, cost, multiplier) {
            if (gold >= cost) {
                if (item === "Health Potion") {
                    playerHealth += 20;
                    logEvent("Du trinkst einen Heiltrank und regenerierst 20 Health!");
                } else {
                    currentWeapon = item;
                    damageMultiplier = multiplier;
                    logEvent(`Du kaufst ein ${item}!`);
                }
                gold -= cost;
            } else {
                logEvent("Nicht genug Gold!");
            }
            closeShop();
            updateStatus();
        }

        function closeShop() {
            updateStatus();
        }

        function checkGameOver() {
            if (playerHealth <= 0) {
                logEvent("Game Over! Du wurdest besiegt...");
                document.querySelectorAll("button").forEach(btn => btn.disabled = true);
            }
            updateStatus();
        }

        // Initialize game
        updateStatus();

        // ==================== Buttons ====================
        document.body.innerHTML += `
            <button onclick="exploreForest()">Wald erkunden</button>
            <button onclick="fightEnemy()">Feind bekämpfen</button>
            <button onclick="visitShop()">Shop besuchen</button>
        `;
    </script>
</body>
</html>
