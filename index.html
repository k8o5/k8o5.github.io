<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fart Tag - Das lustigste Spiel ohne Backend!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Verhindert Scrollen/Zoom auf mobilen Geräten */
        }
        body {
            background: linear-gradient(135deg, #ffeb3b 0%, #ff9800 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 600px;
            position: relative;
            overflow: hidden;
            border: 3px solid #ff5722;
        }
        h1 {
            text-align: center;
            color: #ff5722;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        #game-area {
            width: 100%;
            height: calc(100% - 60px);
            background: url('https://www.transparenttextures.com/patterns/cartoon-grass.png');
            position: relative;
            overflow: hidden;
        }
        .player {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            text-align: center;
            line-height: 40px;
            transition: all 0.05s linear; /* Sanfte Bewegung */
        }
        .player.it {
            border-radius: 50%;
            box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.7);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .fart-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(139, 69, 19, 0.5);
            border-radius: 50%;
            animation: fart 0.5s forwards;
        }
        @keyframes fart {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        #online-users {
            text-align: center;
            color: #ff5722;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        #joystick {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 100px;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            display: none;
            touch-action: none;
        }
        #joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ff5722;
            border-radius: 50%;
            top: 25px;
            left: 25px;
            transform: translate(0, 0);
            touch-action: none;
        }
        @media (max-width: 600px) {
            .container {
                width: 100%;
                height: 400px;
            }
            h1 {
                font-size: 1.2rem;
            }
            #game-area {
                height: calc(100% - 50px);
            }
            .player {
                width: 30px;
                height: 30px;
                font-size: 1.2rem;
                line-height: 30px;
            }
            #online-users {
                font-size: 0.9rem;
            }
            #joystick {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fart Tag - Wer furzt dich?!</h1>
        <div id="online-users">Online Spieler: 1</div>
        <div id="game-area"></div>
    </div>
    <div id="joystick">
        <div id="joystick-knob"></div>
    </div>

    <!-- PeerJS einbinden -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // Vordefinierte Liste von Peer-IDs (für unendlich viele Spieler)
        const POSSIBLE_PEER_IDS = Array.from({ length: 1000 }, (_, i) => `peer-${i + 1}`);

        // Wähle eine zufällige Peer-ID aus der Liste für diesen Spieler
        const myPeerId = POSSIBLE_PEER_IDS[Math.floor(Math.random() * POSSIBLE_PEER_IDS.length)];
        const userId = `Nutzer-${myPeerId}`;

        // PeerJS initialisieren mit der ausgewählten Peer-ID
        const peer = new Peer(myPeerId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }, // Öffentlicher STUN-Server von Google
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        // Liste der verbundenen Peers
        const connections = new Map();

        // Spieler-Daten
        const players = new Map();
        let myPlayer = {
            id: myPeerId,
            x: Math.random() * (window.innerWidth - 50),
            y: Math.random() * (window.innerHeight - 50),
            emoji: getRandomEmoji(),
            isIt: false,
            vx: 0, // Geschwindigkeit in x-Richtung
            vy: 0  // Geschwindigkeit in y-Richtung
        };
        players.set(myPeerId, myPlayer);

        // Spielbereich
        const gameArea = document.getElementById('game-area');
        const onlineUsers = document.getElementById('online-users');

        // Zufälliges Emoji für Spieler
        function getRandomEmoji() {
            const emojis = ['💩', '🐷', '🤡', '🐮', '🐔', '🦊', '🐸', '🐵'];
            return emojis[Math.floor(Math.random() * emojis.length)];
        }

        // Spieler rendern
        function renderPlayers() {
            gameArea.innerHTML = '';
            players.forEach(player => {
                const playerElement = document.createElement('div');
                playerElement.className = 'player' + (player.isIt ? ' it' : '');
                playerElement.style.left = `${player.x}px`;
                playerElement.style.top = `${player.y}px`;
                playerElement.textContent = player.emoji;
                gameArea.appendChild(playerElement);
            });
        }

        // Bewegung aktualisieren
        const speed = 5;
        function updateMovement() {
            myPlayer.x += myPlayer.vx;
            myPlayer.y += myPlayer.vy;

            // Begrenze die Bewegung innerhalb des Spielfelds
            myPlayer.x = Math.max(0, Math.min(myPlayer.x, gameArea.clientWidth - 40));
            myPlayer.y = Math.max(0, Math.min(myPlayer.y, gameArea.clientHeight - 40));

            broadcastPlayerUpdate();
            checkCollisions();
            renderPlayers();

            requestAnimationFrame(updateMovement);
        }

        // Desktop-Steuerung (Pfeiltasten)
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
        document.addEventListener('keydown', (e) => {
            if (e.key in keys) {
                keys[e.key] = true;
                updateVelocity();
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.key in keys) {
                keys[e.key] = false;
                updateVelocity();
            }
        });

        function updateVelocity() {
            myPlayer.vx = 0;
            myPlayer.vy = 0;
            if (keys.ArrowLeft) myPlayer.vx = -speed;
            if (keys.ArrowRight) myPlayer.vx = speed;
            if (keys.ArrowUp) myPlayer.vy = -speed;
            if (keys.ArrowDown) myPlayer.vy = speed;
        }

        // Mobile-Steuerung (Joystick)
        const joystick = document.getElementById('joystick');
        const joystickKnob = document.getElementById('joystick-knob');
        let isDragging = false;
        let joystickCenterX, joystickCenterY;

        joystick.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            joystickCenterX = joystick.offsetLeft + 50;
            joystickCenterY = joystick.offsetTop + 50;
        });

        joystick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDragging) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joystickCenterX;
            const dy = touch.clientY - joystickCenterY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxDistance = 50;
            const angle = Math.atan2(dy, dx);

            if (distance > maxDistance) {
                joystickKnob.style.transform = `translate(${Math.cos(angle) * maxDistance}px, ${Math.sin(angle) * maxDistance}px)`;
            } else {
                joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            }

            const speedFactor = Math.min(distance / maxDistance, 1);
            myPlayer.vx = Math.cos(angle) * speed * speedFactor;
            myPlayer.vy = Math.sin(angle) * speed * speedFactor;
        });

        joystick.addEventListener('touchend', () => {
            isDragging = false;
            joystickKnob.style.transform = 'translate(0, 0)';
            myPlayer.vx = 0;
            myPlayer.vy = 0;
        });

        // Kollisionen prüfen
        function checkCollisions() {
            if (!myPlayer.isIt) return;
            players.forEach((player, id) => {
                if (id === myPeerId || player.isIt) return;
                const dx = myPlayer.x - player.x;
                const dy = myPlayer.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 40) {
                    // Spieler wurde gefurzt
                    myPlayer.isIt = false;
                    player.isIt = true;
                    broadcastPlayerUpdate();
                    playFartSound();
                    showFartEffect(player.x, player.y);
                }
            });
        }

        // Furz-Effekt anzeigen
        function showFartEffect(x, y) {
            const fart = document.createElement('div');
            fart.className = 'fart-effect';
            fart.style.left = `${x}px`;
            fart.style.top = `${y}px`;
            gameArea.appendChild(fart);
        }

        // Furz-Sound abspielen
        function playFartSound() {
            const audio = new Audio('https://www.myinstants.com/media/sounds/fart.mp3');
            audio.play().catch(err => console.log('Audio-Fehler:', err));
        }

        // Spieler-Updates senden
        function broadcastPlayerUpdate() {
            connections.forEach((conn, peerId) => {
                conn.send({
                    type: 'player-update',
                    data: myPlayer
                });
            });
        }

        // Wenn der Peer initialisiert wird, erhalten wir eine ID
        peer.on('open', (id) => {
            console.log(`Deine ID: ${id} (${userId})`);
            console.log('Versuche, dich mit anderen Peers zu verbinden...');
            connectToOtherPeers();
            // Wähle zufällig den ersten "It"-Spieler
            if (Math.random() < 0.1) {
                myPlayer.isIt = true;
            }
            renderPlayers();
            updateMovement(); // Starte die Animationsschleife
        });

        // Funktion, um sich mit anderen Peers zu verbinden
        function connectToOtherPeers() {
            POSSIBLE_PEER_IDS.forEach(peerId => {
                if (peerId !== myPeerId && !connections.has(peerId)) {
                    const conn = peer.connect(peerId);
                    setupConnection(conn);
                }
            });

            // Retry-Mechanismus: Versuche alle 10 Sekunden, sich mit nicht verbundenen Peers zu verbinden
            setTimeout(connectToOtherPeers, 10000);
        }

        // Wenn ein anderer Peer sich mit uns verbindet
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // Verbindung einrichten
        function setupConnection(conn) {
            const peerId = conn.peer;
            if (connections.has(peerId)) return;

            conn.on('open', () => {
                connections.set(peerId, conn);
                console.log(`Verbunden mit ${peerId}`);
                onlineUsers.textContent = `Online Spieler: ${connections.size + 1}`;
                // Sende meine Spieler-Daten an den neuen Peer
                conn.send({
                    type: 'player-update',
                    data: myPlayer
                });
            });

            conn.on('data', (data) => {
                if (data.type === 'player-update') {
                    players.set(data.data.id, data.data);
                    renderPlayers();
                }
            });

            conn.on('close', () => {
                connections.delete(peerId);
                players.delete(peerId);
                console.log(`${peerId} hat das Spiel verlassen.`);
                onlineUsers.textContent = `Online Spieler: ${connections.size + 1}`;
                renderPlayers();
            });

            conn.on('error', (err) => {
                console.log(`Fehler mit ${peerId}: ${err}`);
            });
        }

        // Fehlerbehandlung
        peer.on('error', (err) => {
            console.log(`Fehler: ${err}`);
        });
    </script>
</body>
</html>
