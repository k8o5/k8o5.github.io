<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummes Arena PvP Spiel</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            background-color: #f0f0f0;
            margin-top: 20px;
        }
        #spielbereich {
            position: relative; /* Wichtig für absolute Positionierung der Spieler */
            width: 600px;
            height: 400px;
            border: 3px solid black;
            background-color: #d3d3d3; /* Hellgrauer Hintergrund */
            overflow: hidden; /* Verhindert, dass Spieler rausgehen (visuell) */
        }
        .spieler {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid black;
        }
        #spieler1 {
            background-color: red;
            left: 50px; /* Startposition */
            top: 180px;
        }
        #spieler2 {
            background-color: blue;
            right: 50px; /* Startposition */
            top: 180px;
        }
        #info {
            margin-top: 15px;
            font-size: 1.2em;
            text-align: center;
        }
        #steuerung {
            margin-top: 10px;
            font-size: 0.9em;
            color: #555;
            text-align: center;
            max-width: 600px;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }
        #gewinnerAnzeige {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: green;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            display: none; /* Standardmäßig ausgeblendet */
            text-align: center;
            z-index: 10; /* Über den Spielern */
        }
    </style>
</head>
<body>

    <h1>Dummes Arena Spiel</h1>

    <div id="spielbereich">
        <div id="spieler1" class="spieler"></div>
        <div id="spieler2" class="spieler"></div>
        <div id="gewinnerAnzeige"></div>
    </div>

    <div id="info">
        <span id="leben1">Spieler 1 Leben: 100</span> |
        <span id="leben2">Spieler 2 Leben: 100</span>
    </div>

    <div id="steuerung">
        Steuerung: Spieler 1 (Rot) mit WASD, Spieler 2 (Blau) mit Pfeiltasten.
        <br>Berührt euch, um Schaden zu machen!
    </div>

    <button id="neustartButton">Neustart</button>

    <script>
        // Elemente holen
        const spielbereich = document.getElementById('spielbereich');
        const spieler1Element = document.getElementById('spieler1');
        const spieler2Element = document.getElementById('spieler2');
        const leben1Anzeige = document.getElementById('leben1');
        const leben2Anzeige = document.getElementById('leben2');
        const neustartButton = document.getElementById('neustartButton');
        const gewinnerAnzeige = document.getElementById('gewinnerAnzeige');

        // Spiel-Konstanten und Variablen
        const spielerGroesse = 40; // Muss mit CSS übereinstimmen
        const geschwindigkeit = 4;
        const schadenProKollision = 2;
        const arenaBreite = spielbereich.clientWidth;
        const arenaHoehe = spielbereich.clientHeight;

        let spieler1 = {
            x: 50,
            y: arenaHoehe / 2 - spielerGroesse / 2,
            leben: 100
        };

        let spieler2 = {
            x: arenaBreite - 50 - spielerGroesse,
            y: arenaHoehe / 2 - spielerGroesse / 2,
            leben: 100
        };

        let gedrueckteTasten = {}; // Objekt zum Speichern gedrückter Tasten
        let spielLaeuft = true;
        let kollisionsCooldown = false; // Verhindert zu schnellen Schaden

        // --- Event Listener für Tastendrücke ---
        document.addEventListener('keydown', (event) => {
            gedrueckteTasten[event.code] = true;
        });

        document.addEventListener('keyup', (event) => {
            delete gedrueckteTasten[event.code]; // Taste aus dem Objekt entfernen
        });

        // --- Neustart Button ---
        neustartButton.addEventListener('click', spielZuruecksetzen);

        // --- Spiel zurücksetzen Funktion ---
        function spielZuruecksetzen() {
            spieler1 = {
                x: 50,
                y: arenaHoehe / 2 - spielerGroesse / 2,
                leben: 100
            };
            spieler2 = {
                x: arenaBreite - 50 - spielerGroesse,
                y: arenaHoehe / 2 - spielerGroesse / 2,
                leben: 100
            };
            gedrueckteTasten = {};
            spielLaeuft = true;
            kollisionsCooldown = false;
            gewinnerAnzeige.style.display = 'none'; // Gewinneranzeige ausblenden
            updateAnzeige(); // Anzeige aktualisieren
            // Startpositionen visuell setzen
            spieler1Element.style.left = spieler1.x + 'px';
            spieler1Element.style.top = spieler1.y + 'px';
            spieler2Element.style.left = spieler2.x + 'px';
            spieler2Element.style.top = spieler2.y + 'px';
            // Spiel-Loop neu starten (falls er gestoppt wurde)
            if (!animationFrameId) { // Verhindert mehrfache Loops
                 spielLoop();
            }
        }


        // --- Spiel-Loop ---
        let animationFrameId = null; // Um den Loop zu stoppen/starten
        function spielLoop() {
            if (!spielLaeuft) {
                animationFrameId = null; // Loop beenden
                return;
            }

            bewegen();
            pruefeKollision();
            updateAnzeige();
            pruefeSpielende();

            // Nächsten Frame anfordern
           animationFrameId = requestAnimationFrame(spielLoop);
        }

        // --- Bewegungslogik ---
        function bewegen() {
            // Spieler 1 (WASD)
            if (gedrueckteTasten['KeyW']) spieler1.y -= geschwindigkeit;
            if (gedrueckteTasten['KeyS']) spieler1.y += geschwindigkeit;
            if (gedrueckteTasten['KeyA']) spieler1.x -= geschwindigkeit;
            if (gedrueckteTasten['KeyD']) spieler1.x += geschwindigkeit;

            // Spieler 2 (Pfeiltasten)
            if (gedrueckteTasten['ArrowUp']) spieler2.y -= geschwindigkeit;
            if (gedrueckteTasten['ArrowDown']) spieler2.y += geschwindigkeit;
            if (gedrueckteTasten['ArrowLeft']) spieler2.x -= geschwindigkeit;
            if (gedrueckteTasten['ArrowRight']) spieler2.x += geschwindigkeit;

            // Grenzen prüfen für Spieler 1
            spieler1.x = Math.max(0, Math.min(arenaBreite - spielerGroesse, spieler1.x));
            spieler1.y = Math.max(0, Math.min(arenaHoehe - spielerGroesse, spieler1.y));

            // Grenzen prüfen für Spieler 2
            spieler2.x = Math.max(0, Math.min(arenaBreite - spielerGroesse, spieler2.x));
            spieler2.y = Math.max(0, Math.min(arenaHoehe - spielerGroesse, spieler2.y));

            // Visuelle Position aktualisieren
            spieler1Element.style.left = spieler1.x + 'px';
            spieler1Element.style.top = spieler1.y + 'px';
            spieler2Element.style.left = spieler2.x + 'px';
            spieler2Element.style.top = spieler2.y + 'px';
        }

        // --- Kollisionserkennung ---
        function pruefeKollision() {
            // Einfache Rechteck-Kollision (Axis-Aligned Bounding Box)
            const kollidiert =
                spieler1.x < spieler2.x + spielerGroesse &&
                spieler1.x + spielerGroesse > spieler2.x &&
                spieler1.y < spieler2.y + spielerGroesse &&
                spieler1.y + spielerGroesse > spieler2.y;

            if (kollidiert && !kollisionsCooldown) {
                // Schaden zufügen
                spieler1.leben -= schadenProKollision;
                spieler2.leben -= schadenProKollision;

                // Sicherstellen, dass Leben nicht unter 0 fällt
                spieler1.leben = Math.max(0, spieler1.leben);
                spieler2.leben = Math.max(0, spieler2.leben);

                // Cooldown starten, um sofortigen Mehrfachschaden zu verhindern
                kollisionsCooldown = true;
                // Kleines visuelles Feedback (optional)
                spieler1Element.style.opacity = '0.7';
                spieler2Element.style.opacity = '0.7';

                setTimeout(() => {
                    kollisionsCooldown = false;
                    spieler1Element.style.opacity = '1';
                    spieler2Element.style.opacity = '1';
                }, 200); // 200ms Cooldown

            }
        }

        // --- Anzeige aktualisieren ---
        function updateAnzeige() {
            leben1Anzeige.textContent = `Spieler 1 Leben: ${spieler1.leben}`;
            leben2Anzeige.textContent = `Spieler 2 Leben: ${spieler2.leben}`;
        }

        // --- Spielende prüfen ---
        function pruefeSpielende() {
            let gewinnerText = '';
            if (spieler1.leben <= 0 && spieler2.leben <= 0) {
                gewinnerText = "Unentschieden!";
                spielLaeuft = false;
            } else if (spieler1.leben <= 0) {
                gewinnerText = "Spieler 2 (Blau) gewinnt!";
                spielLaeuft = false;
            } else if (spieler2.leben <= 0) {
                gewinnerText = "Spieler 1 (Rot) gewinnt!";
                spielLaeuft = false;
            }

            if (!spielLaeuft && gewinnerText) {
                 gewinnerAnzeige.textContent = gewinnerText;
                 gewinnerAnzeige.style.display = 'block'; // Anzeige sichtbar machen
            }
        }

        // --- Initiales Setup und Start des Spiel-Loops ---
        spielZuruecksetzen(); // Setzt alles auf Anfangswerte
        // spielLoop(); // Wird jetzt in spielZuruecksetzen aufgerufen

    </script>

</body>
</html>
