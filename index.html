<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Hintergrund</title>
    <style>
        /* Setze das GIF als gestrecktes Hintergrundbild */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-image: url('dein-hintergrund.gif'); /* Ersetze 'dein-hintergrund.gif' mit dem Pfad zu deinem GIF */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer; /* Zeige einen Zeiger, um anzuzeigen, dass die Seite klickbar ist */
        }
    </style>
</head>

</html>
