<!DOCTYPE html>
<html>
<head>
    <title>AmaLfA5qUMU to SOL Swap</title>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.70.1/lib/index.iife.min.js"></script>
</head>
<body>
    <button id="connectButton">Connect Phantom Wallet</button>
    <div id="status"></div>
    <hr>
    <h3>Swap AmaLfA5qUMU Token to SOL</h3>
    <input type="number" id="amountInput" placeholder="Enter token amount" step="0.1">
    <button id="swapButton">Swap to SOL</button>

    <script>
        let provider;
        let publicKey;

        // Token configuration
        const inputMint = 'AmaLfA5qUMUDG5DfxVFR8ZmM41dR5b9H6xpsM6qApump';
        const outputMint = 'So11111111111111111111111111111111111111112'; // SOL
        const DECIMALS = 6; // Change this according to your token's decimals

        document.getElementById('connectButton').addEventListener('click', async () => {
            if (!window.solana?.isPhantom) {
                alert('Phantom wallet not installed!');
                return;
            }

            provider = window.solana;
            try {
                await provider.connect();
                publicKey = provider.publicKey.toString();
                document.getElementById('status').innerHTML = `Connected: ${publicKey.slice(0,4)}...${publicKey.slice(-4)}`;
            } catch (error) {
                console.error(error);
            }
        });

        document.getElementById('swapButton').addEventListener('click', async () => {
            if (!provider) {
                alert('Please connect wallet first!');
                return;
            }

            const amount = document.getElementById('amountInput').value;
            if (!amount) {
                alert('Please enter amount!');
                return;
            }

            try {
                // Convert amount to lamports
                const amountInLamports = amount * Math.pow(10, DECIMALS);

                // Get swap quote
                const quote = await fetch(
                    `https://quote-api.jup.ag/v4/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amountInLamports}&slippageBps=50`
                ).then(res => res.json());

                // Get swap transaction
                const swapResult = await fetch('https://quote-api.jup.ag/v4/swap', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        quoteResponse: quote,
                        userPublicKey: publicKey,
                        wrapAndUnwrapSol: true
                    })
                }).then(res => res.json());

                // Deserialize transaction
                const swapTransactionBuf = Buffer.from(swapResult.swapTransaction, 'base64');
                const transaction = web3.Transaction.from(swapTransactionBuf);

                // Sign and send transaction
                const signedTx = await provider.signTransaction(transaction);
                const rawTransaction = signedTx.serialize();
                const txid = await web3.sendRawTransaction(
                    new web3.Connection(web3.clusterApiUrl('mainnet-beta')),
                    rawTransaction
                );

                alert(`Swap submitted! Transaction ID: ${txid}`);
            } catch (error) {
                console.error('Swap error:', error);
                alert(`Swap failed: ${error.message}`);
            }
        });
    </script>
</body>
</html>
