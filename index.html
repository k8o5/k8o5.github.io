<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            display: block;
            color: white;
            font-family: monospace;
            font-size: 24px;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 101;
            display: none; /* Hidden by default */
            color: red;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 36px;
            text-align: center;
            border: 2px solid red;
        }
         #game-over button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
         }
    </style>
</head>
<body>
    <div id="info">Score: 0</div>
    <div id="game-over">
        Game Over!<br>
        <span id="final-score"></span><br>
        <button id="restart-button">Restart</button>
    </div>
    <div id="game-container"></div>

    <!-- Import THREE.js using importmap -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // Import Three.js
        import * as THREE from 'three';

        // --- Game Constants ---
        const LANE_WIDTH = 5;
        const NUM_LANES = 3;
        const TRACK_WIDTH = LANE_WIDTH * NUM_LANES;
        const PLAYER_SPEED = 15;
        const OBSTACLE_START_Z = -100;
        const OBSTACLE_BASE_SPEED = 0.3;
        const OBSTACLE_SPAWN_RATE = 0.01; // Probability per frame
        const SCORE_MULTIPLIER = 10; // Score increases faster

        // --- Game Variables ---
        let scene, camera, renderer;
        let player, playerTargetX = 0;
        let obstacles = [];
        let score = 0;
        let isGameOver = false;
        let animationFrameId = null;
        let currentObstacleSpeed = OBSTACLE_BASE_SPEED;
        let clock = new THREE.Clock();

        // --- DOM Elements ---
        const infoElement = document.getElementById('info');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');
        const container = document.getElementById('game-container');

        // --- Initialization ---
        function init() {
            isGameOver = false;
            score = 0;
            obstacles = [];
            playerTargetX = 0;
            currentObstacleSpeed = OBSTACLE_BASE_SPEED;
            gameOverElement.style.display = 'none'; // Hide game over screen

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222244);
            scene.fog = new THREE.Fog(0x222244, 50, 150); // Add fog for depth

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 5, 15); // Positioned behind and slightly above the player
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Enable shadows
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x606060);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            directionalLight.castShadow = true;
            // Configure shadow properties for performance
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -TRACK_WIDTH;
            directionalLight.shadow.camera.right = TRACK_WIDTH;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);
            // const shadowHelper = new THREE.CameraHelper(directionalLight.shadow.camera); // Optional: visualize shadow frustum
            // scene.add(shadowHelper);


            // Ground
            const groundGeometry = new THREE.PlaneGeometry(TRACK_WIDTH * 1.5, 200); // Long plane
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2; // Rotate flat
            ground.position.y = -0.5; // Slightly below player origin
            ground.receiveShadow = true;
            scene.add(ground);

            // Player
            const playerGeometry = new THREE.BoxGeometry(1.5, 1.5, 1.5); // Slightly larger cube
            const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 }); // Green cube
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.set(0, playerGeometry.parameters.height / 2 - 0.5, 5); // Start slightly forward
            player.castShadow = true;
            scene.add(player);

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('keydown', onKeyDown, false);
            restartButton.addEventListener('click', restartGame, false);

            // Start Animation Loop
            clock.start();
            animate();
        }

        // --- Obstacle Creation ---
        function createObstacle() {
            const obstacleGeometry = new THREE.BoxGeometry(LANE_WIDTH * 0.8, 2, 2); // Wide obstacles
            const obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 }); // Red obstacles
            const obstacle = new THREE.Mesh(obstacleGeometry, obstacleMaterial);

            // Choose a random lane (-1, 0, or 1) * LANE_WIDTH
            const laneIndex = Math.floor(Math.random() * NUM_LANES) - Math.floor(NUM_LANES / 2); // -1, 0, 1 for 3 lanes
            const xPos = laneIndex * LANE_WIDTH;

            obstacle.position.set(
                xPos,
                obstacleGeometry.parameters.height / 2 - 0.5,
                OBSTACLE_START_Z
            );
            obstacle.castShadow = true;
            obstacle.receiveShadow = true; // Obstacles can receive shadows from others

            // Add bounding box for easier collision detection
            obstacle.userData.boundingBox = new THREE.Box3().setFromObject(obstacle);

            obstacles.push(obstacle);
            scene.add(obstacle);
        }

        // --- Game Loop ---
        function animate() {
            if (isGameOver) return; // Stop the loop if game is over

            animationFrameId = requestAnimationFrame(animate);
            const delta = clock.getDelta(); // Time since last frame

            // --- Player Movement ---
            const moveAmount = PLAYER_SPEED * delta;
            // Lerp for smoother movement
            player.position.x = THREE.MathUtils.lerp(player.position.x, playerTargetX, moveAmount);
             // Keep player within track bounds (slightly less than full width)
            const halfTrack = TRACK_WIDTH / 2 - player.geometry.parameters.width / 2;
            player.position.x = THREE.MathUtils.clamp(player.position.x, -halfTrack, halfTrack);


            // --- Obstacle Spawning ---
            if (Math.random() < OBSTACLE_SPAWN_RATE) {
                createObstacle();
            }

             // --- Increase Difficulty ---
             currentObstacleSpeed += delta * 0.01; // Speed increases slowly over time

            // --- Obstacle Movement & Collision ---
            const playerBox = new THREE.Box3().setFromObject(player); // Update player box each frame

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                obstacle.position.z += currentObstacleSpeed; // Move obstacle towards player

                // Update obstacle bounding box
                 obstacle.userData.boundingBox.setFromObject(obstacle);

                // Collision Check
                if (playerBox.intersectsBox(obstacle.userData.boundingBox)) {
                    gameOver();
                    return; // Exit loop immediately on collision
                }

                // Remove obstacles that have passed
                if (obstacle.position.z > camera.position.z + 10) {
                    scene.remove(obstacle);
                    obstacles.splice(i, 1);
                }
            }

            // --- Update Score ---
            score += delta * SCORE_MULTIPLIER;
            infoElement.textContent = `Score: ${Math.floor(score)}`;

            // --- Render ---
            renderer.render(scene, camera);
        }

        // --- Game Over ---
        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationFrameId); // Stop the animation loop
            clock.stop();
            finalScoreElement.textContent = `Final Score: ${Math.floor(score)}`;
            gameOverElement.style.display = 'block'; // Show game over screen
            // Optional: Add sound effect here
        }

        // --- Restart Game ---
        function restartGame() {
             // Clean up old scene objects
             while(scene.children.length > 0){
                const object = scene.children[0];
                if(object.geometry) object.geometry.dispose();
                if(object.material) {
                    // Ensure textures are disposed if they exist
                    if (object.material.map) object.material.map.dispose();
                    if (object.material.lightMap) object.material.lightMap.dispose();
                    if (object.material.aoMap) object.material.aoMap.dispose();
                    if (object.material.emissiveMap) object.material.emissiveMap.dispose();
                    if (object.material.bumpMap) object.material.bumpMap.dispose();
                    if (object.material.normalMap) object.material.normalMap.dispose();
                    if (object.material.displacementMap) object.material.displacementMap.dispose();
                    if (object.material.roughnessMap) object.material.roughnessMap.dispose();
                    if (object.material.metalnessMap) object.material.metalnessMap.dispose();
                    if (object.material.alphaMap) object.material.alphaMap.dispose();
                    if (object.material.envMap) object.material.envMap.dispose();
                    object.material.dispose();
                }
                scene.remove(object);
            }

            // Dispose of renderer resources if possible (may not be fully necessary but good practice)
            renderer.dispose();
            container.removeChild(renderer.domElement); // Remove old canvas


            // Remove event listeners to avoid duplicates (important!)
            window.removeEventListener('resize', onWindowResize, false);
            document.removeEventListener('keydown', onKeyDown, false);
            // Note: restartButton listener remains

            // Re-initialize the game
            init();
        }


        // --- Event Handlers ---
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyDown(event) {
            if (isGameOver) return;

            const halfLane = LANE_WIDTH / 2;
            const maxLaneIndex = Math.floor(NUM_LANES / 2); // 1 for 3 lanes

            if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') {
                // Move target one lane left, clamped
                 playerTargetX = Math.max(-maxLaneIndex * LANE_WIDTH, playerTargetX - LANE_WIDTH);

            } else if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') {
                // Move target one lane right, clamped
                 playerTargetX = Math.min(maxLaneIndex * LANE_WIDTH, playerTargetX + LANE_WIDTH);
            }
        }

        // --- Start the game ---
        init();

    </script>
</body>
</html>
