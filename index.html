<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Game with Jump & Music</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: monospace;}
        canvas { display: block; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; display:block; font-size: 24px; }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; display: none; color: red; background-color: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 10px; font-size: 36px; text-align: center; border: 2px solid red;}
        #game-over button { margin-top: 15px; padding: 10px 20px; font-size: 20px; cursor: pointer; }
        #start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 102;
            padding: 20px 40px;
            font-size: 30px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <button id="start-button">Start Game</button>

    <div id="info">Score: 0</div>
    <div id="game-over">
        Game Over!<br>
        <span id="final-score"></span><br>
        <button id="restart-button">Restart</button>
    </div>
    <div id="game-container"></div>

    <!-- Import THREE.js using importmap -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        // Import Three.js
        import * as THREE from 'three';

        // --- Game Constants ---
        const LANE_WIDTH = 5;
        const NUM_LANES = 3;
        const TRACK_WIDTH = LANE_WIDTH * NUM_LANES;
        const PLAYER_SPEED_X = 15; // Horizontal speed
        const OBSTACLE_START_Z = -100;
        const OBSTACLE_BASE_SPEED = 0.3;
        const OBSTACLE_SPAWN_RATE = 0.01;
        const SCORE_MULTIPLIER = 10;
        const GRAVITY = 25.0; // Acceleration due to gravity (units per second squared)
        const JUMP_FORCE = 10.0; // Initial upward velocity on jump (units per second)
        const PLAYER_SIZE = 1.5; // Use a constant for player dimensions
        const GROUND_Y = (PLAYER_SIZE / 2) - 0.5; // Player's Y position when on the ground plane at y=-0.5

        // --- Audio Constants ---
        const BASE_TEMPO_BPM = 100;
        const NOTE_DURATION_SEC = 60.0 / (BASE_TEMPO_BPM * 2);
        const LOOKAHEAD_TIME_SEC = 0.1;
        const SCHEDULE_INTERVAL_MS = 25;
        const SCALE_MIDI_NOTES = [60, 63, 65, 67, 70, 72, 75, 77, 79, 82];
        const BASS_MIDI_NOTES = [36, 39, 41, 43, 46];

        // --- Game Variables ---
        let scene, camera, renderer;
        let player, playerTargetX = 0;
        let playerVelocityY = 0; // Vertical velocity for jumping
        let isPlayerOnGround = true; // Track if player can jump
        let obstacles = [];
        let score = 0;
        let isGameOver = false;
        let isGameRunning = false;
        let animationFrameId = null;
        let currentObstacleSpeed = OBSTACLE_BASE_SPEED;
        let clock = new THREE.Clock();

        // --- Audio Variables ---
        let audioCtx;
        let nextNoteTime = 0.0;
        let currentMelodyNoteIndex = 0;
        let currentBassNoteIndex = 0;
        let schedulerIntervalId = null;
        let masterGain;
        let tempoMultiplier = 1.0;

        // --- DOM Elements ---
        const infoElement = document.getElementById('info');
        const gameOverElement = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');
        const container = document.getElementById('game-container');
        const startButton = document.getElementById('start-button');

        // --- Initialization ---
        function initGameGraphics() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222244);
            scene.fog = new THREE.Fog(0x222244, 50, 150);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x606060);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            directionalLight.castShadow = true;
            // Shadow settings (same as before)
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 1024;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -TRACK_WIDTH;
            directionalLight.shadow.camera.right = TRACK_WIDTH;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);

            // Ground
            const groundGeometry = new THREE.PlaneGeometry(TRACK_WIDTH * 1.5, 200);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5; // Ground plane position
            ground.receiveShadow = true;
            scene.add(ground);

            // Player
            const playerGeometry = new THREE.BoxGeometry(PLAYER_SIZE, PLAYER_SIZE, PLAYER_SIZE); // Use constant
            const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.set(0, GROUND_Y, 5); // Start player exactly on the ground
            player.castShadow = true;
            scene.add(player);

            obstacles = [];
        }

        function resetGameState() {
            isGameOver = false;
            score = 0;
            playerTargetX = 0;
            playerVelocityY = 0; // Reset vertical velocity
            isPlayerOnGround = true; // Player starts on ground
            currentObstacleSpeed = OBSTACLE_BASE_SPEED;
            tempoMultiplier = 1.0;
            gameOverElement.style.display = 'none';

            obstacles.forEach(obstacle => scene.remove(obstacle));
            obstacles = [];

            if (player) {
                player.position.x = 0;
                player.position.y = GROUND_Y; // Ensure player is on ground
                player.position.z = 5;
            }

            infoElement.textContent = `Score: 0`;
        }

        // --- Audio Setup and Control (Identical to previous version) ---
        function setupAudio() {
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    masterGain = audioCtx.createGain();
                    masterGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    masterGain.connect(audioCtx.destination);
                    console.log("AudioContext created successfully.");
                } catch (e) {
                    console.error("Web Audio API is not supported", e);
                    alert("Web Audio API is not supported. Music cannot be played.");
                    return false;
                }
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => console.log("AudioContext resumed."));
            }
            return true;
        }

        function midiNoteToFrequency(midiNote) {
            return Math.pow(2, (midiNote - 69) / 12) * 440;
        }

        function scheduleNote(type, noteMidi, startTime, duration, volume = 0.8) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const noteGain = audioCtx.createGain();
            osc.connect(noteGain);
            noteGain.connect(masterGain);
            osc.type = (type === 'melody') ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(midiNoteToFrequency(noteMidi), startTime);
            noteGain.gain.setValueAtTime(0, startTime);
            noteGain.gain.linearRampToValueAtTime(volume, startTime + duration * 0.1);
            noteGain.gain.linearRampToValueAtTime(0, startTime + duration);
            osc.start(startTime);
            osc.stop(startTime + duration + 0.05);
        }

         function generateNextMelodyNoteIndex(currentIndex) {
            const rand = Math.random();
            const maxIndex = SCALE_MIDI_NOTES.length - 1;
            if (rand < 0.3) return currentIndex;
            if (rand < 0.6) return THREE.MathUtils.clamp(currentIndex + (Math.random() < 0.5 ? -1 : 1), 0, maxIndex);
            if (rand < 0.8) return THREE.MathUtils.clamp(currentIndex + (Math.random() < 0.5 ? -2 : 2), 0, maxIndex);
            return Math.floor(Math.random() * (maxIndex + 1));
         }

         function generateNextBassNoteIndex(currentIndex) {
            const rand = Math.random();
            const maxIndex = BASS_MIDI_NOTES.length - 1;
            if (rand < 0.6) return currentIndex;
            if (rand < 0.9) return THREE.MathUtils.clamp(currentIndex + (Math.random() < 0.5 ? -1 : 1), 0, maxIndex);
            return Math.floor(Math.random() * (maxIndex + 1));
         }

        function scheduler() {
             if (!isGameRunning || isGameOver || !audioCtx) return;
             const currentNoteDuration = NOTE_DURATION_SEC / tempoMultiplier;
             while (nextNoteTime < audioCtx.currentTime + LOOKAHEAD_TIME_SEC) {
                 if (Math.random() < 0.9) {
                    currentMelodyNoteIndex = generateNextMelodyNoteIndex(currentMelodyNoteIndex);
                    scheduleNote('melody', SCALE_MIDI_NOTES[currentMelodyNoteIndex], nextNoteTime, currentNoteDuration * 0.9, 0.7);
                 }
                const beatsElapsed = (nextNoteTime / (NOTE_DURATION_SEC * 2 / tempoMultiplier));
                if (beatsElapsed % 1 < 0.1) {
                     currentBassNoteIndex = generateNextBassNoteIndex(currentBassNoteIndex);
                    scheduleNote('bass', BASS_MIDI_NOTES[currentBassNoteIndex], nextNoteTime, currentNoteDuration * 1.8, 0.5);
                }
                nextNoteTime += currentNoteDuration;
            }
        }

        function startMusicLoop() {
            if (!setupAudio()) return;
            if (schedulerIntervalId) clearInterval(schedulerIntervalId);
            nextNoteTime = audioCtx.currentTime + 0.1;
            currentMelodyNoteIndex = Math.floor(SCALE_MIDI_NOTES.length / 2);
            currentBassNoteIndex = 0;
            schedulerIntervalId = setInterval(scheduler, SCHEDULE_INTERVAL_MS);
            console.log("Music loop started.");
        }

        function stopMusicLoop() {
            if (schedulerIntervalId) {
                clearInterval(schedulerIntervalId);
                schedulerIntervalId = null;
                console.log("Music loop stopped.");
                if(audioCtx && masterGain) {
                     masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                     masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                     setTimeout(() => {
                          if(masterGain) masterGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                     }, 550);
                }
            }
        }

        // --- Obstacle Creation (Identical to previous version) ---
        function createObstacle() {
            if (!isGameRunning || isGameOver) return;
            const obstacleGeometry = new THREE.BoxGeometry(LANE_WIDTH * 0.8, PLAYER_SIZE, PLAYER_SIZE); // Make obstacles player height
            const obstacleMaterial = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const obstacle = new THREE.Mesh(obstacleGeometry, obstacleMaterial);
            const laneIndex = Math.floor(Math.random() * NUM_LANES) - Math.floor(NUM_LANES / 2);
            const xPos = laneIndex * LANE_WIDTH;
            // Obstacles start on the ground
            obstacle.position.set(xPos, GROUND_Y, OBSTACLE_START_Z);
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;
            obstacle.userData.boundingBox = new THREE.Box3().setFromObject(obstacle);
            obstacles.push(obstacle);
            scene.add(obstacle);
        }

        // --- Game Loop ---
        function animate() {
             animationFrameId = requestAnimationFrame(animate);

             if (!isGameRunning || isGameOver) return;

            const delta = clock.getDelta(); // Time since last frame

            // --- Player Horizontal Movement ---
             const moveAmountX = PLAYER_SPEED_X * delta;
             player.position.x = THREE.MathUtils.lerp(player.position.x, playerTargetX, moveAmountX);
             const halfTrack = TRACK_WIDTH / 2 - player.geometry.parameters.width / 2;
             player.position.x = THREE.MathUtils.clamp(player.position.x, -halfTrack, halfTrack);

            // --- Player Vertical (Jump) Movement ---
            if (!isPlayerOnGround) {
                // Apply gravity
                playerVelocityY -= GRAVITY * delta;
                // Update position
                player.position.y += playerVelocityY * delta;

                // Check for landing
                if (player.position.y <= GROUND_Y) {
                    player.position.y = GROUND_Y; // Snap to ground
                    playerVelocityY = 0;          // Stop vertical movement
                    isPlayerOnGround = true;      // Allow jumping again
                }
            }

            // --- Obstacle Spawning ---
            if (Math.random() < OBSTACLE_SPAWN_RATE) {
                createObstacle();
            }

             // --- Increase Difficulty & Adapt Music Tempo ---
             currentObstacleSpeed += delta * 0.01;
             tempoMultiplier = 1.0 + (currentObstacleSpeed - OBSTACLE_BASE_SPEED) * 0.5;
             tempoMultiplier = Math.min(tempoMultiplier, 2.0);

            // --- Obstacle Movement & Collision ---
            // Update player's bounding box *after* position updates
             const playerBox = new THREE.Box3().setFromObject(player);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                obstacle.position.z += currentObstacleSpeed; // Move obstacle
                 obstacle.userData.boundingBox.setFromObject(obstacle); // Update obstacle box

                // Collision Check (uses updated player and obstacle boxes)
                if (playerBox.intersectsBox(obstacle.userData.boundingBox)) {
                    triggerGameOver();
                    return;
                }
                // Remove obstacles that have passed
                if (obstacle.position.z > camera.position.z + 10) {
                    scene.remove(obstacle);
                    obstacles.splice(i, 1);
                }
            }

            // --- Update Score ---
            score += delta * SCORE_MULTIPLIER;
            infoElement.textContent = `Score: ${Math.floor(score)}`;

            // --- Render ---
            renderer.render(scene, camera);
        }

        // --- Game Over ---
        function triggerGameOver() {
            if (isGameOver) return;
            console.log("Game Over triggered!");
            isGameOver = true;
            isGameRunning = false;
            clock.stop();
            stopMusicLoop();
            finalScoreElement.textContent = `Final Score: ${Math.floor(score)}`;
            gameOverElement.style.display = 'block';
        }

        // --- Start Game ---
         function startGame() {
             startButton.style.display = 'none';
             if (!setupAudio()) return;
             resetGameState();
             isGameRunning = true;
             isGameOver = false;
             if (!clock.running) {
                 clock.start();
             } else {
                 clock.getDelta();
             }
             startMusicLoop();
             if (animationFrameId === null) {
                 console.log("Starting animation loop.");
                 animate();
             } else {
                 // If restarting, ensure game loop continues processing
                 // This branch might not be strictly necessary if animate() keeps running
                 // but ensures the logic restarts if animate was somehow paused externally.
             }
             console.log("Game Started!");
         }

        // --- Restart Game ---
        function restartGame() {
            gameOverElement.style.display = 'none';
            startGame(); // Use the main start function
        }

        // --- Event Handlers ---
        function onWindowResize() {
            if (!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyDown(event) {
             if (!isGameRunning || isGameOver) return;

             const maxLaneIndex = Math.floor(NUM_LANES / 2);

            // Horizontal Movement
            if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') {
                 playerTargetX = Math.max(-maxLaneIndex * LANE_WIDTH, playerTargetX - LANE_WIDTH);
            } else if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') {
                 playerTargetX = Math.min(maxLaneIndex * LANE_WIDTH, playerTargetX + LANE_WIDTH);
            }

            // Jump Trigger
             if ((event.key === ' ' || event.key === 'ArrowUp' || event.key.toLowerCase() === 'w') && isPlayerOnGround) {
                 playerVelocityY = JUMP_FORCE; // Apply upward force
                 isPlayerOnGround = false;    // Player is now airborne
             }
        }

        // --- Initial Setup Call ---
        initGameGraphics();
        window.addEventListener('resize', onWindowResize, false);
        document.addEventListener('keydown', onKeyDown, false);
        restartButton.addEventListener('click', restartGame, false);
        startButton.addEventListener('click', startGame, false);

        console.log("Game initialized. Press 'Start Game' to play. Use Arrows/A/D to move, Space/Up/W to jump.");
        animate(); // Start rendering loop immediately

    </script>
</body>
</html>
