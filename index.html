<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5 Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #console {
            width: 100%;
            height: 100%;
            background: #000;
            color: #0f0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            overflow-y: auto;
        }
        #output {
            min-height: 80%;
            font-size: 16px;
            white-space: pre-wrap;
            text-align: left;
        }
        #inputArea {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
        }
        #prompt {
            color: #0f0;
            font-size: 16px;
            margin-right: 10px;
        }
        #input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #0f0;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            outline: none;
        }
        #background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            z-index: -1;
            transition: background-image 1s ease-in-out;
        }
        /* Animation für Konsolenstart */
        @keyframes boot {
            0% { opacity: 0; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        #console.boot {
            animation: boot 1s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="console" class="boot">
        <div id="background"></div>
        <div id="output">k8o5 Console v1.0\nInitialisiere...\n</div>
        <div id="inputArea">
            <span id="prompt">> </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let myPeerId = '';
        let connections = [];
        let isConnected = false;
        const backgrounds = [
            'url("https://i.imgur.com/1XqZ8kV.jpg")', // Matrix
            'url("https://i.imgur.com/9z5vK7L.jpg")', // Cyberpunk
            'url("https://i.imgur.com/Kz6X8nL.jpg")', // Space
            'url("https://i.imgur.com/8XyX7Zt.jpg")', // Retro Grid
            'url("https://i.imgur.com/4vX7Y8n.jpg")'  // Neon City
        ];
        let currentBgIndex = 0;

        // PeerJS initialisieren
        function initPeer() {
            peer = new Peer({ debug: 3 });
            peer.on('open', id => {
                myPeerId = id;
                document.getElementById('output').innerHTML += `Deine Peer-ID: ${myPeerId}\nBefehl: peer [peer_id] zum Verbinden\n`;
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', () => {
                    console.log('Verbunden mit: ' + conn.peer);
                    switchToChatMode(conn.peer);
                });
                conn.on('data', handleData);
            });
        }

        // Eingabe verarbeiten
        function handleInput() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            document.getElementById('output').innerHTML += `> ${input}\n`;
            if (!isConnected) {
                if (input.startsWith('peer ')) {
                    const targetPeerId = input.split(' ')[1];
                    if (targetPeerId) {
                        connectToPeer(targetPeerId);
                    } else {
                        document.getElementById('output').innerHTML += 'Fehler: Gib eine Peer-ID ein!\n';
                    }
                } else {
                    document.getElementById('output').innerHTML += 'Unbekannter Befehl. Nutze: peer [peer_id]\n';
                }
            } else {
                if (input === 'bg') {
                    changeBackground();
                } else {
                    connections.forEach(conn => conn.send(input));
                    document.getElementById('output').innerHTML += `${input}\n`;
                }
            }
            document.getElementById('input').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // Mit Peer-ID verbinden
        function connectToPeer(peerId) {
            const conn = peer.connect(peerId);
            connections.push(conn);
            conn.on('open', () => {
                console.log('Verbunden mit: ' + peerId);
                switchToChatMode(peerId);
            });
            conn.on('data', handleData);
        }

        // Daten empfangen
        function handleData(data) {
            document.getElementById('output').innerHTML += `${data}\n`;
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // In Chat-Modus wechseln
        function switchToChatMode(peerId) {
            isConnected = true;
            document.getElementById('output').innerHTML += `Verbunden mit ${peerId}!\nChat-Modus aktiviert.\nBefehl: 'bg' zum Ändern der Kulisse\n`;
            document.getElementById('prompt').innerHTML = 'chat> ';
        }

        // Hintergrund ändern
        function changeBackground() {
            currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
            document.getElementById('background').style.backgroundImage = backgrounds[currentBgIndex];
            document.getElementById('output').innerHTML += 'Hintergrund geändert!\n';
        }

        // Event Listener für Enter
        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleInput();
        });

        // Start
        initPeer();
    </script>
</body>
</html>
