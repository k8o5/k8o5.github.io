<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet-Verbindung</title>
</head>
<body>
    <button id="connectButton">Mit Phantom verbinden</button>
    <div>Wallet: <span id="walletAddress">Nicht verbunden</span></div>

    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script>
        async function connectWallet() {
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    alert('Bitte installiere die Phantom Wallet Erweiterung!');
                    return;
                }
                const response = await window.solana.connect();
                const publicKey = response.publicKey.toString();
                document.getElementById('walletAddress').textContent = publicKey.slice(0, 8) + '...';
            } catch (err) {
                console.error('Fehler beim Verbinden:', err);
            }
        }

        document.getElementById('connectButton').addEventListener('click', connectWallet);
    </script>
</body>
</html>
