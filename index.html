"""<!DOCTYPE html>
<html>
<head>
    <title>HTML Simulator</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <h1>HTML Simulator</h1>
    <textarea id="content" rows="10" cols="50" oninput="saveContent(this.value)">
        Hier deinen HTML-Code eingeben...
    </textarea>
    
    <script>
        // Local Storage Simulation
        let storage = {};
        
        // Storage laden
        fetch('/load_storage')
            .then(response => response.json())
            .then(data => {
                storage = data;
                const savedContent = storage.content || '';
                document.getElementById('content').value = savedContent;
            });

        function saveContent(content) {
            storage.content = content;
            fetch('/save_storage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(storage)
            });
        }
    </script>
</body>
</html>
