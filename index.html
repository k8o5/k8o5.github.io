<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Wird durch JS ersetzt */
            overflow: hidden;
        }
        pre {
            font-family: monospace;
            white-space: pre;
            color: white;
            font-size: 1vmin;
            line-height: 1;
        }
    </style>
</head>
<body>
    <pre id="ascii"></pre>
    <script>
        // Zufällige Hintergrundfarbe generieren
        const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        document.body.style.backgroundColor = randomColor;

        // Funktion zur ASCII-Konvertierung
        function imageToAscii(img, width, height, callback) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            const chars = '@%#*+=-:. '; // ASCII-Zeichen für Helligkeit
            let ascii = '';

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const offset = (y * width + x) * 4;
                    const r = data[offset];
                    const g = data[offset + 1];
                    const b = data[offset + 2];
                    // Helligkeit berechnen (0-255)
                    const brightness = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
                    // Zeichen basierend auf Helligkeit auswählen
                    const charIndex = Math.floor(brightness * (chars.length - 1));
                    ascii += chars[charIndex];
                }
                ascii += '\n';
            }
            callback(ascii);
        }

        // Satellitenbild laden
        const img = new Image();
        img.crossOrigin = 'Anonymous'; // CORS-Zugriff ermöglichen
        img.src = 'https://cdn.star.nesdis.noaa.gov/GOES16/ABI/FD/GEOCOLOR/latest.jpg';
        img.onload = () => {
            // ASCII-Art generieren (Breite und Höhe anpassen für Details)
            imageToAscii(img, 300, 150, (ascii) => {
                document.getElementById('ascii').innerText = ascii;
            });
        };
        img.onerror = () => {
            document.getElementById('ascii').innerText = 'Fehler beim Laden des Bildes.';
        };
    </script>
</body>
</html>
