<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            overflow: hidden;
            text-rendering: optimizeLegibility;
            line-height: 1.5;
        }

        #console {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            background: #000;
            position: relative;
        }

        #output {
            font-size: 15px;
            white-space: pre-wrap;
            text-align: left;
            -webkit-font-smoothing: antialiased;
            color: #00cc00;
            letter-spacing: 0.05em;
        }

        #inputArea {
            display: none; /* Initially hidden */
            position: sticky;
            bottom: 10px;
            align-items: center;
            padding: 8px 0;
            margin-top: 15px;
        }

        #prompt {
            font-size: 15px;
            margin-right: 8px;
            color: #00ff00;
            font-weight: bold;
        }

        #input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            caret-color: #00ff00;
            caret-shape: block;
        }

        .peer-message {
            display: inline-block;
            padding: 4px 0;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .command {
            color: #0fdc5f;
            font-weight: bold;
        }

        .parameter {
            color: #5fb3ff;
        }

        .error-message {
            color: #ff4f4f;
        }

        .success-message {
            color: #2aef63;
        }

        @media (max-width: 768px) {
            #input {
                width: 100%;
                font-size: 14px;
                padding: 5px;
            }

            #inputArea {
                padding: 10px 0;
            }

            #prompt {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="console" tabindex="0">
        <div id="output"></div>
        <div id="inputArea">
            <span id="prompt">> </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer, myPeerId = '', connections = [], knownPeers = new Set(), connectedPeers = new Set(),
            isConnected = false, chatHistory = [], myName = 'k8o5_0', commandHistory = [], historyIndex = -1,
            aesKey, publicKey, privateKey, lobbyId = null;

        // Generate RSA key pair for secure key exchange
        async function generateKeyPair() {
            const keyPair = await window.crypto.subtle.generateKey(
                { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                true,
                ["encrypt", "decrypt"]
            );
            publicKey = keyPair.publicKey;
            privateKey = keyPair.privateKey;
        }

        // Generate AES key for message encryption
        async function generateAESKey() {
            aesKey = await window.crypto.subtle.generateKey(
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
            return aesKey;
        }

        // Export AES key to share with others
        async function exportAESKey(key) {
            const exported = await window.crypto.subtle.exportKey("raw", key);
            return new Uint8Array(exported);
        }

        // Import AES key from raw data
        async function importAESKey(rawKey) {
            return await window.crypto.subtle.importKey(
                "raw", rawKey, { name: "AES-GCM" }, true, ["encrypt", "decrypt"]
            );
        }

        // Encrypt AES key with RSA public key
        async function encryptAESKey(aesKey, publicKey) {
            const exportedKey = await exportAESKey(aesKey);
            const encrypted = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" },
                publicKey,
                exportedKey
            );
            return new Uint8Array(encrypted);
        }

        // Decrypt AES key with RSA private key
        async function decryptAESKey(encryptedKey) {
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "RSA-OAEP" },
                privateKey,
                encryptedKey
            );
            return await importAESKey(new Uint8Array(decrypted));
        }

        // Encrypt message with AES-GCM
        async function encryptMessage(message) {
            const encoder = new TextEncoder();
            const data = encoder.encode(message);
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                aesKey,
                data
            );
            return { iv: iv, encryptedData: new Uint8Array(encrypted) };
        }

        // Decrypt message with AES-GCM
        async function decryptMessage(encryptedMessage) {
            const { iv, encryptedData } = encryptedMessage;
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                aesKey,
                encryptedData
            );
            const decoder = new TextDecoder();
            return decoder.decode(decrypted);
        }

        // Convert array buffer to base64
        function arrayBufferToBase64(buffer) {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }

        // Convert base64 to array buffer
        function base64ToArrayBuffer(base64) {
            const binary = atob(base64);
            const len = binary.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }

        // Parse join link
        function parseJoinLink() {
            const path = window.location.pathname.split('/');
            if (path[1] === 'join' && path[2] && path[3]) {
                return { peerId: path[2], encryptedKey: base64ToArrayBuffer(path[3]) };
            }
            return null;
        }

        function getPeerColor(peerId) {
            let hash = 0; for (let i = 0; i < peerId.length; i++) hash = peerId.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash % 360)}, 70%, 50%)`;
        }

        function renderText(text, peerId = null, name = null) {
            return peerId ? `<span class="peer-message" style="color:${getPeerColor(peerId)}">${name||`k8o5_${connections.length-1}`}:${text}</span><br>` : text.replace(/\n/g, '<br>');
        }

        function typeWriter(text, index = 0, delay = 50, callback) {
            if (index < text.length) {
                document.getElementById('output').innerHTML += text.charAt(index);
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
                setTimeout(() => typeWriter(text, index + 1, delay, callback), delay);
            } else if (callback) callback();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function tryToConnectToNewPeers() {
            [...knownPeers].filter(peerId => peerId !== myPeerId && !connectedPeers.has(peerId) && !connections.some(conn => conn.peer === peerId))
                .forEach(peerId => connectToPeer(peerId));
        }

        async function initPeer() {
            await generateKeyPair();
            const joinInfo = parseJoinLink();

            peer = new Peer({ debug: 3 });
            peer.on('open', async id => {
                myPeerId = id;
                knownPeers.add(myPeerId);
                lobbyId = myPeerId; // Default lobby ID is the creator's peer ID

                if (joinInfo) {
                    // Joining an existing lobby
                    lobbyId = joinInfo.peerId;
                    aesKey = await decryptAESKey(joinInfo.encryptedKey);
                    connectToPeer(lobbyId);
                    typeWriter('k8o5\n', 0, 40, () => {
                        typeWriter(`Deine Peer-ID: ${myPeerId}\n`, 0, 20, () => {
                            document.getElementById('inputArea').style.display = 'flex';
                            document.getElementById('input').focus();
                        });
                    });
                } else {
                    // Creating a new lobby
                    await generateAESKey();
                    const encryptedKey = await encryptAESKey(aesKey, publicKey);
                    const joinLink = `https://k8o5.com/join/${myPeerId}/${arrayBufferToBase64(encryptedKey)}`;
                    typeWriter('k8o5\n', 0, 40, () => {
                        typeWriter(`Deine Peer-ID: ${myPeerId}\n`, 0, 20, () => {
                            typeWriter(`Lobby-Link: ${joinLink}\n`, 0, 20, () => {
                                document.getElementById('inputArea').style.display = 'flex';
                                document.getElementById('input').focus();
                            });
                        });
                    });
                }
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', async () => {
                    console.log('Verbunden mit: ' + conn.peer);
                    knownPeers.add(conn.peer); connectedPeers.add(conn.peer);
                    switchToChatMode(conn.peer);
                    conn.send(JSON.stringify({ type: 'peer_list', peers: [...knownPeers], lobbyId: lobbyId }));
                    const encryptedKey = await encryptAESKey(aesKey, publicKey); // Re-encrypt for each peer
                    conn.send(JSON.stringify({ type: 'aes_key', key: arrayBufferToBase64(encryptedKey) }));
                    conn.send(JSON.stringify({ type: 'chat_history', history: chatHistory }));
                    tryToConnectToNewPeers();
                });
                conn.on('data', handleData);
                conn.on('close', () => { 
                    connectedPeers.delete(conn.peer); 
                    knownPeers.delete(conn.peer);
                    console.log('Verbindung geschlossen mit: ' + conn.peer); 
                });
            });
        }

        function handleInput() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            document.getElementById('output').innerHTML += renderText(`<span class="command">> ${input}</span>\n`);
            if (!isConnected) {
                if (input.startsWith('peer ')) {
                    const targetPeerId = input.split(' ')[1];
                    if (targetPeerId) connectToPeer(targetPeerId);
                    else document.getElementById('output').innerHTML += renderText('<span class="error-message">Fehler: Gib eine Peer-ID ein!</span>\n');
                } else if (input.startsWith('help')) showHelp();
                else if (input.startsWith('name ')) {
                    const name = input.split(' ')[1];
                    myName = name || myName;
                    document.getElementById('output').innerHTML += renderText(`<span class="success-message">Name geändert zu: ${myName}</span>\n`);
                } else document.getElementById('output').innerHTML += renderText('<span class="error-message">Unbekannter Befehl. Nutze: help</span>\n');
            } else {
                const messageEntry = { peerId: myPeerId, message: input, name: myName };
                chatHistory.push(messageEntry);
                broadcastMessage(messageEntry);
                document.getElementById('output').innerHTML += renderText(input, myPeerId, myName);
            }
            document.getElementById('input').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        function connectToPeer(peerId) {
            if (peerId === myPeerId || connectedPeers.has(peerId) || connections.some(conn => conn.peer === peerId)) return;
            const conn = peer.connect(peerId);
            connections.push(conn);
            conn.on('open', async () => {
                console.log('Verbunden mit: ' + peerId);
                knownPeers.add(peerId); connectedPeers.add(peerId);
                switchToChatMode(peerId);
                conn.send(JSON.stringify({ type: 'peer_list', peers: [...knownPeers], lobbyId: lobbyId }));
                const encryptedKey = await encryptAESKey(aesKey, publicKey);
                conn.send(JSON.stringify({ type: 'aes_key', key: arrayBufferToBase64(encryptedKey) }));
                conn.send(JSON.stringify({ type: 'chat_history', history: chatHistory }));
                tryToConnectToNewPeers();
            });
            conn.on('data', handleData);
            conn.on('close', () => { 
                connectedPeers.delete(conn.peer); 
                knownPeers.delete(conn.peer); 
                console.log('Verbindung geschlossen mit: ' + peerId); 
            });
        }

        async function broadcastMessage(message) {
            const encryptedMessage = await encryptMessage(message.message);
            const messageData = JSON.stringify({
                peerId: message.peerId,
                name: message.name,
                encryptedMessage: {
                    iv: arrayBufferToBase64(encryptedMessage.iv),
                    encryptedData: arrayBufferToBase64(encryptedMessage.encryptedData)
                }
            });
            connections.forEach(conn => { if (conn.peer !== message.peerId) conn.send(messageData); });
        }

        async function handleData(data) {
            let messageData;
            try { messageData = JSON.parse(data); } catch (e) { messageData = { peerId: this.peer, message: data, name: `k8o5_${connections.length-1}` }; }
            if (messageData.type === 'peer_list') {
                messageData.peers.forEach(peerId => { if (peerId !== myPeerId) knownPeers.add(peerId); });
                if (messageData.lobbyId) lobbyId = messageData.lobbyId;
                tryToConnectToNewPeers();
            } else if (messageData.type === 'aes_key') {
                const encryptedKey = base64ToArrayBuffer(messageData.key);
                aesKey = await decryptAESKey(encryptedKey);
            } else if (messageData.type === 'chat_history') {
                for (const entry of messageData.history) {
                    if (!entry.encryptedMessage) continue; // Skip unencrypted entries
                    const iv = base64ToArrayBuffer(entry.encryptedMessage.iv);
                    const encryptedData = base64ToArrayBuffer(entry.encryptedMessage.encryptedData);
                    const decryptedMessage = await decryptMessage({ iv, encryptedData });
                    const decryptedEntry = { peerId: entry.peerId, message: decryptedMessage, name: entry.name };
                    if (!chatHistory.some(h => h.peerId === decryptedEntry.peerId && h.message === decryptedEntry.message)) {
                        chatHistory.push(decryptedEntry);
                        document.getElementById('output').innerHTML += renderText(decryptedMessage, entry.peerId, entry.name);
                    }
                }
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            } else {
                const { peerId, encryptedMessage, name } = messageData;
                const iv = base64ToArrayBuffer(encryptedMessage.iv);
                const encryptedData = base64ToArrayBuffer(encryptedMessage.encryptedData);
                const decryptedMessage = await decryptMessage({ iv, encryptedData });
                const messageEntry = { peerId, message: decryptedMessage, name };
                if (!chatHistory.some(h => h.peerId === peerId && h.message === decryptedMessage)) {
                    chatHistory.push(messageEntry);
                    document.getElementById('output').innerHTML += renderText(decryptedMessage, peerId, name);
                    const broadcastEntry = { peerId, name, encryptedMessage };
                    broadcastMessage(broadcastEntry);
                }
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            }
        }

        function switchToChatMode(peerId) {
            isConnected = true;
            document.getElementById('output').innerHTML += renderText(`<span class="success-message">Verbunden mit ${peerId}!</span>\n<span class="success-message">Chat-Modus aktiviert.</span>\n`);
            document.getElementById('prompt').innerHTML = 'chat> ';
        }

        function showHelp() {
            const helpText = `
<span class="success-message">Verfügbare Befehle:</span>
- <span class="command">peer</span> <span class="parameter">[peer_id]</span>: Verbinde dich mit einem anderen Peer
- <span class="command">name</span> <span class="parameter">[string]</span>: Definiere deinen Namen (z. B. name Max)
- <span class="command">help</span>: Zeige diese Hilfe
`;
            document.getElementById('output').innerHTML += renderText(helpText);
        }

        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                if (commandHistory.length > 0 && historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    document.getElementById('input').value = commandHistory[commandHistory.length - 1 - historyIndex];
                }
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                if (historyIndex > 0) {
                    historyIndex--;
                    document.getElementById('input').value = commandHistory[commandHistory.length - 1 - historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    document.getElementById('input').value = '';
                }
                e.preventDefault();
            }
        });

        document.getElementById('console').addEventListener('click', (e) => {
            if (!e.target.matches('#input')) {
                document.getElementById('input').focus();
            }
        });

        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const inputValue = document.getElementById('input').value.trim();
                if (inputValue) {
                    commandHistory.push(inputValue);
                    historyIndex = -1;
                }
                handleInput();
            }
        });

        document.getElementById('input').addEventListener('touchstart', function() {
            this.focus();
        });

        initPeer();
    </script>
</body>
</html>
