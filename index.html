<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/webrtc.js"></script>
    <style>
        body { max-width: 800px; margin: 0 auto; font-family: Arial, sans-serif; }
        .post { background: #f0f2f5; border-radius: 8px; padding: 15px; margin: 10px 0; }
        .comment { background: #fff; margin: 5px 0; padding: 8px; border-radius: 4px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; }
        button { background: #1877f2; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #166fe5; }
        .like-btn { background: none; color: #65676b; padding: 0; }
        .like-btn:hover { background: none; color: #1877f2; }
    </style>
</head>
<body>
    <h1>k8o5</h1>
    <h2>Decentralized Social Feed - IP-Based (@<span id="userIp">...</span>)</h2>
    <div id="newPost">
        <textarea id="postContent" placeholder="What's on your mind?"></textarea>
        <button onclick="createPost()">Post</button>
    </div>
    <div id="feed"></div>

    <script>
        let userIp = '';
        
        // Get user IP
        async function fetchIp() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                userIp = data.ip;
                document.getElementById('userIp').textContent = userIp;
            } catch (error) {
                userIp = 'unknown';
                console.error('Error fetching IP:', error);
            }
        }

        const gun = Gun({ peers: ['https://k8o5.com/gun'], localStorage: true });
        const posts = gun.get('social2-posts');

        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content || !userIp) return;

            const postId = Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            const post = {
                id: postId,
                author: userIp,
                content: content,
                timestamp: Date.now(),
                likes: 0,
                likedBy: {},
                comments: {}
            };

            posts.get(postId).put(post);
            document.getElementById('postContent').value = '';
        }

        function likePost(postId) {
            if (!userIp) return;
            
            posts.get(postId).once(post => {
                if (!post || post.likedBy[userIp]) return;
                
                posts.get(postId).put({
                    likes: (post.likes || 0) + 1,
                    likedBy: { ...post.likedBy, [userIp]: true }
                });
            });
        }

        function addComment(postId) {
            const input = document.getElementById(`comment-${postId}`);
            const content = input.value.trim();
            if (!content || !userIp) return;

            const commentId = Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            const comment = {
                id: commentId,
                author: userIp,
                content: content,
                timestamp: Date.now()
            };

            posts.get(postId).get('comments').get(commentId).put(comment);
            input.value = '';
        }

        // Real-time updates
        posts.map().on((post, postId) => {
            if (!post || !postId) return;

            let postElement = document.getElementById(postId);
            if (!postElement) {
                postElement = document.createElement('div');
                postElement.id = postId;
                postElement.className = 'post';
                document.getElementById('feed').prepend(postElement);
            }

            // Update post content
            postElement.innerHTML = `
                <h4>@${post.author}</h4>
                <p>${post.content}</p>
                <div>
                    <button class="like-btn" onclick="likePost('${postId}')">
                        ${post.likes || 0} Likes
                    </button>
                    <span style="color: #65676b;">${new Date(post.timestamp).toLocaleString()}</span>
                </div>
                <div id="comments-${postId}"></div>
                <div>
                    <input id="comment-${postId}" type="text" placeholder="Write a comment...">
                    <button onclick="addComment('${postId}')">Comment</button>
                </div>
            `;

            // Update comments
            const commentsDiv = document.getElementById(`comments-${postId}`);
            commentsDiv.innerHTML = '';
            gun.get('social2-posts').get(postId).get('comments').map().on((comment, commentId) => {
                if (!comment || !commentId) return;
                
                const commentElement = document.createElement('div');
                commentElement.className = 'comment';
                commentElement.innerHTML = `
                    <strong>@${comment.author}</strong>
                    <p>${comment.content}</p>
                    <small>${new Date(comment.timestamp).toLocaleString()}</small>
                `;
                commentsDiv.appendChild(commentElement);
            });
        });

        fetchIp();
    </script>
</body>
</html>
