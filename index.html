<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fart Tag - Das lustigste Spiel ohne Backend!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #ffeb3b 0%, #ff9800 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 600px;
            position: relative;
            overflow: hidden;
            border: 3px solid #ff5722;
        }
        h1 {
            text-align: center;
            color: #ff5722;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            font-size: 2rem;
        }
        #game-area {
            width: 100%;
            height: calc(100% - 60px);
            background: url('https://www.transparenttextures.com/patterns/cartoon-grass.png');
            position: relative;
            overflow: hidden;
        }
        .player {
            position: absolute;
            width: 50px;
            height: 50px;
            font-size: 2rem;
            text-align: center;
            line-height: 50px;
            transition: all 0.1s;
        }
        .player.it {
            border-radius: 50%;
            box-shadow: 0 0 15px 5px rgba(255, 0, 0, 0.7);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .fart-effect {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(139, 69, 19, 0.5);
            border-radius: 50%;
            animation: fart 0.5s forwards;
        }
        @keyframes fart {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        #online-users {
            text-align: center;
            color: #ff5722;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        @media (max-width: 600px) {
            .container {
                width: 100%;
                height: 400px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .player {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
                line-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fart Tag - Wer furzt dich?!</h1>
        <div id="online-users">Online Spieler: 1</div>
        <div id="game-area"></div>
    </div>

    <!-- PeerJS einbinden -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // Vordefinierte Liste von Peer-IDs (für unendlich viele Spieler)
        const POSSIBLE_PEER_IDS = Array.from({ length: 1000 }, (_, i) => `peer-${i + 1}`);

        // Wähle eine zufällige Peer-ID aus der Liste für diesen Spieler
        const myPeerId = POSSIBLE_PEER_IDS[Math.floor(Math.random() * POSSIBLE_PEER_IDS.length)];
        const userId = `Nutzer-${myPeerId}`;

        // PeerJS initialisieren mit der ausgewählten Peer-ID
        const peer = new Peer(myPeerId, {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }, // Öffentlicher STUN-Server von Google
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        });

        // Liste der verbundenen Peers
        const connections = new Map();

        // Spieler-Daten
        const players = new Map();
        let myPlayer = {
            id: myPeerId,
            x: Math.random() * 700,
            y: Math.random() * 500,
            emoji: getRandomEmoji(),
            isIt: false
        };
        players.set(myPeerId, myPlayer);

        // Spielbereich
        const gameArea = document.getElementById('game-area');
        const onlineUsers = document.getElementById('online-users');

        // Zufälliges Emoji für Spieler
        function getRandomEmoji() {
            const emojis = ['💩', '🐷', '🤡', '🐮', '🐔', '🦊', '🐸', '🐵'];
            return emojis[Math.floor(Math.random() * emojis.length)];
        }

        // Spieler rendern
        function renderPlayers() {
            gameArea.innerHTML = '';
            players.forEach(player => {
                const playerElement = document.createElement('div');
                playerElement.className = 'player' + (player.isIt ? ' it' : '');
                playerElement.style.left = `${player.x}px`;
                playerElement.style.top = `${player.y}px`;
                playerElement.textContent = player.emoji;
                gameArea.appendChild(playerElement);
            });
        }

        // Bewegung des Spielers
        const speed = 5;
        document.addEventListener('keydown', (e) => {
            let moved = false;
            if (e.key === 'ArrowLeft' && myPlayer.x > 0) {
                myPlayer.x -= speed;
                moved = true;
            } else if (e.key === 'ArrowRight' && myPlayer.x < gameArea.clientWidth - 50) {
                myPlayer.x += speed;
                moved = true;
            } else if (e.key === 'ArrowUp' && myPlayer.y > 0) {
                myPlayer.y -= speed;
                moved = true;
            } else if (e.key === 'ArrowDown' && myPlayer.y < gameArea.clientHeight - 50) {
                myPlayer.y += speed;
                moved = true;
            }
            if (moved) {
                broadcastPlayerUpdate();
                checkCollisions();
                renderPlayers();
            }
        });

        // Kollisionen prüfen
        function checkCollisions() {
            if (!myPlayer.isIt) return;
            players.forEach((player, id) => {
                if (id === myPeerId || player.isIt) return;
                const dx = myPlayer.x - player.x;
                const dy = myPlayer.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 50) {
                    // Spieler wurde gefurzt
                    myPlayer.isIt = false;
                    player.isIt = true;
                    broadcastPlayerUpdate();
                    playFartSound();
                    showFartEffect(player.x, player.y);
                }
            });
        }

        // Furz-Effekt anzeigen
        function showFartEffect(x, y) {
            const fart = document.createElement('div');
            fart.className = 'fart-effect';
            fart.style.left = `${x}px`;
            fart.style.top = `${y}px`;
            gameArea.appendChild(fart);
        }

        // Furz-Sound abspielen
        function playFartSound() {
            const audio = new Audio('https://www.myinstants.com/media/sounds/fart.mp3');
            audio.play().catch(err => console.log('Audio-Fehler:', err));
        }

        // Spieler-Updates senden
        function broadcastPlayerUpdate() {
            connections.forEach((conn, peerId) => {
                conn.send({
                    type: 'player-update',
                    data: myPlayer
                });
            });
        }

        // Wenn der Peer initialisiert wird, erhalten wir eine ID
        peer.on('open', (id) => {
            console.log(`Deine ID: ${id} (${userId})`);
            console.log('Versuche, dich mit anderen Peers zu verbinden...');
            connectToOtherPeers();
            // Wähle zufällig den ersten "It"-Spieler
            if (Math.random() < 0.1) {
                myPlayer.isIt = true;
            }
            renderPlayers();
        });

        // Funktion, um sich mit anderen Peers zu verbinden
        function connectToOtherPeers() {
            POSSIBLE_PEER_IDS.forEach(peerId => {
                if (peerId !== myPeerId && !connections.has(peerId)) {
                    const conn = peer.connect(peerId);
                    setupConnection(conn);
                }
            });

            // Retry-Mechanismus: Versuche alle 10 Sekunden, sich mit nicht verbundenen Peers zu verbinden
            setTimeout(connectToOtherPeers, 10000);
        }

        // Wenn ein anderer Peer sich mit uns verbindet
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // Verbindung einrichten
        function setupConnection(conn) {
            const peerId = conn.peer;
            if (connections.has(peerId)) return;

            conn.on('open', () => {
                connections.set(peerId, conn);
                console.log(`Verbunden mit ${peerId}`);
                onlineUsers.textContent = `Online Spieler: ${connections.size + 1}`;
                // Sende meine Spieler-Daten an den neuen Peer
                conn.send({
                    type: 'player-update',
                    data: myPlayer
                });
            });

            conn.on('data', (data) => {
                if (data.type === 'player-update') {
                    players.set(data.data.id, data.data);
                    renderPlayers();
                }
            });

            conn.on('close', () => {
                connections.delete(peerId);
                players.delete(peerId);
                console.log(`${peerId} hat das Spiel verlassen.`);
                onlineUsers.textContent = `Online Spieler: ${connections.size + 1}`;
                renderPlayers();
            });

            conn.on('error', (err) => {
                console.log(`Fehler mit ${peerId}: ${err}`);
            });
        }

        // Fehlerbehandlung
        peer.on('error', (err) => {
            console.log(`Fehler: ${err}`);
        });
    </script>
</body>
</html>
