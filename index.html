<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5 - Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #setup {
            text-align: center;
        }
        #chat {
            display: none;
            width: 100%;
            height: 100%;
            background: #000;
            color: #0f0;
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 20px 40px;
            font-size: 18px;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        button:hover {
            background: #000;
            color: #0f0;
        }
        #console {
            width: 100%;
            height: 80%;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 16px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
        }
        #inputArea {
            display: flex;
            margin-top: 10px;
        }
        input {
            flex-grow: 1;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }
        #sendButton {
            padding: 10px 20px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="setup">
        <button onclick="createLobby()">Lobby erstellen</button>
    </div>
    <div id="chat">
        <div id="console"></div>
        <div id="inputArea">
            <input type="text" id="messageInput" placeholder="Name eingeben oder Nachricht..." onkeypress="if(event.key === 'Enter') handleInput()">
            <button id="sendButton" onclick="handleInput()">Senden</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let roomId = new URLSearchParams(window.location.search).get('room') || '';
        let isHost = false;
        let connections = [];
        let username = '';
        let asciiArt = '';

        // Einzigartige ASCII-Art generieren
        function generateAsciiArt() {
            const patterns = [
                `  .-""""""""-.\n .'          '.\n|  **    **  |\n: ,          :\n '._         _.'\n    '-....-'`,
                `  .-""""""""-.\n .'          '.\n|  @@    @@  |\n: ,          :\n '._         _.'\n    '-....-'`,
                `  .-""""""""-.\n .'          '.\n|  $$    $$  |\n: ,          :\n '._         _.'\n    '-....-'`
            ];
            return patterns[Math.floor(Math.random() * patterns.length)];
        }

        // Lobby erstellen
        function createLobby() {
            roomId = roomId || Math.random().toString(36).substr(2, 5);
            window.history.pushState({}, document.title, `?room=${roomId}`);
            isHost = true;
            initPeer();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('console').innerHTML = `Lobby erstellt! Raum-ID: ${roomId}\nTeile diesen Link: k8o5.com?room=${roomId}\n\nHost-Angebot: Kopiere den Text unten und teile ihn mit anderen:\n<textarea>${JSON.stringify({ type: 'offer', roomId })}</textarea>\n\nAntwort hier einfügen (von anderen erhalten):\n<textarea id="answer" onpaste="setTimeout(() => joinChat(document.getElementById('answer').value), 0)"></textarea>`;
        }

        // PeerJS initialisieren
        function initPeer() {
            peer = new Peer({ debug: 3 });
            peer.on('open', id => {
                console.log('Mein Peer-ID: ' + id);
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', () => {
                    console.log('Verbunden mit: ' + conn.peer);
                });
                conn.on('data', data => {
                    const [senderArt, sender, msg] = data.split('|');
                    document.getElementById('console').innerHTML += `\n${senderArt}\n${sender}: ${msg}`;
                    document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
                });
            });
        }

        // Chat beitreten
        function joinChat(answerText) {
            const answer = JSON.parse(answerText);
            if (answer.type !== 'answer' || answer.roomId !== roomId) return alert('Ungültige Antwort');
            const conn = peer.connect(answer.peerId);
            connections.push(conn);
            conn.on('open', () => {
                document.getElementById('console').innerHTML = 'Verbunden! Gib deinen Namen ein...';
            });
            conn.on('data', data => {
                const [senderArt, sender, msg] = data.split('|');
                document.getElementById('console').innerHTML += `\n${senderArt}\n${sender}: ${msg}`;
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            });
        }

        // Eingabe verarbeiten
        function handleInput() {
            const input = document.getElementById('messageInput').value.trim();
            if (!input) return;

            if (!username) {
                username = input;
                asciiArt = generateAsciiArt();
                document.getElementById('console').innerHTML += `\n${asciiArt}\n${username} hat den Chat betreten!`;
                if (!isHost) {
                    document.getElementById('console').innerHTML = `Teile diese Antwort mit dem Host:\n<textarea>${JSON.stringify({ type: 'answer', peerId: peer.id, roomId })}</textarea>\n\nChat beginnt, sobald der Host verbunden ist...`;
                }
            } else {
                const message = `${asciiArt}|${username}|${input}`;
                connections.forEach(conn => conn.send(message));
                document.getElementById('console').innerHTML += `\n${asciiArt}\n${username}: ${input}`;
            }
            document.getElementById('messageInput').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }
    </script>
</body>
</html>
