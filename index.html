<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dezentraler P2P Chat</title>
    <style>
        #chat-box {
            width: 400px;
            height: 300px;
            border: 1px solid #ccc;
            overflow-y: scroll;
            margin: 10px 0;
            padding: 10px;
        }
        #message-input {
            width: 300px;
            margin-right: 10px;
        }
        #connection-info {
            margin: 10px 0;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <h2>Dezentraler End-to-End Encrypted Chat</h2>
    <div>
        <button onclick="startConnection()">Chat starten</button>
        <div id="connection-info"></div>
    </div>
    <div id="chat-box"></div>
    <div>
        <input type="text" id="message-input" placeholder="Nachricht eingeben" disabled>
        <button onclick="sendMessage()" disabled id="send-btn">Senden</button>
    </div>

    <script>
        const configuration = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };
        let peerConnection;
        let dataChannel;
        let encryptionKey;

        async function generateKey() {
            encryptionKey = await window.crypto.subtle.generateKey(
                {
                    name: "AES-GCM",
                    length: 256
                },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function encryptMessage(message) {
            const encoder = new TextEncoder();
            const data = encoder.encode(message);
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv },
                encryptionKey,
                data
            );
            return { iv, encrypted };
        }

        async function decryptMessage(encryptedData, iv) {
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv },
                encryptionKey,
                encryptedData
            );
            return new TextDecoder().decode(decrypted);
        }

        async function startConnection() {
            await generateKey();
            peerConnection = new RTCPeerConnection(configuration);
            
            dataChannel = peerConnection.createDataChannel('chat');
            dataChannel.onmessage = handleMessage;
            dataChannel.onopen = () => {
                document.getElementById('message-input').disabled = false;
                document.getElementById('send-btn').disabled = false;
                addToChat('System: Verbindung hergestellt!');
            };

            let iceCandidates = [];
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    iceCandidates.push(event.candidate);
                    updateConnectionInfo();
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            function updateConnectionInfo() {
                const connectionData = {
                    offer: peerConnection.localDescription,
                    candidates: iceCandidates
                };
                const infoDiv = document.getElementById('connection-info');
                infoDiv.innerHTML = `
                    <p>1. Kopiere diesen Text:</p>
                    <textarea readonly>${JSON.stringify(connectionData)}</textarea>
                    <p>2. Sende ihn an deinen Chat-Partner</p>
                    <p>3. Füge die Antwort deines Partners hier ein:</p>
                    <textarea id="remote-data" placeholder="Antwort hier einfügen"></textarea>
                    <button onclick="connectToRemote()">Verbinden</button>
                `;
            }
            updateConnectionInfo();
        }

        async function connectToRemote() {
            const remoteDataText = document.getElementById('remote-data').value;
            if (!remoteDataText) return;

            const remoteData = JSON.parse(remoteDataText);
            await peerConnection.setRemoteDescription(remoteData.offer);
            
            for (const candidate of remoteData.candidates) {
                await peerConnection.addIceCandidate(candidate);
            }
        }

        async function handleMessage(event) {
            const data = JSON.parse(event.data);
            const message = await decryptMessage(
                new Uint8Array(Object.values(data.encrypted)),
                new Uint8Array(Object.values(data.iv))
            );
            addToChat(`Peer: ${message}`);
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value;
            if (!message || !dataChannel) return;

            const { iv, encrypted } = await encryptMessage(message);
            const data = {
                iv: Array.from(iv),
                encrypted: Array.from(new Uint8Array(encrypted))
            };
            dataChannel.send(JSON.stringify(data));
            
            addToChat(`Du: ${message}`);
            input.value = '';
        }

        function addToChat(message) {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div>${message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
