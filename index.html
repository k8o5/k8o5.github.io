<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8o5 Live Chart</title>
    <style>
        /* Full page setup */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Stretched background image */
        body {
            background-image: url('Banner.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Centered chart container */
        #dexscreener-embed {
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            position: relative;
            z-index: 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Responsive aspect ratio */
        @media (min-width: 1400px) {
            #dexscreener-embed {
                padding-bottom: 65%;
            }
        }

        #dexscreener-embed iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: 0;
        }
    </style>
</head>
<body>
    <div id="dexscreener-embed">
        <iframe src="https://dexscreener.com/solana/Aqvdycn6XxWDXFL28ZihvSavrxZgtE1TcLH2QwSgPM7W?embed=1&loadChartSettings=0&trades=0&tabs=0&chartLeftToolbar=0&chartTheme=dark&theme=dark&chartStyle=0&chartType=usd&interval=15"></iframe>
    </div>
</body>
</html>
