<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8O5 Swap – Powered by Raydium</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a4a);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            width: 450px;
            text-align: center;
            border: 2px solid #ff007a;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #ff007a;
            text-shadow: 0 0 10px rgba(255, 0, 122, 0.5);
        }
        .tagline {
            font-size: 14px;
            color: #00ddeb;
            margin-bottom: 20px;
        }
        button {
            background: #ff007a;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            width: 100%;
            margin: 10px 0;
        }
        button:hover {
            background: #e6006d;
            transform: scale(1.05);
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
        }
        .wallet-info, .swap-info {
            margin-top: 20px;
            font-size: 14px;
        }
        .wallet-info span, .swap-info span {
            color: #ff007a;
        }
        .k8o5-promo {
            font-size: 12px;
            color: #00ddeb;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>K8O5 Swap</h1>
        <div class="tagline">Tausche K8O5 – Der Token, der die Zukunft antreibt!</div>
        <button id="connectButton" onclick="connectWallet()">Mit Phantom verbinden</button>
        <div class="wallet-info" id="walletInfo">Wallet: <span id="walletAddress">Nicht verbunden</span></div>
        <input type="number" id="amountInput" placeholder="K8O5 Betrag eingeben" disabled>
        <select id="slippageSelect" disabled>
            <option value="0.5">0.5% Slippage</option>
            <option value="1">1% Slippage</option>
            <option value="2">2% Slippage</option>
            <option value="5">5% Slippage</option>
        </select>
        <button id="swapButton" onclick="swapTokens()" disabled>K8O5 zu SOL tauschen</button>
        <div class="swap-info" id="swapInfo">Status: <span id="swapStatus">Warte auf Verbindung...</span></div>
        <div class="k8o5-promo">
            Entdecke K8O5 – Schnell. Stark. Revolutionär. Der Token, den die Community liebt!
        </div>
    </div>

    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script src="https://unpkg.com/@raydium-io/raydium-sdk@1.3.1-beta.23/lib/index.iife.js"></script>
    <script>
        const { solana } = window;
        let publicKey = null;
        const K8O5_TOKEN_ADDRESS = '5xRxwB4N3Rc2J2toHixeMD4PsqaT1YMFavPxcyNqpump'; // K8O5 Token Adresse
        const SOL_TOKEN_ADDRESS = 'So11111111111111111111111111111111111111112'; // Wrapped SOL Adresse
        const SOLANA_RPC = 'https://api.devnet.solana.com'; // Devnet für Tests
        const RAYDIUM_LIQUIDITY_JSON = 'https://api.raydium.io/v2/sdk/liquidity/mainnet.json'; // Mainnet-Pools, für Devnet ggf. anpassen

        async function connectWallet() {
            try {
                if (!solana || !solana.isPhantom) {
                    alert('Bitte installiere die Phantom Wallet Erweiterung!');
                    return;
                }
                const response = await solana.connect();
                publicKey = response.publicKey.toString();
                document.getElementById('walletAddress').textContent = publicKey.slice(0, 8) + '...';
                document.getElementById('amountInput').disabled = false;
                document.getElementById('slippageSelect').disabled = false;
                document.getElementById('swapButton').disabled = false;
                document.getElementById('swapStatus').textContent = 'Verbunden! Bereit für K8O5!';
            } catch (err) {
                console.error('Fehler beim Verbinden:', err);
                document.getElementById('swapStatus').textContent = 'Verbindung fehlgeschlagen';
            }
        }

        async function swapTokens() {
            const amount = document.getElementById('amountInput').value;
            const slippagePercent = parseFloat(document.getElementById('slippageSelect').value);
            if (!amount || amount <= 0) {
                alert('Bitte gib einen gültigen K8O5-Betrag ein!');
                return;
            }

            document.getElementById('swapStatus').textContent = 'K8O5-Swap wird vorbereitet...';
            document.getElementById('swapButton').disabled = true;

            try {
                const connection = new solanaWeb3.Connection(SOLANA_RPC, 'confirmed');

                // Lade Raydium Liquidity Pool Daten
                const liquidityData = await (await fetch(RAYDIUM_LIQUIDITY_JSON)).json();
                const pools = liquidityData.official.concat(liquidityData.unOfficial);
                const pool = pools.find(p => 
                    (p.baseMint === K8O5_TOKEN_ADDRESS && p.quoteMint === SOL_TOKEN_ADDRESS) ||
                    (p.baseMint === SOL_TOKEN_ADDRESS && p.quoteMint === K8O5_TOKEN_ADDRESS)
                );

                if (!pool) {
                    throw new Error('Kein passender Liquidity Pool für K8O5 gefunden!');
                }

                const poolKeys = {
                    id: new solanaWeb3.PublicKey(pool.id),
                    baseMint: new solanaWeb3.PublicKey(pool.baseMint),
                    quoteMint: new solanaWeb3.PublicKey(pool.quoteMint),
                    lpMint: new solanaWeb3.PublicKey(pool.lpMint),
                    baseVault: new solanaWeb3.PublicKey(pool.baseVault),
                    quoteVault: new solanaWeb3.PublicKey(pool.quoteVault),
                    openOrders: new solanaWeb3.PublicKey(pool.openOrders),
                    targetOrders: new solanaWeb3.PublicKey(pool.targetOrders),
                    marketId: new solanaWeb3.PublicKey(pool.marketId),
                    marketProgramId: new solanaWeb3.PublicKey(pool.marketProgramId),
                };

                const amountIn = new RaydiumSDK.TokenAmount(
                    new RaydiumSDK.Token(solanaWeb3.TOKEN_PROGRAM_ID, pool.baseMint, pool.baseDecimal),
                    amount * 10 ** pool.baseDecimal,
                    false
                );

                // Berechne den erwarteten Output mit Slippage
                const poolInfo = await RaydiumSDK.Liquidity.fetchInfo({ connection, poolKeys });
                const amountOutEstimate = RaydiumSDK.Liquidity.computeAmountOut({
                    poolKeys,
                    poolInfo,
                    amountIn,
                    currencyOut: new RaydiumSDK.Token(solanaWeb3.TOKEN_PROGRAM_ID, pool.quoteMint, pool.quoteDecimal),
                    slippage: slippagePercent / 100,
                });

                const amountOutMin = amountOutEstimate.minAmountOut;

                const { transaction } = await RaydiumSDK.Liquidity.makeSwapInstructionSimple({
                    connection,
                    poolKeys,
                    userKeys: { owner: new solanaWeb3.PublicKey(publicKey), payer: new solanaWeb3.PublicKey(publicKey) },
                    amountIn,
                    amountOut: amountOutMin,
                    fixedSide: 'in',
                    makeTxVersion: 1,
                });

                const recentBlockhash = await connection.getLatestBlockhash();
                transaction.recentBlockhash = recentBlockhash.blockhash;
                transaction.feePayer = new solanaWeb3.PublicKey(publicKey);

                const signedTx = await solana.signTransaction(transaction);
                const txId = await connection.sendRawTransaction(signedTx.serialize());
                await connection.confirmTransaction(txId);

                document.getElementById('swapStatus').textContent = `K8O5-Swap erfolgreich! Tx: ${txId.slice(0, 8)}...`;
            } catch (err) {
                console.error('Swap Fehler:', err);
                document.getElementById('swapStatus').textContent = 'Swap fehlgeschlagen: ' + err.message;
            } finally {
                document.getElementById('swapButton').disabled = false;
            }
        }
    </script>
</body>
</html>
