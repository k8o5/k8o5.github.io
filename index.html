<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K8O5 Swap – Powered by Raydium</title>
    <style>
        /* Füge hier deine CSS-Stile ein */
    </style>
</head>
<body>
    <div class="container">
        <h1>K8O5 Swap</h1>
        <button id="connectButton">Mit Phantom verbinden</button>
        <div class="wallet-info" id="walletInfo">Wallet: <span id="walletAddress">Nicht verbunden</span></div>
    </div>

    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <script>
        const { solana } = window;

        // Funktion zum Verbinden der Wallet
        async function connectWallet() {
            try {
                if (!solana || !solana.isPhantom) {
                    alert('Bitte installiere die Phantom Wallet Erweiterung!');
                    return;
                }
                const response = await solana.connect();
                const publicKey = response.publicKey.toString();
                document.getElementById('walletAddress').textContent = publicKey.slice(0, 8) + '...';
            } catch (err) {
                console.error('Fehler beim Verbinden:', err);
            }
        }

        // Event-Listener für den Button
        document.getElementById('connectButton').addEventListener('click', connectWallet);
    </script>
</body>
</html>
