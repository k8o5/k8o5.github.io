<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Prüfungsdateien Übersicht</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: #007BFF;
            font-size: 18px;
        }
        a:hover {
            text-decoration: underline;
            color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Prüfungsdateien Übersicht</h1>
        <ul id="fileList">
            <!-- Dateien werden hier dynamisch eingefügt -->
        </ul>
    </div>

    <script>
        // Liste der Dateien (aus deinem Verzeichnis)
        const files = [
            "Frühjahr2019.pdf",
            "Frühjahr2020.pdf",
            "Frühjahr2023.pdf",
            "Herbst2016.pdf",
            "Herbst2017(1).pdf",
            "Herbst2017(2).pdf",
            "Herbst2018.pdf",
            "Herbst2021.pdf",
            "Herbst2022.pdf",
            "Herbst2023.pdf"
        ];

        // Funktion zum Erstellen der Dateiliste
        function populateFileList() {
            const fileList = document.getElementById('fileList');
            files.forEach(file => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = file; // Relativer Pfad, da die HTML-Datei im selben Verzeichnis ist
                a.textContent = file;
                a.target = "_blank"; // Öffnet die Datei in einem neuen Tab
                li.appendChild(a);
                fileList.appendChild(li);
            });
        }

        // Dateiliste beim Laden der Seite füllen
        window.onload = populateFileList;
    </script>
</body>
</html>
