<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title><style>
        /* Grundlegende Styling-Regeln für den Body */
        body {
            background-image: url('https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73751/world.topo.bathy.200407.3x5400x2700.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Styling für die Buttons */
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Styling für den Log-Bereich */
        #log {
            margin-top: 20px;
            font-size: 16px;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }

        /* Overlay mit extrem langem box-shadow für visuellen Effekt */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1px;
            height: 1px;
            background: transparent;
            /* Hier beginnt der extrem lange box-shadow-Block */
            box-shadow:
                /* Erste Reihe (0,0 bis 19,0) */
                0px 0px 0px 1px rgb(0, 0, 0),
                1px 0px 0px 1px rgb(1, 0, 0),
                2px 0px 0px 1px rgb(2, 0, 0),
                3px 0px 0px 1px rgb(3, 0, 0),
                4px 0px 0px 1px rgb(4, 0, 0),
                5px 0px 0px 1px rgb(5, 0, 0),
                6px 0px 0px 1px rgb(6, 0, 0),
                7px 0px 0px 1px rgb(7, 0, 0),
                8px 0px 0px 1px rgb(8, 0, 0),
                9px 0px 0px 1px rgb(9, 0, 0),
                10px 0px 0px 1px rgb(10, 0, 0),
                11px 0px 0px 1px rgb(11, 0, 0),
                12px 0px 0px 1px rgb(12, 0, 0),
                13px 0px 0px 1px rgb(13, 0, 0),
                14px 0px 0px 1px rgb(14, 0, 0),
                15px 0px 0px 1px rgb(15, 0, 0),
                16px 0px 0px 1px rgb(16, 0, 0),
                17px 0px 0px 1px rgb(17, 0, 0),
                18px 0px 0px 1px rgb(18, 0, 0),
                19px 0px 0px 1px rgb(19, 0, 0),
                /* Zweite Reihe (0,1 bis 19,1) */
                0px 1px 0px 1px rgb(0, 1, 0),
                1px 1px 0px 1px rgb(1, 1, 0),
                2px 1px 0px 1px rgb(2, 1, 0),
                3px 1px 0px 1px rgb(3, 1, 0),
                4px 1px 0px 1px rgb(4, 1, 0),
                5px 1px 0px 1px rgb(5, 1, 0),
                6px 1px 0px 1px rgb(6, 1, 0),
                7px 1px 0px 1px rgb(7, 1, 0),
                8px 1px 0px 1px rgb(8, 1, 0),
                9px 1px 0px 1px rgb(9, 1, 0),
                10px 1px 0px 1px rgb(10, 1, 0),
                11px 1px 0px 1px rgb(11, 1, 0),
                12px 1px 0px 1px rgb(12, 1, 0),
                13px 1px 0px 1px rgb(13, 1, 0),
                14px 1px 0px 1px rgb(14, 1, 0),
                15px 1px 0px 1px rgb(15, 1, 0),
                16px 1px 0px 1px rgb(16, 1, 0),
                17px 1px 0px 1px rgb(17, 1, 0),
                18px 1px 0px 1px rgb(18, 1, 0),
                19px 1px 0px 1px rgb(19, 1, 0),
                /* Dritte Reihe (0,2 bis 19,2) */
                0px 2px 0px 1px rgb(0, 2, 0),
                1px 2px 0px 1px rgb(1, 2, 0),
                2px 2px 0px 1px rgb(2, 2, 0),
                3px 2px 0px 1px rgb(3, 2, 0),
                4px 2px 0px 1px rgb(4, 2, 0),
                5px 2px 0px 1px rgb(5, 2, 0),
                6px 2px 0px 1px rgb(6, 2, 0),
                7px 2px 0px 1px rgb(7, 2, 0),
                8px 2px 0px 1px rgb(8, 2, 0),
                9px 2px 0px 1px rgb(9, 2, 0),
                10px 2px 0px 1px rgb(10, 2, 0),
                11px 2px 0px 1px rgb(11, 2, 0),
                12px 2px 0px 1px rgb(12, 2, 0),
                13px 2px 0px 1px rgb(13, 2, 0),
                14px 2px 0px 1px rgb(14, 2, 0),
                15px 2px 0px 1px rgb(15, 2, 0),
                16px 2px 0px 1px rgb(16, 2, 0),
                17px 2px 0px 1px rgb(17, 2, 0),
                18px 2px 0px 1px rgb(18, 2, 0),
                19px 2px 0px 1px rgb(19, 2, 0),
                /* Hinweis: Dies ist nur ein kleiner Ausschnitt */
                /* Um den Code wirklich lang zu machen, könnten wir bis z.B. 499px 499px gehen */
                /* Das wären 250.000 Einträge! Hier nur bis 19x2 gezeigt */
                /* Fortsetzung könnte so aussehen: */
                0px 3px 0px 1px rgb(0, 3, 0),
                1px 3px 0px 1px rgb(1, 3, 0),
                2px 3px 0px 1px rgb(2, 3, 0),
                3px 3px 0px 1px rgb(3, 3, 0),
                4px 3px 0px 1px rgb(4, 3, 0),
                5px 3px 0px 1px rgb(5, 3, 0),
                6px 3px 0px 1px rgb(6, 3, 0),
                7px 3px 0px 1px rgb(7, 3, 0),
                8px 3px 0px 1px rgb(8, 3, 0),
                9px 3px 0px 1px rgb(9, 3, 0),
                10px 3px 0px 1px rgb(10, 3, 0),
                11px 3px 0px 1px rgb(11, 3, 0),
                12px 3px 0px 1px rgb(12, 3, 0),
                13px 3px 0px 1px rgb(13, 3, 0),
                14px 3px 0px 1px rgb(14, 3, 0),
                15px 3px 0px 1px rgb(15, 3, 0),
                16px 3px 0px 1px rgb(16, 3, 0),
                17px 3px 0px 1px rgb(17, 3, 0),
                18px 3px 0px 1px rgb(18, 3, 0),
                19px 3px 0px 1px rgb(19, 3, 0),
                /* Weitere Reihen könnten folgen */
                0px 4px 0px 1px rgb(0, 4, 0),
                1px 4px 0px 1px rgb(1, 4, 0),
                2px 4px 0px 1px rgb(2, 4, 0),
                3px 4px 0px 1px rgb(3, 4, 0),
                4px 4px 0px 1px rgb(4, 4, 0),
                5px 4px 0px 1px rgb(5, 4, 0),
                6px 4px 0px 1px rgb(6, 4, 0),
                7px 4px 0px 1px rgb(7, 4, 0),
                8px 4px 0px 1px rgb(8, 4, 0),
                9px 4px 0px 1px rgb(9, 4, 0),
                10px 4px 0px 1px rgb(10, 4, 0),
                11px 4px 0px 1px rgb(11, 4, 0),
                12px 4px 0px 1px rgb(12, 4, 0),
                13px 4px 0px 1px rgb(13, 4, 0),
                14px 4px 0px 1px rgb(14, 4, 0),
                15px 4px 0px 1px rgb(15, 4, 0),
                16px 4px 0px 1px rgb(16, 4, 0),
                17px 4px 0px 1px rgb(17, 4, 0),
                18px 4px 0px 1px rgb(18, 4, 0),
                19px 4px 0px 1px rgb(19, 4, 0)
                /* Hier könnte es weitergehen bis z.B. 499px 499px */
                ;
        }
    </style>
</head>
<body>
    <!-- Overlay-Element für den langen box-shadow -->
    <div class="overlay"></div>

    <!-- Steuerungsbuttons für TTS -->
    <div>
        <button id="startButton">TTS Starten</button>
        <button id="stopButton">TTS Stoppen</button>
    </div>

    <!-- Log-Bereich für TTS-Status -->
    <div id="log">TTS-Status wird hier angezeigt</div>

    <script>
        // TTS-Logik ohne console.log
        let voices = [];
        let currentVoiceIndex = 0;
        let intervalId = null;

        function startTTSLoop() {
            if (intervalId) return;
            intervalId = setInterval(function() {
                if (voices.length === 0) {
                    document.getElementById('log').textContent = "Keine Stimmen verfügbar.";
                    return;
                }
                const utterance = new SpeechSynthesisUtterance('K 8 O 5');
                utterance.voice = voices[currentVoiceIndex];
                document.getElementById('log').textContent = `Spricht mit Stimme: ${voices[currentVoiceIndex].name}`;
                speechSynthesis.speak(utterance);
                currentVoiceIndex = (currentVoiceIndex + 1) % voices.length;
            }, 5000);
        }

        function stopTTSLoop() {
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
                speechSynthesis.cancel();
                document.getElementById('log').textContent = "TTS gestoppt.";
            }
        }

        document.getElementById('startButton').addEventListener('click', startTTSLoop);
        document.getElementById('stopButton').addEventListener('click', stopTTSLoop);

        speechSynthesis.onvoiceschanged = function() {
            voices = speechSynthesis.getVoices();
            if (voices.length > 0) {
                document.getElementById('log').textContent = "Stimmen geladen. TTS kann gestartet werden.";
                startTTSLoop();
            } else {
                document.getElementById('log').textContent = "Keine Stimmen verfügbar.";
            }
        };
    </script>
</body>
</html>
