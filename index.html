<!DOCTYPE html>
<html>
<head>
    <title>k8o5/SOL</title>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.70.1/lib/index.iife.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .chart { height: 400px; margin: 20px 0; border: 1px solid #ddd; }
        .swap-box { padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        select, input, button { margin: 5px; padding: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <button id="connectButton">Connect Phantom Wallet</button>
        <div id="status"></div>
        
        <div class="swap-box">
            <select id="tradeType">
                <option value="buy">Buy k8o5 with SOL</option>
                <option value="sell">Sell k8o5 for SOL</option>
            </select>
            
            <div id="priceInfo"></div>
            
            <input type="number" id="amountInput" placeholder="Enter amount" step="0.1">
            <button id="swapButton">Execute Swap</button>
        </div>

        <div class="chart" id="priceChart"></div>
    </div>

    <script>
        let provider;
        let publicKey;
        const K8O5_MINT = 'k8o5'; // Replace with actual mint address
        const SOL_MINT = 'So11111111111111111111111111111111111111112';
        const DECIMALS = 6; // Set your token's decimals

        // Initialize TradingView chart
        new TradingView.widget({
            container_id: "priceChart",
            autosize: true,
            symbol: "BIRDEYE:${K8O5_MINT}", // Replace with actual BirdEye identifier
            interval: "60",
            timezone: "Etc/UTC",
            theme: "light",
            style: "1",
            locale: "en",
            toolbar_bg: "#f1f3f6",
            enable_publishing: false,
            hide_legend: true,
            hide_volume: true
        });

        document.getElementById('connectButton').addEventListener('click', async () => {
            if (!window.solana?.isPhantom) return alert('Phantom wallet required');
            
            try {
                provider = window.solana;
                await provider.connect();
                publicKey = provider.publicKey.toString();
                document.getElementById('status').innerHTML = `Connected: ${publicKey.slice(0,4)}...${publicKey.slice(-4)}`;
            } catch (error) {
                alert(`Connection failed: ${error.message}`);
            }
        });

        document.getElementById('swapButton').addEventListener('click', async () => {
            if (!provider) return alert('Connect wallet first');
            
            const amount = document.getElementById('amountInput').value;
            if (!amount) return alert('Enter amount');
            
            const isBuy = document.getElementById('tradeType').value === 'buy';
            const inputMint = isBuy ? SOL_MINT : K8O5_MINT;
            const outputMint = isBuy ? K8O5_MINT : SOL_MINT;
            
            try {
                // Get price quote
                const quote = await fetch(
                    `https://quote-api.jup.ag/v4/quote?inputMint=${inputMint}&outputMint=${outputMint}&amount=${amount * Math.pow(10, isBuy ? 9 : DECIMALS)}&slippageBps=50`
                ).then(res => res.json());

                // Get swap transaction
                const swapResult = await fetch('https://quote-api.jup.ag/v4/swap', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        quoteResponse: quote,
                        userPublicKey: publicKey,
                        wrapAndUnwrapSol: true
                    })
                }).then(res => res.json());

                // Execute transaction
                const transaction = web3.Transaction.from(Buffer.from(swapResult.swapTransaction, 'base64'));
                const signedTx = await provider.signTransaction(transaction);
                const txid = await web3.sendRawTransaction(
                    new web3.Connection(web3.clusterApiUrl('mainnet-beta')),
                    signedTx.serialize()
                );

                alert(`Swap executed!\nTX ID: ${txid}`);
            } catch (error) {
                alert(`Swap failed: ${error.message}`);
            }
        });

        // Update price display
        async function updatePrice() {
            try {
                const response = await fetch(`https://price.jup.ag/v4/price?ids=${K8O5_MINT}`);
                const data = await response.json();
                const price = data.data[K8O5_MINT].price;
                document.getElementById('priceInfo').innerHTML = 
                    `Current price: 1 k8o5 = ${price} SOL`;
            } catch (error) {
                console.error('Price update failed:', error);
            }
        }

        // Update price every 30 seconds
        setInterval(updatePrice, 30000);
        updatePrice();
    </script>
</body>
</html>
