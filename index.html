<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
            overflow: hidden;
            text-rendering: optimizeLegibility;
            line-height: 1.5;
        }

        #console {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            overflow-y: auto;
            background: #0c0c0c;
            position: relative;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #output {
            font-size: 15px;
            white-space: pre-wrap;
            text-align: left;
            -webkit-font-smoothing: antialiased;
            color: #00cc00;
            letter-spacing: 0.05em;
        }

        #inputArea {
            position: sticky;
            bottom: 10px;
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-top: 1px solid #1a1a1a;
            margin-top: 15px;
        }

        #prompt {
            font-size: 15px;
            margin-right: 8px;
            color: #00ff00;
            font-weight: bold;
        }

        #input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            caret-color: #00ff00;
            caret-shape: block;
        }

        #console:focus-within {
            border-color: #0a4e14;
        }

        .peer-message {
            display: inline-block;
            padding: 4px 0;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #2a2a2a;
        }

        .command {
            color: #0fdc5f;
            font-weight: bold;
        }

        .parameter {
            color: #5fb3ff;
        }

        .error-message {
            color: #ff4f4f;
        }

        .success-message {
            color: #2aef63;
        }

        #console::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0.1) 50%, 
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
            opacity: 0.15;
        }

        #output::selection, #input::selection {
            background: rgba(0, 255, 0, 0.3);
            color: #fff;
        }

        @media (max-width: 768px) {
            #input {
                width: 100%;
                font-size: 14px;
                padding: 5px;
            }

            #inputArea {
                padding: 10px 0;
            }

            #prompt {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="console" tabindex="0">
        <div id="output"></div>
        <div id="inputArea">
            <span id="prompt">> </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let myPeerId = '';
        let connections = [];
        let knownPeers = new Set();
        let connectedPeers = new Set();
        let isConnected = false;
        let chatHistory = [];
        let myName = 'k8o5_0';
        let commandHistory = [];
        let historyIndex = -1;

        // Extract peer ID from URL
        function getPeerIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('peerid');
        }

        // Generate unique color based on Peer ID
        function getPeerColor(peerId) {
            let hash = 0;
            for (let i = 0; i < peerId.length; i++) {
                hash = peerId.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash % 360);
            return `hsl(${hue}, 70%, 50%)`;
        }

        // Render text with optional peer styling
        function renderText(text, peerId = null, name = null) {
            if (peerId) {
                const color = getPeerColor(peerId);
                const displayName = name || `k8o5_${connections.length - 1}`;
                return `<span class="peer-message" style="color: ${color}">${displayName}: ${text}</span><br>`;
            }
            return text.replace(/\n/g, '<br>');
        }

        // Typewriter animation for text
        function typeWriter(text, index, delay, callback) {
            if (index < text.length) {
                document.getElementById('output').innerHTML += text.charAt(index);
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
                setTimeout(() => typeWriter(text, index + 1, delay, callback), delay);
            } else {
                if (callback) callback();
            }
        }

        // Shuffle array for random selection
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Try to connect to new peers from knownPeers list
        function tryToConnectToNewPeers() {
            const potentialPeers = [...knownPeers].filter(peerId => 
                peerId !== myPeerId && !connectedPeers.has(peerId) && !connections.some(conn => conn.peer === peerId)
            );
            const shuffledPeers = shuffle(potentialPeers);
            const peersToConnect = shuffledPeers.slice(0, Math.min(2, shuffledPeers.length)); // Connect to up to 2 new peers
            peersToConnect.forEach(peerId => {
                connectToPeer(peerId);
            });
        }

        // Initialize PeerJS
        function initPeer() {
            peer = new Peer({ debug: 3 });
            peer.on('open', id => {
                myPeerId = id;
                knownPeers.add(myPeerId);
                const welcomeMsg = `k8o5\n`;
                const peerIdMsg = `Your Peer-ID: ${myPeerId}\n`;
                
                document.getElementById('output').innerHTML = "";
                
                typeWriter(welcomeMsg, 0, 40, () => {
                    typeWriter(peerIdMsg, 0, 20, () => {
                        // After displaying Peer ID, try connecting to peer from URL if present
                        const targetPeerId = getPeerIdFromUrl();
                        if (targetPeerId && targetPeerId !== myPeerId) {
                            connectToPeer(targetPeerId);
                        }
                    });
                });

                // Update URL with peer ID
                const newUrl = `${window.location.origin}/peerid=${myPeerId}`;
                history.pushState(null, '', newUrl);
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', () => {
                    console.log('Connected to: ' + conn.peer);
                    knownPeers.add(conn.peer);
                    connectedPeers.add(conn.peer);
                    switchToChatMode(conn.peer);

                    // Send known peers list to the new peer
                    const peerList = [...knownPeers];
                    conn.send(JSON.stringify({ type: 'peer_list', peers: peerList }));

                    // Share chat history
                    chatHistory.forEach(entry => {
                        conn.send(JSON.stringify({ peerId: entry.peerId, message: entry.message, name: entry.name || `k8o5_${connections.length - 1}` }));
                    });

                    // Try to connect to other peers
                    tryToConnectToNewPeers();
                });
                conn.on('data', handleData);
            });
        }

        // Handle user input
        function handleInput() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            document.getElementById('output').innerHTML += renderText(`<span class="command">> ${input}</span>\n`);
            if (!isConnected) {
                if (input.startsWith('peer ')) {
                    const targetPeerId = input.split(' ')[1];
                    if (targetPeerId) {
                        connectToPeer(targetPeerId);
                    } else {
                        document.getElementById('output').innerHTML += renderText('<span class="error-message">Error: Enter a Peer-ID!</span>\n');
                    }
                } else if (input.startsWith('help')) {
                    showHelp();
                } else if (input.startsWith('name ')) {
                    const name = input.split(' ')[1];
                    if (name) {
                        myName = name;
                        document.getElementById('output').innerHTML += renderText(`<span class="success-message">Name changed to: ${myName}</span>\n`);
                    } else {
                        document.getElementById('output').innerHTML += renderText('<span class="error-message">Error: Enter a name! (e.g., name Max)</span>\n');
                    }
                } else {
                    document.getElementById('output').innerHTML += renderText('<span class="error-message">Unknown command. Use: help</span>\n');
                }
            } else {
                const messageEntry = { peerId: myPeerId, message: input, name: myName };
                chatHistory.push(messageEntry);
                connections.forEach(conn => {
                    conn.send(JSON.stringify(messageEntry));
                });
                document.getElementById('output').innerHTML += renderText(`${input}`, myPeerId, myName);
            }
            document.getElementById('input').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // Connect to a peer
        function connectToPeer(peerId) {
            if (peerId === myPeerId || connectedPeers.has(peerId) || connections.some(conn => conn.peer === peerId)) {
                return; // Avoid self-connection or duplicate connections
            }
            const conn = peer.connect(peerId);
            connections.push(conn);
            conn.on('open', () => {
                console.log('Connected to: ' + peerId);
                knownPeers.add(peerId);
                connectedPeers.add(peerId);
                switchToChatMode(peerId);

                // Send known peers list to the new peer
                const peerList = [...knownPeers];
                conn.send(JSON.stringify({ type: 'peer_list', peers: peerList }));

                // Share chat history
                chatHistory.forEach(entry => {
                    conn.send(JSON.stringify({ peerId: entry.peerId, message: entry.message, name: entry.name || `k8o5_${connections.length - 1}` }));
                });

                // Try to connect to other peers
                tryToConnectToNewPeers();
            });
            conn.on('data', handleData);
        }

        // Handle received data
        function handleData(data) {
            let messageData;
            try {
                messageData = JSON.parse(data);
            } catch (e) {
                messageData = { peerId: this.peer, message: data, name: `k8o5_${connections.length - 1}` };
            }

            if (messageData.type === 'peer_list') {
                // Handle peer list message
                const receivedPeers = messageData.peers;
                receivedPeers.forEach(peerId => {
                    if (peerId !== myPeerId) {
                        knownPeers.add(peerId);
                    }
                });
                tryToConnectToNewPeers();
            } else {
                // Handle chat message
                const { peerId, message, name } = messageData;
                chatHistory.push({ peerId, message, name });
                document.getElementById('output').innerHTML += renderText(`${message}`, peerId, name);
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            }
        }

        // Switch to chat mode
        function switchToChatMode(peerId) {
            isConnected = true;
            document.getElementById('output').innerHTML += renderText(`<span class="success-message">Connected to ${peerId}!</span>\n<span class="success-message">Chat mode activated.</span>\n`);
            document.getElementById('prompt').innerHTML = 'chat> ';
        }

        // Display help text
        function showHelp() {
            const helpText = `
<span class="success-message">Available commands:</span>
- <span class="command">peer</span> <span class="parameter">[peer_id]</span>: Connect to another peer
- <span class="command">name</span> <span class="parameter">[string]</span>: Set your name (e.g., name Max)
- <span class="command">help</span>: Show this help
`;
            document.getElementById('output').innerHTML += renderText(helpText);
        }

        // Command history navigation
        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                if (commandHistory.length > 0 && historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    document.getElementById('input').value = commandHistory[commandHistory.length - 1 - historyIndex];
                }
                e.preventDefault();
            } else if (e.key === 'ArrowDown') {
                if (historyIndex > 0) {
                    historyIndex--;
                    document.getElementById('input').value = commandHistory[commandHistory.length - 1 - historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    document.getElementById('input').value = '';
                }
                e.preventDefault();
            }
        });

        // Focus input on console click
        document.getElementById('console').addEventListener('click', (e) => {
            if (!e.target.matches('#input')) {
                document.getElementById('input').focus();
            }
        });

        // Handle Enter keypress
        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const inputValue = document.getElementById('input').value.trim();
                if (inputValue) {
                    commandHistory.push(inputValue);
                    historyIndex = -1;
                }
                handleInput();
            }
        });

        // Ensure input focus on touch for mobile
        document.getElementById('input').addEventListener('touchstart', function() {
            this.focus();
        });

        // Initialize the application
        initPeer();
    </script>
</body>
</html>
