<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #console {
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
            line-height: 1.4;
            text-shadow: 0 0 2px #00ff00;
            background: #000;
            position: relative;
        }
        #output {
            font-size: 14px;
            white-space: pre-wrap;
            text-align: left;
        }
        #inputArea {
            position: sticky;
            bottom: 10px;
            display: flex;
            align-items: center;
        }
        #prompt {
            font-size: 14px;
            margin-right: 5px;
        }
        #input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #00ff00;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            outline: none;
            text-shadow: 0 0 2px #00ff00;
        }
        #console:focus-within #input {
            outline: none;
        }
        .peer-message {
            display: inline;
        }
        /* Fokus auf Klick im leeren Bereich */
        #console {
            cursor: text;
        }
        #console:not(#inputArea):active {
            pointer-events: none;
        }
        #console:not(#inputArea):hover {
            cursor: text;
        }
    </style>
</head>
<body>
    <div id="console" tabindex="0">
        <div id="output"></div>
        <div id="inputArea">
            <span id="prompt">> </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let myPeerId = '';
        let connections = [];
        let isConnected = false;
        let chatHistory = [];
        let myName = 'k8o5_0'; // Standardname

        // Eindeutige Farbe basierend auf Peer-ID
        function getPeerColor(peerId) {
            let hash = 0;
            for (let i = 0; i < peerId.length; i++) {
                hash = peerId.charCodeAt(i) + ((hash << 5) - hash);
            }
            const hue = Math.abs(hash % 360);
            return `hsl(${hue}, 70%, 50%)`;
        }

        // Text rendern
        function renderText(text, peerId = null, name = null) {
            if (peerId) {
                const color = getPeerColor(peerId);
                const displayName = name || `k8o5_${connections.length - 1}`;
                return `<span class="peer-message" style="color: ${color}">${displayName}: ${text}</span><br>`;
            }
            return text.replace(/\n/g, '<br>');
        }

        // PeerJS initialisieren
        function initPeer() {
            peer = new Peer({ debug: 3 });
            peer.on('open', id => {
                myPeerId = id;
                document.getElementById('output').innerHTML = renderText(`k8o5 Console v1.0\nInitialisiere...\nDeine Peer-ID: ${myPeerId}\nBefehl: peer [peer_id] zum Verbinden\n`);
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', () => {
                    console.log('Verbunden mit: ' + conn.peer);
                    switchToChatMode(conn.peer);
                    chatHistory.forEach(entry => {
                        conn.send(JSON.stringify({ peerId: entry.peerId, message: entry.message, name: entry.name || `k8o5_${connections.length - 1}` }));
                    });
                });
                conn.on('data', handleData);
            });
        }

        // Eingabe verarbeiten
        function handleInput() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            document.getElementById('output').innerHTML += renderText(`> ${input}`);
            if (!isConnected) {
                if (input.startsWith('peer ')) {
                    const targetPeerId = input.split(' ')[1];
                    if (targetPeerId) {
                        connectToPeer(targetPeerId);
                    } else {
                        document.getElementById('output').innerHTML += renderText('Fehler: Gib eine Peer-ID ein!\n');
                    }
                } else if (input.startsWith('help')) {
                    showHelp();
                } else if (input.startsWith('name ')) {
                    const name = input.split(' ')[1];
                    if (name) {
                        myName = name;
                        document.getElementById('output').innerHTML += renderText(`Name geändert zu: ${myName}\n`);
                    } else {
                        document.getElementById('output').innerHTML += renderText('Fehler: Gib einen Namen ein! (z. B. name Max)\n');
                    }
                } else {
                    document.getElementById('output').innerHTML += renderText('Unbekannter Befehl. Nutze: help\n');
                }
            } else {
                const messageEntry = { peerId: myPeerId, message: input, name: myName };
                chatHistory.push(messageEntry);
                connections.forEach(conn => {
                    conn.send(JSON.stringify(messageEntry));
                });
                document.getElementById('output').innerHTML += renderText(`${input}`, myPeerId, myName);
            }
            document.getElementById('input').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // Mit Peer-ID verbinden
        function connectToPeer(peerId) {
            const conn = peer.connect(peerId);
            connections.push(conn);
            conn.on('open', () => {
                console.log('Verbunden mit: ' + peerId);
                switchToChatMode(peerId);
            });
            conn.on('data', handleData);
        }

        // Daten empfangen
        function handleData(data) {
            let messageData;
            try {
                messageData = JSON.parse(data);
            } catch (e) {
                messageData = { peerId: this.peer, message: data, name: `k8o5_${connections.length - 1}` }; // Fallback
            }
            const { peerId, message, name } = messageData;
            chatHistory.push({ peerId, message, name });
            document.getElementById('output').innerHTML += renderText(`${message}`, peerId, name);
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // In Chat-Modus wechseln
        function switchToChatMode(peerId) {
            isConnected = true;
            document.getElementById('output').innerHTML += renderText(`Verbunden mit ${peerId}!\nChat-Modus aktiviert.\n`);
            document.getElementById('prompt').innerHTML = 'chat> ';
        }

        // Help-Befehl anzeigen
        function showHelp() {
            const helpText = `
Verfügbare Befehle:
- peer [peer_id]: Verbinde dich mit einem anderen Peer
- name [string]: Definiere deinen Namen (z. B. name Max)
- help: Zeige diese Hilfe
`;
            document.getElementById('output').innerHTML += renderText(helpText);
        }

        // Fokus setzen bei Klick im leeren Bereich
        document.getElementById('console').addEventListener('click', (e) => {
            if (!e.target.matches('#input')) {
                document.getElementById('input').focus();
            }
        });

        // Event Listener für Enter
        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleInput();
        });

        // Start
        initPeer();
    </script>
</body>
</html>
