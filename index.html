<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k8o5 - Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #chat {
            width: 100%;
            height: 100%;
            background: #000;
            color: #0f0;
            padding: 20px;
            box-sizing: border-box;
        }
        #console {
            width: 100%;
            height: 80%;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 16px;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
        }
        #inputArea {
            display: flex;
            margin-top: 10px;
        }
        input {
            flex-grow: 1;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }
        button {
            padding: 10px 20px;
            margin-left: 10px;
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        button:hover {
            background: #000;
            color: #0f0;
        }
    </style>
</head>
<body>
    <div id="chat">
        <div id="console"></div>
        <div id="inputArea">
            <input type="text" id="messageInput" placeholder="Peer-ID des anderen oder Nachricht..." onkeypress="if(event.key === 'Enter') handleInput()">
            <button onclick="handleInput()">Senden</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script>
        let peer;
        let myPeerId = '';
        let connections = [];

        // PeerJS initialisieren
        function initPeer() {
            peer = new Peer({ debug: 3 });
            peer.on('open', id => {
                myPeerId = id;
                document.getElementById('console').innerHTML = `Deine Peer-ID: ${myPeerId}\nTeile sie mit anderen, um zu chatten.\nGib die Peer-ID eines anderen ein, um dich zu verbinden:`;
            });

            peer.on('connection', conn => {
                connections.push(conn);
                conn.on('open', () => {
                    console.log('Verbunden mit: ' + conn.peer);
                    document.getElementById('console').innerHTML += `\nVerbunden mit ${conn.peer}!`;
                });
                conn.on('data', data => {
                    document.getElementById('console').innerHTML += `\n${data}`;
                    document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
                });
            });
        }

        // Eingabe verarbeiten
        function handleInput() {
            const input = document.getElementById('messageInput').value.trim();
            if (!input) return;

            if (connections.length === 0) {
                // Erste Eingabe ist die Peer-ID des anderen
                connectToPeer(input);
            } else {
                // Nachricht senden
                connections.forEach(conn => conn.send(input));
                document.getElementById('console').innerHTML += `\n${input}`;
            }
            document.getElementById('messageInput').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // Mit einer Peer-ID verbinden
        function connectToPeer(peerId) {
            const conn = peer.connect(peerId);
            connections.push(conn);
            conn.on('open', () => {
                console.log('Verbunden mit: ' + peerId);
                document.getElementById('console').innerHTML += `\nVerbunden mit ${peerId}!`;
            });
            conn.on('data', data => {
                document.getElementById('console').innerHTML += `\n${data}`;
                document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
            });
        }

        // Start
        initPeer();
    </script>
</body>
</html>
