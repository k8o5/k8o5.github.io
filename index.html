<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Chat- und Konsolenmodus</title>
</head>
<body>
    <div id="console">
        <div id="output"></div>
        <div id="inputArea">
            <span id="prompt">> </span>
            <input type="text" id="input" autofocus>
        </div>
    </div>

    <script>
        let isConnected = false; // Zeigt an, ob der Chat-Modus aktiv ist
        let currentPath = '/';   // Aktueller Pfad für Prompt

        // Eingabe verarbeiten
        function handleInput() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            const output = document.getElementById('output');
            output.innerHTML += `<span class="command">${currentPath}> ${input}</span><br>`;

            if (!isConnected) { // Konsolen-Modus
                if (input === 'help') {
                    showConsoleHelp();
                } else if (input.startsWith('peer ')) {
                    isConnected = true; // Simuliert den Wechsel in den Chat-Modus
                    document.getElementById('prompt').innerHTML = 'chat> ';
                    output.innerHTML += '<span class="success-message">Chat betreten.</span><br>';
                } else {
                    output.innerHTML += '<span class="error-message">Unbekannter Befehl. Nutze: help</span><br>';
                }
            } else { // Chat-Modus
                if (input === '/help') {
                    showChatHelp();
                } else if (input === '/exit') {
                    isConnected = false;
                    document.getElementById('prompt').innerHTML = `${currentPath}> `;
                    output.innerHTML += '<span class="success-message">Chat verlassen.</span><br>';
                } else {
                    output.innerHTML += `${input}<br>`; // Simuliert eine Chat-Nachricht
                }
            }

            document.getElementById('input').value = '';
            document.getElementById('console').scrollTop = document.getElementById('console').scrollHeight;
        }

        // Hilfe für Konsolen-Modus
        function showConsoleHelp() {
            const helpText = `
<span class="success-message">Verfügbare Befehle im Konsolen-Modus:</span><br>
- <span class="command">peer</span> <span class="parameter">[peer_id]</span>: Verbinde dich mit einem anderen Peer<br>
- <span class="command">name</span> <span class="parameter">[string]</span>: Definiere deinen Namen<br>
- <span class="command">copy</span>: Kopiere deine Peer-ID in die Zwischenablage<br>
- <span class="command">clear</span>: Lösche den Bildschirm<br>
- <span class="command">help</span>: Zeige diese Hilfe
            `;
            document.getElementById('output').innerHTML += helpText + '<br>';
        }

        // Hilfe für Chat-Modus
        function showChatHelp() {
            const helpText = `
<span class="success-message">Verfügbare Befehle im Chat-Modus:</span><br>
- <span class="command">/exit</span>: Verlasse den Chat-Modus<br>
- <span class="command">/peers</span>: Zeige verbundene Peers<br>
- <span class="command">/mkdir</span> <span class="parameter">[ordner]</span>: Erstelle einen Ordner<br>
- <span class="command">/cd</span> <span class="parameter">[ordner]</span>: Wechsle in einen Ordner<br>
- <span class="command">/edit</span> <span class="parameter">[filename]</span>: Bearbeite eine Datei<br>
- <span class="command">/cat</span> <span class="parameter">[filename]</span>: Zeige den Inhalt einer Datei<br>
- <span class="command">/dir</span>: Zeige den Inhalt des aktuellen Ordners<br>
- <span class="command">/echo</span> <span class="parameter">[text]</span>: Wiederhole den Text<br>
- <span class="command">/help</span>: Zeige diese Hilfe
            `;
            document.getElementById('output').innerHTML += helpText + '<br>';
        }

        // Event-Listener für Eingabe
        document.getElementById('input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleInput();
        });
    </script>
</body>
</html>
