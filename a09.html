<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio a09 - AAA Edition</title>
    
    <!-- ROCK SOLID DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --bg-space: #05050A;
            --surface: rgba(22, 22, 28, 0.65);
            --surface-solid: #16161c;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --magenta: #ff2a6d;
            --text-main: #ffffff;
            --text-muted: #8e8e99;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: var(--bg-space);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #globeCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; outline: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }

        .top-bar {
            padding: calc(env(safe-area-inset-top, 20px) + 20px) 24px 0;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .logo span { color: #fff; margin-right: 2px; }

        /* PANEL - Desktop & Mobile */
        .panel {
            position: absolute; top: 20px; left: 20px; width: 360px; height: calc(100vh - 140px);
            background: var(--surface); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); border-radius: 24px; pointer-events: auto; display: flex;
            flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.4s; z-index: 100;
        }
        
        /* Desktop Collapse State */
        .panel.collapsed { transform: translateX(calc(-100% - 40px)); opacity: 0; pointer-events: none; }

        .panel-header { padding: 20px 20px 10px; border-bottom: 1px solid var(--border); }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 12px; }
        .tab-btn {
            flex: 1; padding: 10px 0; background: transparent; border: none;
            color: var(--text-muted); border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .tab-btn.active { background: var(--surface-solid); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .search-container { position: relative; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; }
        .search-box {
            width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border);
            color: white; padding: 12px 16px 12px 40px; border-radius: 14px; font-size: 15px; outline: none; transition: all 0.3s;
        }
        .search-box:focus { background: rgba(0,0,0,0.5); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1); }

        .station-list { flex: 1; overflow-y: auto; padding: 10px; }
        .station-list::-webkit-scrollbar { width: 4px; }
        .station-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .station-item { 
            padding: 10px; border-radius: 16px; cursor: pointer; transition: all 0.2s; 
            display: flex; align-items: center; gap: 14px; margin-bottom: 4px; border: 1px solid transparent;
        }
        .station-item:hover { background: rgba(255, 255, 255, 0.05); }
        .station-item.active { background: rgba(0, 240, 255, 0.1); border-color: rgba(0, 240, 255, 0.2); }
        
        .station-icon {
            width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: white; text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); overflow: hidden; background: var(--surface-solid);
        }
        .station-icon img { width: 100%; height: 100%; object-fit: cover; }

        .station-info { flex: 1; overflow: hidden; }
        .station-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-geo { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-item.active .station-name { color: var(--accent); }

        .player-dock {
            position: absolute; bottom: var(--safe-bottom); left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 800px; height: 84px;
            background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 24px; pointer-events: auto; display: flex;
            align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }

        .now-playing { display: flex; align-items: center; gap: 16px; flex: 1; overflow: hidden; }
        .np-img { width: 54px; height: 54px; border-radius: 14px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .np-info { display: flex; flex-direction: column; overflow: hidden; }
        .np-title { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .np-sub { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { display: flex; align-items: center; gap: 15px; }
        
        .btn-icon {
            background: none; border: none; color: var(--text-muted); width: 44px; height: 44px;
            cursor: pointer; transition: all 0.3s; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .btn-icon svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; transition: all 0.3s; }
        .btn-icon:hover { color: #fff; background: rgba(255,255,255,0.1); }
        
        .btn-fav.active { color: var(--magenta); }
        .btn-fav.active svg { fill: var(--magenta); stroke: var(--magenta); filter: drop-shadow(0 0 8px rgba(255,42,109,0.5)); }

        .btn-play {
            width: 54px; height: 54px; border-radius: 50%; background: var(--text-main); color: #000; 
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: transform 0.1s, box-shadow 0.3s;
        }
        .btn-play svg { width: 24px; height: 24px; fill: currentColor; }
        .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .btn-play:active { transform: scale(0.95); }

        .volume-wrapper { display: flex; align-items: center; gap: 10px; width: 120px; margin-left: 10px; }
        .volume-wrapper svg { width: 18px; color: var(--text-muted); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* MASTER TOGGLE BUTTON (Visible everywhere now) */
        .panel-toggle {
            position: absolute; top: 20px; right: 20px; width: 48px; height: 48px;
            background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;
            z-index: 101; pointer-events: auto; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .panel-toggle:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .panel-toggle:active { transform: scale(0.95); }

        #visualizer-container {
            position: absolute; bottom: 84px; left: 0; width: 100%; height: 40px;
            pointer-events: none; display: flex; align-items: flex-end; justify-content: center; gap: 4px; opacity: 0.5;
        }
        .vis-bar { width: 4px; height: 4px; background: var(--accent); border-radius: 4px 4px 0 0; transition: height 0.05s ease; box-shadow: 0 0 10px var(--accent-glow); }

        #loader {
            position: fixed; inset: 0; background: var(--bg-space); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease;
        }
        .pulse-ring {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent);
            animation: pulse 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        #loader-text { margin-top: 30px; font-size: 13px; letter-spacing: 3px; color: var(--accent); font-weight: 600; text-transform: uppercase; }

        @media (max-width: 768px) {
            .volume-wrapper { display: none; }
            
            .panel {
                top: auto; bottom: calc(var(--safe-bottom) + 100px); left: 10px; right: 10px; width: calc(100% - 20px);
                height: 60vh; border-radius: 24px; transform: translateY(150%); opacity: 0;
            }
            .panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
            
            .player-dock { width: calc(100% - 20px); padding: 0 16px; bottom: calc(var(--safe-bottom) + 10px); }
            .np-img { width: 48px; height: 48px; }
            .btn-play { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="logo" style="margin-bottom: -40px; z-index: 2;"><span>a</span>09</div>
        <div class="pulse-ring"></div>
        <div id="loader-text">Connecting Array...</div>
    </div>

    <canvas id="globeCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
            <div class="logo"><span>a</span>09</div>
        </div>

        <button class="panel-toggle" id="panel-toggle" title="Toggle Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <aside class="panel open" id="sidebar">
            <div class="panel-header">
                <div class="tabs">
                    <button class="tab-btn active" id="tab-all">Explore</button>
                    <button class="tab-btn" id="tab-fav">Saved</button>
                </div>
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" class="search-box" id="search-input" placeholder="Search signals...">
                </div>
            </div>
            <div class="station-list" id="station-list"></div>
        </aside>

        <div class="player-dock" id="player-dock">
            <div id="visualizer-container"></div>
            
            <div class="now-playing">
                <div class="station-icon np-img" id="player-icon">A09</div>
                <div class="np-info">
                    <div class="np-title" id="player-title">Awaiting Signal</div>
                    <div class="np-sub" id="player-subtitle">Select a blip on the globe</div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-icon btn-fav" id="fav-btn">
                    <!-- FIX: stroke-linecap und stroke-linejoin wurden auf round gesetzt -->
                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </button>
                <button class="btn-play" id="play-btn">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </button>
                <div class="volume-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <input type="range" id="volume-slider" min="0" max="100" value="80">
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    let apiBaseUrl = 'https://de1.api.radio-browser.info/json';
    let allStations = [];
    let favorites = JSON.parse(localStorage.getItem('radioFavorites_a09')) || [];
    let currentMode = 'all'; 
    let currentStation = null;

    const audio = document.getElementById('audio-player');
    audio.volume = 0.8;

    /* --- AUTO-COLLAPSE PANEL LOGIC --- */
    let collapseTimer;
    
    function collapsePanel() {
        const panel = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            panel.classList.remove('open');
        } else {
            panel.classList.add('collapsed');
        }
    }

    function openPanel() {
        const panel = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
            panel.classList.add('open');
        } else {
            panel.classList.remove('collapsed');
        }
        resetCollapseTimer();
    }

    function togglePanel() {
        const panel = document.getElementById('sidebar');
        const isClosed = window.innerWidth <= 768 ? !panel.classList.contains('open') : panel.classList.contains('collapsed');
        if (isClosed) openPanel(); else collapsePanel();
    }

    function resetCollapseTimer() {
        clearTimeout(collapseTimer);
        // Nach 10 Sekunden Inaktivität schließen
        collapseTimer = setTimeout(collapsePanel, 10000); 
    }

    // Setze den Timer bei jeder Interaktion mit dem Menü zurück
    const sidebarEl = document.getElementById('sidebar');
    ['mousemove', 'touchstart', 'wheel', 'click'].forEach(evt => {
        sidebarEl.addEventListener(evt, resetCollapseTimer);
    });
    document.getElementById('search-input').addEventListener('input', resetCollapseTimer);
    document.getElementById('panel-toggle').addEventListener('click', togglePanel);
    
    // Starte den Timer beim ersten Laden
    resetCollapseTimer();

    /* --- FAVICON FALLBACK LOGIC --- */
    const gradientColors = [
        ['#ff2a6d', '#ff7b00'], ['#00f0ff', '#0057ff'], ['#b14fff', '#ff2a6d'],
        ['#00ff88', '#00a1ff'], ['#ffcc00', '#ff2a6d'], ['#1e1e24', '#3a3a47']
    ];

    function getStationFallback(name, uuid) {
        const initials = (name || "R").substring(0, 2).toUpperCase();
        let hash = 0;
        if(uuid) for (let i = 0; i < uuid.length; i++) hash = uuid.charCodeAt(i) + ((hash << 5) - hash);
        const colorPair = gradientColors[Math.abs(hash) % gradientColors.length];
        return { initials, gradient: `linear-gradient(135deg, ${colorPair[0]}, ${colorPair[1]})` };
    }

    async function initApp() {
        const cached = localStorage.getItem('radio_cache_a09');
        if (cached) {
            try {
                const data = JSON.parse(cached);
                addStationsToGlobe(data);
                renderSidebarList(allStations.slice(0, 100));
                setTimeout(hideLoader, 500);
            } catch(e) { localStorage.removeItem('radio_cache_a09'); }
        }

        texLoader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg', 
            (tex) => { earthMat.map = tex; earthMat.color.setHex(0xaaaaaa); earthMat.needsUpdate = true; }
        );

        try {
            const sRes = await fetch('https://all.api.radio-browser.info/json/servers');
            const servers = await sRes.json();
            apiBaseUrl = `https://${servers[0].name}/json`;
            
            const res = await fetch(`${apiBaseUrl}/stations/search?has_geo_info=true&limit=2500&order=votes&reverse=true&hidebroken=true`);
            const data = await res.json();
            
            localStorage.setItem('radio_cache_a09', JSON.stringify(data));
            
            if (!allStations.length) {
                addStationsToGlobe(data);
                renderSidebarList(allStations.slice(0, 100));
                hideLoader();
            }
        } catch(e) { console.error("API Error", e); }
    }

    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 600);
    }

    /* --- 3D ENGINE --- */
    const canvas = document.getElementById('globeCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05050A, 0.002);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 260;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.04;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.5;
    controls.enablePan = false; controls.minDistance = 120; controls.maxDistance = 400;

    const starGeo = new THREE.BufferGeometry();
    const starPos = [], starColors = [];
    const colorObj = new THREE.Color();
    for(let i=0; i<2000; i++) {
        const x = (Math.random() - 0.5) * 1500; const y = (Math.random() - 0.5) * 1500; const z = (Math.random() - 0.5) * 1500;
        if(Math.hypot(x, y, z) > 120) {
            starPos.push(x, y, z);
            const mix = Math.random();
            if(mix > 0.9) colorObj.setHex(0x00f0ff);
            else if(mix > 0.8) colorObj.setHex(0xff2a6d);
            else colorObj.setHex(0xffffff);
            starColors.push(colorObj.r, colorObj.g, colorObj.b);
        }
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    starGeo.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.8 })));

    const earthRadius = 100;
    const earthMat = new THREE.MeshStandardMaterial({ color: 0x1a1a24, roughness: 0.9, metalness: 0.1 });
    const earth = new THREE.Mesh(new THREE.SphereGeometry(earthRadius, 64, 64), earthMat);
    scene.add(earth);

    const texLoader = new THREE.TextureLoader(); texLoader.setCrossOrigin('Anonymous'); 
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));
    const dirLight = new THREE.DirectionalLight(0x00f0ff, 1.5); dirLight.position.set(5, 3, 5); scene.add(dirLight);
    const dirLight2 = new THREE.DirectionalLight(0xff2a6d, 1); dirLight2.position.set(-5, -3, -5); scene.add(dirLight2);

    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180); const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(-(radius * Math.sin(phi) * Math.cos(theta)), radius * Math.cos(phi), radius * Math.sin(phi) * Math.sin(theta));
    }

    function createGlowTexture() {
        const c = document.createElement('canvas'); c.width = 32; c.height = 32;
        const ctx = c.getContext('2d'); const grd = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        grd.addColorStop(0, 'rgba(255,255,255,1)'); grd.addColorStop(0.2, 'rgba(0,240,255,1)'); grd.addColorStop(1, 'rgba(0,240,255,0)');
        ctx.fillStyle = grd; ctx.fillRect(0,0,32,32); return new THREE.CanvasTexture(c);
    }

    let pointsMesh;
    function addStationsToGlobe(data) {
        const positions = []; allStations = [];
        data.forEach(s => {
            if(s.geo_lat !== null && s.geo_long !== null) {
                const lat = parseFloat(s.geo_lat), lng = parseFloat(s.geo_long); 
                if(!isNaN(lat) && !isNaN(lng)) {
                    const pos = latLngToVector3(lat, lng, earthRadius + 0.5);
                    s.position = pos; positions.push(pos.x, pos.y, pos.z); allStations.push(s);
                }
            }
        });

        if(allStations.length > 0) {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            pointsMesh = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 3.5, color: 0xffffff, map: createGlowTexture(), transparent: true, depthWrite: false }));
            scene.add(pointsMesh);
        }
    }

    const activeBeacon = new THREE.Group(); activeBeacon.visible = false; scene.add(activeBeacon);
    activeBeacon.add(new THREE.Mesh(new THREE.SphereGeometry(1.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff2a6d })));
    const ring = new THREE.Mesh(new THREE.RingGeometry(2, 5, 32), new THREE.MeshBasicMaterial({ color: 0xff2a6d, transparent: true, side: THREE.DoubleSide, depthWrite: false }));
    activeBeacon.add(ring);

    const raycaster = new THREE.Raycaster(); raycaster.params.Points.threshold = 3.0;
    const mouse = new THREE.Vector2(); let isFlying = false; let targetCameraPos = new THREE.Vector3();

    function handleGlobeClick(clientX, clientY) {
        if (!pointsMesh || !earth) return;
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1; mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        let hitPoint = null;
        const dotHits = raycaster.intersectObject(pointsMesh); const earthHit = raycaster.intersectObject(earth);

        if (dotHits.length > 0) hitPoint = allStations[dotHits[0].index].position;
        else if (earthHit.length > 0) hitPoint = earthHit[0].point;

        if (hitPoint) {
            const nearby = allStations.map(s => ({ station: s, dist: s.position.distanceTo(hitPoint) })).filter(i => i.dist < 15).sort((a, b) => a.dist - b.dist);
            if (nearby.length > 0) {
                startStationPlayback(nearby[0].station);
                collapsePanel(); // Hide panel when user clicks globe to reveal map
            }
        }
    }

    let mouseDownPos = {x: 0, y: 0};
    canvas.addEventListener('pointerdown', e => mouseDownPos = {x: e.clientX, y: e.clientY});
    canvas.addEventListener('pointerup', e => {
        if(Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y) < 10) handleGlobeClick(e.clientX, e.clientY);
    });

    controls.addEventListener('start', () => { controls.autoRotate = false; });

    function flyTo(position) {
        targetCameraPos.copy(position).normalize().multiplyScalar(160);
        isFlying = true; controls.autoRotate = false;
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isFlying) {
            camera.position.lerp(targetCameraPos, 0.08); camera.lookAt(0,0,0);
            if(camera.position.distanceTo(targetCameraPos) < 2) isFlying = false;
        } else { controls.update(); }

        if(activeBeacon.visible) {
            const time = Date.now() * 0.003; const scale = 1 + Math.sin(time) * 0.4;
            ring.scale.set(scale, scale, 1); ring.material.opacity = Math.max(0, 0.6 - (scale - 1)); ring.lookAt(camera.position);
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); 
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* --- UI LOGIC --- */
    function renderSidebarList(list) {
        const container = document.getElementById('station-list');
        if(list.length === 0) { container.innerHTML = `<div style="padding:20px; color:#888; text-align:center;">No signals found.</div>`; return; }
        
        container.innerHTML = list.map(s => {
            const fallback = getStationFallback(s.name, s.stationuuid);
            const imgHtml = s.favicon 
                ? `<img src="${s.favicon}" onerror="this.outerHTML='<div style=\\'width:100%;height:100%;background:${fallback.gradient};\\'>${fallback.initials}</div>'">` 
                : `<div style="width:100%;height:100%;background:${fallback.gradient};">${fallback.initials}</div>`;

            const cleanObj = { ...s }; delete cleanObj.position;
            const dataStr = encodeURIComponent(JSON.stringify(cleanObj));

            return `
            <div class="station-item" id="item-${s.stationuuid}" onclick="selectFromList('${s.stationuuid}', '${dataStr}')">
                <div class="station-icon">${imgHtml}</div>
                <div class="station-info">
                    <div class="station-name">${escapeHtml(s.name)}</div>
                    <div class="station-geo">${escapeHtml(s.country || 'Global Stream')}</div>
                </div>
            </div>`;
        }).join('');
        
        if(currentStation) {
            const activeItem = document.getElementById(`item-${currentStation.stationuuid}`);
            if(activeItem) activeItem.classList.add('active');
        }
    }

    document.getElementById('tab-all').addEventListener('click', e => switchTab('all', e.target));
    document.getElementById('tab-fav').addEventListener('click', e => switchTab('fav', e.target));

    function switchTab(mode, btn) {
        currentMode = mode; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); document.getElementById('search-input').dispatchEvent(new Event('input'));
    }

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout); const query = e.target.value.trim().toLowerCase();

        if(currentMode === 'fav') {
            const filtered = query ? favorites.filter(s => (s.name && s.name.toLowerCase().includes(query))) : favorites;
            renderSidebarList(filtered); return;
        }

        searchTimeout = setTimeout(async () => {
            if(query.length > 0) {
                document.getElementById('station-list').innerHTML = '<div style="padding:20px; color:#888; text-align:center;">Scanning...</div>';
                try {
                    const res = await fetch(`${apiBaseUrl}/stations/search?name=${encodeURIComponent(query)}&limit=100&order=votes&reverse=true`);
                    renderSidebarList(await res.json());
                } catch(e) {}
            } else renderSidebarList(allStations.slice(0, 100));
        }, 400);
    });

    window.selectFromList = function(uuid, fallbackStr) {
        let station = allStations.find(s => s.stationuuid === uuid) || favorites.find(s => s.stationuuid === uuid);
        if(!station && fallbackStr) station = JSON.parse(decodeURIComponent(fallbackStr));
        if(station) startStationPlayback(station);
    };

    const playIcon = `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>`;
    const pauseIcon = `<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;

    function startStationPlayback(station) {
        currentStation = station;
        if(!station.position && station.geo_lat !== null) station.position = latLngToVector3(parseFloat(station.geo_lat), parseFloat(station.geo_long), earthRadius + 0.5);

        document.getElementById('player-title').textContent = station.name;
        document.getElementById('player-subtitle').textContent = "Connecting...";
        
        const fallback = getStationFallback(station.name, station.stationuuid);
        const iconContainer = document.getElementById('player-icon');
        iconContainer.innerHTML = station.favicon 
            ? `<img src="${station.favicon}" onerror="this.outerHTML='<div style=\\'width:100%;height:100%;background:${fallback.gradient};display:flex;align-items:center;justify-content:center;\\'>${fallback.initials}</div>'">`
            : `<div style="width:100%;height:100%;background:${fallback.gradient};display:flex;align-items:center;justify-content:center;">${fallback.initials}</div>`;

        const isFav = favorites.some(s => s.stationuuid === station.stationuuid);
        document.getElementById('fav-btn').classList.toggle('active', isFav);
        document.querySelectorAll('.station-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${station.stationuuid}`);
        if(activeItem) activeItem.classList.add('active');

        if(station.position) { activeBeacon.position.copy(station.position); activeBeacon.visible = true; flyTo(station.position); }

        audio.src = station.url_resolved || station.url;
        audio.play().then(() => {
            document.getElementById('play-btn').innerHTML = pauseIcon; document.getElementById('player-subtitle').textContent = station.country || 'Live Stream';
        }).catch(() => {
            document.getElementById('play-btn').innerHTML = playIcon; document.getElementById('player-subtitle').textContent = 'Stream Offline';
        });
    }

    document.getElementById('play-btn').addEventListener('click', () => {
        if(!audio.src) return;
        if(audio.paused) { audio.play(); document.getElementById('play-btn').innerHTML = pauseIcon; } 
        else { audio.pause(); document.getElementById('play-btn').innerHTML = playIcon; }
    });

    document.getElementById('fav-btn').addEventListener('click', () => {
        if(!currentStation) return;
        const idx = favorites.findIndex(s => s.stationuuid === currentStation.stationuuid);
        if(idx > -1) { favorites.splice(idx, 1); document.getElementById('fav-btn').classList.remove('active'); } 
        else { favorites.push({ ...currentStation, position: null }); document.getElementById('fav-btn').classList.add('active'); }
        localStorage.setItem('radioFavorites_a09', JSON.stringify(favorites));
        if(currentMode === 'fav') document.getElementById('search-input').dispatchEvent(new Event('input'));
    });

    document.getElementById('volume-slider').addEventListener('input', e => audio.volume = e.target.value / 100);

    /* --- VISUALIZER --- */
    let audioCtx, analyser, dataArray;
    const visContainer = document.getElementById('visualizer-container');
    const barCount = 40; const bars = [];
    for(let i=0; i<barCount; i++) {
        const bar = document.createElement('div'); bar.className = 'vis-bar'; visContainer.appendChild(bar); bars.push(bar);
    }

    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); analyser.fftSize = 128;
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount); animateVisualizer();
    }

    function animateVisualizer() {
        requestAnimationFrame(animateVisualizer);
        if (!analyser || audio.paused) { bars.forEach(b => b.style.height = '4px'); return; }
        analyser.getByteFrequencyData(dataArray);
        for(let i=0; i<barCount; i++) bars[i].style.height = Math.max(4, (dataArray[i] / 255) * 35) + 'px';
    }

    audio.addEventListener('play', () => { initVisualizer(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
    function escapeHtml(text) { if(!text) return ''; const d = document.createElement('div'); d.innerText = text; return d.innerHTML; }

    initApp();
</script>
</body>
</html>
