

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio a09</title>
    
    <link rel="manifest" href="a09_manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="a09">
    <link rel="apple-touch-icon" href="buh/apps/sparky.svg">

    <!-- ROCK SOLID DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --apple-bg: rgba(28, 28, 30, 0.75);
            --apple-border: rgba(255, 255, 255, 0.1);
            --apple-blue: #0a84ff;
            --apple-text: #ffffff;
            --apple-text-muted: #8e8e93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: #000;
            color: var(--apple-text);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #globeCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }

        .sidebar {
            position: absolute; top: 0; left: 0; width: 340px; height: calc(100vh - 100px);
            background: var(--apple-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--apple-border); pointer-events: auto; display: flex;
            flex-direction: column; box-shadow: 5px 0 30px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .sidebar.collapsed { transform: translateX(-100%); }

        .sidebar-toggle {
            position: absolute; top: 20px; left: 360px; width: 44px; height: 44px;
            background: var(--apple-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--apple-border); border-radius: 12px; color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            pointer-events: auto; transition: all 0.3s; z-index: 101;
        }
        .sidebar.collapsed + .sidebar-toggle { left: 20px; }
        .sidebar-toggle:hover { background: rgba(255,255,255,0.1); }

        .sidebar-header { padding: 25px 20px 15px; border-bottom: 1px solid var(--apple-border); }
        .logo { font-size: 26px; font-weight: 700; letter-spacing: -1px; margin-bottom: 15px; display: flex; align-items: center; color: var(--apple-blue); }
        .logo span { color: #fff; margin-right: 1px; }
        
        /* Removed miniGlobe styles */

        /* TABS for Favorites */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 8px 0; background: rgba(255, 255, 255, 0.1); border: 1px solid transparent;
            color: white; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--apple-blue); border-color: var(--apple-blue); }

        .search-box {
            width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid transparent;
            color: white; padding: 12px 16px; border-radius: 12px; font-size: 15px; outline: none; transition: all 0.2s;
        }
        .search-box:focus { background: rgba(255, 255, 255, 0.15); border-color: var(--apple-blue); }

        .station-list { flex: 1; overflow-y: auto; padding: 10px; }
        .station-list::-webkit-scrollbar { width: 6px; }
        .station-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .station-item { padding: 12px 16px; border-radius: 10px; cursor: pointer; transition: background 0.2s; margin-bottom: 4px; }
        .station-item:hover { background: rgba(255, 255, 255, 0.1); }
        .station-item.active { background: var(--apple-blue); }
        .station-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-geo { font-size: 13px; color: var(--apple-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-item.active .station-geo { color: rgba(255,255,255,0.8); }

        .player-dock {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100px;
            background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--apple-border); pointer-events: auto; display: flex;
            align-items: center; justify-content: space-between; padding: 0 40px; z-index: 10;
            padding-bottom: env(safe-area-inset-bottom);
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 100vh; padding-bottom: 200px; z-index: 100; }
            .sidebar-toggle { left: auto; right: 20px; top: 20px; z-index: 102; }
            .sidebar.collapsed + .sidebar-toggle { left: auto; right: 20px; }

            .player-dock {
                height: auto;
                padding: 15px 20px;
                flex-direction: column;
                gap: 12px;
                padding-bottom: calc(15px + env(safe-area-inset-bottom));
                z-index: 101;
            }
            .now-playing { width: 100% !important; min-width: 0 !important; justify-content: center; text-align: center; }
            .now-playing .np-info { align-items: center; }
            .controls { width: 100%; justify-content: center; gap: 30px; }
            .volume-ctrl { display: none !important; }

            #visualizer-container { bottom: 180px; }
            .sidebar-header { padding-top: 60px; }
        }

        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; min-width: 250px; }
        .np-img { width: 60px; height: 60px; border-radius: 14px; background: #111; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .np-info { display: flex; flex-direction: column; overflow: hidden; }
        .np-title { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .np-sub { font-size: 13px; color: var(--apple-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .controls { display: flex; align-items: center; justify-content: center; flex: 1; gap: 20px; }
        
        /* AAA FAVORITES BUTTON */
        .btn-fav {
            background: none; border: none; color: var(--apple-text-muted); padding: 0;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-fav svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; transition: all 0.3s; }
        .btn-fav:hover { transform: scale(1.15); color: #fff; }
        .btn-fav.active { color: #ff3366; }
        .btn-fav.active svg { fill: #ff3366; stroke: #ff3366; }

        .btn-play {
            width: 54px; height: 54px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 22px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s;
        }

        /* AUDIO VISUALIZER */
        #visualizer-container {
            position: absolute; bottom: 100px; left: 0; width: 100%; height: 60px;
            pointer-events: none; display: flex; align-items: flex-end; justify-content: center;
            gap: 3px; padding-bottom: 5px; z-index: 5;
        }
        .vis-bar {
            width: 4px; height: 4px; background: var(--apple-blue); border-radius: 2px;
            transition: height 0.1s ease; opacity: 0.6;
        }
        .btn-play:hover { transform: scale(1.05); }
        .btn-play:active { transform: scale(0.95); }

        .volume-ctrl { width: 30%; display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
        input[type="range"] { -webkit-appearance: none; width: 130px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; }

        #tooltip {
            position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px;
            border-radius: 8px; font-size: 14px; pointer-events: none; display: none; z-index: 20;
            border: 1px solid var(--apple-border); backdrop-filter: blur(10px); font-weight: 500;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--apple-blue); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #loader-text { margin-top: 25px; font-size: 14px; letter-spacing: 2px; color: var(--apple-text-muted); font-weight: 600; text-transform: uppercase;}
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Connecting to satellite network...</div>
    </div>

    <canvas id="globeCanvas"></canvas>

    <div id="ui-layer">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo"><span>a</span>09</div>
                <div class="tabs">
                    <button class="tab-btn active" id="tab-all">All</button>
                    <button class="tab-btn" id="tab-fav">Favorites</button>
                </div>
                <input type="text" class="search-box" id="search-input" placeholder="Search station, genre, or country...">
            </div>
            <div class="station-list" id="station-list"></div>
        </aside>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Toggle Sidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

            <div class="player-dock" id="player-dock">
            <div class="now-playing">
                <div id="player-mini-canvas" class="np-img" style="background: #111; display: flex; align-items: center; justify-content: center;"></div>
                <div class="np-info">
                    <div class="np-title" id="player-title">Searching signal...</div>
                    <div class="np-sub" id="player-subtitle">Select a station on the map</div>
                </div>
            </div>
            <div class="controls">
                <button class="btn-fav" id="fav-btn" title="Add to favorites">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.78-8.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </button>
                <button class="btn-play" id="play-btn">▶</button>
            </div>
            <div class="volume-ctrl">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <input type="range" id="volume-slider" min="0" max="100" value="80">
            </div>
        </div>
        <div id="visualizer-container"></div>
        <div id="tooltip"></div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

<script>
    let apiBaseUrl = 'https://de1.api.radio-browser.info/json';
    let allStations =[];
    
    // Manage favorites state
    let favorites = JSON.parse(localStorage.getItem('radioFavorites')) ||[];
    let currentMode = 'all'; // 'all' oder 'fav'
    let currentStation = null;

    const audio = document.getElementById('audio-player');
    audio.volume = 0.8;

    async function initApp() {
        // --- INSTANT LOAD CACHE ---
        const cached = localStorage.getItem('radio_cache_a09');
        if (cached) {
            try {
                const data = JSON.parse(cached);
                addStationsToGlobe(data);
                renderSidebarList(allStations.slice(0, 1000));
                hideLoader(); 
                console.log("Instant UI from cache.");
            } catch(e) { localStorage.removeItem('radio_cache_a09'); }
        }

        // Parallel texture and API loading
        texLoader.load('https://unpkg.com/three-globe/example/img/earth-dark.jpg', 
            (tex) => {
                earthMat.map = tex;
                earthMat.color.setHex(0xffffff);
                earthMat.needsUpdate = true;
            }
        );

        try {
            const sRes = await fetch('https://all.api.radio-browser.info/json/servers');
            const servers = await sRes.json();
            apiBaseUrl = `https://${servers[0].name}/json`;
            
            const res = await fetch(`${apiBaseUrl}/stations/search?has_geo_info=true&limit=2500&order=votes&reverse=true&hidebroken=true`);
            const data = await res.json();
            
            localStorage.setItem('radio_cache_a09', JSON.stringify(data));
            
            if (!allStations.length) {
                addStationsToGlobe(data);
                renderSidebarList(allStations.slice(0, 1000));
                hideLoader();
            }
        } catch(e) {
            console.error("Background refresh failed", e);
        }
    }

    function hideLoader() {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }

    /* --- 3D ENGINE --- */
    const canvas = document.getElementById('globeCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 280;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.05;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.8;
    controls.enablePan = false; controls.minDistance = 120; controls.maxDistance = 600;

    // Background Stars
    const starGeo = new THREE.BufferGeometry();
    const starPos =[];
    for(let i=0; i<1500; i++) {
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;
        if(Math.hypot(x, y, z) > 150) starPos.push(x, y, z);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.2, transparent: true, opacity: 0.6})));

    // Earth Sphere
    const earthRadius = 100;
    const earthMat = new THREE.MeshStandardMaterial({ color: 0x111625, roughness: 0.8, metalness: 0.1 });
    const earth = new THREE.Mesh(new THREE.SphereGeometry(earthRadius, 64, 64), earthMat);
    scene.add(earth);

    const texLoader = new THREE.TextureLoader();
    texLoader.setCrossOrigin('Anonymous'); 

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(5, 3, 5);
    scene.add(dirLight);

    function latLngToVector3(lat, lng, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lng + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -(radius * Math.sin(phi) * Math.cos(theta)),
            radius * Math.cos(phi),
            radius * Math.sin(phi) * Math.sin(theta)
        );
    }

    function createCircleTexture() {
        const c = document.createElement('canvas'); c.width = 32; c.height = 32;
        const ctx = c.getContext('2d');
        ctx.beginPath(); ctx.arc(16, 16, 14, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
        return new THREE.CanvasTexture(c);
    }

    let pointsMesh;
    function addStationsToGlobe(data) {
        const positions = [];
        allStations =[];

        data.forEach(s => {
            if(s.geo_lat !== null && s.geo_long !== null) {
                const lat = parseFloat(s.geo_lat);
                const lng = parseFloat(s.geo_long); 
                if(!isNaN(lat) && !isNaN(lng)) {
                    const pos = latLngToVector3(lat, lng, earthRadius + 0.5);
                    s.position = pos;
                    positions.push(pos.x, pos.y, pos.z);
                    allStations.push(s);
                }
            }
        });

        if(allStations.length > 0) {
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            pointsMesh = new THREE.Points(geometry, new THREE.PointsMaterial({
                size: 2.8, color: 0x00ff88, map: createCircleTexture(), transparent: true, alphaTest: 0.1, sizeAttenuation: true
            }));
            scene.add(pointsMesh);
        }
    }

    // Active Beacon (Roter Kreis)
    const activeBeacon = new THREE.Group(); activeBeacon.visible = false; scene.add(activeBeacon);
    activeBeacon.add(new THREE.Mesh(new THREE.SphereGeometry(1.2, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff3366 })));
    const ring = new THREE.Mesh(new THREE.RingGeometry(1.5, 3.5, 32), new THREE.MeshBasicMaterial({ color: 0xff3366, transparent: true, side: THREE.DoubleSide }));
    activeBeacon.add(ring);

    /* --- GLOBE INTERACTION & REGIONAL PLAYBACK --- */
    const raycaster = new THREE.Raycaster(); 
    raycaster.params.Points.threshold = 4.0; // Reduced for higher precision
    const mouse = new THREE.Vector2();
    let isFlying = false; let targetCameraPos = new THREE.Vector3();
    const tooltip = document.getElementById('tooltip');

    let currentQueue = [];
    let queueIndex = 0;

    function handleGlobeClick(clientX, clientY) {
        if (!pointsMesh || !earth) return;

        const rect = canvas.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);

        // 1. Finde den exakten 3D-Punkt unter der Maus
        let hitPoint = null;
        const dotHits = raycaster.intersectObject(pointsMesh);
        const earthHit = raycaster.intersectObject(earth);

        if (dotHits.length > 0) {
            hitPoint = allStations[dotHits[0].index].position;
        } else if (earthHit.length > 0) {
            hitPoint = earthHit[0].point;
        }

        if (hitPoint) {
            const nearbyStations = allStations
                .map(s => ({ station: s, dist: s.position.distanceTo(hitPoint) }))
                .filter(item => item.dist < 20)
                .sort((a, b) => a.dist - b.dist)
                .map(item => item.station);

            if (nearbyStations.length > 0) {
                console.log(`Precision Click: ${nearbyStations[0].name} selected.`);
                startStationPlayback(nearbyStations[0]);
            }
        }
    }

    // Tooltip bei Mouseover
    window.addEventListener('mousemove', (e) => {
        if(e.target.closest('#ui-layer') || !pointsMesh) return;
        
        const rect = canvas.getBoundingClientRect();
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObject(pointsMesh);
        if(intersects.length > 0) {
            const station = allStations[intersects[0].index];
            document.body.style.cursor = 'pointer';
            tooltip.style.left = e.clientX + 15 + 'px'; tooltip.style.top = e.clientY + 15 + 'px';
            tooltip.textContent = station.name;
            tooltip.style.display = 'block';
        } else {
            document.body.style.cursor = 'default';
            tooltip.style.display = 'none';
        }
    });

    let mouseDownPos = {x: 0, y: 0};
    canvas.addEventListener('pointerdown', e => {
        mouseDownPos = {x: e.clientX, y: e.clientY};
    });
    
    canvas.addEventListener('pointerup', e => {
        // Nur als Klick werten, wenn die Maus kaum bewegt wurde (Drag-Check)
        const dist = Math.hypot(e.clientX - mouseDownPos.x, e.clientY - mouseDownPos.y);
        if(dist < 10) {
            handleGlobeClick(e.clientX, e.clientY);
        }
    });

    controls.addEventListener('start', () => { controls.autoRotate = false; });

    function flyTo(position) {
        targetCameraPos.copy(position).normalize().multiplyScalar(180);
        isFlying = true; controls.autoRotate = false;
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isFlying) {
            camera.position.lerp(targetCameraPos, 0.05); camera.lookAt(0,0,0);
            if(camera.position.distanceTo(targetCameraPos) < 2) {
                isFlying = false; controls.target.set(0,0,0); controls.update();
            }
        } else { controls.update(); }

        if(activeBeacon.visible) {
            const time = Date.now() * 0.004; const scale = 1 + Math.sin(time) * 0.5;
            ring.scale.set(scale, scale, 1); ring.material.opacity = Math.max(0, 0.5 - (scale - 1));
            ring.lookAt(camera.position);
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
    });


    /* --- UI & FAVORITES LOGIC --- */
    function renderSidebarList(list) {
        const container = document.getElementById('station-list');
        if(list.length === 0) { 
            container.innerHTML = `<div style="padding:15px; color:#888; text-align:center;">${currentMode === 'fav' ? 'No favorites saved.' : 'Nothing found.'}</div>`; 
            return; 
        }
        
        container.innerHTML = list.map(s => {
            const cleanObj = { ...s };
            delete cleanObj.position;
            const fallback = encodeURIComponent(JSON.stringify(cleanObj));
            const stationIcon = s.favicon ? `<img src="${s.favicon}" style="width:34px; height:34px; border-radius:6px; background:#111; object-fit:cover;" onerror="this.style.display='none'">` : '';
            
            return `<div class="station-item" style="display:flex; align-items:center; gap:12px;" id="item-${s.stationuuid}" onclick="selectFromList('${s.stationuuid}', '${fallback}')">
                        <div style="width:34px; height:34px; border-radius:6px; background:rgba(255,255,255,0.05); flex-shrink:0; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                            ${stationIcon || '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>'}
                        </div>
                        <div style="flex:1; overflow:hidden;">
                            <div class="station-name">${escapeHtml(s.name)}</div>
                            <div class="station-geo">${escapeHtml(s.country || 'Global Stream')}</div>
                        </div>
                    </div>`;
        }).join('');
        
        if(currentStation) {
            const activeItem = document.getElementById(`item-${currentStation.stationuuid}`);
            if(activeItem) activeItem.classList.add('active');
        }
    }

    // Tabs Event-Listener
    document.getElementById('tab-all').addEventListener('click', () => {
        currentMode = 'all';
        document.getElementById('tab-all').classList.add('active');
        document.getElementById('tab-fav').classList.remove('active');
        const query = document.getElementById('search-input').value.trim();
        if(query.length > 0) {
            document.getElementById('search-input').dispatchEvent(new Event('input'));
        } else {
            renderSidebarList(allStations.slice(0, 1000));
        }
    });

    document.getElementById('tab-fav').addEventListener('click', () => {
        currentMode = 'fav';
        document.getElementById('tab-fav').classList.add('active');
        document.getElementById('tab-all').classList.remove('active');
        document.getElementById('search-input').dispatchEvent(new Event('input'));
    });

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim().toLowerCase();

        if(currentMode === 'fav') {
            if(query.length === 0) {
                renderSidebarList(favorites);
            } else {
                const filtered = favorites.filter(s => 
                    (s.name && s.name.toLowerCase().includes(query)) || 
                    (s.country && s.country.toLowerCase().includes(query))
                );
                renderSidebarList(filtered);
            }
            return;
        }

        searchTimeout = setTimeout(async () => {
            if(query.length > 0) {
                document.getElementById('station-list').innerHTML = '<div style="padding:15px; color:#888; text-align:center;">Searching...</div>';
                try {
                    const res = await fetch(`${apiBaseUrl}/stations/search?name=${encodeURIComponent(query)}&limit=1000&order=votes&reverse=true&hidebroken=true`);
                    const results = await res.json();
                    renderSidebarList(results);
                } catch(e) { document.getElementById('station-list').innerHTML = '<div style="padding:15px; color:#ff453a;">Search error.</div>'; }
            } else {
                renderSidebarList(allStations.slice(0, 1000));
            }
        }, 500);
    });

    window.selectFromList = function(uuid, fallbackStr) {
        let station = allStations.find(s => s.stationuuid === uuid);
        if(!station) station = favorites.find(s => s.stationuuid === uuid);
        
        if(!station && fallbackStr) {
            station = JSON.parse(decodeURIComponent(fallbackStr));
        }
        if(station) {
            currentQueue = [station]; 
            startStationPlayback(station);
        }
    };

    function startStationPlayback(station, isAutoNext = false) {
        currentStation = station;
        
        if(!station.position && station.geo_lat !== null && station.geo_long !== null) {
            station.position = latLngToVector3(parseFloat(station.geo_lat), parseFloat(station.geo_long), earthRadius + 0.5);
        }

        const playBtn = document.getElementById('play-btn');
        const defaultIcon = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1" style="opacity:0.6"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>`;
        const iconContainer = document.getElementById('player-mini-canvas');
        
        document.getElementById('player-title').textContent = station.name;
        document.getElementById('player-subtitle').textContent = isAutoNext ? `Buffering: ${station.country || 'Global'}...` : "Connecting...";
        
        if (station.favicon) {
            const img = document.createElement('img');
            img.src = station.favicon;
            img.style.cssText = "width:100%; height:100%; border-radius:12px; object-fit:cover;";
            img.onerror = function() { this.outerHTML = defaultIcon; };
            iconContainer.innerHTML = '';
            iconContainer.appendChild(img);
        } else {
            iconContainer.innerHTML = defaultIcon;
        }
// Update UI favorites button
const isFav = favorites.some(s => s.stationuuid === station.stationuuid);
const favBtn = document.getElementById('fav-btn');
if(isFav) favBtn.classList.add('active'); else favBtn.classList.remove('active');

document.querySelectorAll('.station-item').forEach(el => el.classList.remove('active'));
        const activeItem = document.getElementById(`item-${station.stationuuid}`);
        if(activeItem) activeItem.classList.add('active');

        if(station.position) {
            activeBeacon.position.copy(station.position);
            activeBeacon.visible = true; 
            if (!isAutoNext) flyTo(station.position);
        } else { activeBeacon.visible = false; }

        audio.src = station.url_resolved || station.url;
        audio.play().then(() => {
            playBtn.innerHTML = '⏸';
            document.getElementById('player-subtitle').textContent = station.country || 'Live Stream';
            fetch(`${apiBaseUrl}/url/${station.stationuuid}`).catch(()=>{});
        }).catch(err => {
            console.warn("Playback failed.");
            playBtn.innerHTML = '▶';
            document.getElementById('player-subtitle').textContent = '❌ Stream blocked/offline';
        });
    }

    // Favorites Add / Remove Logic
    const favBtnEl = document.getElementById('fav-btn');
    if (favBtnEl) {
        favBtnEl.addEventListener('click', () => {
            if(!currentStation) return;
            
            const idx = favorites.findIndex(s => s.stationuuid === currentStation.stationuuid);
            
            if(idx > -1) {
                favorites.splice(idx, 1);
                favBtnEl.classList.remove('active');
            } else {
                const favStation = { ...currentStation };
                delete favStation.position;
                favorites.push(favStation);
                favBtnEl.classList.add('active');
            }
            
            localStorage.setItem('radioFavorites', JSON.stringify(favorites));
            
            if(currentMode === 'fav') {
                const searchInp = document.getElementById('search-input');
                if(searchInp) searchInp.dispatchEvent(new Event('input'));
            }
        });
    }

    /* --- AUDIO VISUALIZER ENGINE --- */
    let audioCtx, analyser, dataArray, source;
    const visContainer = document.getElementById('visualizer-container');
    const barCount = 48;
    const bars = [];

    // Initialize bars
    for(let i=0; i<barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'vis-bar';
        visContainer.appendChild(bar);
        bars.push(bar);
    }

    function initVisualizer() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        animateVisualizer();
    }

    function animateVisualizer() {
        requestAnimationFrame(animateVisualizer);
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        
        for(let i=0; i<barCount; i++) {
            const val = dataArray[i % (dataArray.length / 2)];
            const height = Math.max(4, (val / 255) * 50);
            bars[i].style.height = `${height}px`;
            bars[i].style.opacity = 0.3 + (val / 255) * 0.7;
        }
    }

    audio.addEventListener('play', () => {
        initVisualizer();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    // Play/Pause Button
    const playBtnEl = document.getElementById('play-btn');
    if (playBtnEl) {
        playBtnEl.addEventListener('click', () => {
            if(!audio.src) return;
            if(audio.paused) { audio.play(); playBtnEl.innerHTML = '⏸'; } 
            else { audio.pause(); playBtnEl.innerHTML = '▶'; }
        });
    }

    document.getElementById('volume-slider').addEventListener('input', (e) => { audio.volume = e.target.value / 100; });
    function escapeHtml(text) { if(!text) return ''; const div = document.createElement('div'); div.innerText = text; return div.innerHTML; }

    initApp();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('a09_sw.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW failed', err));
        });
    }

    /* --- SIDEBAR COLLAPSE LOGIC --- */
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    let collapseTimer;

    function resetCollapseTimer() {
        clearTimeout(collapseTimer);
        if (!sidebar.classList.contains('collapsed')) {
            collapseTimer = setTimeout(() => {
                sidebar.classList.add('collapsed');
            }, 10000); // 10 seconds
        }
    }

    sidebarToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        if (!sidebar.classList.contains('collapsed')) {
            resetCollapseTimer();
        }
    });

    // Reset timer on any interaction inside the sidebar or search
    sidebar.addEventListener('mousemove', resetCollapseTimer);
    sidebar.addEventListener('click', resetCollapseTimer);
    document.getElementById('search-input').addEventListener('input', resetCollapseTimer);

    // Initial timer start
    resetCollapseTimer();
</script>
</body>
</html>
